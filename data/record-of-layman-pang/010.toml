case_en = '''
Layman Pang went to see the Chan master at Mount Furong. The master held out some food. As Pang reached for it, Furong drew his hand back. "Long ago Vimalakirti scolded Shariputra for taking alms with a grasping mind. Drop the grasping, and will the food still taste sweet?"

"Wasn't Shariputra a real adept back then?" said Pang.

"That's beside the point."

"The food got right to his mouth," said Pang, "and you snatched it away."

At that, Furong set the food down.

"One word," said Pang, "and there's nothing left to say."

Then he asked, "When Master Ma really got down to teaching people, did he hand the whole thing over to you?"

"I've never even met the man," said Furong. "How would I know what he taught when he got down to it?"

"Just this much knowing," said Pang, "and there's nowhere to find it."

"You shouldn't go on and on with words, Layman."

"Go on with words and you lose the point. But box it into two sides, three sides, and can you open your mouth at all?"

"The plain fact is, there's no opening your mouth," said Furong. "Now that's the real thing."

Pang clapped his hands and walked out.
'''

