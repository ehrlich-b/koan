pointer = '''
Yaoshan and Shitou are both heavyweight teachers of Pang's day. The "One Vehicle" is the Mahayana claim that under all the apparent paths there is really one road to awakening, and Yaoshan is needling Pang about whether his hand-to-mouth daily grind fits inside something that grand. "Pick one up, set one down" means playing favorites, sorting things into keep and discard, which Pang calls amateur work even as Yaoshan turns the same phrase back on him as praise. The snow is the payoff: every flake lands exactly where it belongs, nothing out of place, no exceptions. When the student Quan treats that as a riddle with a hidden answer ("so where does it land?"), he has converted a plain fact into a puzzle, which earns the slap. Yama is the judge of the dead, so Pang is saying this confusion is no parlor game.
'''
