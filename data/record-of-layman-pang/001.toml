pointer = '''
This opens the record with its whole argument in one life: Layman Pang (died 808), the householder who woke all the way up without ever shaving his head, "layman" meaning he kept the wife, the clothes, and the day job. His first question to the master Shitou, "Who is the one not partnered with the ten thousand things," uses stock phrasing for everything that exists, so he is reaching for the self that isn't tangled into all of it, and Shitou's answer is to clap a hand over his mouth, at which something opens. The gesture works because the instant you name that self you have turned it back into one more item in the inventory, partnered with the rest. Pang's poem then plants enlightenment in hauling water and carrying firewood, done without grabbing at things or shoving them away, and when he is offered the monk's robe at the end he shrugs and stays an ordinary man, which is the bait set for every case ahead. So where exactly is the holy life supposed to happen, if not at the woodpile?
'''
