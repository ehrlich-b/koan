case_en = '''
One day Layman Pang was sitting in his thatched hut. Suddenly he said, "Hard, hard, hard — like spreading ten bushels of sesame seeds over a tree."

His wife said, "Easy, easy, easy — like your feet finding the floor when you climb out of bed."

Their daughter Lingzhao said, "Neither hard nor easy: the mind of the patriarchs, on the tip of every blade of grass."
