case_en = '''
One day Chan master Danxia Tianran came to visit the Layman. He had just reached the gate when he saw Pang's daughter Lingzhao carrying a vegetable basket. Danxia asked, "Is the Layman home?"

Lingzhao set down the basket, folded her hands, and stood there.

Danxia asked again, "Is the Layman home?"

Lingzhao picked up the basket and walked off. Danxia left.

A little later the Layman came back, and Lingzhao told him what had happened. The Layman said, "Was Danxia here?"

"He came and went," she said.

The Layman said, "Red dirt smeared on milk."

Soon after, Danxia came in to see the Layman. The Layman saw him coming and neither got up nor said a word. Danxia held up his whisk. The Layman held up his mallet.

Danxia said, "Just that? Or is there more?"

The Layman said, "Seeing you this time, you're not what you were before."

Danxia said, "Go ahead, knock down my reputation."

The Layman said, "A moment ago I took you down a peg."

Danxia said, "Then you've struck Tianran dumb."

The Layman said, "You're dumb in your very nature, and now you've dragged me into it too."

Danxia tossed down his whisk and started to leave. The Layman called after him, "Ran! Ran!" Danxia didn't look back. The Layman said, "Dumb, and deaf on top of it."

---

Another day Danxia came to visit the Layman. They met at the gate. Danxia asked, "Is the Layman home?"

The Layman said, "When you're starving you don't get to be picky."

Danxia said, "Is old Pang home?"

The Layman said, "Good god, good god," and went inside.

Danxia said, "Good god, good god," and turned to go.

---

One day Danxia asked the Layman, "How does yesterday's meeting compare to today's?"

The Layman said, "Play back yesterday's business the way it ought to go, and make it the eye of the whole school."

Danxia said, "Granting it's the eye of the school, does old Pang fit inside it?"

The Layman said, "I'm already inside your eye."

Danxia said, "My eye is narrow. Where would you find room to stand?"

The Layman said, "What's narrow about this eye? What's standing about this body?"

Danxia let it drop.

The Layman said, "One more line and you'd have rounded it off."

Danxia said nothing.

The Layman said, "That one line, nobody can speak it."

---

One day the Layman stood with folded hands in front of Danxia. After a moment he went back out. Danxia didn't look at him. The Layman came back and sat down. Then Danxia stood with folded hands in front of the Layman. After a moment he went into his quarters.

The Layman said, "You go in, I go out, and nothing's settled yet."

Danxia said, "This old man, in and out, in and out. When will it ever end?"

The Layman said, "You haven't a scrap of compassion."

Danxia said, "I'm the one who led this fellow to where he stands."

The Layman said, "Led me with what?"

Danxia picked up the Layman's headcloth and said, "You look just like an old monk."

The Layman set the headcloth on Danxia's head and said, "You look just like a young layman."

Danxia answered "Yes, yes, yes," three times.

The Layman said, "The old habit's still in you."

Danxia threw down the headcloth and said, "It looks just like an official's black cap."

The Layman answered "Yes, yes, yes," three times.

Danxia said, "How could I forget the old habit?"

The Layman snapped his fingers three times and said, "It moves heaven, it moves earth."

---

One day Danxia saw the Layman coming and made as if to run. The Layman said, "That's still the lunging pose. How about the moaning, flinching pose?"

Danxia sat down. The Layman walked up and drew the character for "seven" on the ground with his staff. Underneath it Danxia wrote the character for "one."

The Layman said, "Through seven you see one. See one and forget seven."

Danxia said, "Put a word right here."

The Layman cried out three times and left.

---

One day the Layman was walking with Danxia when they came to a pool of water. The Layman pointed at it and said, "Even just like this, you still can't sort it out."

Danxia said, "No doubt about it, can't sort it out."

The Layman scooped up two handfuls of water and splashed Danxia.

Danxia said, "Don't do that, don't do that."

The Layman said, "I have to, I have to."

Danxia scooped up three handfuls and splashed the Layman back. "At a moment like this," he said, "what's it good for?"

The Layman said, "Nothing outside."

Danxia said, "Few come out ahead."

The Layman said, "Who's the one who came out behind?"
