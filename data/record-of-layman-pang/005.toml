case_zh = '''
丹霞天然禪師一日來訪居士，纔到門首，見女子靈照携一菜籃。霞問曰：「居士在否？」照放下菜籃，斂手而立。霞又問：「居士在否？」照提籃便行。霞遂去。須臾，居士歸，照乃舉前話。士曰：「丹霞在麼？」照曰：「去也。」士曰：「赤土塗牛嬭。」霞隨後入見居士，士見來，不起亦不言。霞乃竪起拂子，士竪起槌子。霞曰：「只恁麼，更別有？」士曰：「這回見師，不似於前。」霞曰：「不妨減人聲價。」士曰：「比來拆你一下。」霞曰：「恁麼則瘂却天然口也。」士曰：「你瘂繇本分，累我亦瘂。」霞便擲下拂子而去。士召曰：「然闍黎！然闍黎！」霞不顧。士曰：「不惟患瘂，更兼患聾。」丹霞一日又訪居士，至門首相見，霞乃問：「居士在否？」士曰：「饑不擇食。」霞曰：「龐老在否？」士曰：「蒼天！蒼天！」便入宅去。霞曰：「蒼天！蒼天！」便回。霞一日問居士：「昨日相見何似今日？」士曰：「如法舉昨日事來，作箇宗眼。」霞曰：「祇如宗眼還著得龐公麼？」士曰：「我在你眼裏。」霞曰：「某甲眼窄，何處安身？」士曰：「是眼何窄？是身何安？」霞休去。士曰：「更道取一句，便得此語圓。」霞亦不對。士曰：「就中這一句，無人道得。」居士一日向丹霞前叉手立，少時却出去，霞不顧。士却來坐，霞却向士前叉手立，少時便入方丈。士曰：「汝入我出，未有事在。」霞曰：「這老翁出出入入，有甚了期？」士曰：「却無些子慈悲心。」霞曰：「引得這漢到這田地。」士曰：「把什麼引？」霞乃拈起士幞頭曰：「却似一箇老師僧。」士却將幞頭安霞頭上曰：「一似少年俗人。」霞應喏三聲。士曰：「猶有昔時氣息在。」霞乃拋下幞頭曰：「大似一箇烏紗巾。」士乃應喏三聲。霞曰：「昔時氣息爭忘得？」士彈指三下，曰：「動天動地。」丹霞一日見居士來，便作走勢。士曰：「猶是拋身勢，怎生是嚬呻勢？」霞便坐。士乃回前，以拄杖劃地作七字，霞於下面書箇一字。士曰：「因七見一，見一忘七。」霞曰：「這裏著語。」士乃哭三聲而去。居士一日與丹霞行次，見一泓水，士以手指曰：「便與麼也還辦不出。」霞曰：「灼然是辦不出。」士乃戽水潑霞二掬。霞曰：「莫與麼！莫與麼！」士曰：「須與麼！須與麼！」霞却戽水潑士三掬，曰：「正與麼時，堪作什麼？」士曰：「無外物。」霞曰：「得便宜者少。」士曰：「誰是落便宜者？」

