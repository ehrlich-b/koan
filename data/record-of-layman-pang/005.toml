pointer = '''
Danxia Tianran was a close friend of Pang's and a major teacher in his own right, and this is not one case but a whole reel of their meetings, the way two old friends keep replaying the same jokes for decades. The props carry the action: a whisk and a mallet are the gear a teacher brandishes to make a point in formal dialogue, so holding them up is a dueling gesture, and a headcloth marks you as a layman while an official's cap marks you as a worldly bureaucrat, which is why swapping headgear and calling each other "old monk" and "young layman" is affectionate mutual slander about who is the bigger fraud. The daughter Lingzhao opens the set by answering Danxia's question without a word, just setting down her basket and standing. None of these resolve into a winner. Two people who cannot be cornered keep daring each other to flinch.
'''
