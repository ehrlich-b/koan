pointer = '''
The Diamond Sutra is a core Buddhist text, and its central claim is that the solid-seeming "self" and "other" everyone assumes are empty, not really there as separate things. Pang catches a lecturer reciting exactly that line and springs the obvious trap: if there is truly no self and no other, who is up there talking and who is sitting here listening? The teacher freezes, having recited the words without standing inside them. Pang's verse twists gently, noting that even the sutra's own famous tags, "thus I have heard" and "I believe and accept," are borrowed labels, so quit performing the text on the lecture circuit and go straight for what it points at. The cruelty is mild, the teacher ends up delighted, and the closing remark is the real tribute to Pang: he carried no canned answer, he simply returned whatever came at him, like an echo answering a sound.
'''
