case_en = '''
The Layman was out selling bamboo strainers. Coming off a bridge, he stumbled and went down hard. His daughter Lingzhao saw it, ran over, and threw herself down on the ground beside him.

"What are you doing?" he said.

"I saw you fall," she said, "so I'm helping you up."
