pointer = '''
Pang lived by selling handmade bamboo goods on the road, and here, coming off a bridge, he takes a hard spill. Lingzhao, as quick as her father or quicker, doesn't rush over to haul him up the ordinary way. She drops to the ground beside him and calls that "helping you up." The point sits in the refusal: she will not stand over him as the rescuer above a victim, she meets him flat on the dirt exactly where he is. Read past the slapstick and it is the same instinct that runs through their whole record, two people declining the roles of the one who fixes and the one who needs fixing. It also sets up the deathbed in case 24, where she will outmaneuver him one last time.
'''
