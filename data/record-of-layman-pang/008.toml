case_en = '''
Layman Pang was drinking tea with Master Songshan. The Layman held up the tray and said, "Everyone has a full share of it. So why can't anyone say it?"

Songshan said, "Precisely because everyone has it, no one can say it."

The Layman said, "Then how come you can say it, brother?"

Songshan said, "I can't just say nothing."

The Layman said, "Right. Exactly." And Songshan went on drinking his tea.

The Layman said, "Brother, you're drinking your tea. Why don't you offer any to your guest?"

Songshan said, "Who's the guest?"

The Layman said, "Pang."

Songshan said, "Then why bother offering it?"

Later Danxia heard about this and said, "If it hadn't been Songshan, that old man would have thrown him for the rest of his life."

When the Layman heard that, he sent someone to tell Danxia: "Why not get the point before the tray was ever lifted?"

---

One day the Layman was watching a plow ox with Songshan. Pointing at the ox, he said, "He's perfectly content right where he is. He just doesn't know he's got it."

Songshan said, "If it weren't for you, who'd ever recognize that in him?"

The Layman said, "Master, you say he doesn't know he's got it. Got what?"

Songshan said, "He hasn't met Shitou yet, so no wonder he can't say it."

The Layman said, "And after he meets him?"

Songshan clapped his hands three times.

---

One day the Layman came to see Songshan and found him carrying a staff. He said, "What's that in your hand?"

Songshan said, "I'm getting on in years. I can't take a single step without it."

The Layman said, "Even so, you've still got plenty of strength left."

Songshan hit him with the staff.

The Layman said, "Drop that staff and ask me a real question."

Songshan threw down the staff.

The Layman said, "This old man. What he says first doesn't match what comes next."

Songshan let out a shout.

The Layman said, "Heaven help us. There's more grief here yet."

---

One day the Layman was walking with Songshan when they saw a monk sorting vegetables. Songshan said, "Toss the yellow leaves, keep the green ones."

The Layman said, "And not falling into yellow leaves at all?"

Songshan said, "You say it."

The Layman said, "Being neither host nor guest. Now that's hard."

Songshan said, "It's only because you keep forcing yourself to play host."

The Layman said, "Who doesn't?"

Songshan said, "No, no."

The Layman said, "The place where neither green nor yellow remains. That's the hard thing to say."

Songshan said, "And yet you manage to talk that way anyhow."

The Layman said, "Take care, everyone."

Songshan said, "Everyone's letting you off where you slipped."

And the Layman walked off.

---

One day Songshan was talking with the Layman when he suddenly picked up the ruler from the table and said, "Do you see this?"

The Layman said, "I see it."

Songshan said, "See what?"

The Layman said, "Songshan. Songshan."

Songshan said, "You can't not say it."

The Layman said, "How could I?"

Songshan threw down the ruler.

The Layman said, "All head and no tail. That kind of thing makes people sick."

Songshan said, "If it weren't you, old man, today you still wouldn't have measured up."

The Layman said, "Measured up to what?"

Songshan said, "All head and no tail."

The Layman said, "Find the weak inside the strong and there's something there. Find the strong inside the weak and there's nothing."

Songshan threw his arms around the Layman and said, "This old fellow. Right here there's nothing left to say."

---

The Layman asked Master Benxi, "When Danxia hit his attendant, what was he getting at?"

Benxi said, "The old man can see what's long and short in people."

The Layman said, "I'm only daring to ask because you and I studied under the same teacher."

Benxi said, "If that's how it is, lay it out from the top and we'll talk it over."

The Layman said, "A great old man shouldn't be gossiping with you about who's right and who's wrong."

Benxi said, "I'll allow it on account of your age."

The Layman said, "My mistake. My mistake."

---

One day Benxi saw the Layman coming and just stared at him for a long while. The Layman took his staff and drew a circle on the ground. Benxi stepped forward and stamped on it with his foot.

The Layman said, "What's that? What's that?"

Benxi then drew a circle in front of the Layman. The Layman stamped on it too.

Benxi said, "Coming, there's something. Going, there's nothing."

The Layman hugged his staff and stood there.

Benxi said, "Coming, there's something. Going, there's nothing."

The Layman said, "It's already complete on its own. You stared for nothing."

Benxi clapped his hands and said, "Remarkable. Not one thing gained."

The Layman tapped his way out with his staff, tap, tap.

Benxi said, "Watch the road. Watch the road."

The Layman said, "What's that? What's that?"
