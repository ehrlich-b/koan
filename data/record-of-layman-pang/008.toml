pointer = '''
Songshan and Benxi are the teachers Pang works over here, and the recurring stake is that "it," your own original nature, the awakening everyone is said to have already, cannot be pinned in words. So the masters keep trying to trap one another into either saying it, and being wrong for thinking it sayable, or going mute, and being wrong for clamming up. The ox "has it but doesn't know," which is the whole human condition in one animal. "Host and guest" is Chan shorthand for the split between self and other, knower and known, and the green-leaf, yellow-leaf sorting of the vegetables is that same split as the habit of dividing right from wrong. The circles drawn in the dirt and stamped flat say it plainly: a shape made, a shape erased, nothing gained. Pang's parting "what's that, what's that" simply bounces Benxi's helpful warning back at him, denying anyone the last word.
'''
