case_en = '''
Layman Pang went to see Qifeng. The moment he stepped into the temple, Qifeng said, "Some layman keeps barging in here. What's he after?"

Pang looked left, then right. "Who said that? Who said that?"

Qifeng gave a shout.

Pang said, "Right here."

Qifeng said, "Saying it to my face, are you?"

Pang said, "And what about behind your back?"

Qifeng turned his head around. "Look, look."

Pang said, "The bandit's routed. The bandit's routed."

Another day Qifeng was walking beside the Layman. Pang took one step ahead. "I'm one step stronger than you, teacher."

Qifeng said, "An old man has no front and no back, yet here you are wanting to come first."

Pang said, "Bitter inside bitter. That's not the line yet."

Qifeng said, "I'm afraid the old man won't let it go."

Pang said, "If this old man can't take it, what could Qifeng possibly take?"

Qifeng said, "If I had a stick in my hand, I'd beat you and never tire of it."

Pang stepped up and slapped him. "Not very nice."

Qifeng reached for his stick, but the Layman caught hold of him. "You bandit, today you've lost the whole game."

Qifeng laughed. "I'm the clumsy one. You're the clever one."

Pang clapped his hands. "Even match. Even match."

Another day the Layman asked Qifeng, "How many miles from here to the top of the peak?"

Qifeng said, "Where have you been coming from?"

Pang said, "Steep and rocky, terrifying. No use even asking."

Qifeng said, "How far is it, then?"

Pang said, "One, two, three."

Qifeng said, "Four, five, six."

Pang said, "Why not say seven?"

Qifeng said, "The moment you say seven, there's eight."

Pang said, "You can stop there."

Qifeng said, "Add as many as you like."

Pang shouted and walked out. Qifeng shouted right back.

Another day the Layman said, "No fair stating it straight out."

Qifeng said, "Then hand me back the master of the house, old Pang, the one standing here right now."

Pang said, "What, are you short a few wits?"

Qifeng said, "A fine greeting, but it misses the man."

Pang said, "Good one. Good one."
