pointer = '''
Qifeng is one more teacher in the parade, and these four run-ins are sparring matches, fast and half-friendly, each man trying to catch the other leaning on a fixed idea. When Pang crows "the bandit's routed," he has just caught Qifeng physically turning to look "behind his back," as though a real self could be sitting in front or behind. The counting game, one through eight, goes nowhere by design: you can always tack on the next number, so there is no final spot to land. The closer is the live trap. Qifeng dares Pang to "hand back the master of the house," to produce the genuine self standing right there, betting there is nobody to hand over. Pang's "are you short a few wits" is him declining the trade rather than walking into it.
