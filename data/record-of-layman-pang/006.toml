pointer = '''
Bailing is a monk Pang keeps running into, and across these four encounters the game is to corner the other into "saying" the thing that supposedly cannot be said, since the instant you say it you have already missed it. That is the meaning of Pang's "speak and I am already in the wrong." Notice that nobody ever actually answers a question here: they point at their own chest, blink, slap, or put on a hat and leave. Manjushri and Subhuti, the bodhisattva of wisdom and the Buddha's disciple famous for grasping emptiness, get name-dropped as the highest praise Bailing can muster. The finish is clean. Bailing reaches for the stick, the teacher's tool for striking a student, Pang grabs it and flips Bailing's own challenge back on him, get me off the hook, and for once the monk has nothing.
