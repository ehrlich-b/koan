pointer = '''
Pang earned his living plainly, and here he is selling his bamboo strainers in the Hongzhou market when a begging monk comes by. A monk lives on "faith and donations," alms from ordinary people who trust that the robe means the real thing, so "wasting" that means pocketing the handout without being awake. Pang dangles a coin to buy a real answer, the monk freezes, and Pang answers his own question, hardly anyone is even listening, before springing the hook. When the monk admits he doesn't get it, Pang's last line swivels the lamp onto him: never mind the doctrine, who is this "you" that fails to understand? That one, standing right there in the market, is the whole matter. Pang hands the question straight back to its owner.
'''
