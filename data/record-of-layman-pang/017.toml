case_zh = '''
居士一日在洪州市賣笊籬，見一僧化緣，乃將一文錢問曰：「不辜負信施道理，還道得麼？道得即捨。」僧無語。士曰：「汝問我，與汝道。」僧便問：「不辜負信施道理作麼生？」士曰：「少人聽。」又曰：「會麼？」僧曰：「不會。」士曰：「是誰不會？」

'''
case_en = '''
One day Layman Pang was in the Hongzhou market selling bamboo baskets. He saw a monk begging for alms. Pang took out a single coin and said, "Can you tell me how not to waste people's faith and donations? Tell me, and the coin is yours."

The monk said nothing.

"Ask me," said Pang. "I'll tell you."

So the monk asked, "How does one not waste people's faith and donations?"

"Hardly anyone's listening," said Pang. Then he added, "Get it?"

"No," said the monk.

"Who," said Pang, "is the one who doesn't get it?"
'''

