pointer = '''
The teacher Yangshan's name reads roughly as "Facing Up," and that pun runs the whole encounter. Pang comes in needling: I heard you were "Up," so why do you look down to me now? From there the two play keep-away with the up-down pair. Yangshan raises his whisk, the horsehair flapper a teacher brandishes, Pang agrees, Yangshan pins him with "up or down," and Pang refuses the either-or, smacking a pillar as his witness instead of picking a side. The live trap is the demand to choose up or down at all, when the awakened answer sits in neither slot. Yangshan's closing line is a friendly dare: go repeat this story at the other monasteries and hear how it holds up.
