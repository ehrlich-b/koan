case_zh = '''
居士訪仰山禪師。問：「久響仰山，到來為甚麼却覆？」山竪起拂子。士曰：「恰是。」山曰：「是仰是覆？」士乃打露柱曰：「雖然無人，也要露柱證明。」山擲拂子曰：「若到諸方，一任舉似。」

'''
case_en = '''
The Layman went to see Chan master Yangshan. "I've heard of you a long time, Yangshan — 'Facing Up.' So how is it that now I'm here, you're facing down?"

Yangshan held up his whisk.

"Just so," said the Layman.

"Is it up," Yangshan asked, "or down?"

The Layman struck the bare pillar. "No one else is here, but the pillar can vouch for me."

Yangshan threw down the whisk. "When you reach the other monasteries, tell it however you like."
'''

