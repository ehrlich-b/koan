pointer = '''
Pang opens on the teacher Luopu with a flat weather report: midsummer is brutal, early winter has a chill. Obvious, banal, true. Luopu suspects a hidden move and warns him not to slip, Pang shrugs it off as old age, and Luopu presses, if you are only stating plain facts, why not say cold when it is cold and hot when it is hot. The fight is over whether Pang's plainness is the genuine article or a pose dressed as plainness, and each tries to back the other into a corner. Luopu falls to the stock teacher's threat, twenty blows, and Pang turns it: you have struck me dumb and blinded your own eyes in the same stroke. The live question is whether you can tell ordinary plainness from the awakened kind that looks identical from the outside.
