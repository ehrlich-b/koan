case_zh = '''
居士到洛浦禪師，拜起，曰：「仲夏毒熱，孟冬薄寒。」浦曰：「莫錯。」士曰：「龐公年老。」浦曰：「何不寒時道寒，熱時道熱？」士曰：「患聾作麼？」浦曰：「放汝二十棒。」士曰：「瘂却我口，塞却汝眼。」

'''
case_en = '''
Layman Pang came to see Chan master Luopu. He bowed, rose, and said, "Midsummer, brutal heat. Early winter, a little chill."

Luopu said, "Don't get it wrong."

Pang said, "I'm getting old."

Luopu said, "Why not say cold when it's cold, hot when it's hot?"

Pang said, "What are you, deaf?"

Luopu said, "I'll let you off with twenty blows."

Pang said, "You've struck me dumb, and blinded yourself doing it."
'''

