pointer = '''
Lingzhao was every bit her father's match, and these household sparring matches thread the whole record. The "old line" Pang quotes is a stock Chan saying: the truth the founding teachers carried from India is not stashed in a temple or a scripture, it is right there in the roadside weeds, bright on every blade of grass. Pang asks her to interpret it, which is itself the trap, since an interpretation turns the living thing into a lecture. She first ribs him for even asking, then, pushed, simply says the line straight back, word for word, no gloss and no spin. Refusing to explain it is the answer, and his laugh concedes she got there. This is the same recognition the family circled in case 20, now boiled down to one repeated sentence.
'''
