case_en = '''
One day Layman Pang was sitting. He said to his daughter Lingzhao, "There's an old line: 'Clear and bright, the tips of the hundred grasses; clear and bright, the meaning of the founding teachers.' How do you read it?"

Lingzhao said, "A grown man, and you still talk this way?"

"Then how would you put it?" he asked.

She said, "Clear and bright, the tips of the hundred grasses; clear and bright, the meaning of the founding teachers."

The Layman laughed.
'''

