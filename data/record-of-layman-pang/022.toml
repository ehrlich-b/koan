case_zh = '''
居士一日坐次，問靈照曰：「古人道：『明明百草頭，明明祖師意。』如何會？」照曰：「老老大大，作這箇語話。」士曰：「你作麼生？」照曰：「明明百草頭，明明祖師意。」士乃笑。

