pointer = '''
Two teachers get sparred with here, Datong Puji and Changzi. "The lineage of Shitou" is the teaching line Pang trained in, so saying it "melts to slush" at Puji's place reads as half jab, half compliment: nothing solid is left to grab, which is exactly the aim. The objects do the work, a kitchen strainer, a door opening and shutting, an awl against a chisel, and each sets up the same move where one man tries to fix the truth as a thing or a reason and the other yanks it back out of reach. "Don't prop it up with reasons" means don't explain it, because the explanation is already the loss. At Changzi's place Pang grabs a clueless monk and shoves him off, and the awl-and-chisel trading at the end is two pros arguing over who sees only the sharp point and who sees only the square edge. The dances and finger-snaps are Pang calling the win and leaving before anyone can rebut.
'''
