case_zh = '''
居士訪大梅禪師。纔相見，便問：「久嚮大梅，未審梅子熟也未？」梅曰：「熟也。你向什麼處下口？」士曰：「百雜碎。」梅伸子曰：「還我核子來。」士便去。

'''
case_en = '''
Layman Pang went to see Chan master Damei. The moment they laid eyes on each other, Pang said, "I've heard about Big Plum a long time. Is the plum ripe yet?"

Damei said, "Ripe. So where will you set your teeth?"

Pang said, "I'll chew it to a hundred crumbs."

Damei held out his hand. "Then give me back the pit."

Pang walked off.
'''

