pointer = '''
The teacher here is Damei Fachang, and "Damei" means "Big Plum," which sets the whole exchange. Pang walks in asking whether the plum is ripe, that is, whether the man's realization is fully cooked. Damei plays along, grants that it is, then turns it around: so where will you set your teeth? Pang says he will chew it down to a hundred crumbs, no remainder, no trace left. Damei's comeback is the sting, since every plum has a pit, the hard kernel you cannot actually swallow, so hand it back. Pang doesn't argue the point. He just walks off, and leaving is its own reply about what is or isn't left over.
'''
