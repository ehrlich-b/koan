intro_en = '''
The Record of Layman Pang (Chinese: Páng Jūshì Yǔlù; Japanese: Hōkoji Goroku) preserves the sayings of Pang Yun, the most famous lay adept of Chan — a married householder who studied with Shitou and Mazu and held his own in dialogue with the great masters of the Tang. His exchanges, several of them with his equally awakened daughter Lingzhao, became stock cases in the later kōan collections. Unlike a numbered kōan anthology, this is recorded sayings: a short life-record and a series of encounter dialogues, which we have segmented into sequential passages.

The original text is public domain (from the Xuzangjing), set in our own punctuation. The translations and pointers are released under CC0.
'''
