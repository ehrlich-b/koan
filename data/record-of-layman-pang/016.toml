pointer = '''
Buddhism has rules for "dignified bearing," the prescribed way to sit, stand, and hold yourself while doing something sacred like reading scripture, and the passing monk scolds Pang for sprawling on his bed to read a sutra instead. Pang's whole reply is to stick a foot in the air at him: here is your dignified bearing. He is poking a hole in the assumption that the truth on the page depends on how you arrange the body in front of it. The monk, caught, can find no comeback. The thing left live is whether the foot is genuine freedom or just a householder's excuse for slouching, which is the same doubt that shadows half of Pang's stunts.
'''
