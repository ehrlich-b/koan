pointer = '''
Danxia, Pang's friend from case 5, is the offstage figure here. "Danxia's trick" has become shorthand for a clever Chan gesture that is hardening into a predictable gimmick, so the teacher Shilin dares Pang to produce a line that does not fall into it. A whisk is the horsehair baton a teacher waves, the usual prop in these face-offs. What follows is two pros feinting: Pang snatches the whisk and throws up a fist, Shilin calls it Danxia's move anyway, and then saying "I cannot say it" or going silent becomes part of the same fencing. The running joke is that they keep accusing each other of being "out of line" and "stingy with words" while doing precisely that on purpose, each trying to be the one who declines to be pinned.
'''
