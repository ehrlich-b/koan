pointer = '''
This is the death that made Pang a legend, and in this tradition a real adept is expected to be able to schedule dying and do it deliberately, sitting upright and composed. Pang plans his, sending Lingzhao to watch for noon. She pulls a fast one, lures him outside with a fake eclipse, then climbs into his seat and dies first, sitting up. "My girl is quick" is a proud father admiring the daughter who just beat him at his own game, one last echo of the bridge in case 23, so he postpones his own death a week. The parting line to the governor is the real bequest: empty yourself of all you have, and never make real what is not there, meaning don't hoard possessions or spiritual attainments, since it is all shadow and echo. Monks called him Vimalakirti, the enlightened layman of the sutras who out-argued the Buddha's disciples, which is the tradition admitting its patron saint of ordinary life never needed the robe.
'''
