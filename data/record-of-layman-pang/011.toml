pointer = '''
Zechuan is an old sparring partner of Pang's, roughly his own age, so the tone runs needling and competitive, two veterans ribbing each other about who has aged better. "Host and guest" is the Chan pairing at the center: the host is the one in charge, settled and planted, while the guest comes and goes, free and unattached. Each man keeps trying to shove the other into the host role, stuck and sitting bolt upright, while claiming the looser guest role for himself, which is the whole point of Zechuan dangling one foot down and then drawing it back as Pang circles. When Zechuan asks "but what of the host," Pang's answer is that Zechuan knows only the host and has forgotten the guest. Then Pang gets up and dances out the door, settling nothing and proving the point with his feet.
'''
