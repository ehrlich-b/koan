case_en = '''
The Layman went to see Zechuan. Zechuan said, "Do you still remember the point you grasped when you met Shitou?"

The Layman said, "You're still dragging that up?"

Zechuan said, "I'd have thought a longtime student would let such things go."

The Layman said, "And you're the older man, Master."

Zechuan said, "We were born around the same time. How much is in it?"

The Layman said, "Still hale, still spry. There I've got you beat."

Zechuan said, "You don't have me beat. You're just one headcloth short of me."

The Layman pulled off his own headcloth and said, "Now I'm the very image of you."

Zechuan only laughed.

Another day, while Zechuan was picking tea, the Layman said, "The whole dharma-realm can't hold this body of mine. Do you see me now?"

Zechuan said, "Were I not an old monk, I'd have answered that."

The Layman said, "A question, an answer. That's just the ordinary way of it."

Zechuan went on picking tea and paid no heed.

The Layman said, "Don't mind the idle question I tossed out just now."

Zechuan still wouldn't look up.

The Layman shouted, "You rude old man! Wait till I take every bit of this to someone with clear eyes."

Zechuan threw down his tea basket and went straight back to his quarters.

One day Zechuan sat in his quarters. The Layman came in and said, "All you know is sitting bolt upright in your room. You don't even notice a monk come to call."

Zechuan let one foot hang down. The Layman started to leave, took a few steps, then turned back. Zechuan drew his foot in.

The Layman said, "Free and easy, you might say."

Zechuan said, "But what of the host?"

The Layman said, "All you know is that there's a host. You don't know there's a guest."

Zechuan called his attendant to serve tea. The Layman broke into a dance and went out.
