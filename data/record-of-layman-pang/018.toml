case_en = '''
One day Layman Pang came upon a boy herding cattle. He asked, "Where does this road go?"

The boy said, "I don't even know what a road is."

Pang said, "You little cowherd."

The boy said, "You animal."

Pang said, "What time is it today?"

The boy said, "Rice-planting time."

Pang roared with laughter.
'''

