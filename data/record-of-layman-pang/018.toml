pointer = '''
Pang liked to probe whoever crossed his path, monks and farmhands alike, and here he tries it on a boy minding cattle, fishing for a clever answer with a leading question about where the road goes. The kid won't bite. He bats each question back, declining the "deep" frame and replying only with what is plainly in front of him, and when Pang asks the time he gets no hour, just the season, it is rice-planting time, full stop. The boy is doing without effort the thing Pang fights grown teachers to pin down, answering from exactly where he stands with nothing added. That is why Pang roars: he came to test the child and got tested instead.
