case_en = '''
During the Yuanhe years, Layman Pang traveled north into the Xiang and Han river country, settling wherever he came to rest. His daughter Lingzhao went with him, making bamboo strainers and selling them to keep the two of them fed.

The layman had a verse:

Mind is just so, and so is the world:
nothing solid, nothing empty either.
What is there, I don't bother with.
What is not, I don't cling to.
No sage, no saint,
just an ordinary man done with his business.

Easy, and easy again:
right here in these five heaps, real wisdom.
The worlds in all ten directions, one road.
The formless body of truth, how could it be two?
Throw off your troubles to go chasing enlightenment,
and good luck finding where the Buddha lives.

To guard life you must kill.
Kill it all, and only then can you rest.
Catch what this points to,
and an iron ship floats on the water.
'''

