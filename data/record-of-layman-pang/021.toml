pointer = '''
By now Pang is old and wandering broke through river country, with Lingzhao keeping them both fed by selling strainers, and this long verse is his summary of the whole view. It runs the stock terms past us: the "five heaps" are the Buddhist name for the bundle that makes up a person, body and sensation and perception and the rest, and the "formless body of truth" is the notion of one absolute reality behind all appearances. Pang's move throughout is to collapse the gaps people imagine, between trouble and enlightenment, ordinary and holy, here and some better elsewhere, which is why he says good luck finding where the Buddha lives if you throw off your troubles to go chasing it. The closing lines, to guard life you must kill, and an iron ship floats, are impossible on purpose. They are built to stall the part of you that wants to solve them, so that something else can look.
'''
