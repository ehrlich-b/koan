case_zh = '''
元和中，居士北遊襄漢，隨處而居。有女靈照，常鬻竹漉籬，以供朝夕。士有偈曰：
心如境亦如，無實亦無虗。
有亦不管，無亦不拘。
不是賢聖，了事凡夫。
易復易，即此五蘊有真智。
十方世界一乘同，無相法身豈有二？
若捨煩惱入菩提，不知何方有佛地。
護生須是殺，殺盡始安居。
會得箇中意，鉄船水上浮。

