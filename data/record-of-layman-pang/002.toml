case_en = '''
Later the Layman went to Jiangxi to study with Master Mazu. He asked, "Who is the one who keeps no company with the ten thousand things?"

Mazu said, "I'll tell you once you've swallowed the whole West River in a single gulp."

At those words the Layman saw it all at once. He wrote a verse that ended, "An empty mind passes the exam." Then he stayed on, studying under Mazu for two years.

He wrote another verse:

I have a son who won't marry,
a daughter who won't wed.
The whole family sits in a circle
talking the talk of no-birth.

One day the Layman asked Mazu again, "The original person, the one never in the dark. Master, raise your eyes and look."

Mazu looked straight down.

The Layman said, "It's the same stringless lute, but only you play it so well."

Mazu looked straight up.

The Layman bowed. Mazu went back to his quarters, and the Layman followed him, saying, "You just botched it, getting clever."

Another day the Layman asked Mazu, "Water has no bones, yet it carries a ship loaded with tons. How can that be?"

Mazu said, "Here there's no water and no ship. What bones are you talking about?"
