居士後之江西參馬祖大師，問曰：「不與萬法為侶者是什麼人？」祖曰：「待汝一口吸盡西江水即向汝道。」士於言下頓領玄旨，遂呈偈，有「心空及第」之句，乃留駐。參承二載，有偈曰：「有男不婚，有女不嫁，大家團圞頭，共說無生話。」士一日又問祖曰：「不昧本來人，請師高著眼。」祖直下覷。士曰：「一等沒絃琹，惟師彈得妙。」祖直上覷。士禮拜。祖歸方丈，士隨後曰：「適來弄巧成拙。」士一日又問祖曰：「如水無筋骨，能勝萬斛舟，此理如何？」祖曰：「這裏無水亦無舟，說什麼筋骨？」

