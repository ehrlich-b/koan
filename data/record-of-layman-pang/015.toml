case_zh = '''
居士訪谷隱道者。隱問曰：「誰？」士竪起杖子。隱曰：「莫是上上機麼？」士拋下杖子。隱無語。士曰：「只知上上機，不覺上上事。」隱曰：「作麼生是上上事？」士拈起杖子。隱曰：「不得草草。」士曰：「可憐強作主宰。」隱曰：「有一機人，不要拈槌竪拂，亦不用對答言辭。居士若逢，如何則是？」士曰：「何處逢？」隱把住。士乃曰：「莫這便是否？」驀面便唾。隱無語。士與一頌曰：
焰水無魚下底鈎，
覓魚無處笑君愁。
可憐谷隱孜禪伯，
被唾如今見亦羞。

'''
case_en = '''
Layman Pang went to see Guyin, a man of the Way.

Guyin asked, "Who's there?"

Pang held up his staff.

Guyin said, "Isn't that the highest move there is?"

Pang threw the staff down. Guyin had nothing to say.

Pang said, "You know the highest move, but you've missed the highest matter."

Guyin said, "Then what is the highest matter?"

Pang picked the staff back up.

Guyin said, "Don't be careless."

Pang said, "Pitiful, how hard you strain to play the master."

Guyin said, "There's a kind of person who needs no mallet to bang, no whisk to raise, no clever words to trade. If you met him, Layman, what would you do?"

Pang said, "Where would I meet him?"

Guyin seized hold of him.

Pang said, "So this is him?" and spat in his face. Guyin had nothing to say.

Pang handed him a verse:

In mirage water, no fish,
yet down goes your hook.
Fishing where nothing can be caught,
I laugh at all your worry.
Poor Guyin Zi, diligent master of Chan:
spat on, and to this day
a shame to look upon.
'''

