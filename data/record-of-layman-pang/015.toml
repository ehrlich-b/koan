pointer = '''
Guyin is a teacher Pang plainly doesn't rate, and the whole bout skewers a Chan cliche: masters loved dramatic wordless gestures, raising a staff, lifting a whisk, banging a mallet, as proof of having "got it." Pang baits Guyin into praising the raised staff, then drops it to show the gesture is hollow when you cling to it as proof. When Guyin brags about the rare adept who needs no gesture and no words, then physically grabs Pang to corner him with the question, Pang answers with the most wordless gesture available and spits in his face. The verse drives it home: Guyin is fishing hard in "mirage water," a heat-shimmer with no fish in it, all that diligent effort and nothing to catch. The live edge is that Pang's spit is either the freest move in the room or the same cheap theater he just mocked, and he leaves you to tell which.
'''
