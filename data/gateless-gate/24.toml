number = 24
slug = "leaving-speech-behind"
title_zh = "離卻語言"
title_en = "Leaving Speech Behind"
title_pinyin = ""

case_zh = '''
風穴和尚。因僧問。語默涉離微。如何通不犯。穴云。長憶江南三月裏。鷓鴣啼處百花香。
'''
case_en = '''
A monk asked Fengxue, "Speech and silence both slip into either separation or subtlety. How do you get through without breaking either one?"

Fengxue said, "I still remember Jiangnan in spring, the partridge calling, a hundred flowers in bloom."
'''

commentary_zh = '''
風穴機如掣電。得路便行。爭奈坐前人舌頭不斷。若向者裏見得親切。自有出身之路。且離卻語言三昧。道將一句來。
'''
commentary_en = '''
Fengxue's wit was lightning. The moment he saw the road, he took it. Even so, he couldn't keep from speaking with another man's tongue. See into this clearly and you'll find your own way out. Now set the trick of words aside and give me one line.
'''

verse_zh = '''
不露風骨句
未語先分付
進步口喃喃
知君大罔措
'''
verse_en = '''
A line that won't show its bones,
disclosed before he speaks.
Press him and his mouth runs on.
You can tell the man is lost.
'''

pointer = '''
Fengxue Yanzhao was a Chan master of the tenth century. The monk's question is a logic trap: in this tradition "separation" (li) means standing apart, transcendent and aloof, while "subtlety" (wei) means being woven invisibly into everything. The claim is that talking tips you toward one and falling silent tips you toward the other, so either way you've slipped off the fence. How do you answer without landing on a side? Fengxue ignores the whole frame and quotes a gorgeous old line of poetry about spring in southern China. The sting, which Wumen pounces on, is that even this lovely reply is still borrowed words, no different from the speech the monk was fretting about. So the real dare is to do it yourself, fresh, in one line.
'''
