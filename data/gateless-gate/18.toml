case_zh = '''
洞山和尚。因僧問。如何是佛。山云。麻三斤。
'''
case_en = '''
A monk asked Dongshan, "What is Buddha?"
Dongshan said, "Three pounds of flax."
'''

commentary_zh = '''
洞山老人參得些蚌蛤禪。纔開兩片。露出肝腸。然雖如是且道。向甚處見洞山。
'''
commentary_en = '''
Old Dongshan studied his way into a clam's notion of Zen: crack the shell a hair and out spill the guts. Fine. But tell me, where do you actually catch sight of Dongshan?
'''

verse_zh = '''
突出麻三斤
言親意更親
來說是非者
便是是非人
'''
verse_en = '''
Three pounds of flax, blurted out.
The words land close, the meaning closer.
Whoever comes to argue right and wrong
is the one right and wrong have caught.
'''

pointer = '''
Dongshan is a Chan master, and a monk asks him the biggest question going: what is Buddha, the awakened reality everyone's chasing? Dongshan doesn't lecture. He just names whatever's at hand, three pounds of flax, the raw stuff he might've been weighing out for robes, as if the question had a flat, ordinary answer. The bait is the itch to decode it, "flax must stand for X." Wumen's verse heads you off: the moment you start sorting his words into right answer and wrong answer, the sorting itself is the only mistake there is. Yunmen pulls the same crude move with the shit-stick in case 21.
'''
