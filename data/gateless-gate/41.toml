number = 41
slug = "bodhidharma-pacifies-the-mind"
title_zh = "達磨安心"
title_en = "Bodhidharma Pacifies the Mind"
title_pinyin = ""

case_zh = '''
達磨面壁。二祖立雪斷臂云。弟子心未安。乞師安心。磨云。將心來。與汝安。祖云。覓心了不可得。磨云。為汝安心竟。
'''
case_en = '''
Bodhidharma sat facing the wall. The Second Patriarch stood in the snow, cut off his own arm, and said, "Your disciple's mind is not at peace. Master, I beg you, set it at peace."

Bodhidharma said, "Bring me the mind and I'll set it at peace."

The Second Patriarch said, "I've searched for the mind and can't find it anywhere."

Bodhidharma said, "There. I've set it at peace."
'''

commentary_zh = '''
缺齒老胡。十萬里航海特特而來。可謂是無風起浪。末後接得一箇門人。又卻六根不具。咦謝三郎。不識四字。
'''
commentary_en = '''
The gap-toothed old foreigner sailed a hundred thousand miles, made the whole trip on purpose. Call it raising waves where there's no wind. In the end he picks up one disciple, and that one's missing a few parts. Hah. Xie Sanlang couldn't read four characters.
'''

verse_zh = '''
西來直指
事因囑起
撓聒叢林
元來是爾
'''
verse_en = '''
He came from the West and pointed straight,
and the whole thing began with a plea.
He set the monasteries buzzing,
and the trouble, in the end, was you.
'''

pointer = '''
Bodhidharma is the Indian monk credited with bringing Zen to China, then sitting nine years facing a wall. Huike, the Second Patriarch, is the man who stood in the snow all night and, the legend says, cut off his own arm to be taken seriously. He brings the request every meditator eventually brings: my mind won't settle, settle it for me. Notice that Bodhidharma offers no method. He says hand the anxious mind over, and Huike goes hunting and finds nothing to hand him. The cure was the looking: there was never a fixed thing called "my unsettled mind" sitting somewhere to be fixed. The verse drives it home, naming the only troublemaker in the whole nine-year affair. This is the wall the founder finally turns to face in person, and the wall turns out to be the one staring at it.
'''
