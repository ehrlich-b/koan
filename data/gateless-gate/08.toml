number = 8
slug = "xizhong-makes-a-cart"
title_zh = "奚仲造車"
title_en = "Xizhong Makes a Cart"
title_pinyin = ""

case_zh = '''
月庵和尚。問僧。奚仲造車一百輻。拈卻兩頭。去卻軸。明甚麼邊事。
'''
case_en = '''
Master Yue'an asked a monk, "Xizhong built carts with a hundred spokes. Strip off both ends, pull out the axle. Now what does it show?"
'''

commentary_zh = '''
若也直下明得。眼似流星。機如掣電。
'''
commentary_en = '''
See it right here, on the spot, and your eye is a shooting star, your mind a streak of lightning.
'''

verse_zh = '''
機輪轉處
達者猶迷
四維上下
南北東西
'''
verse_en = '''
Where the wheel turns on its pivot,
even the adept loses his way.
The four directions, above and below,
north, south, east, west.
'''

pointer = '''
Xizhong was China's legendary first cartwright, so "Xizhong's cart" stands for a flawlessly engineered machine, every part pulling its weight. Yue'an strips it bare: take off the wheels, pull the axle, and the working cart is gone. So what's left, and what does it "show"? The bait is to hunt for a tidy answer about the parts or the sum of them. He's pointing instead at whatever was driving the cart before you'd named a single piece, and the verse warns that even an expert spins out trying to pin that down. Not so different from asking where one-finger Zen lived once you take the finger away (3).
'''
