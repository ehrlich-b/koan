number = 34
slug = "knowing-is-not-the-way"
title_zh = "智不是道"
title_en = "Knowing Is Not the Way"
title_pinyin = ""

case_zh = '''
南泉云。心不是佛。智不是道。
'''
case_en = '''
Nanquan said, "Mind is not Buddha. Knowing is not the Way."
'''

commentary_zh = '''
南泉可謂。老不識羞。纔開臭口。家醜外揚。然雖如是。知恩者少。
'''
commentary_en = '''
You could say Nanquan is too old to feel shame. The moment he opens that foul mouth, he airs the family's dirty laundry for the whole street. Even so, few know enough to thank him for it.
'''

verse_zh = '''
天晴日頭出
雨下地上濕
盡情都說了
只恐信不及
'''
verse_en = '''
Sky clears, the sun comes out.
Rain falls, the ground turns wet.
He has told you everything, held nothing back.
His one fear is that you won't trust it.
'''

pointer = '''
Nanquan, the master who halves a cat in case 14, knocks down two of the slogans his students loved to chant. "Mind is Buddha" was Mazu's catchphrase from case 30, the idea that your own mind already is the awakened thing. And monks prized "knowing," wisdom and insight, as the road in. Nanquan torches both at once: don't mount "mind" on the wall as a trophy, don't mount "knowing" either. The commentary calls this airing the family's dirty laundry in the street, and adds that almost nobody is grateful for it, because people would rather keep their prized words. The verse says the truth is as obvious as sun after a clear sky and wet ground after rain, fully spelled out, and the only snag is whether you will trust something that plain instead of going off to hunt for something with more incense on it.
'''
