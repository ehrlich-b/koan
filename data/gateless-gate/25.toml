slug = "preaching-from-the-third-seat"
title_zh = "三座說法"
title_en = "Preaching from the Third Seat"
title_pinyin = ""

case_zh = '''
仰山和尚。夢見往彌勒所安第三座。有一尊者。白槌云。今日當第三座說法。山乃起白槌云。摩訶衍法離四句絕百非。諦聽諦聽。
'''
case_en = '''
Yangshan dreamed he went to Maitreya's place and took the third seat. One of the elders there struck the gavel and announced, "Today the one in the third seat will preach." Yangshan rose, struck the gavel himself, and said: "The teaching of the Great Vehicle is past all four propositions, past all hundred negations. Listen close. Listen close."
'''

commentary_zh = '''
且道是說法不說法。開口即失。閉口又喪。不開不閉十萬八千。
'''
commentary_en = '''
So tell me: was that preaching, or wasn't it? Open your mouth and you've lost it. Shut your mouth and you've lost it too. Neither open nor shut, and you're a hundred thousand miles off.
'''

verse_zh = '''
白日青天
夢中說夢
捏怪捏怪
誑謼一眾
'''
verse_en = '''
Broad daylight, clear blue sky,
he dreams up a dream.
Conjuring wonders, conjuring tricks,
he hoodwinks the whole crowd.
'''

pointer = '''
Yangshan was a real Chan master, but the whole scene is a dream: he has been bumped up to teach in the heaven where Maitreya, the buddha-to-be, holds court. He stands and announces that the great teaching is past the "four propositions" and the "hundred negations," the standard logical boxes Buddhist philosophy used to corner reality (it is, it isn't, both, neither, and every elaboration). Then, having said the real thing escapes all speech, he keeps speaking. Wumen's verse pushes the absurdity one more turn: this grand sermon happened inside a dream, so the wonders being preached are made up twice over. The live spot is the commentary's bind, that talking loses it and staying silent loses it too. So when even the no-answer is ruled out, what is the third seat actually for?
'''
