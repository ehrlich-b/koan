number = 19
slug = "ordinary-mind-is-the-way"
title_zh = "平常是道"
title_en = "Ordinary Mind Is the Way"
title_pinyin = ""

case_zh = '''
南泉因趙州問。如何是道。泉云。平常心是道。州云。還可趣向否。泉云。擬向即乖。州云。不擬爭知是道。泉云。道不屬知。不屬不知。知是妄覺。不知是無記。若真達不擬之道。猶如太虛廓然洞豁。豈可強是非也。州於言下頓悟。
'''
case_en = '''
Zhaozhou asked Nanquan, "What is the Way?"

Nanquan said, "Ordinary mind is the Way."

"Then should I aim at it?"

"The moment you aim, you miss."

"If I don't aim, how do I know it's the Way?"

Nanquan said, "The Way has nothing to do with knowing or not knowing. Knowing is delusion. Not knowing is blank. When you truly reach the Way beyond all aiming, it is wide open as empty sky. How could you force it into right and wrong?"

At those words Zhaozhou woke up.
'''

commentary_zh = '''
南泉被趙州發問。直得瓦解冰消分疏不下。趙州縱饒悟去。更參三十年始得。
'''
commentary_en = '''
Nanquan, hit with Zhaozhou's question, just came apart: ice melting, tiles falling, nothing left to explain. And even so, even granting Zhaozhou woke up, he still needed another thirty years to get it.
'''

verse_zh = '''
春有百花秋有月
夏有涼風冬有雪
若無閑事挂心頭
便是人間好時節
'''
verse_en = '''
Spring its hundred flowers, autumn its moon,
summer a cool wind, winter the snow.
Keep nothing idle snagged in your mind
and any season is the good one.
'''

pointer = '''
Nanquan and Zhaozhou are two heavyweight Tang masters; here Zhaozhou is still the student. "The Way," the Dao, is what he's after: call it awakening, ultimate truth, the real thing. The trap sits in his own questions. He keeps trying to aim at the Way as if it were a target across the room. Nanquan's point is that it isn't an object you can face toward and it isn't a fact you can know or fail to know, and the instant you grab for it that way you've turned it into one more thing and missed it. This is the tradition's homely face, kin to Zhaozhou's "wash your bowl" (7). The verse is the payoff: quit snagging your mind on stuff, and the plain day you're already standing in turns out to be the whole point.
'''
