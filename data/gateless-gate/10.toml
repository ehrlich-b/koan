title_zh = "清稅孤貧"
title_en = "Qingshui, Alone and Poor"
title_pinyin = ""

case_zh = '''
曹山和尚。因僧問云。清稅孤貧。乞師賑濟。山云。稅闍梨稅應諾。山曰。青原白家酒。三盞喫了猶道。未沾唇。
'''
case_en = '''
A monk said to Caoshan, "Qingshui is all alone and dirt poor. Master, please help me out."

Caoshan said, "Reverend Shui!"

"Yes," Qingshui answered.

Caoshan said, "You've knocked back three cups of the best wine in the house, and you still claim you haven't wet your lips."
'''

commentary_zh = '''
清稅輸機。是何心行。曹山具眼深辨來機。然雖如是且道。那裏是稅闍梨喫。酒處。
'''
commentary_en = '''
Qingshui made his play. What was he after? Caoshan had the eye for it and saw straight through what was coming. Even so, tell me: where did Reverend Shui drink that wine?
'''

verse_zh = '''
貧似范丹
氣如項羽
活計雖無
敢與鬥富
'''
verse_en = '''
Poor as Fan Dan,
proud as Xiang Yu,
not a coin to his name,
yet he steps up to outspend the room.
'''

pointer = '''
Caoshan is the teacher; Qingshui is a monk who walks in playing the pauper, "I've got nothing, give me something." It's a setup, because in this tradition begging the master for spiritual help is the standard opening of someone fishing for a teaching. Caoshan won't bite. He simply calls the monk's name, the monk answers "Yes," and that wide-awake "Yes" is the whole show, the everything he claims to be missing. So Caoshan ribs him: you've already downed three cups of the good stuff and you're standing here acting parched. The verse drops in two famous Chinese figures, Fan Dan the legendarily broke and Xiang Yu the legendarily cocky, to seal the joke: penniless on paper, swaggering like the richest man in the room, because he is.
'''
