number = 14
slug = "nanquan-cuts-the-cat"
title_zh = "南泉斬貓"
title_en = "Nanquan Cuts the Cat"
title_pinyin = ""

case_zh = '''
南泉和尚。因東西兩堂爭貓兒。泉乃提起云。大眾道得即救。道不得即斬卻也。眾無對。泉遂斬之。晚趙州外歸。泉舉似州。州乃脫履。安頭上而出。泉云。子若在即救得貓兒。
'''
case_en = '''
The monks of the east hall and the west hall were fighting over a cat. Nanquan grabbed it and held it up. "Say something," he told them. "Say the right word and I'll spare it. If you can't, I cut it in two." Nobody spoke. So Nanquan cut the cat in half.

That evening Zhaozhou came back from outside, and Nanquan told him what had happened. Zhaozhou took off his sandal, set it on his head, and walked out. Nanquan said, "If you'd been here, the cat would have lived."
'''

commentary_zh = '''
且道。趙州頂草鞋意作麼生。若向者裏下得一轉語。便見南泉令不虛行。其或未然險。
'''
commentary_en = '''
So tell me: what did Zhaozhou mean, balancing a sandal on his head? Drop one turning word here and you'll see Nanquan's order was no idle gesture. If you can't, watch your step.
'''

verse_zh = '''
趙州若在
倒行此令
奪卻刀子
南泉乞命
'''
verse_en = '''
Had Zhaozhou been there,
he'd have turned the order around,
seized the knife,
and left Nanquan begging for his life.
'''

pointer = '''
Nanquan is the teacher, Zhaozhou his sharpest student. Two halls of monks are squabbling over a cat, the kind of petty turf fight a monastery is supposed to be past. Nanquan turns it into a life-or-death exam: give me one real word right now, or the cat dies. Their silence isn't wisdom, it's freezing up with nothing live to offer, so he makes good on the threat. This is the blunt, shocking face of Zen, the same one that hands you a shit-stick in case 21. When Zhaozhou hears of it he doesn't argue or excuse, he balances a sandal on his head and walks out. Don't decode the sandal into a meaning; the point is that he answered with something free and alive while everyone else had gone stiff and mute.
'''
