number = 44
slug = "bajiao-staff"
title_zh = "芭蕉拄杖"
title_en = "Bajiao's Staff"
title_pinyin = ""

case_zh = '''
芭蕉和尚示眾云。爾有拄杖子。我與爾拄杖子。爾無拄杖子。我奪爾拄杖子。
'''
case_en = '''
Master Bajiao said to the assembly: "If you have a staff, I'll give you a staff. If you have no staff, I'll take your staff away."
'''

commentary_zh = '''
扶過斷橋水。伴歸無月村。若喚作拄杖。入地獄如箭。
'''
commentary_en = '''
It carries you across the river where the bridge is out. It walks you home to the village with no moon. Call it a staff, and you drop into hell like a loosed arrow.
'''

verse_zh = '''
諸方深與淺
都在掌握中
撐天并拄地
隨處振宗風
'''
verse_en = '''
The depths and the shallows of every place,
all of it here in your grip.
It holds up the sky, it braces the earth,
and wherever it goes, the old school roars.
'''

pointer = '''
A staff here is the walking stick a wandering monk carried, half travel gear and half mark of his office, always in hand. Bajiao hands out a riddle that runs backward: whoever already has one gets a second, whoever has none has even that nothing taken away. There is no clever rule about sticks hiding in it. The move lands the instant you reach for the word "staff" as a solid thing you could own or be robbed of, because that grabbing is the only loss on offer. Wumen's comment works both faces of it. The staff carries you over the washed-out bridge and walks you home through the moonless village, genuinely the most useful thing you have, right up until you mistake it for something real and it fires you into hell like a loosed arrow. Same stick, two destinations, and the fork is in your grip, not the wood.
'''
