number = 11
slug = "zhaozhou-examines-the-hermits"
title_zh = "州勘庵主"
title_en = "Zhaozhou Examines the Hermits"
title_pinyin = ""

case_zh = '''
趙州到一庵主處問。有麼有麼主豎起拳頭。州云。水淺。不是泊舡處。便行。又到一庵主處云。有麼有麼主亦豎起拳頭。州云。能縱能奪能殺能活。便作禮。
'''
case_en = '''
Zhaozhou came to a hermit's hut and asked, "Anybody home? Anybody home?" The hermit shot up a fist. Zhaozhou said, "Water's too shallow to dock a boat here," and walked off.

He came to another hermit's hut and asked, "Anybody home? Anybody home?" This hermit also shot up a fist. Zhaozhou said, "You can give and take, kill and bring to life," and bowed.
'''

commentary_zh = '''
一般豎起拳頭。為甚麼。肯一箇不肯一箇。且道。誵訛在甚處。若向者裏。下得一轉語。便見趙　州舌頭無骨。扶起放倒得大自在。雖然如是。爭奈趙州卻被二庵主勘破。若道二庵主有優劣。未具參學眼。若道無優劣。亦未具參學眼。
'''
commentary_en = '''
Both raised a fist, the same move exactly. So why bless the one and snub the other? Tell me, where's the catch? If you can set down one turning word right here, you'll see that Zhaozhou's tongue has no bone in it: he props a man up or knocks him flat, free as he pleases. And yet, for all that, the two hermits saw clean through him. Say one hermit was the better and you've no eye for practice yet. Say there was nothing to choose between them and you've no eye for practice yet either.
'''

verse_zh = '''
眼流星
機掣電
殺人刀
活人劍。
'''
verse_en = '''
Eyes like a shooting star,
mind like a lightning strike.
A blade that kills,
a sword that gives life.
'''

pointer = '''
Zhaozhou is the celebrated Tang master who tested people with throwaway lines. A "hermit" here is a monk living alone in a hut, off doing his own practice. Zhaozhou drops in on two of them, asks each the identical question, and gets the identical wordless reply, a raised fist. Then he praises one and walks out on the other. The bait is the obvious question, which fist was right, and the commentary slams that door the moment you reach for it: call one hermit better and you've no eye for practice, call them equal and you've no eye for practice either. The verdict was never about the gesture. It was about what Zhaozhou met, or didn't, in the person behind it, the same thing the boy's copied finger lacked in case 3.
'''
