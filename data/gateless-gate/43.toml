number = 43
slug = "shoushan-bamboo-staff"
title_zh = "首山竹篦"
title_en = "Shoushan's Bamboo Staff"
title_pinyin = ""

case_zh = '''
首山和尚。拈竹篦示眾云。汝等諸人若喚作竹篦則觸。不喚作竹篦則背。汝諸人且道。喚作甚麼。
'''
case_en = '''
Master Shoushan held up his bamboo staff and said to the assembly: "Call this a bamboo staff and you collide with it. Don't call it a bamboo staff and you turn your back on it. So tell me, what do you call it?"
'''

commentary_zh = '''
喚作竹篦則觸。不喚作竹篦則背。不得有語。不得無語。速道速道。
'''
commentary_en = '''
Call it a bamboo staff and you collide with it. Don't call it a bamboo staff and you turn your back on it. No words. No silence. Speak. Speak.
'''

verse_zh = '''
拈起竹篦
行殺活令
背觸交馳
佛祖乞命
'''
verse_en = '''
He lifts the bamboo staff
and gives the order: kill or let live.
Name it, deny it, both come charging,
and the buddhas and patriarchs beg for their lives.
'''

pointer = '''
Shoushan was a tenth-century Chan master. The bamboo staff is a short rod teachers kept on hand, and here it is bait. Call it a staff and you have swallowed the label, treating the word as if it were the thing. Refuse the word and you are denying the plain object an arm's length away. He has nailed both doors shut, then demands you walk through. Wumen's comment tightens the screw: no words, no silence, speak. That looks impossible only as long as you think the test is about the stick. It is the same either/or trap Bajiao sets next door (44) with his giving and taking, and the same gate Mu guards at the very front of the book: any answer you can hold is the wrong shape. So what comes out of you when both held answers are gone?
'''
