number = 29
slug = "not-the-wind-not-the-flag"
title_zh = "非風非幡"
title_en = "Not the Wind, Not the Flag"
title_pinyin = ""

case_zh = '''
六祖因風颺剎幡。有二僧對論。一云幡動。一云風動。往復曾未契理。祖云。不是風動不是幡動。仁者心動。二僧悚然。
'''
case_en = '''
The Sixth Patriarch was at the temple when the wind set a flag flapping. Two monks were arguing about it. One said, "The flag is moving." The other said, "The wind is moving." Back and forth they went, getting nowhere. The Patriarch said, "It is not the wind that moves, and not the flag. What moves is your mind." The two monks froze.
'''

commentary_zh = '''
不是風動。不是幡動。不是心動。甚處見祖師。若向者裏見得親切。方知二僧買鐵得金。祖師忍俊不禁一場漏逗。
'''
commentary_en = '''
Not the wind moving. Not the flag moving. Not the mind moving. So where do you find the Patriarch? See right into this, and you'll know the two monks paid for iron and walked off with gold. As for the Patriarch, he couldn't help himself, and the whole thing slipped out.
'''

verse_zh = '''
風幡心動
一狀領過
只知開口
不覺話墮
'''
verse_en = '''
Wind, flag, mind, all moving.
One charge covers the lot.
He knows only that his mouth came open.
He never feels the words hit the dirt.
'''

pointer = '''
The Sixth Patriarch is Huineng, the most famous figure in Chan history, and here he is a bystander to two monks bickering over a flapping temple flag: is it the flag that moves, or the wind. He drops the line everyone quotes, that it is your mind moving, and the monks freeze. The thing most readers miss is what Wumen does next. He turns on Huineng too, ruling out wind, flag, and mind alike, then saying the patriarch's famous answer also "slipped out," that he got caught naming a mover like the monks did. So "it's the mind" is not the safe correct answer that closes the case; it is one more spot the argument can land and miss. The verse charges all three movers under a single indictment. The monks paid for scrap iron and walked off with gold, but can you see why even Huineng's mic-drop is iron?
'''
