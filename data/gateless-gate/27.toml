number = 27
slug = "not-mind-not-buddha"
title_zh = "不是心佛"
title_en = "Not Mind, Not Buddha"
title_pinyin = ""

case_zh = '''
南泉和尚。因僧問云。還有不與人說底法麼。泉云有僧云。如何是不與人說底法。泉云。不是心不是佛不是物。
'''
case_en = '''
A monk asked Nanquan, "Is there a teaching that's never been told to anyone?"
"There is," said Nanquan.
"What is it, this teaching nobody's been told?"
Nanquan said, "Not mind. Not Buddha. Not a thing."
'''

commentary_zh = '''
南泉被者一問。直得揣盡家私。郎當不少。
'''
commentary_en = '''
One question, and Nanquan empties his pockets, hands over everything he owns. Sloppy of him.
'''

verse_zh = '''
叮嚀損君德
無言真有功
任從滄海變
終不為君通
'''
verse_en = '''
Spelling it out only cheapens you.
Silence is where the real work gets done.
Let the blue seas turn to dust,
still he won't spell it out for you.
'''

pointer = '''
Nanquan is the eighth-century master who, in case 14, cuts a cat in two; here a monk tries to corner him. He asks for the teaching too deep to have ever been spoken, which is a trap baited for a teacher: answer it and you have just spoken it. Nanquan walks in on purpose. "Not mind, not Buddha, not a thing" gives nothing to hold; it only knocks over every container the monk would pour an answer into, which is exactly why it can pass for the never-told teaching. The verse needles Nanquan for opening his mouth at all, then admits that even this much gives the secret away to no one, because there was no secret, only the habit of reaching for one. Watch what your own mind grabs when you read his three negations, and notice it grabbing.
'''
