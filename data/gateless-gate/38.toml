number = 38
slug = "buffalo-passes-the-window"
title_zh = "牛過窗櫺"
title_en = "A Buffalo Passes the Window"
title_pinyin = ""

case_zh = '''
五祖曰。譬如水牯牛過窗櫺。頭角四蹄都過了。因甚麼。尾巴過不得。
'''
case_en = '''
Wuzu said: It's like a buffalo passing through a window lattice. The head, the horns, all four hooves get through. So how is it the tail can't?
'''

commentary_zh = '''
若向者裏。顛倒著得一隻眼。下得一轉語。可以上報四恩下資三有。其或未然。更須照顧尾巴始得。
'''
commentary_en = '''
If, right here, you can turn yourself over, fix the single eye, and drop one turning word that lands, then you repay the four debts above and sustain the three realms below. If you can't, you had better keep watching that tail.
'''

verse_zh = '''
過去墮坑塹
回來卻被壞
者些尾巴子
直是甚奇怪
'''
verse_en = '''
Go forward, you fall in the pit.
Turn back, and you're wrecked.
This little scrap of a tail—
what a strange thing it is.
'''

pointer = '''
Wuzu (full name Wuzu Fayan, named for the mountain of the Fifth Patriarch where he taught) hands you a deliberately impossible picture. A water buffalo squeezes through a window lattice; the whole bulk of it, head, horns, body, four hooves, somehow makes it, and then the scrap of a tail gets stuck. The bait is to fix it by logic, to object that this cannot happen or that a tail is thinner than horns, treating the case like a brain-teaser with a solution. It is not asking for an explanation. The tail is whatever last small thing you cannot put down, the final bit of self you keep dragging along after everything else has supposedly gone through. The commentary's drop a turning word that lands is the live demand here, the same one in case 36, and the verse warns that going forward drops you in a pit and turning back wrecks you. So with the rest of the beast already through, what is your tail?
'''
