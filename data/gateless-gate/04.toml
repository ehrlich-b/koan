number = 4
slug = "barbarian-has-no-beard"
title_zh = "胡子無鬚"
title_en = "The Barbarian Has No Beard"
title_pinyin = ""

case_zh = '''
或庵曰。西天胡子。因甚無鬚。
'''
case_en = '''
Huo'an asked: "The barbarian from the West — why has he got no beard?"
'''

commentary_zh = '''
參須實參。悟須實悟。者箇胡子。直須親見一回始得。說親見。早成兩箇。
'''
commentary_en = '''
If you're going to study, study for real. If you're going to wake up, wake up for real. This barbarian: you have to meet him face to face, just once, and then it's yours. But say you've "met him face to face," and already there are two of you.
'''

verse_zh = '''
癡人面前
不可說夢
胡子無鬚
惺惺添懵
'''
verse_en = '''
Don't tell your dream
to a fool.
The barbarian has no beard:
clear eyes, and now you've fogged them.
'''

pointer = '''
The "barbarian from the West" is Bodhidharma, the Indian monk who supposedly carried Chan to China. Chinese painters always drew him as a fierce, wild-bearded foreigner; the beard is practically his logo. So the question is a trap wearing the mask of nonsense: why does the famously bearded man have no beard? There's no clever fact that resolves it. The instant you reach for an explanation you've split one thing into two, the actual Bodhidharma and your idea about him, which is the same crack Mu (1) opens. That's the last line of the verse: you had clear sight, then you talked yourself blind.
'''
