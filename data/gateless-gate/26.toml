number = 26
slug = "two-monks-roll-the-blind"
title_zh = "二僧卷簾"
title_en = "Two Monks Roll Up the Blind"
title_pinyin = ""

case_zh = '''
清涼大法眼。因僧齋前上參。眼以手指簾。時有二僧。同去卷簾。眼曰。一得一失。
'''
case_en = '''
The great teacher Fayan of Qingliang was about to give a talk before the noon meal. He pointed at the bamboo blind. Two monks went over together and rolled it up. Fayan said, "One got it, one missed."
'''

commentary_zh = '''
且道是誰得誰失。若向者裏著得一隻眼。便知清涼國師敗闕處。然雖如是。切忌向得失裏商量。
'''
commentary_en = '''
So tell me, which one got it and which one missed? Fit a single eye to this and you'll see exactly where Master Qingliang slipped. Even so, whatever you do, don't go sizing it up in terms of gain and loss.
'''

verse_zh = '''
卷起明明徹太空
太空猶未合吾宗
爭似從空都放下
綿綿密密不通風
'''
verse_en = '''
Rolled up, the wide sky shows clear and bright,
yet even that sky falls short of my school.
Better to let the whole sky go as well,
sealed close and seamless, no wind passing through.
'''

pointer = '''
Fayan, named here for his temple Qingliang, founded one of the major Chan houses; a roomful of monks is waiting on his talk. He just points at the window blind, two monks jump to roll it, and he grades them split: one got it, one missed, no reason given. That verdict is the bait. The reflex is to start scoring, to decide which monk passed, and the commentary cuts that off cold: fit one eye to this and don't go sizing it up as gain and loss. The verse then refuses the obvious reading too. Rolling the blind to reveal the open sky looks like the awakened move, but Fayan's school wants you to drop even that clear sky and seal everything shut. Since identical actions earned opposite marks, the question is what Fayan was watching that had nothing to do with the blind.
'''
