slug = "this-mind-is-buddha"
title_zh = "即心即佛"
title_en = "This Very Mind Is Buddha"
title_pinyin = ""

case_zh = '''
馬祖因大梅問。如何是佛。祖云。即心是佛。
'''
case_en = '''
Damei asked Mazu, "What is Buddha?"
Mazu said, "This very mind is Buddha."
'''

commentary_zh = '''
若能直下領略得去。著佛衣喫佛飯。說佛話行佛行。即是佛也。然雖如是。大梅引多少人。錯認定盤星。爭知道說箇佛字三日漱口。若是箇漢。見說即心是佛。掩耳便走。
'''
commentary_en = '''
Take this in directly, and you wear Buddha's clothes, eat Buddha's food, talk Buddha's talk, walk Buddha's walk. You are Buddha.

Even so, Damei has led no end of people to misread the scale. How could they know that saying the word "Buddha" once means three days rinsing out your mouth? A real one, hearing "this very mind is Buddha," covers his ears and runs.
'''

verse_zh = '''
青天白日
切忌尋覓
更問如何
抱贓叫屈
'''
verse_en = '''
Clear blue sky, broad daylight.
Whatever you do, don't go looking.
Ask once more, "What is it?"
and you're the thief, holding the loot, crying he's been robbed.
'''

pointer = '''
Mazu was an eighth-century master known for blunt, mind-stopping replies. His student Damei ("Big Plum") asks the largest question there is, what Buddha is, and Mazu hands back the plainest line in Zen: this very mind is Buddha, already yours, nothing to chase. The bait is taking that as a slogan to bank or a thing to go hunting. That is the "misreading the scale" in the commentary, fumbling the weights and landing on the wrong total. The word "Buddha" is so loaded that Wumen says speaking it once leaves a taste you need three days to rinse out. Which is why his sharpest student would not nod along; hearing "this very mind is Buddha" he covers his ears and bolts before the good news can set into one more idea to grip. Notice that the cure and the disease are the same four words, depending on whether you hold them.
'''
