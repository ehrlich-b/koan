number = 42
slug = "woman-comes-out-of-samadhi"
title_zh = "女子出定"
title_en = "The Woman Comes Out of Samadhi"
title_pinyin = ""

case_zh = '''
世尊昔因文殊至諸佛集處。值諸佛各還本處。惟有一女人。近彼佛坐入於三昧。文殊乃白佛。云何女人得近佛坐。而我不得。佛告文殊。汝但覺此女。令從三昧起。汝自問之。文殊遶女人三匝。鳴指一下。乃托至梵天。盡其神力。而不能出。世尊云。假使百千文殊亦出此女人定不得。下方過一十二億河沙國土。有罔明菩薩。能出此女人定。須臾罔明大士從地湧出。禮拜世尊。世尊敕罔明。卻至女人前。鳴指一下。女人於是從定而出。
'''
case_en = '''
Long ago, Manjushri came to a gathering of all the buddhas, just as they were each departing for their own realms. One woman alone remained, seated close beside the Buddha, sunk deep in meditation.

Manjushri asked the Buddha, "How is it that this woman gets to sit so near you, when I can't?"

The Buddha said, "Wake her. Bring her out of her trance and ask her yourself."

Manjushri circled the woman three times and snapped his fingers once. Nothing. He carried her up to the highest heaven and threw everything he had at her. Still she didn't stir.

The Buddha said, "A hundred thousand Manjushris couldn't pull this woman out of her meditation. But far below us, past more lands than there are grains of sand in twelve billion Ganges Rivers, lives a bodhisattva named Wangming. He can do it."

In an instant Wangming sprang up out of the earth and bowed to the Buddha. The Buddha told him to try. Wangming went and stood before the woman and snapped his fingers once, and at that she came out of her trance.
'''

commentary_zh = '''
釋迦老子做者一場雜劇。不通小小。且道文殊是七佛之師。因甚出女人定不得。罔明初地菩薩。為甚卻出得。若向者裏。見得親切。業識忙忙　那伽大定。
'''
commentary_en = '''
Old man Shakyamuni staged quite a little circus here, and it's no small thing. Tell me: Manjushri is teacher to seven buddhas. Why couldn't he get the woman out? Wangming has barely set foot on the path. Why could he? See straight into this, and right where your mind churns in its restless karmic fog, you'll find the dragon's deep stillness itself.
'''

verse_zh = '''
出得出不得
渠儂得自由
神頭并鬼面
敗闕當風流
'''
verse_en = '''
One can, one can't—
both of them perfectly free.
A god's face, a demon's mask,
even the failure carries it off.
'''

pointer = '''
The players: Shakyamuni, the Buddha; Manjushri, bodhisattva of wisdom, the one you'd bet on in any contest of insight; and Wangming, a beginner barely onto the path. Samadhi is deep meditative absorption, and the woman is so far under that the wisest being present cannot reach her, even hauling her up to the Brahma heaven. Read as a ranking puzzle it makes no sense, which is the door. Wisdom is exactly what fails here, because Manjushri arrives as someone who should be able to do it, and that someone is precisely what cannot get in. Wangming has no reputation to drag along, so there is nothing in his way. Wumen pushes you past scoring the two of them: the one who succeeds and the one who fails are both already free, so where does that leave your scorekeeping?
'''
