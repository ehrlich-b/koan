case_zh = '''
五祖曰。路逢達道人。不將語默對。且道將甚麼對。
'''
case_en = '''
Wuzu said: When you meet an adept on the road, don't greet them with words and don't greet them with silence. So tell me, how do you greet them?
'''

commentary_zh = '''
若向者裏。對得親切。不妨慶快。其或未然。也須一切處著眼。
'''
commentary_en = '''
If you can answer that one right to the bone, good for you. If you can't, you'd better keep your eyes open everywhere you go.
'''

verse_zh = '''
路逢達道人
不將語默對
攔腮劈面拳
直下會便會
'''
verse_en = '''
Meet an adept on the road:
no words, no silence.
A fist across the jaw,
splitting the face.
Get it right here, and you've got it.
'''

pointer = '''
Wuzu sets this up so the usual moves are gone before you start. An "adept" is someone who has already seen through the game, a peer rather than a beginner, so you cannot impress them with a clever line and you cannot fake depth by going quiet. Words and silence are the two reflexes everyone reaches for, and Wuzu nails both shut, then asks what is left to meet them with. The verse answers with a fist across the jaw, which is not advice to hit anybody; it is pointing at a live, immediate response that comes out before the talk-or-stay-silent calculation can run. This is the same dead end the buffalo gets stuck in next door (38) and the question Doushuai will press three times near the end (47): the demand for something direct, right now, with nowhere to hide. So when you meet that adept, what comes out of you before you have time to choose?
'''
