case_zh = '''
雲門因僧問。如何是佛。門云乾屎橛
'''
case_en = '''
A monk asked Yunmen, "What is Buddha?"
Yunmen said, "A dried shit-stick."
'''

commentary_zh = '''
雲門可謂。家貧難辨素食。事忙不及草書。動便將屎橛來。撐門拄戶。佛法興衰可見。
'''
commentary_en = '''
You could say Yunmen keeps a poor house: too broke to lay out a proper meal, too rushed to write a neat hand. The moment you ask, he shoves a shit-stick at you to prop the door open. You can see where the Buddhist teaching is headed.
'''

verse_zh = '''
閃電光
擊石火
眨得眼
已蹉過
'''
verse_en = '''
A flash of lightning,
sparks struck from flint.
Blink once
and it's already gone.
'''

pointer = '''
Yunmen, a tenth-century master of the Five Dynasties, was known for blunt one-shot answers. A monk lobs him the biggest question there is, what is Buddha, the awakened one, the whole point, clearly fishing for something lofty. Yunmen hands him a "dried shit-stick": back then the bathroom substitute for toilet paper was a thin stick, so he's reaching for about the crudest object a person could name. The jab is aimed at the monk's appetite for a holy, quotable answer; go looking for "Buddha" as some special thing out there and you've already walked past it. This is the shocking face of Zen that also cuts the cat in case 14. The verse drives it home: the real thing is gone in the time it takes to blink.
'''
