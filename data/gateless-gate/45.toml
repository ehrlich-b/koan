number = 45
slug = "who-is-he"
title_zh = "他是阿誰"
title_en = "Who Is He?"
title_pinyin = ""

case_zh = '''
東山演師祖曰。釋迦彌勒猶是他奴。且道他是阿誰。
'''
case_en = '''
Master Wuzu of Dongshan said, "Even Shakyamuni and Maitreya are his servants. So tell me — who is he?"
'''

commentary_zh = '''
若也見得他分曉。譬如十字街頭撞見親爺相似。更不須問別人。道是與不是。
'''
commentary_en = '''
If you can really see who he is, it's like running smack into your own father at a busy crossroads. You don't need to ask anyone else whether it's really him.
'''

verse_zh = '''
他弓莫挽
他馬莫騎
他非莫辨
他事莫知
'''
verse_en = '''
Don't draw his bow.
Don't ride his horse.
Don't take his side.
Don't mind his business.
'''

pointer = '''
Wuzu Fayan was an influential Chan teacher, the same Wuzu who opens "Who is he?" Shakyamuni is the historical Buddha and Maitreya is the buddha said to arrive in the future, two of the largest names Buddhism has. Calling even those two "his" servants points at something prior to any buddha at all, and then leaves you holding the dare to say what it is. The question is built to extract a noun, an answer you can set down on the table, and the reach for that noun is the miss. The verse turns practical: quit drawing his bow, quit riding his horse, quit wearing a buddha's or a teacher's identity like a borrowed coat. The "he" in the question is not somewhere out past Maitreya. So who is asking?
'''
