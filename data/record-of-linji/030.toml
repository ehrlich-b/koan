case_zh = '''
師因入軍營赴齋，門首見員僚，師指露柱問：「是凡？是聖？」員僚無語。師打露柱，云：「直饒道得，也秖是箇木橛。」便入去。

'''
case_en = '''
Linji was invited to a meal at an army camp. At the gate he ran into one of the officers. Pointing to a pillar, Linji asked, "Ordinary, or holy?"

The officer had nothing to say.

Linji struck the pillar and said, "Even if you'd found an answer, it's still just a block of wood." Then he went in.
'''

