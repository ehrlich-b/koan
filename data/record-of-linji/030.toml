pointer = '''
Linji takes his testing on the road, to an army camp, and works over an officer instead of a monk. He points at a plain wooden pillar and forces a choice: ordinary, or holy? The question is rigged, because it assumes the world sorts into two bins, sacred over here and mundane over there, and any answer accepts the bins. The officer freezes. Then comes the actual teaching in the punchline: pick either label and you have still missed it, it is a block of wood, and Linji whacks the pillar to shove the bare thing forward, the pillar itself before a word gets stuck to it. This is the same split he refuses with Puhua a few cases back, and it runs straight from his core claim that there is nothing holy to attain because the real person is already standing here, in the camp, looking at the wood.
'''
