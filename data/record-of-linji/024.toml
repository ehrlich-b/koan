pointer = '''
Now Linji holds the seat and others come to be checked. The shout was his signature blast of sound, meant to cut through thinking, and students copied it the way you'd copy a famous coach's move. The first monk answers Linji's question with a shout, borrowing the master's own weapon; Linji bows, plays along, then hits him the instant he gropes for a follow-up line, because that flicker of "what now?" gives away that the shout was theater. The fly-whisk, a horsehair swatter that became a teacher's prop, runs the same trap twice: one monk bows to it and turns it into a holy object, the next ignores it and strikes a pose of the opposite kind. There is no correct response sitting in Linji's pocket. He hits the scripted bow and the scripted non-bow alike, the way he keeps insisting nobody has to attain anything because the real person is already here (case 3); he is only checking whether anyone is home, or just running lines.
'''
