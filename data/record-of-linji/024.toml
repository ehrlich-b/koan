case_en = '''
Linji asked a monk, "Where are you coming from?"

The monk shouted.

Linji bowed and gestured for him to sit. The monk started to speak, and Linji hit him.

Later Linji saw another monk coming and held up his fly-whisk. The monk bowed. Linji hit him.

Then another monk came, and again Linji held up the fly-whisk. This monk paid it no mind. Linji hit him too.
'''

