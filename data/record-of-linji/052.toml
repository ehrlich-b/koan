pointer = '''
Huangbo sends Linji on an errand carrying a letter to Guishan, a major master with a huge community, and the trip becomes the bridge from Linji's training to his own teaching seat. At the door Yangshan, Guishan's sharp young disciple, opens with a riddle: he splits the letter into "Huangbo's part" and "the messenger's part" and dares Linji to say which is which. Linji answers with a slap, and Yangshan calls it good. The small talk that follows, how many monks does each house have, is the same trap in plainer clothes, and Linji keeps refusing to be pinned to a number or a name. The payoff is Yangshan's parting prophecy that Linji will head north and find a helper with "a head and no tail, a beginning and no end," brilliant and wild but unfinished. That helper is Puhua, and the case quietly fast-forwards to his arrival and his vanishing death, the same scene case 45 tells in full.
'''
