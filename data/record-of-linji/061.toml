case_zh = '''
到明化，化問：「來來去去作什麼？」師云：「秖徒踏破草鞋。」化云：「畢竟作麼生？」師云：「老漢話頭也不識。」

'''
case_en = '''
Linji came to see Minghua. Minghua said, "Coming and going, coming and going. What for?"

Linji said, "Just wearing out sandals."

Minghua said, "And in the end, what have you got?"

Linji said, "Old man, you can't even follow your own question."
'''

