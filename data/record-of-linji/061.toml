pointer = '''
By now Linji has visited a string of teachers, and Minghua needles him about exactly that: all this trekking temple to temple, what's it actually for? Linji's deadpan, "just wearing out sandals," flatly refuses to gild the journey as a noble spiritual quest; it's walking, and shoes die. Minghua pushes for the real haul, what have you got to show, and Linji turns the question inside out: the trouble isn't his empty hands, it's that Minghua is still convinced there's a "point" to be carried home and can't even hear his own question straight. This sits right beside Linji's deeper teaching that there is nothing to attain and nowhere to arrive, which makes the pilgrimage itself a little absurd. The wandering wears out sandals and produces no trophy, and for Linji that's not the joke's failure, it's the joke.
'''
