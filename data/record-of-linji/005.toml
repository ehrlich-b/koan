pointer = '''
The whisk is a horsehair fly-swatter every master kept on hand, and raising it is a wordless "here it is, right in front of you." The monks have clearly studied the choreography, the shout, the reach for the stick, but they are imitating the gestures, not seeing, and Linji can tell the difference instantly. The heart of this one is the memory he shares: under Huangbo he asked the same question three times and got beaten three times, and the blows landed "soft as a brush of grass," meaning he received them as the gift they were rather than as punishment. That is the bar. So when he offers his own stick and the last monk grabs for it, thinking he's been let in on the game, the stick comes down on him anyway. The biography (46) tells the full story of those three beatings; here you see how completely they became his method.
'''
