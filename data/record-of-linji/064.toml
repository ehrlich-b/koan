pointer = '''
Linji and Jinniu are both seasoned masters, and this is the pilgrimage's last sparring match before the record turns to Linji's death. In these meetings there's meant to be a "host," the one truly running the encounter, and a "guest," and the test is which man holds the role. Jinniu bars the doorway with his staff held crosswise and lectures Linji on the proper courtesies between host and guest; Linji ignores every word of it, taps the staff three times, walks past, and plants himself in the head seat, the host's chair. When Jinniu protests and starts to argue back, Linji hits him before the sentence forms, and Jinniu, rather than getting rattled, rolls with it and flops down playing dead, a wrestler taking the fall on purpose. Guishan's closing question, who won, gets the only straight answer: between equals there's no scoreboard, so both won and both lost, and the trap is believing the match was ever keeping score.
'''
