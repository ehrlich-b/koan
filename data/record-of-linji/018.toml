case_zh = '''
問：「如何是心心不異處？」師云：「爾擬問，早異了也，性相各分。道流莫錯！世、出世諸法，皆無自性，亦無生性，但有空名，名字亦空。爾秖麼認他閑名為實，大錯了也。設有，皆是依變之境。有箇菩提依、涅槃依、解脫依、三身依、境智依、菩薩依、佛依，爾向依變國土中覓什麼物？乃至三乘十二分教，皆是拭不淨故紙。佛是幻化身，祖是老比丘，爾還是娘生已否？爾若求佛，即被佛魔攝；爾若求祖，即被祖魔縛；爾若有求皆苦，不如無事。有一般禿比丘，向學人道：『佛是究竟，於三大阿僧祇劫修行果滿，方始成道。』道流！爾若道佛是究竟，緣什麼八十年後向拘尸羅城雙林樹間側臥而死去？佛今何在？明知與我生死不別。爾言三十二相、八十種好是佛，轉輪聖王應是如來，明知是幻化。古人云：『如來舉身相，為順世間情，恐人生斷見，權且立虛名。』假言三十二、八十也，空聲有身非覺體，無相乃真形。
「爾道佛有六通是不可思議。一切諸天、神仙、阿修羅、大力鬼亦有神通，應是佛否？道流莫錯！秖如阿修羅與天帝釋戰，戰敗，領八萬四千眷屬入藕絲孔中藏，莫是聖否？如山僧所舉，皆是業通、依通。夫如佛六通者不然，入色界不被色惑，入聲界不被聲惑，入香界不被香惑，入味界不被味惑，入觸界不被觸惑，入法界不被法惑。所以達六種色、聲、香、味、觸、法皆是空相，不能繫縛。此無依道人，雖是五蘊漏質，便是地行神通。
「道流！真佛無形，真法無相，爾秖麼幻化上頭作模作樣，設求得者，皆是野狐精魅，並不是真佛，是外道見解。夫如真學道人，並不取佛，不取菩薩、羅漢，不取三界殊勝，逈無獨脫，不與物拘。乾坤倒覆，我更不疑；十方諸佛現前，無一念心喜；三塗地獄頓現，無一念心怖。緣何如此？我見諸法空相，變即有，不變即無，三界唯心，萬法唯識，所以夢幻空花，何勞把捉？唯有道流目前現今聽法底人，入火不燒，入水不溺，入三塗地獄如遊園觀，入餓鬼畜生而不受報。緣何如此？無嫌底法。爾若愛聖憎凡，生死海裏沈浮。煩惱由心故有，無心煩惱何拘？不勞分別取相，自然得道須臾。爾擬傍家波波地學得，於三祇劫中終歸生死，不如無事向叢林中床角頭交脚坐。
「道流！如諸方有學人來，主客相見了，便有一句子語，辨前頭善知識。被學人拈出箇機權語路，向善知識口角頭攛過，看爾識不識？爾若識得是境，把得便拋向坑子裏。學人便即尋常，然後便索善知識語，依前奪之。學人云：『上智哉，是大善知識！』即云：『爾大不識好惡。』如善知識把出箇境塊子，向學人面前弄，前人辨得，下下作主，不受境惑。善知識便即現半身，學人便喝。善知識又入一切差別語路中擺撲，學人云：『不識好惡老禿奴。』善知識歎曰：『真正道流。』如諸方善知識，不辨邪正，學人來問菩提、涅槃、三身、境智，瞎老師便與他解說，被他學人罵著，便把棒打他，言：『無禮度。』自是爾善知識無眼，不得嗔他。有一般不識好惡禿奴，即指東劃西，好晴、好雨、好燈籠露柱。爾看眉毛有幾莖？這箇具機緣，學人不會，便即心狂。如是之流，總是野狐精魅、魍魎，被他好學人嗌嗌微笑，言：『瞎老禿奴惑亂他天下人。』道流！出家兒且要學道。秖如山僧往日，曾向毘尼中留心，亦曾於經論尋討，後方知是濟世藥、表顯之說，遂乃一時拋却，即訪道參禪。後遇大善知識，方乃道眼分明，始識得天下老和尚，知其邪正。不是娘生下便會，還是體究練磨，一朝自省。
「道流！爾欲得如法見解，但莫受人惑，向裏向外，逢著便殺：逢佛殺佛，逢祖殺祖，逢羅漢殺羅漢，逢父母殺父母，逢親眷殺親眷，始得解脫，不與物拘，透脫自在。如諸方學道流，未有不依物出來底。山僧向此間，從頭打：手上出來手上打，口裏出來口裏打，眼裏出來眼裏打。未有一箇獨脫出來底，皆是上他古人閑機境。山僧無一法與人，秖是治病解縛。爾諸方道流，試不依物出來，我要共爾商量。十年五歲，並無一人，皆是依草、附葉、竹木、精靈、野狐精魅，向一切糞塊上亂咬。瞎漢！枉消他十方信施，道我是出家兒，作如是見解。向爾道：無佛、無法、無修、無證，秖與麼傍家擬求什麼物？瞎漢！頭上安頭，是爾欠少什麼？
「道流！是爾目前用底，與祖佛不別，秖麼不信，便向外求。莫錯！向外無法，內亦不可得。爾取山僧口裏語，不如休歇無事去。已起者莫續，未起者不要放起，便勝爾十年行脚。約山僧見處，無如許多般，秖是平常著衣、喫飯，無事過時。爾諸方來者，皆是有心求佛、求法、求解脫、求出離三界。癡人！爾要出三界，什麼處去？佛祖是賞繫底名句。爾欲識三界麼？不離爾今聽法底心地。爾一念心貪是欲界，爾一念心瞋是色界，爾一念心癡是無色界，是爾屋裏家具子。三界不自道『我是三界』，還是道流目前靈靈地照燭萬般酌度世界底人，與三界安名。大德！四大色身是無常，乃至脾、胃、肝、膽、髮、毛、爪、齒，唯見諸法空相。爾一念心歇得處，喚作菩提樹；爾一念心不能歇得處，喚作無明樹。無明無住處，無明無始終。爾若念念心歇不得，便上他無明樹，便入六道、四生，披毛、戴角；爾若歇得，便是清淨身界。爾一念不生，便是上菩提樹，三界神通變化，意生化身，法喜禪悅，身光自照，思衣羅綺千重，思食百味具足，更無橫病。菩提無住處，是故無得者。
「道流！大丈夫漢，更疑箇什麼？目前用處，更是阿誰把得便用，莫著名字，號為玄旨。與麼見得，勿嫌底法。古人云：『心隨萬境轉，轉處實能幽，隨流認得性，無喜亦無憂。』道流！如禪宗見解，死活循然，參學之人，大須子細。如主客相見，便有言論往來，或應物現形，或全體作用，或把機權喜怒，或現半身，或乘師子，或乘象王。如有真正學人便喝，先拈出一箇膠盆子，善知識不辨是境，便上他境上作模作樣，學人便喝，前人不肯放，此是膏肓之病，不堪醫，喚作客看主。或是善知識不拈出物，隨學人問處即奪，學人被奪，抵死不放，此是主看客。或有學人應一箇清淨境出善知識前，善知識辨得是境，把得拋向坑裏。學人言：『大好善知識。』即云：『咄哉，不識好惡。』學人便禮拜，此喚作主看主。或有學人披枷帶鎖出善知識前，善知識更與安一重枷鎖，學人歡喜，彼此不辨，呼為客看客。
「大德！山僧如是所舉，皆是辨魔揀異，知其邪正。道流！寔情大難，佛法幽玄，解得可可地。山僧竟日與他說破，學者總不在意，千遍萬遍脚底踏過，黑沒焌地，無一箇形段，歷歷孤明。學人信不及，便向名句上生解，年登半百，秖管傍家負死屍行，檐却檐子天下走，索草鞋錢有日在。大德！山僧說向外無法，學人不會，便即向裏作解，便即倚壁坐，舌拄上齶，湛然不動，取此為是祖門佛法也。大錯！是爾若取不動清淨境為是，爾即認他無明為郎主。古人云：『湛湛黑暗深坑，寔可怖畏。』此之是也。爾若認他動者是，一切草木皆解動，應可是道也。所以動者是風大，不動者是地大，動與不動俱無自性。爾若向動處捉他，他向不動處立；爾若向不動處捉他，他向動處立。譬如潛泉魚，鼓波而自躍。大德！動與不動是二種境，還是無依道人用動、用不動。如諸方學人來，山僧此間作三種根器斷：如中下根器來，我便奪其境，而不除其法；或中上根器來，我便境法俱奪；如上上根器來，我便境法人俱不奪；如有出格見解人來，山僧此間便全體作用，不歷根器。
「大德！到這裏，學人著力處不通風，石火電光即過了也。學人若眼定動，即沒交涉，擬心即差，動念即乖。有人解者，不離目前。大德！爾檐鉢囊屎檐子，傍家走求佛求法，即今與麼馳求底，爾還識渠麼？活撥撥地，秖是勿根株，擁不聚，撥不散，求著即轉遠，不求還在目前，靈音屬耳。若人不信，徒勞百年。
「道流！一剎那間便入華藏世界，入毘盧遮那國土，入解脫國土，入神通國土，入清淨國土，入法界，入穢入淨，入凡入聖，入餓鬼畜生，處處討覓尋皆，不見有生、有死，唯有空名。幻化空花，不勞把捉，得失是非，一時放却。
「道流！山僧佛法的的相承，從麻谷和尚、丹霞和尚、道一和尚、廬山拽石頭和尚，一路行遍天下，無人信得，盡皆起謗。如道一和尚用處純一無雜，學人三百、五百，盡皆不見他意。如廬山和尚自在真正順逆用處，學人不測涯際，悉皆忙然。如丹霞和尚翫珠隱顯，學人來者皆悉被罵。如麻谷用處苦如黃蘗，近皆不得。如石鞏用處向箭頭上覓人，來者皆懼。如山僧今日用處，真正成壞，翫弄神變，入一切境，隨處無事，境不能換。
「但有來求者，我即便出看渠，渠不識我，我便著數般衣，學人生解，一向入我言句：『苦哉，瞎禿子，無眼人，把我著底衣認青、黃、赤、白。』我脫却入清淨境中，學人一見便生忻欲；我又脫却，學人失心，忙然狂走，言：『我無衣。』我即向渠道：『爾識我著衣底人否？』忽爾回頭，認我了也。大德！爾莫認衣，衣不能動，人能著衣。有箇清淨衣，有箇無生衣、菩提衣、涅槃衣，有祖衣，有佛衣。大德！但有聲名文句，皆悉是衣變，從臍輪氣海中鼓激，牙齒敲磕，成其句義，明知是幻化。大德！外發聲語業，內表心所法，以思有念，皆悉是衣。爾秖麼認他著底衣為寔解，縱經塵劫，秖是衣通，三界循還，輪回生死，不如無事，相逢不相識，共語不知名。今時學人不得，蓋為認名字為解，大策子上抄死老漢語，三重五重複子裹，不教人見，道是玄旨，以為保重。大錯！瞎屢生！爾向枯骨上覓什麼汁？有一般不識好惡，向教中取意度商量，成於句義，如把屎塊子向口裏含了，吐過與別人，猶如俗人打傳口令相似，一生虛過也。道我出家，被他問著佛法，便即杜口無詞，眼似漆突，口如楄檐，如此之類，逢彌勒出世，移置他方世界，寄地獄受苦。大德！爾波波地往諸方覓什麼物，踏爾脚板闊？無佛可求，無道可成，無法可得。外求有相佛，與汝不相似。欲識汝本心，非合亦非離。
「道流！真佛無形，真道無體，真法無相，三法混融，和合一處，辨既不得，喚作忙忙業識眾生。」

