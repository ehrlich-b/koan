case_en = '''
A monk asked, "What is the place where mind and mind don't differ?"

Linji said, "The instant you frame the question, you've already split them. Nature and form fall into two. Followers of the Way, don't make this mistake. All things, worldly and beyond the world, have no self-nature and no nature of being born. They're only empty names, and the names too are empty. You take these idle names for something real, and that's a vast mistake.

"Even granting there were something, it would be no more than a shifting, dependent state. There's a prop called enlightenment, a prop called nirvana, a prop called liberation, a prop called the three bodies, a prop called object-and-knowledge, a prop called bodhisattva, a prop called Buddha. In this country of shifting props, what are you hunting for? Right down to the three vehicles and the twelve divisions of the teachings, it's all so much paper for wiping off filth. Buddha is a phantom body. The ancestors are old monks. And you, weren't you born from a mother like anyone else? Go seeking Buddha and the Buddha-demon snatches you up. Go seeking the ancestors and the ancestor-demon ties you fast. Any seeking at all is suffering. Better to have nothing to do.

"There's a breed of bald-headed monk who tells students, 'Buddha is the final goal. Only after three immeasurable eons of practice, the fruit ripened, does he attain the Way.' Followers of the Way, if Buddha is the final goal, then why, after eighty years, did he lie down on his side between the twin trees outside Kushinagara and die? Where is Buddha now? Plainly his life and death were no different from mine. You say the thirty-two marks and the eighty fine features make a Buddha. Then a world-ruling king should be a Buddha too. Plainly these are phantoms. An old master said, 'The Buddha showed his bodily marks to suit the feelings of the world. Afraid people would slip into denial, he set up an empty name as a stopgap.' So we say thirty-two marks, eighty features. But a hollow sound with a body is not the awakened essence. No-form is the true form.

"You say Buddha's six powers are beyond imagining. But the gods, spirits, immortals, demigods, and mighty ghosts all have supernatural powers too. Should they be Buddhas? Followers of the Way, don't make this mistake. When the demigod Asura lost his war with the god Indra, he led his eighty-four thousand kin into the hole of a lotus thread and hid. Was that being a sage? The powers I just named are powers of karma, powers leaning on conditions. Buddha's six powers aren't like that. He enters the realm of form and form doesn't fool him, enters the realm of sound and sound doesn't fool him, enters the realms of smell, taste, touch, and mind, and none of them fool him. He sees clean through all six, form and sound and smell and taste and touch and mind, as empty appearances that cannot bind. This person of the Way who leans on nothing, even in a leaky body of the five aggregates, walks the earth with spiritual power.

"Followers of the Way, the true Buddha has no shape, the true Dharma has no form. You're only striking poses on top of phantoms. Whatever you turn up that way is a wild-fox spirit, a goblin, never the true Buddha. That's an outsider's view. The real student of the Way grabs at no Buddha, no bodhisattva, no arhat, none of the so-called glories of the three worlds. He stands utterly alone and free, snagged by nothing. Let heaven and earth turn over, I won't doubt. Let all the Buddhas of the ten directions appear before me, not a flicker of joy. Let the three hells suddenly gape open, not a flicker of fear. Why? Because I see all things as empty appearances. Conditions shift and they exist; conditions hold and they don't. The three worlds are only mind, the ten thousand things only consciousness. So why labor to clutch at dreams, phantoms, flowers in the air?

"Only one thing is real: the person right here in front of me, listening to this teaching now. Fire can't burn him, water can't drown him. He walks into the three hells like strolling a garden, walks among hungry ghosts and animals and takes on none of their fate. Why? Because he finds nothing to refuse. Love the holy and hate the ordinary, and you'll bob up and down in the ocean of life and death. Affliction comes of mind. No mind, and what does affliction grip? Stop slicing things up and grasping at appearances, and the Way is yours in a breath. But run around studying it with this teacher and that, and after three eons you'll still come back to life and death. Better to sit cross-legged in a corner of the meditation hall with nothing to do.

"Followers of the Way, when students come from all over and host and guest size each other up, the student tosses out a phrase to test the teacher, a tricky scrap of word-bait flung past the corner of his mouth, to see whether you catch it. Recognize it for the baited trap it is, and you grab it and pitch it down a hole. Then the student settles, and asks the teacher to speak, and again you snatch it away. The student says, 'Brilliant. What a great teacher.' And you say, 'You can't even tell good from bad.' Or a teacher holds up a lump of some state and dangles it in front of a student. The student sees it for what it is, stays master through and through, and the bait doesn't fool him. Then the teacher shows half his body, and the student shouts. The teacher tries again, thrashing through every kind of fancy talk, and the student says, 'You bald old fool who can't tell good from bad.' And the teacher sighs, 'A true follower of the Way.'

"But teachers everywhere can't tell straight from crooked. A student comes asking about enlightenment, nirvana, the three bodies, object-and-knowledge, and the blind old teacher launches into an explanation. The student curses him, and he grabs a stick and hits him, crying, 'How rude!' That's your own blindness, teacher. You've no right to be angry at him. Then there's another breed of bald fool who can't tell good from bad. He points east and waves west: 'Fine weather, fine rain, fine lanterns and pillars!' Look, how many hairs in those eyebrows? When a student with real readiness won't play along, the teacher goes out of his mind. Such people are all wild-fox spirits, goblins, ghouls, and the good students just snicker at them and call them blind old bald fools throwing the whole world into confusion.

"Followers of the Way, those who've left home must learn the Way. Take me. In the old days I put my heart into the monastic discipline, and I dug through the sutras and treatises besides. Later I saw they were only medicine for the world's ills, words pointing at something, so I threw the whole lot down at once and went looking for the Way, taking up Chan. Then I met a great teacher, and only then did my eye for the Way come clear, and I could read the whole world at last. A real teacher who can tell straight from crooked isn't born knowing it. It comes of grinding away until one day you wake to yourself.

"Followers of the Way, if you want true understanding, just let no one fool you. Whatever you meet, inside or out, kill it. Meet a Buddha, kill the Buddha. Meet an ancestor, kill the ancestor. Meet an arhat, kill the arhat. Meet your parents, kill your parents. Meet your kin, kill your kin. Only then are you free, snagged by nothing, slipped clean through, your own master. Students of the Way everywhere, not one has come out without leaning on something. Here, I hit them right off the top. Out through the hands, I hit the hands. Out through the mouth, I hit the mouth. Out through the eyes, I hit the eyes. Not one has come out alone and free. They're all climbing onto the dead tricks and traps of the old masters. I've no Dharma to hand anyone. I only cure sickness and untie knots. Students of the Way from everywhere, try coming out without leaning on anything. I'd like to talk it over with you. In five years, ten years, not one has done it. They all lean on grasses, cling to leaves, bamboo, trees, spirits, wild-fox phantoms. They bite wildly at every clod of dung, the blind fools, squandering the gifts of the faithful from the ten directions, and they call themselves monks while holding views like that. So I tell them: no Buddha, no Dharma, nothing to practice, nothing to prove. What are you chasing, off to the side like that? Setting a head on top of your head, you blind fools. What is it you lack?

"Followers of the Way, what's at work in you right now is no different from the Buddhas and ancestors. You just won't believe it, so you go looking outside. Make no mistake. There's no Dharma outside, and no laying hold of it inside either. Don't take the words from my mouth. Better to rest and have nothing to do. What's already arisen, don't carry on. What hasn't arisen, don't let it start. That beats ten years of pilgrimage. The way I see it, there's nothing to all of it. Just be ordinary: put on your clothes, eat your food, pass the time with nothing to do. You who come from all over, every one of you has a mind set on seeking Buddha, seeking Dharma, seeking liberation, seeking a way out of the three worlds. You fools. You want out of the three worlds, and go where? Buddha and ancestor are pretty names to chain you up.

"Want to know the three worlds? They're nowhere but in the very mind listening to this teaching now. One greedy thought in your mind is the world of desire. One angry thought is the world of form. One deluded thought is the formless world. They're the furniture in your own house. The three worlds don't announce, 'We are the three worlds.' It's you, followers of the Way, the person right here, bright and alive, taking the measure of the whole world, who pins the names on the three worlds.

"Worthy ones, this body of the four elements is impermanent, right down to spleen and stomach, liver and gallbladder, hair and nails and teeth. See only that all things are empty appearances. Wherever your mind can rest a single thought, call that the bodhi tree. Wherever it can't, call that the tree of ignorance. Ignorance has no dwelling place, no beginning and no end. If thought after thought your mind can't rest, you climb the tree of ignorance, you fall into the six paths and the four kinds of birth, you grow fur and horns. If your mind can rest, that's the pure body and realm. The moment one thought stops arising, you climb the bodhi tree, work miracles across the three worlds, take any shape you please. Joy in the Dharma, bliss in meditation, your own light shining of itself. Want clothes, a thousand layers of silk. Want food, a hundred flavors spread before you. And never a sudden illness. Enlightenment has no dwelling place, and so no one attains it.

"Followers of the Way, what's a real man got left to doubt? Right here in front of you, at work, who is it that takes hold and uses it? Don't get stuck on the names. Call it the hidden meaning. See it so, and there's nothing left to refuse. An old master said, 'Mind turns with the ten thousand circumstances, and the turning runs deep. Know your nature in the flow, and there's neither joy nor sorrow.'

"Followers of the Way, in the view of the Chan school, life and death run in order, and the student must look hard. When host and guest meet, words pass back and forth. One may take a shape to fit the moment, may act with the whole body, may wield a trick of anger or delight, may show half a body, may ride a lion, may ride an elephant. A real student shouts and first holds up a bowl of glue. The teacher can't tell it's a trap and falls to striking poses on top of it. The student shouts again, and won't let go. This is a sickness in the marrow, past curing. It's called the guest examining the host.

"Or the teacher holds nothing up, and snatches away whatever the student asks. The student, robbed, holds on for dear life. This is the host examining the guest.

"Or a student steps out before the teacher with some pure state. The teacher sees it for a trap and throws it down a hole. The student says, 'What a fine teacher.' The teacher says, 'Tsk, you can't tell good from bad.' The student bows. This is the host examining the host.

"Or a student steps out before the teacher in a cangue and chains, and the teacher loads on a second cangue and chains, and the student is delighted. Neither one can tell what's going on. This is the guest examining the guest.

"Worthy ones, the things I keep holding up are all for sorting out demons and weeding out frauds, for telling straight from crooked. Followers of the Way, the truth of it is very hard. The Buddha-Dharma is deep and dark, and barely can it be understood. I spend whole days spelling it out, and the students pay no mind at all. A thousand times, ten thousand times they trample right over it. Pitch dark, no shape to it, yet vivid and shining alone. The students can't quite trust it, so they go cooking up understanding out of names and phrases. They turn fifty, and all they do is run around hauling a corpse on their shoulders, lugging their burden across the world. The day will come when they're billed for their straw sandals.

"Worthy ones, I say there's no Dharma outside, and the student doesn't get it, so he turns inward to make sense of it. He props himself against a wall, sits, tongue to the roof of his mouth, perfectly still, and takes that for the Buddha-Dharma of the ancestors. Big mistake. Take that motionless, pure state for the real thing, and you've made ignorance itself your master. An old master said, 'A pitch-black bottomless pit, truly something to dread.' That's exactly it. And take the one that moves for the real thing, and, well, grass and trees all move, so they should be the Way too. So: what moves is the wind element, what's still is the earth element. Moving and still both have no self-nature. Try to catch him where he moves, and he stands where it's still. Try to catch him where it's still, and he stands where it moves. Like a fish hidden in a spring, beating the waves, leaping out on its own. Worthy ones, moving and still are two states, and the person of the Way who leans on nothing uses the moving and uses the still.

"When students come from all over, I sort them here by three grades of capacity. If one of middling or lower capacity comes, I snatch his state away but leave his Dharma. If one of middling-to-high capacity comes, I snatch away both state and Dharma. If one of the very highest capacity comes, I snatch away state, Dharma, and person, all three. And if one comes whose view is off the charts, here I act with the whole body and don't bother grading capacity at all.

"Worthy ones, at this point the student's effort lets no breath of air through. It's over in a flash of flint-spark, a streak of lightning. If the student's eye so much as wavers, there's no connection. Try to figure it with your mind and you've missed it. Stir a thought and it's gone wrong. Whoever gets it is never far from what's right in front of him. Worthy ones, you haul your bowl-bag and your dung-sack of a body, running off to the side to seek Buddha, seek Dharma. This very thing chasing after, right now, do you know who it is? Vivid and alive, with no root and no stem. You can't gather it up, can't scatter it. Seek it and it backs away; don't seek it and it's right in front of you. Its sacred sound fills your ears. If a man won't trust it, he wastes a hundred years.

"Followers of the Way, in a single instant you enter the Lotus-Treasury world, enter the land of Vairochana, the land of liberation, the land of supernatural power, the pure land, the Dharma-realm. You enter the foul and the pure, the ordinary and the holy, the hungry ghosts and the animals. Search high and low everywhere, and you find no birth and no death anywhere, only empty names. Phantoms, flowers in the air, no need to clutch at them. Gain and loss, right and wrong, let them all go at once.

"Followers of the Way, my Buddha-Dharma comes down a clear, unbroken line, from master Magu, master Danxia, master Daoyi, master Lushan, master Shigong. One road, walked the whole world over, and no one believed them. Every one of them was slandered. Take master Daoyi: his way of working was pure and unmixed, and three hundred, five hundred students couldn't catch his meaning. Take master Lushan: free and true, working with the grain and against it, and the students couldn't sound his depths and were all at a loss. Take master Danxia: playing with the pearl, now hidden, now shown, and every student who came got cursed. Take Magu: his way of working was bitter as the huangbo tree, and no one could get near. Take Shigong: his way of working was to hunt for a man at the arrow's point, and everyone who came was terrified. As for my way of working today: true making and breaking, playing with transformations, entering every state, at ease wherever I am, and no state can move me.

"Whenever someone comes seeking, I come out and look him over, but he doesn't know me. So I put on a few different robes, and the student starts making sense of them and chases right into my words: 'How awful, the blind bald fool, the sightless one.' I grab the robe he's got me in and he sees blue, yellow, red, white. Then I strip it off and step into a pure state, and one look and the student goes all eager and longing. Then I strip that off too, and the student loses his mind, runs around frantic, crying, 'I've no robe!' And I say to him, 'Do you know the man who wears the robes?' All at once he turns his head, and he knows me.

"Worthy ones, don't take the robe for the man. The robe can't move on its own; the man wears the robe. There's a pure robe, a no-birth robe, a bodhi robe, a nirvana robe, an ancestor robe, a Buddha robe. Worthy ones, anything with sound or name, word or phrase, is nothing but a change of robe, stirred up from the sea of breath at the navel, knocked into shape by clacking teeth, made into phrases and meanings. Plainly it's all phantoms. Worthy ones, the speech that goes out and the mental states marked within, the thinking that holds a thought, all of it is robes. Take the robe somebody's wearing for real understanding, and through endless eons it's nothing but knowing robes, round and round the three worlds in the cycle of life and death. Better to have nothing to do: meet and not know each other, talk together and never learn each other's names. Students these days fail because they take names for understanding. They copy some dead old fool's words into a fat notebook, wrap it in three or five layers of cloth, won't let anyone see it, call it the hidden meaning, and treasure it. Dead wrong, you blind fools. What juice are you hunting in dry bones?

"There's a breed who can't tell good from bad. They pick guesses out of the teachings, work them into phrases and meanings, like holding a clod of dung in your mouth and spitting it out for somebody else. Like villagers passing a whispered message down the line, a wasted life. They say, 'I've left home,' and the moment someone asks them about the Buddha-Dharma, they shut their mouths, no words, eyes like soot-holes, mouths slack as a yoke. People like this, even when Maitreya comes into the world, will be shipped off to another world and parked in hell to suffer. Worthy ones, what are you running all over the place to find, until you've walked your feet flat? There's no Buddha to seek, no Way to attain, no Dharma to get. Seek an outward Buddha with form, and it'll look nothing like you. Want to know your own true mind? It's neither joined to you nor apart from you.

"Followers of the Way, the true Buddha has no shape, the true Way has no body, the true Dharma has no form. The three blend and fuse into one place. Where you can't sort them out, that's what we call the muddled, busy karmic-conscious crowd."
