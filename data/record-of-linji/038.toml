case_zh = '''
趙州行脚時參師，遇師洗脚次，州便問：「如何是祖師西來意？」師云：「恰值老僧洗脚。」州近前作聽勢，師云：「更要第二杓惡水潑在。」州便下去。

'''
case_en = '''
Zhaozhou, traveling on foot, came to study with Linji and found him washing his feet. He asked, "What is the meaning of Bodhidharma coming from the West?"

Linji said, "You've caught this old monk washing his feet."

Zhaozhou stepped closer, cupping his ear as if straining to hear.

Linji said, "You want a second ladle of dirty water thrown on you?"

Zhaozhou walked off.
'''

