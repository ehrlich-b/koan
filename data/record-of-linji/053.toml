pointer = '''
The summer retreat was a fixed three-month stretch when monks were bound to stay put, so Linji breaking it to visit Huangbo, then trying to slip away early, is a real breach, which is why the needling about it runs through the scene. He finds his teacher reading scriptures and zings him: "I took you for a real man, and you're just an old monk counting black beans," counting beans being the dig for grinding through words on a page and mistaking ink for the living thing. The hitting and slapping that follow are the lineage's live testing, and Huangbo's roar of laughter means Linji landed it. Then Huangbo calls for the founder Baizhang's own meditation board and armrest, the lineage heirlooms, which is him naming Linji his heir; Linji's "bring me some fire" says he'd sooner burn the relics than lean on them, and Huangbo loves it. Guishan and Yangshan close by spelling out the law of transmission this whole stretch has been dramatizing: a student who merely matches his teacher is worth half, and only one who surpasses him is fit to carry it on.
