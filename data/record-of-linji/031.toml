pointer = '''
One of the longer stretches of testing, four people stress-tested back to back. The thread to watch is the borrowed move: students had learned that a sudden shout supposedly proved you had cut through ordinary mind, and that a smooth gesture could pass for insight, and they keep trying these on Linji to win his nod. The steward sells off the monastery's millet and figures he can "sell" the line Linji scratches in the dirt too, treating a live demand like more inventory. The cook explains the steward instead of showing his own hand. The lecture-master, a scholar-monk who teaches scripture, files Linji's "same or different" question into a tidy textbook answer. Lepu, Linji's young attendant, shouts to look like he has it. Every one of them gets hit, and the lesson is not that the shout is wrong but that any move performed to earn approval is just another place to hide. Compare case 41, where Linji lays out what a real shout is, and case 35, where Lepu tries this same shout and eats the same stick.
'''
