pointer = '''
This is the densest knot in the record, and Linji built it that way on purpose. The monk keeps asking him to rank the teaching, first statement, second, third, as if awakening came in tiers you could file away. Linji answers each with a cryptic image instead of a definition (the official's seal stamping instant and undeliberated; Manjushri and Wuzhuo, two enlightened figures from a legendary debate where even the sharpest words couldn't pin truth down; the puppet jerking on its strings), then springs the structure: every statement holds three "mysteries," every mystery three "essentials." Do the arithmetic and you get a system that never bottoms out, which is the answer hiding in plain sight. He is not handing over a ladder to climb. The puppet image is the tell, every clever tiered answer is just a doll twitching on strings, and the only thing worth noticing is the hand working it, the same "true person" from case 3 that no ranking can reach.
'''
