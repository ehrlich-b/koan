pointer = '''
Picking up the monk's question from the talk just before (14), Linji takes the "four elements," the old physics where earth, water, fire, and air make up body and world, and pairs each with an emotion that hijacks you: doubt sits heavy as earth, craving drowns like water, anger burns, giddy joy blows you off your feet. None of these is the problem once you stop letting it run the show. Then the part with teeth: Manjushri, Samantabhadra, and Avalokiteshvara are the three superstar bodhisattvas, revered for wisdom, virtue, and compassion, and Mount Wutai was the famous pilgrimage where you went to "find" Manjushri in the flesh. Linji says cancel the trip. There is no Manjushri on the mountain. The wisdom you'd hike for is the ordinary, undoubting awareness already working in you this second, the same "leaning on nothing" listener from case 14. That is the only holy there is, which is exactly why looking for it elsewhere fails.
'''
