pointer = '''
Linji (died 866), fiercest of the Tang masters and founder of the line that became Rinzai, is asked to draw the line between Buddha and demon, and he won't draw it: the "demon" is your own flicker of doubt and grasping, "Buddha" is that same mind once it quits clutching, so the line you wanted runs down the middle of your own attention. From there he undercuts every stage you might climb, no waiting and no cultivation and nothing to attain, because the "true person, alone and bright" listening right now already is it. His sharpest image is "hunting for your head with your own head," a search that fails precisely by being a search, and that is the engine of his whole record, knocking the seeking out of the seeker's hands. So when he warns against teachers who "stamp a seal on your face" and certify your awakening, notice he is refusing to hand you one too. The thing he won't validate is the thing you came for.
'''
