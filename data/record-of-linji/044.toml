pointer = '''
A bookend to case 23: there Linji tested his teacher Huangbo, here Huangbo sends him out on an errand, so he is still the apprentice being aimed like a weapon. Jingshan runs a marquee monastery, five hundred monks, but the story tells you it has gone slack, plenty of bodies and nobody actually pressing. The Dharma hall is the formal teaching room, and marching in with your travel pack still strapped on is a calculated insult, mud on the boardroom carpet. Watch the timing, because it is the whole move: Jingshan never gets a single word out, Linji shouts the instant he lifts his head and walks the instant he tries to reply, so there is no exchange, nothing for Jingshan to grip and look good holding. Then "more than half" the monks scatter, read it as Linji blowing the doors off a hollow operation. To his credit Jingshan will not paper over it, "go ask him yourself," which is closer to passing the test than anything his five hundred were doing.
'''
