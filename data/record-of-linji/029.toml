pointer = '''
A sparring match dressed up as a courtesy call. The old monk's opening is a trap baited with etiquette: you bow to the teacher in a monastery, so "bow, and it's right? don't bow, and it's right?" dares Linji to either accept the homage or look like he is dodging it. Linji answers with the shout, no words, raw presence, and the old monk bows anyway, needles him, and bolts before he can be pinned, the "thief, thief" routine Puhua ran in the last few scenes. "Guest" and "host" are the standard names for the two seats in any encounter, the one being tested and the one running the test, a distinction Linji teaches hard elsewhere. The head monk tries to referee, rules that both men blew it, then cannot say where the fault lies and flees too. Nanquan, an older master hearing it secondhand, shrugs the whole thing off: two well-fed government horses kicking at each other, evenly matched, lots of noise, no winner.
'''
