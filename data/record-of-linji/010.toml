This long evening talk has two halves. First, another of Linji's confrontation tools: four ways of "taking away," canceling the person, the surrounding situation ("ground"), both, or neither, each answered not with a definition but with a picture (warm sun on the earth, the king's command, two provinces cut off from each other, the king on his throne while the farmer sings). Don't decode them like cipher, feel the different weight of each. Then the rant that is the spine of the whole record arrives: the one sickness is that you don't trust yourself, so you go scrambling after teachers and scriptures and exalted states "outside," when the only thing that actually hears and lives is the awareness reading this sentence. The shocking lines, buddhas and saints as "filth in a latrine," enlightenment as "a stake for tying up a donkey," aren't blasphemy for sport, they are Linji smashing every external idol you might kneel to instead of waking up. Yajnadatta, at the end, is the man in the old story who went mad hunting for his head while it sat on his shoulders, the same joke he'll tell flat out in case 20.
