case_zh = '''
師晚參示眾云：「有時奪人不奪境，有時奪境不奪人，有時人境俱奪，有時人境俱不奪。」時有僧問：「如何是奪人不奪境？」師云：「煦日發生鋪地錦，瓔孩垂髮白如絲。」僧云：「如何是奪境不奪人？」師云：「王令已行天下遍，將軍塞外絕烟塵。」僧云：「如何是人境兩俱奪？」師云：「并汾絕信，獨處一方。」僧云：「如何是人境俱不奪？」師云：「王登寶殿，野老謳歌。」師乃云：「今時學佛法者，且要求真正見解。若得真正見解，生死不染，去住自由，不要求殊勝，殊勝自至。道流！秖如自古先德，皆有出人底路。如山僧指示人處，秖要爾不受人惑，要用便用，更莫遲疑。如今學者不得，病在甚處？病在不自信處。爾若自信不及，即便忙忙地徇一切境轉，被他萬境回換，不得自由。爾若能歇得念念馳求心，便與祖佛不別。爾欲得識祖佛麼？秖爾面前聽法底是。學人信不及，便向外馳求；設求得者，皆是文字勝相，終不得他活祖意。莫錯，諸禪德！此時不遇，萬劫千生輪回三界，徇好境掇去，驢牛肚裏生。道流！約山僧見處，與釋迦不別。今日多般用處，欠少什麼？六道神光未曾間歇。若能如是見得，秖是一生無事人。大德！三界無安，猶如火宅，此不是爾久停住處。無常殺鬼一剎那間，不揀貴、賤、老、少。爾要與祖佛不別，但莫外求。爾一念心上清淨光，是爾屋裏法身佛；爾一念心上無分別光，是爾屋裏報身佛；爾一念心上無差別光，是爾屋裏化身佛。此三種身，是爾即今目前聽法底人，秖為不向外馳求，有此功用。據經論家，取三種身為極則；約山僧見處不然，此三種身是名言，亦是三種依。古人云：『身依義立，土據體論。』法性身、法性土，明知是光影。大德！爾且識取弄光影底人，是諸佛之本源，一切處是道流歸舍處。是爾四大色身不解說法聽法，脾胃肝膽不解說法聽法，虛空不解說法聽法，是什麼解說法聽法？是爾目前歷歷底，勿一箇形段孤明，是這箇解說法聽法。若如是見得，便與祖佛不別。但一切時中更莫間斷，觸目皆是。秖為情生智隔，想變體殊，所以輪回三界，受種種苦。若約山僧見處，無不甚深，無不解脫。道流！心法無形，通貫十方，在眼曰見，在耳曰聞，在鼻嗅香，在口談論，在手執捉，在足運奔。本是一精明，分為六和合。一心既無，隨處解脫。山僧與麼說，意在什麼處？秖為道流一切馳求心不能歇，上他古人閑機境。道流取山僧見處，坐斷報化佛頭，十地滿心猶如客作兒，等妙二覺擔枷鎖漢，羅漢、辟支猶如廁穢，菩提、涅槃如繫驢橛。何以如此？秖為道流不達三祇劫空，所以有此障礙。若是真正道人，終不如是，但能隨緣消舊業，任運著衣裳，要行即行，要坐即坐，無一念心希求佛果。緣何如此？古人云：『若欲作業求佛，佛是生死大兆。』大德！時光可惜，秖擬傍家波波地學禪、學道，認名、認句，求佛、求祖、求善知識，意度莫錯。道流！爾秖有一箇父母，更求何物？爾自返照看。古人云：『演若達多失却頭，求心歇處即無事。』大德！且要平常，莫作模樣。有一般不識好惡禿奴，便即見神、見鬼，指東劃西，好晴、好雨。如是之流，盡須抵債，向閻老前吞熱鐵丸有日。好人家男女，被這一般野狐精魅所著，便即揑怪瞎屢生，索飯錢有日在。」

