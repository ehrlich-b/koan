pointer = '''
This begins a run of four scenes with Puhua, the holy fool who shadows Linji and refuses to be pinned (his thread pays off when he climbs into his own coffin at case 45). Linji opens with a stock scriptural image, a single hair holding the whole ocean, a mustard seed holding Mount Sumeru, the infinitely large folded into the infinitely small, then springs the trap: is that a miracle, or just how things plainly are? Both answers swallow the bait. Puhua skips the question and kicks the dinner table over, twice. The live snag is "crude versus fine": Linji keeps grading the kick on a scale of coarse and refined, and Puhua keeps throwing the scale out, since the Dharma does not come in grades to rank. Linji ends by sticking out his tongue, the face you make when you have been caught flat and you know it.
'''
