case_en = '''
A monk asked, "What are the five sins with no reprieve?"

Linji said, "Killing your father, murdering your mother, drawing the Buddha's blood, breaking up the harmony of the community, burning the sutras and images. Those are the five sins with no reprieve."

"And what is the father?"

Linji said, "Ignorance is the father. The instant your mind goes looking for where things start and stop and comes up empty, like an echo answering empty space, at ease wherever you are: that is killing the father."

"What is the mother?"

Linji said, "Craving is the mother. The instant your mind dives into the realm of desire hunting for its cravings and sees nothing but the empty shape of things, with nothing anywhere to grab onto: that is murdering the mother."

"What is drawing the Buddha's blood?"

Linji said, "In the pure dharma-realm you let no single thought of understanding arise, so you stand surrounded by darkness. That is drawing the Buddha's blood."

"What is breaking up the harmony of the community?"

Linji said, "The instant your mind sees straight through the knots and shackles of affliction, with nothing to lean on, empty as space: that is breaking up the community."

"What is burning the sutras and images?"

Linji said, "When you see that cause and effect are empty, mind is empty, things are empty, and in a single instant you cut it all off dead, free and clear with nothing left to do: that is burning the sutras and images.

"Friends, see it like this and no one's labels, 'ordinary,' 'holy,' can trip you up. But you spend your whole lives taking an empty fist or a pointing finger for something real, conjuring ghosts out of the senses and their objects, putting yourselves down and backing off. 'I'm just an ordinary man, he's the saint.' You bald-headed fools! What's the hurry? You dress up in a lion's skin and yelp like a fox. You have a man's body and won't breathe like a man. You won't trust the treasure in your own house, so you go scrounging for it outside, chasing some dead master's pet phrases, betting on shadows instead of sunlight, never breaking through on your own. Meet a situation and you tangle in it, meet some dust and you grab it, stirring up confusion everywhere, never settled.

"Followers of the Way, don't take what I say for gospel. Why not? Because it has nothing to back it up. It is a picture sketched on empty space for the moment, like a painted figure, no more.

"Followers of the Way, don't make the Buddha your final goal. The way I see him, he is a hole in an outhouse. Bodhisattvas and arhats are nothing but chains and shackles to bind you. That is why Manjushri took up a sword against Gautama, and Angulimala went at Shakyamuni with a blade. Followers of the Way, there is no Buddha to get. The three vehicles, the five natures, the perfect-and-sudden teachings and all their traces are medicine for the moment, to treat one particular disease. None of it is real. And where there is something, it is all appearances, signposts laid out, words arranged on the surface. That is all it ever is.

"Followers of the Way, there's a certain kind of bald fool who pours all his effort inward, trying to find some way past the world. Dead wrong. Look for the Buddha and you lose the Buddha. Look for the Way and you lose the Way. Look for the ancestors and you lose the ancestors. Friends, don't get it wrong. I don't care that you can explain the sutras and treatises. I don't care that you're a king or a minister. I don't care that you can talk like a rushing river. I don't care how clever and sharp you are. The one thing I want is your true, straight insight.

"Followers of the Way, say you could explain a hundred sutras and treatises. You'd still be worse off than one plain teacher with nothing to do. Once you can explain things you start sneering at everyone else, fighting to win like a war-god, breeding ignorance about self and other, piling up hell-karma. Take the monk Good Star: he could explain the whole canon, and he fell into hell alive, the earth itself refusing to hold him. Better to have nothing to do and rest. Hungry, you eat. Tired, you close your eyes. Fools laugh at me, but the wise understand. Followers of the Way, don't go searching in words. It wears the mind out and tires you, and gulping cold air gets you nowhere. Better to see that a single thought arising has no birth in it at all. That puts you past the bodhisattvas of the three vehicles with all their borrowed learning.

"Friends, don't drift through your days. Back when I had no insight it was pitch black all around me, but time can't be wasted, so with my belly burning and my heart racing I ran everywhere chasing the Way. Later I got some traction, and that is how I came to be here, talking with you like this. I urge you, friends, don't do it all for food and clothes. The world slips by easily, and a true teacher is hard to find, rare as the udumbara flower that blooms once in an age.

"You hear all over that there's some old man named Linji, and you come thinking you'll stump me with hard questions and leave me speechless. But I meet you with my whole being, and the student only stands there blinking, mouth frozen shut, too dazed to know how to answer me. So I tell him, 'A dragon-elephant's stride is more than a donkey can take.' Everywhere you go you thump your chests and poke your ribs: 'I get Chan, I get the Way.' Two or three of you show up here and you're helpless. Bah! You haul that body and mind of yours around flapping your two lips, lying to everyone in town. The day is coming when you'll eat the iron rod. You're no monks. You all belong in the realm of the war-gods.

"The Way at its deepest is not reached by arguing, or by clanging slogans to crush the heretics. As for what the buddhas and ancestors hand down, there is nothing special to it. Any teachings there are fall under the methods of instruction: the three vehicles, the five natures, the cause and effect of humans and gods. The perfect-and-sudden teaching is different even from that. The boy Sudhana never went looking for anything. Friends, don't misuse your minds. Be like the great ocean, which won't keep a corpse afloat. You just shoulder your dead body and go running around the world, raising your own blinders to block your own mind. No clouds in the sky, the bright sun shining everywhere; no film on the eye, no flowers in the air. Followers of the Way, if you want to be as you should, just don't breed doubt. Spread it out and it fills the whole dharma-realm; pull it in and not a hair stands. Vivid, alone, shining, never lacking a thing. The eye can't see it, the ear can't hear it. So what do you call it? An old master said, 'Call it any one thing and you've already missed.' Just look for yourself. What else is there? Talk of it never ends. Each of you, put your own back into it. Take care."
