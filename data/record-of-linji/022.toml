case_zh = '''
問：「如何是五無間業？」師云：「殺父、害母、出佛身血、破和合僧、焚燒經像等，此是五無間業。」云：「如何是父？」師云：「無明是父。爾一念心求起滅處不得，如響應空，隨處無事，名為殺父。」云：「如何是母？」師云：「貪愛為母。爾一念心入欲界中求其貪愛，唯見諸法空相，處處無著，名為害母。」云：「如何是出佛身血？」師云：「爾向清淨法界中，無一念心生解，便處處黑暗，是出佛身血。」云：「如何是破和合僧？」師云：「爾一念心正達煩惱結使，如空無所依，是破和合僧。」云：「如何是焚燒經像？」師云：「見因緣空、心空、法空，一念決定斷，逈然無事，便是焚燒經像。大德！若如是達得，免被他凡聖名礙。爾一念心，秖向空拳指上生寔解，根境法中虛揑怪，自輕而退屈，言：『我是凡夫，他是聖人。』禿屢生！有甚死急？披他師子皮，却作野干鳴。大丈夫漢不作丈夫氣息，自家屋裏物不肯信，秖麼向外覓，上他古人閑名句，倚陰博陽，不能特達，逢境便緣，逢塵便執，觸處惑起，自無准定。
「道流！莫取山僧說處。何故？說無憑據，一期間圖畫虛空，如彩畫像等喻。道流！莫將佛為究竟，我見猶如廁孔；菩薩、羅漢盡是枷鎖、縛人底物。所以文殊仗劍殺於瞿曇，鴦掘持刀害於釋氏。道流！無佛可得，乃至三乘、五性、圓頓教迹，皆是一期藥病相治，並無實法。設有，皆是相似，表顯路布，文字差排，且如是說。
「道流！有一般禿子，便向裏許著功，擬求出世之法，錯了也。若人求佛，是人失佛；若人求道，是人失道；若人求祖，是人失祖。大德莫錯！我且不取爾解經論，我亦不取爾國王大臣，我亦不取爾辯似懸河，我亦不取爾聰明智慧，唯要爾真正見解。「道流！設解得百本經論，不如一箇無事底阿師。爾解得，即輕蔑他人，勝負修羅，人我無明，長地獄業，如善星比丘解十二分教，生身陷地獄，大地不容，不如無事休歇去。飢來喫飯，睡來合眼，愚人笑我，智乃知焉。道流！莫向文字中求，心動疲勞，吸冷氣無益，不如一念緣起無生，超出三乘權學菩薩。
「大德！莫因循過日。山僧往日，未有見處時，黑漫漫地。光陰不可空過，腹熱心忙，奔波訪道，後還得力，始到今日，共道流如是話度。勸諸道流，莫為衣食，看世界易過，善知識難遇，如優曇花，時一現耳。
「儞諸方聞道有箇臨濟老漢出來，便擬問難，教語不得，被山僧全體作用，學人空開得眼，口總動不得，懵然不知以何答我。我向伊道：『龍象蹴踏，非驢所堪。』爾諸處秖指胸點肋，道我解禪、解道，三箇兩箇到這裏不奈何。咄哉！爾將這箇身心到處簸兩片皮，誑謼閭閻，喫鐵棒有日在，非出家兒，盡向阿修羅界攝。
「夫如至理之道，非諍論而求激揚，鏗鏘以摧外道。至於佛祖相承，更無別意。設有言教，落在化儀三乘、五性、人天因果。如圓頓之教，又且不然，童子善財皆不求過。大德！莫錯用心，如大海不停死屍。秖麼擔却擬天下走，自起見障，以礙於心。日上無雲，麗天普照，眼中無翳，空裏無花。道流！爾欲得如法，但莫生疑。展則彌綸法界，收則絲髮不立，歷歷孤明，未曾欠少。眼不見，耳不聞，喚作什麼物？古人云：『說似一物則不中。』爾但自家看，更有什麼？說亦無盡，各自著力。珍重。」

