pointer = '''
The monk quotes a famous riddle from the Lotus Sutra: a cosmic buddha named Great Penetrating Wisdom sat in meditation for ten eons (an eon being an unimaginable stretch of time) and supposedly still couldn't become enlightened. He wants the puzzle solved. Linji refuses the story whole and reads every word of that buddha's name as a description of the listener's own mind: "great penetrating" is seeing through the fixed nature of things, "wisdom" is gripping nothing, "buddha" is mind clear and shining. Of course no buddha "appeared" after ten eons, he says, a buddha was never born and has no business becoming a buddha twice over. The shock at the end, "commit the five unforgivable crimes," isn't literal, it's a teaser he unpacks in the very next case (22), where the "crimes" turn out to mean cutting off ignorance, craving, and your grip on holy ideas. The whole move is his standard one: a sacred story dragged down into your own present mind so you stop chasing buddhas out there.
'''
