pointer = '''
The meditation hall doubled as the monks' communal sleeping-and-sitting room, so Linji napping there is less of a scandal than it sounds, and the "board" Huangbo keeps cracking is just a wooden signal plank used to make a point. Huangbo comes in and tests two men on one pass. Linji, caught dead asleep, lifts his head, clocks that it's the boss, and drops right back to sleep, unbothered. The head monk, caught doing everything correctly in upright meditation, gets told he's the one daydreaming and instantly bristles, "what's this old man on about?" That contrast is the whole case: the one who looks lazy is loose and unshakable, the one who looks diligent is tight and rattled. Yangshan's verdict, "two wins in one match," is a gambling phrase, and it scores the round for Huangbo, who exposed both men cleanly, with the napper coming out ahead of the show-off.
