case_zh = '''
師在堂中睡，黃蘗下來見，以拄杖打板頭一下。師舉頭見是黃蘗，却睡。黃蘗又打板頭一下，却往上間，見首座坐禪，乃云：「下間後生却坐禪，汝這裏妄想作什麼？」首座云：「這老漢作什麼？」黃蘗打板頭一下，便出去。後溈山問仰山：「黃蘗入僧堂意作麼生？」仰山云：「兩彩一賽。」

'''
case_en = '''
Linji was asleep in the meditation hall. Huangbo came in, saw him, and cracked his staff once on the head of the bench. Linji raised his head, saw it was Huangbo, and went back to sleep. Huangbo cracked the bench again and moved on to the upper section, where he found the head monk sitting in meditation. "The young one down at the far end is the one really sitting," he said. "What are you doing up here, lost in your daydreams?" The head monk said, "What's this old man on about?" Huangbo cracked the bench once more and walked out.

Later Guishan asked Yangshan, "What was Huangbo after, coming into the hall?" Yangshan said, "Two wins in one match."
'''

