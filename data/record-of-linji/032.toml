pointer = '''
Deshan was another ferocious Tang master, famous like Linji for swinging a stick instead of explaining. His line is a flawless no-win: speak and you get thirty blows, stay silent and you get thirty blows, and the airlessness is the whole point, because there is no safe square to stand on. Linji sends his student Lepu in as a scout with a counter-move ready: catch the stick and shove it back. Lepu does it, and Deshan simply walks back to his room, declining the contest. Then notice what Linji actually asks when Lepu returns. Not did the trick work, but did you see Deshan, did you take in who you were standing in front of or only run the play you were handed. The moment Lepu stops to assemble an answer he commits the one offense these masters never let pass, the hesitation, the calculating, so the stick lands on him too, at home this time.
'''
