pointer = '''
The whole sermon turns on one instruction, and Linji says it outright: "wherever you are, be the master." People outsource their lives, chasing teachers, scriptures, fancy states like nirvana and awakening as if the answer were somewhere out there. He calls all of it "scenery," passing scenes the mind throws up, and even the word "buddha" is just a footprint the teaching left, not the thing that walked. The "person who depends on nothing" is you, right now, the one doing the seeing, who can meet any situation and take its shape the way the moon shows up in any puddle. The cosmology he name-drops (the three worlds, the six dusts, Maitreya's tower) is real Buddhist furniture, but his cut through it is that you generate every one of those realms with a single thought, so there's nothing out there to go get. This is the "true person of no rank" (3) restated as a working stance: stop waiting to be certified and run your own ground.
