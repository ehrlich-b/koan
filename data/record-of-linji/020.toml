pointer = '''
The monk opens with the era's stock test question, "What is the meaning of Bodhidharma coming from the West?" Bodhidharma being the Indian monk who supposedly brought Zen to China, so it really asks "what's the whole point of all this?" The "Second Patriarch" is Huike, his first heir, the one who "got the Dharma," meaning woke up and inherited the line. Here Linji says the sentence that is the engine of his entire record: you're "running around looking for your head with your head right there on your shoulders." Getting it isn't acquiring anything, because the thing you're after is already what's doing the looking, and the search is the only thing in the way. From there he mocks the hardcore monastic program he could have endorsed, fasting, never lying down, giving away your children as charity, as not just useless but a karmic debt you'll be billed for later. The real adept "leaves no trace" precisely because he isn't trying to get anywhere. He sets up this head-hunting image briefly back in case 10 (Yajnadatta); here it becomes the center.
'''
