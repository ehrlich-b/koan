case_zh = '''
師行脚時到龍光，光上堂，師出，問云：「不展鋒鋩如何得勝？」光據坐。師云：「大善知識豈無方便？」光瞪目，云：「嗄。」師以手指云：「這老漢今日敗闕也。」

'''
case_en = '''
On his travels Linji came to Longguang, who had taken the high seat to teach. Linji stepped forward and asked, "Without ever drawing your blade, how do you win?"

Longguang just sat there.

Linji said, "A great teacher, and you've nothing better than that?"

Longguang fixed him with a stare and barked, "Hah!"

Linji jabbed a finger at him. "Old man, today you've lost."
'''

