pointer = '''
The record opens with the man taking his seat for the first time, and he opens by picking a fight: who here is fighter enough to test me? That sets the tone for everything that follows. The questioners all want the same thing, the Buddha's teaching put into words, and Linji's whole answer is that words are a stake you can't drive into empty sky. Notice the one autobiographical line he drops, that under his teacher Huangbo he asked three times and was struck three times. The biography at the end (46) shows what those beatings did to him, and they are why he now hits instead of explains. The lecture-master who lives by the scriptures gets the coldest treatment, "the weeds have never been pulled," because book-truth is exactly the untended field Linji spent his life refusing to mistake for the real thing.
