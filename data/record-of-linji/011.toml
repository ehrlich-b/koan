pointer = '''
"Followers of the Way" is just how Linji addresses his monks. His whole pitch here is an anti-pitch: stop hunting for a special technique or holy destination, because the hunting itself is the disease, and the thing doing the hunting is already what you're chasing. He keeps coming back to one jab about labels, and it's the key to the talk: "Buddha" and "Dharma" are only words, and the awareness that pins names on everything can't itself be named, so quit trying to label it and just use it. The flex about Manjushri and Samantabhadra, the two celebrity bodhisattvas of Buddhism, is pointed, he says he'd have even those heavyweights sized up the instant they opened their mouths, because he isn't grading anyone against "holy" versus "ordinary" in the first place. This is the "no rank" of case 3 turned into a way of meeting people: nothing outranks the one already in front of him.
