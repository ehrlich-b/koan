case_zh = '''
到大慈，慈在方丈內坐。師問：「端居丈室時如何？」慈云：「寒松一色千年別，野老拈花萬國春。」師云：「今古永超圓智體，三山鎖斷萬重關。」慈便喝，師亦喝。慈云：「作麼？」師拂袖便出。

'''
case_en = '''
Linji came to Dací, who sat inside his abbot's room. Linji asked, "What is it like, settled here in your room?"

Dací said, "The cold pine holds one color, parted a thousand years. The old farmer lifts a flower, and ten thousand lands turn to spring."

Linji said, "Whole and entire, perfect wisdom forever leaps past past and present. The three sacred peaks bolt shut ten thousand gates."

Dací gave a shout. Linji shouted back.

Dací said, "So what?"

Linji shook out his sleeves and walked out.
'''

