pointer = '''
The "white ox standing in the open field" comes from the Lotus Sutra, a stock image for the one true mind out in the open with nothing left to hide behind, which makes it close kin to Linji's own "true person." So Linji asks Xingshan to produce it. Xingshan refuses to describe the ox and just moos, being it rather than talking about it. Linji prods, "what, are you mute," Xingshan flips the demand back, "you try then, Elder," and Linji answers "you animal," which sounds like a slur but is him grabbing the same ox by the other end, naming the beast instead of pointing at it. Neither man will hand over a clean definition, because a definition of the open-field ox would be one more fence around it, and the refusal is the showing.
'''
