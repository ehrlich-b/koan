case_en = '''
Linji asked Xingshan, "What is the white ox standing in the open field?"

Xingshan said, "Moo. Moo."

Linji said, "What, are you mute?"

Xingshan said, "And you, Elder? What would you say?"

Linji said, "You animal."
'''

