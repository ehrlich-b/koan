pointer = '''
"How is it on the sword's edge?" asks what the do-or-die instant of awakening is like, and Linji's answer is the trap closing: "Disaster," because the second the monk pauses to consider the reply, he has already stepped off the edge into thinking, and he gets hit for it. The Stone Room workman is a stock figure, a man pounding grain so absorbed he forgets his own legs are moving, and "drowned in the deep spring" means he is in so far there's no telling where he went. The closing speech is the warning Linji repeats in different words for the rest of the book: come at him one way and you've lost yourself, come the other way and you've tied yourself up with no rope, so quit sizing things up, because the moment you turn this into a problem to solve you've missed it. Get it or miss it, he says, either way you're wrong, which is his way of refusing to let "right answer" be a thing you can hold.
'''
