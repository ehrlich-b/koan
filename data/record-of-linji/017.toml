case_zh = '''
問：「如何是三眼國土？」師云：「我共儞入淨妙國土中，著清淨衣，說法身佛；又入無差別國土中，著無差別衣，說報身佛；又入解脫國土中，著光明衣，說化身佛。此三眼國土，皆是依變。約經論家，取法身為根本，報、化二身為用。山僧見處，法身即不解說法。所以古人云：『身依義立，土據體論。』法性身、法性土，明知是建立之法，依通國土，空拳黃葉用誑小兒，蒺藜夌刺，枯骨上覓什麼汁？心外無法，內亦不可得，求什麼物？爾諸方言：『道有修、有證。』莫錯！設有修得者，皆是生死業。爾言「六度萬行齊修」，我見皆是造業。求佛、求法，即是造地獄業；求菩薩亦是造業；看經、看教亦是造業。佛與祖師是無事人，所以有漏有為、無漏無為，為清淨業。有一般瞎禿子，飽喫飯了，便坐禪觀行，把捉念漏不令放起，厭喧求靜，是外道法。祖師云：『爾若住心看靜，舉心外照、攝心內澄、凝心入定，如是之流皆是造作。』是爾如今與麼聽法底人，作麼生擬修他、證他、莊嚴他？渠且不是修底物、不是莊嚴得底物。若教他莊嚴，一切物即莊嚴得。爾且莫錯。道流！爾取這一般老師口裏語為是真道，是善知識不思議，「我是凡夫心，不敢測度他老宿」。瞎屢生！爾一生秖作這箇見解，辜負這一雙眼，冷噤噤地，如凍凌上驢駒相似。「我不敢毀善知識，怕生口業。」道流！夫大善知識始敢毀佛毀祖、是非天下、排斥三藏教、罵辱諸小兒、向逆順中覓人。所以我於十二年中求一箇業性，如芥子許不可得。若似新婦子禪師，便即怕趁出院，不與飯喫，不安不樂。自古先輩，到處人不信，被遞出始知是貴。若到處人盡肯，堪作什麼？所以師子一吼，野干腦裂。道流！諸方說有道可修、有法可證，爾說證何法？修何道？爾今用處，欠少什麼物？修補何處？後生小阿師不會，便即信這般野狐精魅，許他說事繫縛人，言「道理行相應、護惜三業始得成佛」，如此說者如春細雨。古人云：『路逢達道人，第一莫向道。』所以言：「若人修道道不行，萬般邪境競頭生，智劍出來無一物，明頭未顯暗頭明。」所以古人云：『平常心是道。』大德！覓什麼物？現今目前聽法無依道人，歷歷地分明，未曾欠少。爾若欲得與祖佛不別，但如是見，不用疑誤。爾心心不異，名之活祖。心若有異，則性相別；心不異故，即性相不別。」

