case_zh = '''
上堂，云：「赤肉團上有一無位真人，常從汝等諸人面門出入，未證據者看看。」時有僧出問：「如何是無位真人？」師下禪床把住，云：「道道。」其僧擬議，師托開，云：「無位真人是什麼乾屎橛！」便歸方丈。

'''
case_en = '''
Linji took the high seat and said, "Here in this lump of red flesh is a true person of no rank, going in and out the gates of your face all day long. Anyone who hasn't seen him yet, look! Look!"

A monk came forward and asked, "What is this true person of no rank?"

Linji got down from the seat, took hold of him, and said, "Speak! Speak!"

The monk faltered. Linji shoved him off and said, "This true person of no rank, what a dried shit-stick he is." Then he went back to his quarters.
'''

