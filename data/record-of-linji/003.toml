pointer = '''
This is the line Linji is remembered for. The "true person of no rank" is his name for what you already are under every job, title, and role, and "no rank" is load-bearing: it can't be classified, graded, or pinned down, so the instant the monk asks "what is it?" he has turned a living thing into a specimen and lost it. Watch the move that defines the whole record: Linji doesn't argue, he grabs the man and says show it, now, no concepts, and the monk reaches for an answer instead of just being the thing he was asked about. The crude punchline, "what a dried shit-stick," is Linji kicking the pedestal out from under his own famous phrase before anyone can start worshipping it. He spends sixty more passages knocking that same search out of people's hands.
'''
