case_zh = '''
到襄州華嚴，嚴倚拄杖作睡勢，師云：「老和尚瞌睡作麼？」嚴云：「作家、禪客，宛爾不同。」師云：「侍者點茶來與和尚喫。」嚴乃喚維那：「第三位安排這上座。」

'''
case_en = '''
Linji arrived at Huayan's place in Xiangzhou. Huayan leaned on his staff and made as if to fall asleep.

Linji said, "Old man, why the dozing?"

Huayan said, "A real adept and a Zen tourist. Plainly not the same."

Linji said, "Attendant, brew some tea and bring it for the master to drink."

Huayan called to the head monk, "Put this one in the third seat."
'''

