pointer = '''
At Huayan's place Linji is again the traveler, and Huayan greets him with a test built out of a fake nap, slumping on his staff as if dozing off, a gesture that asks whether the visitor is sharp enough to read what's really happening. Linji needles him about the sleeping, Huayan throws back a line drawing the line between a true adept and a "Zen tourist," the sightseer who collects monastery visits the way Linji has been racking them up across these cases. Linji's answer isn't a counter-argument, it's a role reversal: he calls for tea to be served to "the master," quietly taking the host's part and casting Huayan as the guest. Huayan reads the move on the spot and seats Linji among the senior monks. The case turns on recognition happening fast, in four lines, with no test of patience: one adept clocks another before either of them has to spell anything out.
