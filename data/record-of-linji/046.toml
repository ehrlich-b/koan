pointer = '''
Here is the hinge of the whole book: the morning Linji woke up. He'd trained under Huangbo for three quiet years without ever once going in to ask a question, and when the head monk finally pushes him to ask the biggest one, what is the actual point of the Buddha's teaching, Huangbo answers each time by hitting him before he can finish the sentence. A blow in this lineage is a tool, not a verdict, meant to knock a student off the ledge of his own analysis, but Linji reads it as failure and packs to leave. It takes a second teacher, Dayu, to flip the meaning: Huangbo was being a "kind old grandmother," the warmest praise in this world, wearing himself out for you. The instant Linji gets it he jabs Dayu in the ribs and goes home to slap Huangbo, and that is the proof he passed; he is dishing it out now instead of taking notes. Yangshan's closing line, that Linji rode the tiger's head and grabbed its tail too, names the man the rest of the record will show in full, and the violence you see everywhere else starts right here, the day it was done to him.
