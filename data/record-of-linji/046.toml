case_en = '''
In his early days, Linji trained under Huangbo, plain and single-minded in his practice. The head monk took notice. "He's young," he said, "but he's not like the others." So he asked him, "How long have you been here?"

"Three years," Linji said.

"Have you ever gone in to question the master?"

"No. I wouldn't even know what to ask."

"Then go ask the master this: what is the real, essential point of the Buddha's teaching?"

Linji went and asked. Before he could finish the sentence, Huangbo hit him. Linji came back down.

"How did it go?" the head monk asked.

"I hadn't even finished asking and he hit me. I don't get it."

"Go ask again."

Linji went and asked, and Huangbo hit him again. Three times he asked, three times he got hit.

He came back to the head monk. "I'm grateful you sent me in to question the master. Three times I asked, three times I got hit. I can only blame myself: something's in the way, and I can't catch the deep meaning. I'm going to leave for now."

"If you're going," the head monk said, "at least say goodbye to the master first."

Linji bowed and withdrew. The head monk got to Huangbo ahead of him. "That young monk who's been asking questions, he's the real thing. When he comes to say goodbye, work with him a little. Hammer on him, and one day he'll grow into a great tree that shades everyone under heaven."

Linji came to take his leave. "Don't go just anywhere," Huangbo said. "Go to Dayu, at the river crossing in Gao'an. He'll explain it to you."

Linji reached Dayu. "Where are you coming from?" Dayu asked.

"From Huangbo."

"What did Huangbo have to say?"

"Three times I asked him about the real, essential point of the Buddha's teaching, and three times he hit me. I don't know: was I at fault or not?"

"Huangbo wore himself out being a kind old grandmother for you," Dayu said, "and here you are asking whether you were at fault."

At those words Linji woke up completely. "So there's nothing much to Huangbo's Buddhism after all."

Dayu grabbed him. "You little bed-wetting devil. A second ago you were asking whether you were at fault, and now you say there's nothing much to Huangbo's Buddhism. What did you just see? Say it. Say it!"

Linji jabbed Dayu three times in the ribs. Dayu shoved him off. "Huangbo's your teacher. This is none of my business."

Linji left Dayu and went back to Huangbo. Huangbo saw him coming. "This fellow, back and forth, back and forth. When does it ever end?"

"It's all because you're such a kind old grandmother," Linji said. Then he finished the formalities and stood waiting.

"Where've you been?" Huangbo asked.

"Yesterday, on your kind instruction, I went to see Dayu."

"What did Dayu have to say?"

Linji told him the whole thing. "Just wait till I get my hands on that Dayu," Huangbo said. "I'll give him a good beating."

"Why wait?" Linji said. "Take it now." And he slapped him.

"This madman," Huangbo said, "coming back here to pull the tiger's whiskers."

Linji let out a shout.

"Attendant," Huangbo said, "haul this madman off to the monks' hall."

Later Guishan brought this story up and asked Yangshan, "At that moment, was it Dayu's doing that got Linji there, or Huangbo's?"

"He didn't just ride the tiger's head," Yangshan said. "He knew how to grab its tail too."
