pointer = '''
The last of the four Puhua scenes, and the one where Linji stops laughing. Puhua roams the streets ringing a bell and chanting a boast: whatever way reality comes at him, bright, dark, from all sides, out of thin air, he has a hit ready for it. Linji sends his attendant to slam the door shut on that: fine, what about when nothing comes at all, no situation to react to? Puhua does not argue, he changes the subject to tomorrow's free lunch and shoves off. What the attendant tried to do is corner Puhua into answering on the attendant's own terms, which would make Puhua's whole act into a system with a hole in it; ducking the frame may be the sharpest move on the board. Linji's closing line, "I always had my doubts about that fellow," is deliberately ambiguous, doubt that Puhua is the real thing or quiet respect that he is, and Linji is not telling.
'''
