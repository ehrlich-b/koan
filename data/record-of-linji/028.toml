case_zh = '''
因普化常於街市搖鈴云：「明頭來明頭打，暗頭來暗頭打，四方八面來旋風打，虛空來連架打。」師令侍者去，纔見如是道，便把住云：「總不與麼來時如何？」普化托開，云：「來日大悲院裏有齋。」侍者回舉似師，師云：「我從來疑著這漢。」

'''
case_en = '''
Puhua used to roam the streets ringing a little bell and chanting: "Comes at me bright, I hit it bright. Comes at me dark, I hit it dark. Comes from every side, I hit it like a whirlwind. Comes out of the empty sky, I hit it like a flail."

Linji sent his attendant to find him. The moment Puhua started up, the attendant grabbed hold of him and said, "And when it comes none of those ways, then what?"

Puhua shoved him off and said, "Tomorrow there's a feast at the Temple of Great Compassion."

The attendant went back and reported this to Linji. Linji said, "I always had my doubts about that fellow."
'''

