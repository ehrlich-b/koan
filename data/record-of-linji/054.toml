case_en = '''
Linji came to the shrine holding Bodhidharma's remains. The keeper asked, "Will the elder bow to the Buddha first, or to the Ancestor first?"

Linji said, "I bow to neither."

The keeper said, "What did the Buddha and the Ancestor ever do to make an enemy of you?"

Linji shook out his sleeves and walked off.
'''

