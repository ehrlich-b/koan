case_zh = '''
師一日在僧堂前坐，見黃蘗來，便閉却目。黃蘗乃作怖勢，便歸方丈。師隨至方丈禮謝，首座在黃蘗處侍立。黃蘗云：「此僧雖是後生，却知有此事。」首座云：「老和尚脚跟不點地，却證據箇後生。」黃蘗自於口上打一摑，首座云：「知即得。」

'''
case_en = '''
One day Linji was sitting in front of the monks' hall. Seeing Huangbo approach, he shut his eyes. Huangbo put on a frightened look and withdrew to his quarters. Linji followed and bowed in apology. The head monk was standing in attendance beside Huangbo.

Huangbo said, "This monk is young, but he knows what's going on."

The head monk said, "Old master, your own feet don't touch the ground, and yet you vouch for this boy?"

Huangbo gave himself a slap across the mouth.

The head monk said, "So long as you know it, that's fine."
'''

