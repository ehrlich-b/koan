pointer = '''
Another scene from Linji's apprentice years with Huangbo, lighter than the beatings in 46. Sitting outside the meditation hall, Linji watches his teacher walk up and simply closes his eyes, a cocky little move that says he doesn't need to keep watch. Huangbo plays along, mock-cowers, and retreats, then praises the kid to the head monk: young, but he knows what's going on. The head monk's needle, "your own feet don't touch the ground, and you're vouching for this boy?", accuses Huangbo of being up in the clouds himself, too lofty to be certifying anybody. Watch what Huangbo does with the dig: he slaps his own mouth, taking the hit and turning it into a joke rather than defending his authority, and the head monk lets it go. The whole exchange runs on the same currency as the harder cases, a teacher who would rather lose face than stand on rank.
'''
