pointer = '''
Magu is a fellow master, not a student, which is why this reads like two equals sparring rather than a teaching. His question sounds like temple trivia: Guanyin, the bodhisattva of compassion, is pictured with a thousand arms and an eye in every palm, so out of all those eyes which one actually sees? It is bait, and Linji throws it straight back word for word, refusing to be the one answering. Then the real exam begins, and it has no words in it: they wrestle for the teacher's seat, each testing whether the other will freeze. Magu hesitates once and loses it. For Linji the "true eye" was never a feature on a statue, it is whether you can move without that fatal half-second of weighing your move, the same gap that gets people hit all through this record.
'''
