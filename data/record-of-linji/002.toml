case_zh = '''
師因一日到河府，府主王常侍請師升座。時麻谷出問：「大悲千手眼，那箇是正眼？」師云：「大悲千手眼，那箇是正眼？速道速道。」麻谷拽師下座，麻谷却坐。師近前，云：「不審。」麻谷擬議，師亦拽麻谷下座，師却坐。麻谷便出去，師便下座。

'''
case_en = '''
One day Linji came to Hefu. The governor, Minister Wang, asked him to take the high seat and teach. Magu stepped forward and asked, "The Bodhisattva of Great Compassion has a thousand hands and a thousand eyes. Which is the true eye?"

Linji said, "The Bodhisattva of Great Compassion has a thousand hands and a thousand eyes. Which is the true eye? Speak. Speak now."

Magu hauled Linji off the seat and sat in it himself. Linji stepped up close and said, "How are you?"

Magu hesitated. Linji hauled him off the seat and sat in it himself. Magu walked out, and Linji stepped down.
'''

