pointer = '''
Linji arrives at Master Ping's place fresh from two earlier stops, and the meeting is conducted entirely in poetry, which is itself the exam. When Ping asks what Linji's old teacher Huangbo has been saying lately, a dutiful student would relay a lesson; Linji answers with a riddle about a "golden ox" dragged through the mud and gone without a trace, handing over nothing you could write down (and watch the same golden ox turn up as a person's name later, in case 64). Ping keeps fishing with prettier and prettier lines, jade flutes and golden wind, and each time Linji tops him with something larger and harder to grab, until he simply stops playing. Then Ping shifts to the polite move, "sit down, have some tea, and where were you before this?", and Linji walks straight out. The imagery is decoration; the case is about a man who won't be reeled in, not by a riddle, not by flattery, not even by hospitality.
'''
