pointer = '''
The famous line lands here: awakening is "ordinary, with nothing to do," you shit, you piss, you dress, you eat, and when you're tired you lie down. The "five unforgivable crimes" are Buddhism's classic list of acts beyond pardon (killing your parents and the like); Linji's claim is that even those dissolve into the "great ocean of liberation" once you stop straining after holiness. Then the turn. Most religious people assume the goal is to choose the holy over the ordinary, buddha over devil, and Linji says a genuinely clear person clings to neither side. The king of geese was believed to drink the milk and leave the water behind, a stock image for picking out the pure, but Linji one-ups it: drop the whole milk-and-water sorting game and strike down both devil and buddha. Loving holiness is just one more rope keeping you in the ocean of birth and death. He'll make this anti-holiness savage in the long sermons ahead (17, 18, 22).
'''
