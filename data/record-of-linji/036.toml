pointer = '''
Another quick pop quiz with no warning, the kind that fills this section. Linji spreads both hands wide at a monk walking up: nothing in them and everything in them, the whole thing held out open, your move. The monk locks up, then admits he is lost. Linji's payoff is a double joke. "One solid lump, can't be pried apart" says the monk is sealed shut, no seam, nothing getting in or out. And "two cents" plays off the two empty hands he just held up, an insultingly small tip for a man who arrived with nothing to give and gave nothing back. Funny and brutal at once, and underneath the joke is Linji's standing complaint, that he keeps offering the open thing for free and getting back a blank face that came shopping for something to take home.
'''
