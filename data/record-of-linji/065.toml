pointer = '''
This is Linji's deathbed, the man whose shouting and hitting fill the whole record now down to his last words (he died in 866). The "True Dharma Eye" is shorthand for the living core of his teaching, the real thing handed straight from teacher to student rather than the talk about it. So he charges his top student Sansheng not to let it be wiped out, then immediately tests whether the charge can even be kept: when someone asks you about it later, what will you say? Sansheng answers with one of Linji's own trademark shouts, throwing the master's method back at him. Linji's reply, calling him a "blind donkey," reads like an insult and that is the knot of the case. He could be saying the kid fumbled it, or he could be half-proud that his student just proved the teaching is already loose in the world, alive past anyone's power to "preserve." Then he dies upright, mid-question, and the ambiguity is the last thing he leaves on the table.
'''
