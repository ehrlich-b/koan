case_zh = '''
師臨遷化時據坐云：「吾滅後不得滅却吾正法眼藏。」三聖出云：「爭敢滅却和尚正法眼藏？」師云：「已後有人問爾，向他道什麼？」三聖便喝。師云：「誰知吾正法眼藏向這瞎驢邊滅却。」言訖端然示寂。

'''
case_en = '''
As he was about to die, Linji sat upright and said, "After I'm gone, don't let my True Dharma Eye be wiped out."

Sansheng stepped forward. "Who would dare wipe out the Master's True Dharma Eye?"

"Later, when someone asks you about it, what will you tell them?"

Sansheng gave a shout.

Linji said, "Who'd have thought my True Dharma Eye would be snuffed out by this blind donkey." And with that, sitting bolt upright, he passed away.
'''

