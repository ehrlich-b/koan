pointer = '''
Puhua is the holy fool who shadows Linji through this record, ringing a little bell and acting crazy in ways that cut deeper than the serious monks ever managed; Yangshan's prophecy in case 52 set him up as the strange helper Linji would find when he went north. Begging the townsfolk for a robe, he turns down every one they offer, because the robe he wants is a shroud, and Linji is the only one who hears it: he sends for a coffin. Then comes the trickster's masterstroke. Puhua announces his death day after day, parading the coffin through the market until the crowd gives up on the show, and only when nobody is watching does he climb in, get the lid nailed shut, and slip off for real. The vanished body and the bell fading in the sky are the kind of tall-tale flourish these records love, but the joke underneath is sober: he made the crowd's appetite for a spectacle the very thing that let him die unobserved, on no one's terms but his own.
'''
