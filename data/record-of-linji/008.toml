pointer = '''
"Leaving home" was the standard phrase for becoming a monk, walking out on family and ordinary life to practice. But "home" is also your own true nature, the thing you never actually leave no matter how far you wander, and Linji is playing both meanings at once. So he hands you two characters who each seem to be missing half the picture: one on the road for ages who somehow never leaves home, one who left home yet goes nowhere. Which deserves the offerings monks live on? It pairs naturally with the peak and the crossroads just before it (7), the same setup of two seeming opposites. And like that one, he steps down without answering, because the either/or is rigged: the road and home were never two places, and the question only traps you if you think you have to choose.
'''
