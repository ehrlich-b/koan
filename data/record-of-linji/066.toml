pointer = '''
The closing page of the record, the formal obituary tacked on after all the teaching stories and written by a junior monk in Linji's line. Linji (died 866) founded what became the dominant school of Zen, and "Linji" is both his name and the riverside temple he ran, which is how a teacher in this tradition got named. A few threads to follow: "the teaching handed down outside the scriptures" is Zen's own pitch, that the real thing passes mind to mind and not through books, which is why the bio has him abandon a promising scholarly career to go wandering. A "seal" is a teacher's formal certification that a student has got it, the one Huangbo gives him after the beatings of case 46. Puhua is the holy fool from earlier; "the little Shakyamuni" (Shakyamuni being the historical Buddha) was the nickname of Yangshan, the master who made the prophecy back in case 52 that Puhua here fulfills. Note one slip to read past: the text dates his death to "867," but the year was 866. The page itself is plain enough, here is the man, here is where he taught, and at the end he died the way he'd lived, sitting up and talking, then gone.
'''
