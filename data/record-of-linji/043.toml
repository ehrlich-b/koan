pointer = '''
Bodhidharma is the Indian monk credited with carrying Chan to China, so "what is the meaning of Bodhidharma coming from the West" became shorthand for "what is the deepest point of all this," the same giant question Zhaozhou aimed at Linji in case 38. Longya goes around lobbing it at famous teachers, and rather than answer, both Linji and Cuiwei just grab whatever is at hand and whack him with it. Longya's verdict each time: fine hit, but you still did not answer me, there is no "meaning" there. The needle is his last line, years later, running his own monastery: he grants that the old teachers were deeply right, and in the same breath holds that there is no meaning to find. That is the trap folded into his original question. It expects a thing, a meaning you can be handed and carry off, when the entire move is that there is no such thing to hand over, which is precisely what their sticks were telling him.
'''
