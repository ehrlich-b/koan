case_en = '''
Linji was planting pines. Huangbo asked, "Why plant so many way out here in the deep mountains?"

Linji said, "Two reasons. One, to give the monastery gate some scenery. Two, to leave a marker for those who come after." With that he tapped the ground three times with his mattock.

Huangbo said, "Even so, you've already eaten thirty blows from me."

Linji tapped the ground three more times and let out a long whoosh of breath.

Huangbo said, "With you, my line will flourish in the world."

Later Guishan raised this with Yangshan. "Back then, did Huangbo entrust it all to Linji alone, or was there someone else?"

Yangshan said, "There was. But it lies far off in the future, so I'd rather not say."

Guishan said, "Say it anyway. I want to know."

Yangshan said, "One man points south, and the order goes out across Wu and Yue, until he meets a great wind, and then it stops."

Another time Linji was standing in attendance on Deshan. Deshan said, "I'm worn out today."

Linji said, "What's this old man mumbling in his sleep for?"

Deshan moved to hit him. Linji flipped the meditation seat over. Deshan let it go.
'''

