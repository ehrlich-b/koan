pointer = '''
Three quick scenes, all set after the awakening in case 46, showing Linji and Huangbo settled into the rough affection of a master and his confirmed heir. When Huangbo asks why he's planting pines so far up the mountain, Linji gives one practical answer and one for posterity, then bangs his mattock on the dirt instead of explaining further, and later just exhales a long whoosh: he's signaling he's past needing words, and Huangbo's "you've already earned thirty blows" and then "my line will flourish through you" are both grudging approval (thirty blows being the lineage's stock half-threat, half-compliment). The middle scene is two later masters, Guishan and Yangshan, gossiping about that handover, and Yangshan's coy prophecy, "until he meets a great wind, then it stops," forecasts that Linji's school will spread across the south and eventually run its course; he's reluctant because it's a prediction of decline. The last fragment swaps Huangbo for the famous Deshan, who pleads tiredness; Linji needles him, Deshan moves to hit, and Linji flips the meditation seat before the stick lands. Across all three he wins by moving, not arguing, which is the grammar of everything he'll do for the rest of the book.
'''
