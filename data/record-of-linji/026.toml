pointer = '''
Puhua again. He wanders the market clowning and raving, which sets up the gossip Linji and Elder Muta are trading by the fire: is the man a genuinely awakened master playing the fool, or just a fool? On cue Puhua walks in, and Linji puts the question to his face, ordinary or sage, then falls back on his trademark shout when Puhua bounces it back. Puhua's reply is to grade the whole room instead, two of the men as soft or fussy, Linji as a green kid who at least "has one eye," meaning the real seeing, then he bolts before the label can stick. The "ordinary or sage" split is exactly the kind of box Linji himself spends the record demolishing, since the true person he keeps pointing at fits in neither slot. "Thief" here is nearly fond: Puhua keeps stealing the high ground, and when Linji names it he cheerfully agrees and slips out with it.
'''
