pointer = '''
An "interview" is the formal one-on-one where a student is supposed to prove himself, and Linji is the rough examiner. Raising the whisk and spreading the sitting cloth are the scripted opening moves of that ritual, test and response. Then Linji throws the whisk down, cancelling the contest mid-step, and Dajue instantly rolls up his cloth and leaves, declining to make the next move in a game that is already off. The watching monks read it as favoritism, why did this one skip the usual beating, and so Linji baits him in front of the crowd: everyone says you never paid your respects. Dajue tosses back a flat "how are you" and rejoins the group, unbothered, and that is the pass. He met Linji by having nothing to win and nothing to defend, which is the same emptiness Linji keeps trying to provoke and almost never gets.
'''
