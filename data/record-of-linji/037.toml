case_zh = '''
大覺到參，師舉起拂子，大覺敷坐具。師擲下拂子，大覺收坐具入僧堂。眾僧云：「這僧莫是和尚親故？不禮拜，又不喫棒。」師聞，令喚覺，覺出，師云：「大眾道汝未參長老。」覺云：「不審。」便自歸眾。

'''
case_en = '''
Dajue came for an interview. Linji raised his whisk. Dajue spread his sitting cloth. Linji threw the whisk down, and Dajue rolled the cloth back up and walked into the monks' hall.

The other monks said, "That one must be a friend of the master's. He didn't bow, and he didn't get the stick."

Linji heard this and sent for Dajue. When Dajue came out, Linji said, "Everyone's saying you never paid your respects to the elder."

"How are you," Dajue said, and went back to join the others.
'''

