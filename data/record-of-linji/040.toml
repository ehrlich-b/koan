pointer = '''
Magu is a visiting monk; Guanyin is the bodhisattva of compassion, shown in statues with many faces, here twelve, watching every direction at once. Magu's question sounds pious and is a trap: name any one face as the "true" one and you have split something whole into parts, like demanding which raindrop is the real rain. Linji does not debate it, he answers with his body, scooping up the cloth, seizing Magu, and asking where that many-faced figure just ran off to, throwing the splitting move right back. Magu wheels for Linji's own seat, Linji grabs his staff, Magu catches it, and the two go wrestling into the abbot's room, locked together. No blood, no loser. This is what testing looks like when both men already get it, full speed and hands on, the match itself the conversation.
'''
