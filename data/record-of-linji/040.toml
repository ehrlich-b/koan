case_zh = '''
麻谷到參，敷坐具，問：「十二面觀音，阿那面正？」師下繩床，一手收坐具，一手搊麻谷，云：「十二面觀音，向什麼處去也？」麻谷轉身擬坐繩床，師拈拄杖打，麻谷接却，相捉入方丈。

'''
case_en = '''
Magu came to call. He spread out his sitting cloth and asked, "The twelve-faced Guanyin: which face is the true one?"

Linji came down off his seat. With one hand he scooped up the cloth, with the other he seized Magu, and said, "The twelve-faced Guanyin: where did it just go?"

Magu wheeled around and made for Linji's seat. Linji snatched up his staff to strike. Magu caught it, and locked together, the two of them wrestled their way into the abbot's room.
'''

