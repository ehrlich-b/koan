case_zh = '''
到翠峯，峯問：「甚處來？」師云：「黃蘗來。」峯云：「黃蘗有何言句指示於人？」師云：「黃蘗無言句。」峯云：「為什麼無？」師云：「設有，亦無舉處。」峯云：「但舉看。」師云：「一箭過西天。」

'''
case_en = '''
Linji came to Cuifeng. Cuifeng asked, "Where have you come from?"

"From Huangbo."

"What does Huangbo say to teach people?"

"Huangbo has nothing to say."

"Why nothing?"

"Even if he did, there'd be no way to bring it up."

"Just try. Let's hear it."

"One arrow, already past India."
'''

