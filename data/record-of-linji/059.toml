pointer = '''
Cuifeng sizes up the traveling Linji the way several of these hosts do, by asking what his teacher actually taught, since a man is judged partly by his lineage. Linji says Huangbo had nothing to say, and there's no way to even point at the nothing. When Cuifeng presses him to try anyway, the answer doubles as a boast and a live demonstration: "India" is the West where the Buddha came from, standing for the far edge of the teaching, and an arrow already flown past it is gone, too fast to track, with no target left to strike. So the reply is "ask me to produce it and it's already over your head and gone." This isn't evasion dressed as wit; the speed is the content. It also rhymes with what Huangbo did to Linji in case 46, where the teaching arrived as a blow before the question was even finished, faster than the mind that came hunting for it.
'''
