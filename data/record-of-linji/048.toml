pointer = '''
Linji and Huangbo are out hoeing the fields with the rest of the monks, still in the easy sparring that fills these post-awakening scenes (46, 47, 50, 51 are all from the same farming stretch). Huangbo opens with a jab, "worn out already?", Linji bats it back, and when Huangbo swings his stick Linji catches it mid-air and dumps his own teacher flat on the ground. That isn't an outrage, it's a pass: Huangbo is testing whether the student responds from real footing or flinches, and he's pleased. The trouble is the steward, the monk who runs the monastery's daily operations, who sees only "kid attacks the master" and rushes in to defend Huangbo's dignity, so Huangbo gets up and clobbers him instead. Yangshan's line lands the point: the steward is the cop who lets the actual criminal stroll off while beating the bystander he caught at the scene. Reading the surface of a thing and missing what it's doing gets you the stick.
'''
