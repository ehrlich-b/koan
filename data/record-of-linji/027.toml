'''
verse_en = '''
'''

pointer = '''
A miniature, the shortest of the Puhua scenes, and it runs the same gear as the one before it. Linji needles him: standing in the yard chewing raw greens, you are basically a donkey. Puhua does not defend himself, he just becomes the donkey and brays, and the insult finds nobody home to land on. Linji upgrades the jab to "thief," the one who snatches your footing out from under you, and Puhua agrees twice and walks off with it. The thing worth seeing is how completely Puhua skips the move every ordinary person makes, the flinch, the wanting to not be the donkey; there is no self there guarding its dignity for the gibe to catch. Two pros trading taps, and nobody gets pinned.
'''
