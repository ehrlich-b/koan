case_zh = '''
一日普化在僧堂前喫生菜，師見云：「大似一頭驢。」普化便作驢鳴。師云：「這賊！」普化云：「賊賊！」便出去。

'''
case_en = '''
One day Puhua stood in front of the monks' hall eating raw greens. Linji saw him and said, "You look just like a donkey."
Puhua brayed.
Linji said, "You thief."
Puhua said, "Thief, thief!" — and walked off.
'''

