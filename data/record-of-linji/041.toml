case_zh = '''
師問僧：「有時一喝如金剛王寶劍，有時一喝如踞地金毛師子，有時一喝如探竿影草，有時一喝不作一喝用，汝作麼生會？」僧擬議，師便喝。

'''
case_en = '''
Linji asked a monk: "Sometimes a shout is the diamond sword of the Vajra King. Sometimes it's a golden-maned lion crouched to spring. Sometimes it's a pole probing the grass. And sometimes a shout doesn't work as a shout at all. How do you tell them apart?"

The monk started to answer, and Linji shouted.
'''

