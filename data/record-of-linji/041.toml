pointer = '''
Linji (died 866) is famous above all for one thing, yelling, and here he sets out his own theory of it. The shout was never a tantrum, it was a tool, and he claims it comes in kinds. The "diamond sword of the Vajra King" cuts through confusion in a stroke. The "crouching lion" is raw force that pins you where you stand. The "pole probing the grass" is reconnaissance, a poke to flush out what you are hiding, the way a fisherman taps the reeds to spook fish into the open. And the fourth "doesn't work as a shout at all," it is doing something else entirely. Then he asks the monk to tell them apart, the monk opens his mouth to sort the categories, and gets a live shout that makes the taxonomy pointless. The instant the four shouts become a menu to memorize, you are standing exactly where the monk stood. This is the formal statement of the move you have watched land on people for twenty cases.
'''
