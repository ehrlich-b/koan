case_zh = '''
上堂，云：「一人在孤峯頂上，無出身之路；一人在十字街頭，亦無向背。那箇在前？那箇在後？不作維摩詰，不作傅大士。珍重。」

'''
case_en = '''
Linji took the high seat and said: "One person stands on a lone peak with no way down. Another stands at a crowded crossroads, facing nothing, turning from nothing. Which is in front? Which is behind? Don't play Vimalakirti. Don't play Mahasattva Fu. Take care."
'''

