pointer = '''
Right after laying out his theory of the shout (case 41), Linji meets someone who can throw one. His opening, "in peace, or in war," forces a choice, friend or foe, and any answer takes the bait. The nun skips the words and shouts, flinging the challenge straight back, a clean move. Then Linji baits her again, "say it again," and when she repeats the same shout he hits her. Read against the four shouts he just described, this is the test: a real response rises fresh to the moment, but run the identical move twice on demand and it has already congealed into a habit, a thing she owns rather than a thing happening now. He hit her for the second shout, not the first. The fact that she is a nun is almost the only place in the record one appears, and Linji tests her on exactly the terms he tests everyone, no softer.
'''
