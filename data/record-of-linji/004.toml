pointer = '''
"Guest and host" is Linji's own tool, and it runs through the rest of the book. In any encounter the host is the one who sees clearly and stays in command, the guest is the one being tested or the one who's lost, and the roles can flip mid-sentence or land on nobody. The shout is how he probes for it: he barks, and what you do next tells him which one you are. Then comes the snag. Two head monks meet and shout at the very same instant, neither giving way, so when someone asks who was host and who was guest there, it is a genuine puzzle with no obvious winner. Linji says the roles are clear as day and then flatly refuses to score it, sending everyone off to the two monks. He won't hand you the answer key, here or anywhere.
'''
