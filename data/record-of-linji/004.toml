case_zh = '''
上堂，有僧出禮拜，師便喝。僧云：「老和尚莫探頭好。」師云：「爾道落在什麼處？」僧便喝。又有僧問：「如何是佛法大意？」師便喝。僧禮拜。師云：「爾道好喝也無？」僧云：「草賊大敗。」師云：「過在什麼處？」僧云：「再犯不容。」師便喝。是日，兩堂首座相見，同時下喝。僧問師：「還有賓主也無？」師云：「賓主歷然。」師云：「大眾要會臨濟賓主句，問取堂中二首座。」便下座。

'''
case_en = '''
Linji took the high seat. A monk stepped forward and bowed. Linji shouted.

"Careful where you stick your neck out, old man," the monk said.

"Tell me, where did that one land?" said Linji. The monk shouted.

Then another monk asked, "What is the great meaning of the Buddha's teaching?" Linji shouted. The monk bowed.

"So, was that a good shout or not?" said Linji.

"The bandit is routed," said the monk.

"Routed where? Where was my mistake?" said Linji.

"Do it again and I won't let it pass," said the monk. Linji shouted.

That same day the two head monks, one from each hall, met face to face and shouted at the very same instant.

A monk asked Linji, "Then is there still guest and host, or not?"

"Guest and host, clear as day," said Linji. And he added, "If you all want to grasp my line on guest and host, go ask the two head monks." Then he stepped down from the seat.
