case_zh = '''
往鳳林，路逢一婆。婆問：「甚處去？」師云：「鳳林去。」婆云：「恰值鳳林不在。」師云：「甚處去？」婆便行，師乃喚婆，婆回頭，師便打。

'''
case_en = '''
On his way to Fenglin, Linji met an old woman on the road.

"Where are you headed?" she asked.

"Fenglin."

"Too bad. Fenglin's not in."

"Then where are you headed?" said Linji.

The old woman just walked off. Linji called after her. She turned her head, and he hit her.
'''

