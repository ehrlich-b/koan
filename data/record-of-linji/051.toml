case_zh = '''
一日普請次，師在後行，黃蘗回頭見師空手，乃問：「钁頭在什麼處？」師云：「有一人將去了也。」黃蘗云：「近前來，共汝商量箇事。」師便近前，黃蘗竪起钁頭，云：「秖這箇，天下人拈掇不起。」師就手掣得竪起，云：「為什麼却在某甲手裏？」黃蘗云：「今日大有人普請。」便歸院。後溈山問仰山：「钁頭在黃蘗手裏，為什麼却被臨濟奪却？」仰山云：「賊是小人，智過君子。」

'''
case_en = '''
One day the monks were all out on communal work. Linji was walking at the back, empty-handed. Huangbo glanced back, saw nothing in his hands, and asked, "Where's your hoe?"

Linji said, "Somebody took it."

Huangbo said, "Come here. Let's talk this over."

Linji stepped up. Huangbo held up his own hoe and said, "Just this, and no one in the world can lift it."

Linji snatched it out of his hand, held it up, and said, "Then how is it in mine?"

Huangbo said, "Today there's a real worker on the crew," and went back to the monastery.

Later Guishan asked Yangshan, "The hoe was in Huangbo's hand. How did Linji wrest it away?"

Yangshan said, "The thief is a petty man, but in cunning he outdoes the gentleman."
'''

