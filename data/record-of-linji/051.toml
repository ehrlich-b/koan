pointer = '''
Still on the work crew with Huangbo, the same setting as the hoeing in 48; Zen monasteries ran on everyone hauling and hoeing, abbot included. Linji turns up empty-handed, and when Huangbo asks where his hoe went he says somebody took it. Then Huangbo holds up his own hoe and makes a flat-out provocation: "just this, and nobody in the world can lift it." He isn't talking about weight, he's daring Linji to meet the claim, and Linji's reply is to grab the thing and hold it overhead: "then how's it in mine?" Action settles what argument can't. The closing wink comes from Guishan and Yangshan, who call Linji a "thief" who in cunning outdoes the gentleman, and in this world that's a compliment, not a charge; lifting the hoe out of the master's hand was precisely the answer the master was fishing for.
'''
