case_zh = '''
黃蘗因入厨次，問飯頭：「作什麼？」飯頭云：「揀眾僧米。」黃蘗云：「一日喫多少？」飯頭云：「二石五。」黃蘗云：「莫太多麼？」飯頭云：「猶恐少在。」黃蘗便打。飯頭却舉似師，師云：「我為汝勘這老漢。」纔到侍立次，黃蘗舉前話，師云：「飯頭不會，請和尚代一轉語。」師便問：「莫太多麼？」黃蘗云：「何不道『來日更喫一頓』？」師云：「說什麼來日？即今便喫！」道了便掌。黃蘗云：「這風顛漢，又來這裏捋虎鬚！」師便喝，出去。後溈山問仰山：「此二尊宿意作麼生？」仰山云：「和尚作麼生？」溈山云：「養子方知父慈。」仰山云：「不然。」溈山云：「子又作麼生？」仰山云：「大似勾賊破家。」

'''
case_en = '''
Huangbo came into the kitchen and asked the cook, "What are you doing?"

"Picking over the monks' rice."

"How much do they get through in a day?"

"Five bushels."

"Isn't that too much?"

"I'm afraid it's not enough."

Huangbo hit him.

The cook went and told Linji what had happened. Linji said, "I'll test the old man for you." As soon as he had taken his place at Huangbo's side, Huangbo raised the exchange. Linji said, "The cook didn't understand. Let me give a turning word in his place." Then he asked, "Isn't that too much?"

Huangbo said, "Why not say, 'And tomorrow we'll eat another helping'?"

Linji said, "Why talk about tomorrow? Eat it now." And he slapped him.

Huangbo said, "This crazy fool, back here again pulling the tiger's whiskers." Linji gave a shout and walked out.

Later Guishan asked Yangshan, "What were those two old masters getting at?"

Yangshan said, "What do you think?"

Guishan said, "You only know a father's love once you've raised a son."

Yangshan said, "I'd say otherwise."

Guishan said, "Then how would you put it?"

Yangshan said, "More like luring a thief in to ruin the house."
'''

