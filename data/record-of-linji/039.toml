case_en = '''
The senior monk Ding came to study with Linji. He asked, "What is the real point of the Buddha's teaching?"

Linji came down off his seat, seized him, gave him a slap, and shoved him off. Ding stood there, frozen.

A monk standing nearby said, "Ding, why don't you bow?"

As Ding bowed, he suddenly broke wide open.
'''

