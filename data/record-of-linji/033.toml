pointer = '''
Minister Wang is a senior government official and a patron of the monastery, so this is a sharp, educated layman trading blows with the abbot, not a tourist out of his depth. Linji's school was known for throwing out the usual monk routine, no scripture-chanting, no sitting meditation, so when he says his monks do neither, Wang is really asking what the place is even for. Linji answers big: he is turning every last one of them into a buddha and an ancestor. Then Wang lands the cleaner shot, "gold dust is precious, but get it in your eye and you cannot see," meaning even Linji's lofty buddha-talk becomes grit that blinds you the second you clutch it, the highest teaching turning into the obstruction. That is Linji's own medicine, the warning that the thing you came to acquire is the thing in your way, used on him by a layman, and his reply, "here I took you for an ordinary man," is the tip of the hat.
'''
