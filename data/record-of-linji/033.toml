case_zh = '''
王常侍一日訪師，同師於僧堂前看，乃問：「這一堂僧還看經麼？」師云：「不看經。」侍云：「還學禪麼？」師云：「不學禪。」侍云：「經又不看、禪又不學，畢竟作箇什麼？」師云：「總教伊成佛作祖去。」侍云：「金屑雖貴，落眼成翳，又作麼生？」師云：「將為爾是箇俗漢。」

'''
case_en = '''
One day Minister Wang came to see Linji. As they stood together in front of the monks' hall, Wang asked, "Do the monks in this hall read the sutras?"

Linji said, "No, they don't read the sutras."

"Do they practice meditation?"

"No, they don't practice meditation."

"They don't read, they don't meditate. So what on earth do they do?"

"I'm turning every last one of them into a buddha, into an ancestor."

Wang said, "Gold dust is precious, but get it in your eye and you can't see. What about that?"

Linji said, "Here I took you for an ordinary man."
'''

