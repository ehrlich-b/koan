pointer = '''
The Buddhist vow is to save all beings, and Zhaozhou opens by naming the bind in it: you can only really reach the reachable, the rest is heartbreak, and giving up isn't allowed either. Then he springs the trap. The monk says he is out there teaching, but when pressed claims no being can see him because "beings have no form," a slick deployment of emptiness, no fixed self anywhere. So Zhaozhou points at himself, solid and right in front of the man: then can you see me? The monk, trying to stay consistent, rules him out, you don't count, you're not an ordinary being. "Knowing your own fault is enough" is the close, and it works two ways at once: a small mercy, and a quiet checkmate, since the man has just argued himself into a corner and at least has the wit to feel the walls.
'''
