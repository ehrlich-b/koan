師示眾云：「老僧今夜答話去也，解問者出來。」有僧纔出禮拜。師云：「比來拋磚引玉，只得箇墼子。」問：「狗子還有佛性也無？」師云：「無。」學云：「上至諸佛，下至螘子，皆有佛性，狗子為什麼無？」師云：「為伊有業識性在。」問：「如何是法身？」師云：「應身。」云：「學人不問應身。」師云：「你但管應身。」問：「朗月當空時如何？」師云：「闍黎名什麼？」學云：「某甲。」師云：「朗月當空在什麼處？」問：「正當二八時如何？」師云：「東東西西。」學云：「如何是東東西西？」師云：「覓不著。」問：「學人全不會時如何？」師云：「我更不會。」云：「和尚還知有也無？」師云：「我不是木頭，作麼不知？」云：「大好不會。」師拍掌笑之。問：「如何是道人？」師云：「我向道是佛人。」問：「凡有言句，舉手動足，盡落在學人網中，離此外，請師道。」師云：「老僧齋了未喫茶。」馬大夫問：「和尚還修行也無？」師云：「老僧若修行即禍事。」云：「和尚既不修行，教什麼人修行？」師云：「大夫是修行底人。」云：「某甲何名修行？」師云：「若不修行，爭得撲在人王位中，餧得來赤凍紅地，無有解出期。」大夫乃下淚拜謝。

