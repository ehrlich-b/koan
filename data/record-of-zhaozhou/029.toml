pointer = '''
Zhaozhou opens the floor and a line of monks take their shots; read it as a session, not one case. A few footholds. "Buddha-nature" is the capacity for awakening said to live in everything, so denying it to a dog is deliberately scandalous, and this is the famous Wú exchange (Gateless Gate 1) caught in the wild. "Dharma-body" versus "response-body" is jargon for formless absolute reality versus the particular shape a buddha takes to teach you; the monk keeps reaching for the grand abstraction and Zhaozhou keeps shoving the ordinary one back at him. The bright moon in empty sky is a stock figure for pure awakened mind, so when a monk invokes it Zhaozhou just asks his name, dragging him back to the body in the room. The session ends with Minister Ma, a powerful official: Zhaozhou tells him his worldly height is not a reward but a trap he ate his way into and cannot climb out of, and Ma weeps because the man got it.
