case_en = '''
Zhaozhou addressed the assembly: "Tonight the old monk will take questions. Whoever knows how to ask, step up."

A monk came forward and bowed.

Zhaozhou said, "I tossed out a brick to draw a piece of jade, and all I got back was a lump of clay."

A monk asked, "Does a dog have buddha-nature?"

"No," said Zhaozhou.

"Everything has buddha-nature, from the buddhas above to the ants below. Why not a dog?"

"Because it's still running on the karma it was born with."

A monk asked, "What is the dharma-body?"

"The response-body."

"I didn't ask about the response-body."

"Never mind. Just stick with the response-body."

A monk asked, "When the bright moon hangs in the empty sky, what then?"

"What's your name, reverend?"

"So-and-so."

"And where's that bright moon in the empty sky now?"

A monk asked, "Right at the height of the full moon, what then?"

"East here, east there, west here, west there."

"And what is 'east here, east there, west here, west there'?"

"Look for it and you won't find it."

A monk asked, "When I don't understand a thing, what then?"

"I understand even less."

"Master, do you actually know or not?"

"I'm not a block of wood. How could I not know?"

"Wonderful. You don't understand a thing."

Zhaozhou clapped his hands and laughed.

A monk asked, "What is a man of the Way?"

"I call him a man of buddha."

A monk said, "Every word out of a mouth, every lift of a hand, every step of a foot, all of it falls into the net I'm caught in. Set that aside, and say something."

"The old monk has finished his meal but hasn't had his tea."

Minister Ma asked, "Master, do you practice or not?"

"If the old monk practiced, that would be a disaster."

"If you don't practice, then who are you telling to practice?"

"You're the one who practices, Minister."

"How can you call me a practitioner?"

"If you hadn't practiced, how would you have landed in the seat of a king? But now you're stuffed full and frozen stiff, with no way out in sight."

At that, Minister Ma wept and bowed in thanks.
