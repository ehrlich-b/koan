pointer = '''
Now Zhaozhou holds the seat himself. "Why did Bodhidharma come from the West?" is the stock shorthand for the largest question in this tradition, what the whole practice is even for, and his answer is to point at the cypress tree in the yard, twice, the same flat reply that became Gateless Gate 37. The monk objects that a tree is just an external object, and Zhaozhou denies he handed over any object at all, which is the live edge of the case: he is not naming a thing, he is refusing to turn the question into doctrine. The rest is Zhaozhou running his hall. He roasts the celebrity teachers of his day as frauds gathering crowds for a free meal, and then fends off a row of earnest questions with deadpan absurdities, a pregnant pigtailed girl, the giant radishes of Zhenzhou, and finally no answers at all. Each refusal does the same work the tree did: it won't let the asker pocket a tidy thing and walk off thinking he has it.
