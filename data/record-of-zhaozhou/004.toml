case_en = '''
Zhaozhou took the high seat and addressed the assembly. "This matter is plain as day, yet even a giant of a man can't get clear of it. When I went to see Guishan, a monk asked him, 'What is the meaning of Bodhidharma coming from the West?' Guishan said, 'Bring me my chair.' A true master has to meet people with the real thing. Nothing less will do."

A monk asked, "What is the meaning of Bodhidharma coming from the West?"

Zhaozhou said, "The cypress tree out in the yard."

The monk said, "Master, don't show me some object."

Zhaozhou said, "I'm showing you no object."

"Then what is the meaning of Bodhidharma coming from the West?"

Zhaozhou said, "The cypress tree out in the yard."

He went on: "Ninety years ago I studied under Great Master Mazu, and I met more than eighty teachers under him. Every one was the real thing, not like the teachers nowadays, sprouting vines on top of vines. We've drifted that far from the sages. Each generation falls short of the last. Take what Nanquan always said: 'You have to walk among the other kinds.' Well, how do you understand that? These days some snot-nosed kid stands at the crossroads spinning tangled nonsense, scrounging a free meal and a bow, gathering three or five hundred followers, and crows, 'I'm the teacher, you're the students.'"

A monk asked, "What is a pure temple?"

Zhaozhou said, "A girl with her hair in pigtails."

"And who lives in that temple?"

Zhaozhou said, "A pigtailed girl, pregnant."

A monk asked, "I hear you studied with Nanquan yourself. Is that so?"

Zhaozhou said, "Zhenzhou grows giant radishes."

A monk asked, "Where were you born?"

Zhaozhou pointed with his hand. "West of here, and further west still."

A monk asked, "There is no Dharma apart from the Dharma. So what is the Dharma?"

Zhaozhou said, "Outside, empty. Inside, empty. Inside and out, empty."

A monk asked, "What is the true body of Buddha?"

Zhaozhou said, "What more do you want?"

A monk asked, "What is the teaching of the mind-ground?"

Zhaozhou said, "The model, then and now."

A monk asked, "What is the host within the guest?"

Zhaozhou said, "This old monk doesn't go asking after a wife."

A monk asked, "What is the guest within the host?"

Zhaozhou said, "This old monk has no father-in-law."

A monk asked, "What is it that all things abide in forever?"

Zhaozhou said, "This old monk won't shy from naming his own ancestors."

The monk asked again. Zhaozhou said, "No more answers today."
