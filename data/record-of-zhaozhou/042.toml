case_en = '''
Cockcrow, the hour of the Ox.
Sick at heart to wake and still be broke.
No skirt, no shirt to my name.
Just the shape of a monk's robe, more or less.
Pants with no waistband.
Trousers with no fly.
A few pecks of gray ash heaped on my head.
I set out to practice and save the world.
Who knew I'd turn out this useless.

First light, the hour of the Tiger.
A ruined village, a wrecked temple, nothing to say about it.
Not one grain of rice to break the fast.
I sit and stare at an idle window and the dust in the cracks.
Only the magpies racket.
Not a soul comes near.
Sitting alone I hear the leaves keep falling.
Who said leaving home cuts off love and hate?
I turn it over and the tears soak the cloth before I know it.

Sunup, the hour of the Rabbit.
What's pure flips straight back into trouble.
My little hoard of merit goes under the dust.
Endless ground inside me, never once swept.
Much frowning.
Little ease.
And damn that swarthy old man from the east village:
never once brought an offering my way,
just turns his donkey loose on the grass in front of my hall.

Mealtime, the hour of the Dragon.
I watch the neighbors' chimney smoke for nothing.
Steamed buns and dumplings, that was years ago.
Today I think of them and swallow on empty.
Few say the prayers.
Many heave the sighs.
A hundred houses and not one good soul among them.
Whoever shows up only wants tea.
No tea, and off they stomp in a huff.

Late morning, the hour of the Snake.
I shaved my head. Who knew it would come to this.
Out of nowhere they made me the village monk.
Hounded, starved, half dead with want.
Some Zhang San.
Some Li Si.
Never a scrap of respect from them.
Now there's someone at the gate again,
wanting to borrow tea, and paper too.

High noon, the hour of the Horse.
Tea and food turn up on no fixed schedule.
I trudge from the south house to the north house.
Reach the north house, and they brush me off as well.
Bitter sand-salt.
Barley vinegar.
Sorghum rice and a mess of bitter lettuce.
They call it an offering, no small thing:
"Monk, keep that resolve of yours good and firm."

Past midday, the hour of the Sheep.
This time around I don't even walk in the daylight.
They say one full meal makes you forget a hundred hungers.
Today that old monk is the proof.
I don't drill at meditation.
I don't argue doctrine.
I spread a broken mat and sleep in the sun.
I figure even Tushita Heaven up there
has nothing on a day like this, baking my back.

Afternoon, the hour of the Monkey.
There are people who burn incense and bow.
Five old women, three with goiters,
a pair of faces black and cracked.
Sesame-oil tea.
A real treasure, this.
No need to strain like a temple guardian flexing his sinews.
"May next year's silkworms and wheat come in,
and give little Rahula here a penny."

Sundown, the hour of the Rooster.
Strip off the desolation and what's left to guard?
High-flying clouds-and-water monks: none, for certain.
Novices drifting temple to temple: always a crowd.
They talk above their station.
They can't back it up.
A waste, calling yourselves the Buddha's heirs.
This one staff of rough briarwood,
not just for climbing hills but for beating off dogs.

Dusk, the hour of the Dog.
I sit alone in one empty, pitch-black room.
Lamplight never reaches me.
What's before my eyes is pure Jinzhou lacquer, black.
No bell to hear.
The day gone for nothing.
Only the rats, squeaking and scuffling.
Where am I to find the heart for anything?
I turn it over and recite one paramita.

Settling in, the hour of the Boar.
Who's out there loving the bright moon at the gate?
Indoors I only dread lying down:
no quilt, nothing to pull over me.
Director Liu.
Layman Zhao.
The virtue rolling off their tongues is a wonder to hear.
Let this mountain monk's sack hang empty,
ask them for a thing and they come up blank every time.

Midnight, the hour of the Rat.
When has the mind ever had a moment's rest?
I think of all the home-leavers under heaven:
how many run a temple like mine?
A dirt platform for a bed.
A busted reed screen.
An old elm-wood pillow and no blanket at all.
No calming-resin incense before the holy image.
In the ashes, only the smell of cow dung.
