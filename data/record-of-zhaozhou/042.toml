pointer = '''
Here the book changes register: the hall-talks give way to verse, and this is the long one, Zhaozhou's comic gripe-poem about life at his broke, falling-apart temple. The old Chinese day ran on twelve two-hour blocks, each named for an animal (Ox, Tiger, Rabbit, on around), so the poem is a clock, and at every hour something is wretched: no clothes, no food, no respect, freeloaders who turn up only wanting free tea, "donors" who never donate. A few things to catch: "leaving home" means becoming a monk; "clouds-and-water" is slang for the wandering monks who were supposed to be the serious seekers, and he is complaining that none of the good ones come, just dropout novices; Tushita is a heaven, and he jokes that even paradise can't beat lying in the sun. The closing whiff of cow dung where holy incense should be is the whole poem in one breath. The joke under the joke: this is the man the tradition crowns a great awakened teacher, and here he sits, freezing, starving, and gorgeously bitter about it.
'''
