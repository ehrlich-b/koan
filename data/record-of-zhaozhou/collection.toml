source_note = "The Record of Zhaozhou (趙州真際禪師語錄并行狀), preserved in 古尊宿語錄 (fascicles 13–14) in the public-domain Xuzangjing (卍續藏, vol. 68, no. 1315), set in our own punctuation. It gives Zhaozhou's own record — his life-record (行狀), his Dharma-hall discourses and instructions (上堂 / 示眾), his Song of the Twelve Hours (十二時歌), and his occasional verses (頌); the appended encomium and elegies written by other hands are omitted."
