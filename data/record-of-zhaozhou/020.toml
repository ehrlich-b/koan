師示眾云：「大道只在目前，要且難覩。」僧乃問：「目前有何形段令學人覩？」師云：「任你江南江北。」學云：「和尚豈無方便為人？」師云：「適來問什麼？」問：「入法界來，還知有也無？」師云：「誰入法界？」學云：「與麼即入法界不知去也。」師云：「不是寒灰死木，花錦成現，百種有。」學云：「莫是入法界處用也無？」師云：「有什麼交涉？」問：「若是實際理地，什麼處得來？」師云：「更請闍黎宣一遍。」問：「萬境俱起，還有惑不得者也無？」師云：「有。」學云：「如何是惑不得者？」師云：「你還信有佛法否？」學云：「信有佛法。古人道了，如何是惑不得者？」師云：「為什麼不問老僧？」學云：「問了也。」師云：「惑也。」問：「未審古人與今人還有近也無？」師云：「相近即相近，不同一體。」學云：「為什麼不同？」師云：「法身不說法。」學云：「法身不說法，和尚為人也無？」師云：「我向惠裏答話。」學云：「爭道法身不說法？」師云：「我向惠裏救你阿爺，他終不出頭。」問：「學人道不相見時，還迴互也無？」師云：「測得迴互。」學云：「測他不得，迴互箇什麼？」師云：「不與麼是你自己。」學云：「和尚還受測也無？」師云：「人即轉近，道即轉遠也。」學云：「和尚為什麼自隱去？」師云：「我今現共你語話。」學云：「爭道不轉？」師云：「合與麼著。」

