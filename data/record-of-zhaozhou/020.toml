Zhaozhou said, "If you could fathom it, there'd be give-and-take."

The monk said, "I can't fathom it. So what's the give-and-take?"

Zhaozhou said, "What can't be fathomed is your own self."

The monk said, "Can you be fathomed?"

Zhaozhou said, "The closer the person comes, the farther the Way recedes."

The monk said, "Why do you hide yourself away?"

Zhaozhou said, "I'm right here, talking with you this very minute."

