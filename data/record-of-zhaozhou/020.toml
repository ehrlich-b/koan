case_en = '''
Zhaozhou addressed the assembly: "The great Way is right in front of you. It's only hard to see."

A monk asked, "What shape does this thing in front of me have, so I can see it?"

Zhaozhou said, "South of the river, north of the river — go where you like."

The monk said, "So you've nothing to offer people?"

Zhaozhou said, "What did you just ask me?"

A monk asked, "When you enter the realm of reality, do you know it's there?"

Zhaozhou said, "Who enters the realm of reality?"

The monk said, "Then to enter the realm of reality is not to know you've gone."

Zhaozhou said, "It isn't cold ash and dead wood. Flowers and brocade, blooming right now, a hundred kinds of things."

The monk said, "Is that where you put 'entering the realm of reality' to use?"

Zhaozhou said, "What's that got to do with it?"

A monk asked, "If there's such a thing as the ground of ultimate truth, where does it come from?"

Zhaozhou said, "Run that by me once more, reverend."

A monk asked, "When the ten thousand things rise up at once, is there anything they can't fool?"

Zhaozhou said, "There is."

The monk said, "What is it they can't fool?"

Zhaozhou said, "Do you believe there's such a thing as the Dharma?"

The monk said, "I believe there's the Dharma. The ancients already settled that. So what is it they can't fool?"

Zhaozhou said, "Why don't you ask me?"

The monk said, "I just did."

Zhaozhou said, "Fooled."

A monk asked, "Are the ancients and people today close to each other?"

Zhaozhou said, "Close, yes. But not one and the same."

The monk said, "Why aren't they the same?"

Zhaozhou said, "The Dharma-body doesn't preach the Dharma."

The monk said, "If the Dharma-body doesn't preach the Dharma, are you doing anything for people?"

Zhaozhou said, "I answer you out of kindness."

The monk said, "Then how can you say the Dharma-body doesn't preach the Dharma?"

Zhaozhou said, "Out of kindness I'd save your father, and still he won't show his face."

