pointer = '''
A long session, all of it turning on one move Zhaozhou makes over and over: every monk wants the truth handed over as a thing, a shape to see, a place it issues from, a doctrine to hold, and every time he slides out from under it. The "realm of reality" and "the ground of ultimate truth" are just ornate Buddhist names for how things actually are, and the running joke is that monks treat them like destinations you can travel to and arrive at. "Cold ash and dead wood" is the stock image for a deadened, checked-out enlightenment, which Zhaozhou rejects, pointing instead at the blooming world right now, "flowers and brocade, a hundred kinds of things." The "Dharma-body" is reality itself, the ultimate Buddha behind any preaching teacher, so saying it "doesn't preach" means the real thing never lectures you; when the monk then demands Zhaozhou explain himself, Zhaozhou says he is only answering out of kindness, and even that won't reach the man. The line that sums the afternoon: the closer you come, the farther the Way recedes.
'''
