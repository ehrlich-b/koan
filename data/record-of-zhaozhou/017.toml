pointer = '''
A tiny scene, almost a joke, and one of the gentlest in the book. Zhaozhou sits on the platform in silence, then says he is waiting for one more before he speaks. The "one more" is not a missing body; it is a person who would actually understand. The monk reads him perfectly and tops him: when there is finally no one left to arrive, I will carry your words to that one. Zhaozhou's reply lands as half praise, half sigh, that such a partner is hard to come by. Underneath the wordplay sits a real question about who his teaching is even for, and whether the room that calls itself full is, by his count, nearly empty.
'''
