case_zh = '''
上堂，良久，大眾總來也未？對云：「總來也。」師云：「更待一人來即說話。」僧云：「候無人來即說似和尚。」師云：「大難得人。」

'''
case_en = '''
Zhaozhou took the high seat. He sat a long while, saying nothing. At last he asked, "Is everyone here?"

A monk said, "Everyone's here."

Zhaozhou said, "I'll wait for one more, then I'll speak."

The monk said, "When there's no one left to come, I'll pass your words along to him."

Zhaozhou said, "A man like that is hard to find."
'''

