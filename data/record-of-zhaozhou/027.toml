case_zh = '''
上堂，示眾云：「若是第一句，與祖佛為師。第二句，與人天為師。第三句，自救不了。」有僧問：「如何是第一句？」師云：「與祖佛為師。」師又云：「大好從頭起。」學人再問。師云：「又却人天去也。」

'''
case_en = '''
Zhaozhou took the high seat and addressed the assembly: "The first statement makes you teacher to the buddhas and ancestors. The second makes you teacher to humans and gods. The third can't even save your own skin."

A monk asked, "What is the first statement?"

Zhaozhou said, "Teacher to the buddhas and ancestors."

Then he added, "Good. Now take it from the top."

The monk asked again.

Zhaozhou said, "And there it goes — down to humans and gods."
'''

