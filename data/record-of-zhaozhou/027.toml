pointer = '''
"Taking the high seat" is the teacher climbing up for a formal address. Zhaozhou lays out a three-rank scale: the top statement makes you teacher even to the buddhas, the next a teacher of ordinary beings, the lowest cannot save its own skin. A monk asks for that top line and Zhaozhou hands it over clean. Here is the hinge: a first-rank answer only stays first-rank if you take it whole, on the spot. The monk hesitates and asks a second time, and in reaching back to grab the answer he has already demoted it to a thing he is holding. Zhaozhou's last line is the demotion announcing itself, the same answer sliding down a rank because the monk turned it into a possession. The ranking was never in the words; it was in how he took them.
'''
