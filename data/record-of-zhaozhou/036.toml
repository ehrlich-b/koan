Another column of one-line bouts from the hall, monks and a couple of laypeople lobbing, Zhaozhou firing back. Footholds: "the intent of the ancestors and the intent of the teachings" is the stock question of whether Zen, passed person to person, and the written scriptures point at the same thing. "Caoxi" is the home temple of the Sixth Ancestor, shorthand for the source of the whole tradition, so "Caoxi is rough going" plays the source as a mountain road. "Vairocana" is the cosmic, all-pervading buddha, which makes "who is his teacher" a setup with no comfortable answer. The exchange with the old woman is the hardest: the "five hindrances" was a sexist doctrine that a woman's body blocks awakening, and rather than reassure her or endorse it, Zhaozhou says something so blunt it knocks the doctrine over instead of answering inside it. The closer is the tell: asked who the real master of Zhaozhou is, he gives his own plain name, Congshen. Nobody special, just the man in front of you.
