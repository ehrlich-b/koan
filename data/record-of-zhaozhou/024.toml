pointer = '''
Zhaozhou (778–897) opens by saying the word "Buddha" turns his stomach, which is the house position of this whole book: make "Buddha" a holy word to repeat and revere and you have built one more idol. The exchange then runs on a pun. Zhaozhou quotes a stock phrase, 玄旨, "the deep gist," and the monk tries to corner him by splitting the compound in two: you've shown me the "deep," now produce the "gist" as a separate item. He wants the gist served as a thing he can write down and keep, and the last line refuses to let it be one. The responding itself, this live answer to this live monk, is the gist; there is no second nugget hiding behind it.
'''
