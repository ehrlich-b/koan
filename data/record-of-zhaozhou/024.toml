case_en = '''
Zhaozhou said to the assembly, "The word 'Buddha' — I don't like hearing it."

A monk asked, "Master, do you still help people?"

Zhaozhou said, "I do."

The monk said, "How?"

Zhaozhou said, "Miss the deep point and you wear yourself out chasing quiet for nothing."

The monk said, "Fine, that's the 'deep.' But what's the 'point'?"

Zhaozhou said, "I hold to no fixed text."

The monk said, "That was the 'deep.' Now what's the 'point'?"

Zhaozhou said, "Answering you is the point."
