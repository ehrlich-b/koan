Zhaozhou from the seat again, taking on monks, a nun, and a layman. He boasts that in thirty years no real Chan master has bothered to stay, then explains his method in a riddle: come from the south and he unloads you, come from the north and he loads you up, meaning he gives you the opposite of whatever you arrive carrying. The questioners keep offering him clean abstractions to bless, and he keeps souring them. A man "untrippable by good or evil," is he free? No, says Zhaozhou, he is standing right inside good and evil. The dharma-body, Buddha versus ordinary being, having or lacking a "root," each falls apart the moment a monk grips it. The nun's burned kettle is a good gauge of the whole room: she fetches a real kettle and demands a real answer, and he only laughs, because she has turned his figure of speech back into an object, which is the very mistake he keeps refusing. The closer, "what business is that of yours," sends the auditing monk back to his own life.
