case_zh = '''
師上堂云：「兄弟但改往修來。若不改，大有著你處在。老僧在此間三十餘年，未曾有一箇禪師到此間。設有來，一宿一食急走過，且趂軟暖處去也。」問：「忽遇禪師到來，向伊道什麼？」師云：「千鈞之弩，不為鼷鼠而發機。」師云：「兄弟，若從南方來者，即與下載；若從北方來，即與裝載。所以道，近上人問道即失道，近下人問道者即得道。兄弟，正人說邪法，邪法亦隨正；邪人說正法，正法亦隨邪。諸方難見易識，我者裏易見難識。」問：「善惡惑不得底人，還獨脫也無？」師云：「不獨脫。」學云：「為什麼不獨脫？」師云：「正在善惡裏。」尼問：「離却上來說處，請和尚指示。」師咄云：「煨破鐵瓶。」尼將鐵瓶添水來，請和尚答話，師笑之。問：「世界變為黑穴，未審此箇落在何路？」師云：「不占。」學云：「不占是什麼人？」師云：「田厙奴。」問：「無言無意始稱得句，既是無言，喚什麼作句？」師云：「高而不危，滿而不溢。」學云：「即今和尚是滿是溢？」師云：「爭柰你問我。」問：「如何是靈者？」師云：「淨地上屙一堆屎。」學云：「請和尚的旨。」師云：「莫惱亂老僧。」問：「法身無為，不墮諸數，還許道也無？」師云：「作麼生道？」學云：「與麼即不道也。」師笑之。問：「如何是佛？如何是眾生？」師云：「眾生即是佛，佛即是眾生。」學云：「未審兩箇那箇是眾生？」師云：「問，問，問。」「大道無根，如何接唱？」師云：「你便接唱。」「無根又作麼生？」師云：「既是無根，什麼處繫縳你？」問：「正修行底人，莫被鬼神測得也無？」師云：「測得。」云：「過在什麼處？」師云：「過在覓處。」云：「與麼即不修行也。」師云：「修行。」問：「孤月當空，光從何生？」師云：「月從何生？」問：「承和尚有言：『道不屬修，但莫染污。』如何是不染污？」師云：「檢校內外。」云：「還自檢校也無？」師云：「檢校。」云：「自己有什麼過自檢校？」師云：「你有什麼事？」

