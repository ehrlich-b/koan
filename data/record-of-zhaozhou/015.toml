pointer = '''
"No-birth, no-death" is standard Buddhist teaching: nothing truly comes into being or goes out of it, so there is nothing to grab onto or dread losing. The danger is how easily it becomes a slogan, and the instant a monk parrots it back as already settled fact, Zhaozhou nails him for dealing in "dead words," memorized phrases with no life in them. The second monk reaches again for that favorite line, "the perfect Way is easy, only stop picking and choosing" (see case 14), and tries to use it to trap the teacher. Zhaozhou's move is to quote it straight back, deadpan, as if to say you are holding the answer in your own mouth and still won't live it. The test running under both halves: can you tell the difference between knowing a true sentence and being changed by it.
'''
