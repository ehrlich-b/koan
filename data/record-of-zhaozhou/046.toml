pointer = '''
The last of the short verses that end the record, four lines on a lotus. The lotus roots in muck at the bottom of a pond and breaks the surface clean and white, the standard Buddhist image for waking up in the middle of an ordinary, messy life. "The West" means India, where Buddhism came from. The weight is all in the final line: while the thing is still down in the mud you cannot tell what it is, deep or shallow, weed or wonder. Only when it clears the water do you know it was a white lotus the whole time. A quiet last note to close a book whose author spent a hundred and twenty years refusing to look any more special than the next stalk in the pond.
'''
