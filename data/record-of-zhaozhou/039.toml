pointer = '''
Three quick scenes. First, the "lion cub": a lion is a master, the cub the rare student who genuinely gets it. The monk shows off by snapping his fingers, a gesture that signals "I'm awake," and Zhaozhou shuts it down; labeling yourself the real thing already misses, and performing the label is worse. Second, a monk arrives from Xuefeng, a big-name teacher whose name means Snow Peak. Xuefeng's saying, the whole universe is one eye, so where do you go to shit, is a cosmic boast, the idea that if everything is awakening there is no leftover corner for an ordinary body; Zhaozhou's deadpan "take him a shovel" sends the great cosmic eye off to do its business like everyone else. Third, Zhaozhou gives all his robes away and a monk frets that he will have nothing left to use. Zhaozhou yells "Huzhou boy" (just where the monk is from), the monk reflexively answers "Yes," and Zhaozhou points at exactly that, the thing that answered. Give away everything you own and you are still using it.
'''
