pointer = '''
This opens with a line Zhaozhou liked enough to reuse (it heads 34 and 38 too): the instant you take sides, you lose your mind in the noise, so is there any room left to answer? A monk responds by slapping the attendant, a borrowed bit of Chan theater, and Zhaozhou just walks back to his room, unimpressed by the performance. Then exchanges. "The Way" is the grand abstract goal everyone hunts, and he keeps pointing at concrete stuff (the man outside the wall, the road that runs to the capital Chang'an) to drag the monk out of his head. An "icchantika" is the Buddhist term for someone supposedly so lost they can never wake up, the worst-case write-off; when the monk swaps it for "enlightenment," Zhaozhou says that fishing for the holy word is itself the dead end. "The four elements and the five heaps" is the standard parts-list for a human being, so his deadpan reply to "what body never gets sick" is, this ordinary one. The thread is a man refusing to score points, sometimes ending an exchange by saying "take care" and leaving.
'''
