case_en = '''
At a formal talk Zhaozhou said, "The moment you take sides, you lose your mind in the noise. So is there any room left to answer at all?"

A monk stepped out and slapped the attendant once. "Why don't you answer the master?"

Zhaozhou just went back to his quarters.

Later the attendant came and asked, "That monk a minute ago, did he get it or not?"

Zhaozhou said, "The one sitting sees the one standing. The one standing sees the one sitting."

A monk asked, "What is the Way?"

Zhaozhou said, "The one outside the wall."

"I'm not asking about that one."

"Then what Way are you asking about?"

"The great Way."

Zhaozhou said, "The great Way runs straight to Chang'an."

A monk asked, "When you brush off the dust and see the Buddha, how is that?"

Zhaozhou said, "Brushing off the dust, fine. Seeing the Buddha, no."

A monk asked, "What is the body that never gets sick?"

Zhaozhou said, "The four elements and the five heaps."

A monk asked, "What is an icchantika?"

Zhaozhou said, "Why don't you ask about enlightenment?"

"What is enlightenment?"

Zhaozhou said, "That right there. That's the icchantika."

One day Zhaozhou held up a finger, curled it, and said, "I call this a fist. What do the rest of you call it?"

A monk said, "Why use an object to teach people?"

Zhaozhou said, "I'm not using an object to teach you. If I used an object to teach you, I'd be burying you alive."

"Then what do you do with this?"

Zhaozhou said, "Take care," and ended it.

A monk asked, "Question and answer, it all falls into the trap of demons and heretics. But stay silent and you're caught in their net just the same. So what is the house style of Zhaozhou?"

Zhaozhou said, "You don't know how to ask."

"Then you answer, master."

Zhaozhou said, "Going by you, you've got twenty blows coming."
