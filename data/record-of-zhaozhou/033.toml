上堂云：「纔有是非，紛然失心，還有答話分也無？」有僧出撫侍者一下云：「何不祇對和尚？」師便歸方丈。後侍者請益：「適來僧是會不會？」師云：「坐底見立底，立底見坐底。」問：「如何是道？」師云：「墻外底。」云：「不問者箇。」師云：「問什麼道？」云：「大道。」師云：「大道通長安。」問：「撥塵見佛時如何？」師云：「撥塵即不無，見佛即不得。」問：「如何是無疾之身？」師云：「四大五陰。」問：「如何是闡提？」師云：「何不問菩提？」云：「如何是菩提？」師云：「只者便是闡提。」師有時屈指云：「老僧喚作拳，你諸人喚作什麼？」僧云：「和尚何得將境示人？」師云：「我不將境示人。若將境示闍黎，即埋沒闍黎去也。」云：「爭奈者箇何？」師便珍重。問：「一問一答，總落天魔外道。設使無言，又犯他匡網。如何是趙州家風？」師云：「你不解問。」云：「請和尚答話。」師云：「若據你，合喫二十棒。」

