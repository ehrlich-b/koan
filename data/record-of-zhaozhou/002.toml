case_zh = '''
師問南泉：「如何是道？」泉云：「平常心是道。」師云：「還可趣向不？」泉云：「擬即乖。」師云：「不擬爭知是道？」泉云：「道不屬知不知。知是妄覺，不知是無記。若真達不疑之道，猶如太虗，廓然蕩豁，豈可強是非也？」師於言下頓悟玄旨，心如朗月。

'''
case_en = '''
Zhaozhou asked Nanquan, "What is the Way?"

Nanquan said, "Ordinary mind is the Way."

Zhaozhou said, "Then can I head toward it?"

Nanquan said, "Reach for it and you've already missed."

Zhaozhou said, "If I don't reach, how do I know it's the Way?"

Nanquan said, "The Way has nothing to do with knowing or not knowing. Knowing is delusion. Not knowing is just blankness. When you truly arrive at the Way beyond all doubt, it's wide open as empty space, vast and clear, without edges. How could you force it into right and wrong?"

At these words Zhaozhou broke through to the depths of it, and his mind was like a bright moon.
'''

