pointer = '''
This is the exchange that cracked Zhaozhou open, and it became famous enough to land in the Gateless Gate as case 19. The "Way" is what every monk in the hall is straining toward: awakening, the point of the whole life. Nanquan's answer, "ordinary mind is the Way," sounds like comfort but sets the trap. Zhaozhou tries to do the obvious thing and head toward it, and Nanquan tells him the heading-toward is itself the miss, because aiming at the Way turns it into one more object outside you. Then he closes the last exit: knowing it is delusion, not knowing it is mere blankness, so you can't think your way in either. What you do with that is left sitting on the page, the way it sat with Zhaozhou until his mind went clear as a moon. The teacher who made him this way walks all through the next case.
'''
