case_zh = '''
師示眾云：「老僧此間即以本分事接人。若教老僧隨伊根機接人，自有三乘十二分教接他了也。若是不會，是誰過歟？已後遇著作家漢，也道老僧不辜他。但有人問，以本分事接人。」問：「從上至今即心是佛，不即心還許學人商量也無？」師云：「即心且置，商量箇什麼？」問：「古鏡不磨，還照也無？」師云：「前生是因，今生是果。」問：「三刀未落時如何？」師云：「森森地。」云：「落後如何？」師云：「迥迥地。」問：「如何是出三界底人？」師云：「籠□不得。」問：「牛頭未見四祖，百鳥銜花供養；見後為什麼百鳥不銜花供養？」師云：「應世不應世。」問：「白雲自在時如何？」師云：「爭似春風處處閑。」問：「如何是露地白牛？」師云：「月下不用色。」云：「食噉何物？」師云：「古今嚼不著。」云：「請師答話。」師云：「老僧合與麼。」

