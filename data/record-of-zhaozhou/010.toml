case_en = '''
Zhaozhou addressed the assembly: "Around here I meet people with the real thing, straight up. If you wanted me to meet you where you are, measured out to fit your capacity, well, that's what the whole canon is for, the three vehicles, the twelve divisions. Let those handle it. And if you still don't get it, whose fault is that? Down the road, if I run into someone who actually has it, that one will say old Zhaozhou never shortchanged him. So go ahead. Ask. I deal in the real thing."

A monk asked, "From the old days down to now they've said, 'This very mind is Buddha.' Drop the 'this very mind,' and is there still something for me to chew on?"
Zhaozhou said, "Set the mind aside. Chew on what?"

A monk asked, "The ancient mirror, left unpolished, does it still reflect?"
Zhaozhou said, "Your last life was the cause. This life is the result."

A monk asked, "The moment before the three blades fall, what then?"
Zhaozhou said, "Thick and dense."
"And after they've fallen?"
Zhaozhou said, "Wide open, clear."

A monk asked, "Who is the one that breaks out of the three realms?"
Zhaozhou said, "No cage can hold him."

A monk asked, "Before Niutou met the Fourth Patriarch, the birds brought him flowers. After he met him, why did the birds stop?"
Zhaozhou said, "He answers the world, or he doesn't."

A monk asked, "When the white cloud drifts free, what's that like?"
Zhaozhou said, "How does it beat the spring wind, idling everywhere it goes?"

A monk asked, "What is the white ox in the open field?"
Zhaozhou said, "Under the moon, no need for color."
"What does it eat?"
Zhaozhou said, "Past and present, it never bit down on a thing."
"Then answer me straight, master."
Zhaozhou said, "This is me answering straight."
