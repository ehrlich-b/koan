pointer = '''
Zhaozhou opens by drawing a hard line: he won't meter out beginner doctrine to suit your level, since the whole canon already exists for that. He deals only in the bare fact in front of you, and if you miss it the fault is yours. Then the stock ideas come and he swats each one. "This very mind is Buddha" is Mazu's famous slogan; the monk tries to be clever by subtracting the mind, and Zhaozhou refuses the game. The "ancient mirror, unpolished" is a classic figure for the pure mind under its grime, and where the monk wants metaphysics, Zhaozhou hands back plain cause and effect. Niutou was a hermit so holy that birds reportedly brought him flowers, until he woke up and left no trace for the birds to find, so they stopped, which is Zhaozhou's wry standard for real attainment: it disappears rather than glows. The "white ox in the open field" is a sutra image for the fully awakened person, nothing hidden, out where anyone could see. Every time a monk reaches for a concept to hold, Zhaozhou closes the hand.
