case_en = '''
Zhaozhou addressed the assembly: "The dragon girl wholeheartedly offered the jewel in person. All of it was simply natural."

A monk asked, "If it was natural, why offer it at all?"

Zhaozhou said, "If she hadn't offered it, how would you know it was natural?"
'''

