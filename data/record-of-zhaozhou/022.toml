pointer = '''
The dragon girl is from the Lotus Sutra, the dragon king's young daughter who suddenly wakes up and offers a priceless jewel to the Buddha, the scripture's favorite proof that awakening can land all at once, no centuries of grinding needed. She turns up here and in case 11. Zhaozhou calls her gift pure spontaneity, nothing forced. The monk pokes the obvious hole: if it was so natural, why make a deliberate gesture of it, doesn't acting on purpose spoil the "natural"? Zhaozhou flips the objection inside out. The offering is precisely where the naturalness becomes visible. You don't get to point at spontaneity sitting off to one side, pristine and separate from any act; it has no existence except in the doing.
'''
