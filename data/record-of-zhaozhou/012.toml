pointer = '''
The game in this talk is that any statement you make about Zhaozhou traps you. Claim you "come from Zhaozhou" and you have turned him into a brand, a fixed thing, a doctrine to carry, which he calls slander. Deny it and you erase yourself. Even protesting "I'm not slandering" is a claim, so it slanders too. The way out he hands the monks is gloriously deflating: when asked what Zhaozhou teaches, say only that when it is cold he says cold and when it is hot he says hot, and if the questioner still wants the secret, tell him to quit working through middlemen and go ask the man himself. That is the teaching, not a clue to it. The closing line turns the blade on the questioner. Never mind ahead and behind, who exactly do you imagine is doing the asking.
'''
