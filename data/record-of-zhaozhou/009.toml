case_zh = '''
師上堂云：「此事如明珠在掌，胡來胡現，漢來漢現。老僧把一枝草作丈六金身用，把丈六金身作一枝草用。佛即是煩惱，煩惱即是佛。」問：「佛與誰人為煩惱？」師云：「與一切人為煩惱。」云：「如何免得？」師云：「用免作麼？」

'''
case_en = '''
Zhaozhou took the high seat and said: "This thing is like a bright pearl in your palm. A foreigner comes and it shows a foreigner; a local comes and it shows a local. I can take a single blade of grass and use it as the Buddha in all his golden glory, and take the Buddha in all his golden glory and use it as a single blade of grass. Buddha is your troubles, and your troubles are Buddha."

A monk asked, "Whose trouble is the Buddha?"

Zhaozhou said, "Everyone's."

The monk said, "How do you get free of it?"

Zhaozhou said, "Why get free?"
'''

