pointer = '''
The "bright pearl" is an old image for mind: a clear gem that adds nothing and judges nothing, showing a foreigner to a foreigner and a local to a local, reflecting exactly what arrives. From there Zhaozhou flattens every ranking you might want to keep. A weed and a gilded Buddha statue become interchangeable in his hands, and "Buddha," the goal, turns out to be the same stuff as your everyday "troubles," the mess you are trying to escape. The monk asks the reasonable next question, how to get free of the troubles, and Zhaozhou's last line shuts the door: if the trouble already is the Buddha, then escaping it means escaping the very thing you are chasing. Which leaves you holding the pearl, and the question of why you wanted out.
'''
