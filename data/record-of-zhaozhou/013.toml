case_en = '''
Zhaozhou addressed the assembly: "Mahakashyapa handed it to Ananda. So tell me: who did Bodhidharma hand it to?"

A monk asked, "Then what about the Second Patriarch, who got the marrow?"

Zhaozhou said, "Don't slander the Second Patriarch."

He went on: "Bodhidharma did say it. The one outside got the skin, the one inside got the bone. So tell me: what did the one further in than that get?"

A monk asked, "What's the reasoning behind getting the marrow?"

Zhaozhou said, "Just take hold of the skin. Here with me, I don't even set up a marrow."

The monk said, "What is the marrow?"

Zhaozhou said, "At that rate you can't even lay a finger on the skin."

A monk asked, "Sitting there so grand and upright, isn't that the master's true seat?"

Zhaozhou said, "And do you know there's one who won't go along with it?"

The monk said, "Then there's a separate seat."

Zhaozhou said, "Who's separate?"

The monk said, "Who isn't?"

Zhaozhou said, "Yell all you want."

A monk asked, "The best of the best turn at a single nudge. What about when the worst of the worst come along?"

Zhaozhou said, "Are you the best of the best, or the worst of the worst?"

The monk said, "Answer me, master."

Zhaozhou said, "The conversation has no master yet."

The monk said, "I came seven thousand miles. Don't toy with my mind."

Zhaozhou said, "Going by a question like yours, how could I not toy with your mind?"

The monk stayed one night and left.

A monk asked, "What about the one who doesn't carry on a side transmission?"

Zhaozhou said, "Who?"

The monk said, "Huiyan."

Zhaozhou said, "Asking about what?"

The monk said, "The one who doesn't carry on a side transmission."

Zhaozhou reached out and patted him.

A monk asked, "What's the matter under the patched robe?"

Zhaozhou said, "Don't fool yourself."

A monk asked, "Suchness, ordinary, holy: it's all dream-talk. What is true speech?"

Zhaozhou said, "I won't say those other two again."

The monk said, "Leave those two aside. What is true speech?"

Zhaozhou said: "Om □ lin he."

A monk asked, "What is Zhaozhou?"

Zhaozhou said, "East gate, west gate, south gate, north gate."

A monk asked, "What is concentration?"

Zhaozhou said, "It won't stay fixed."

The monk said, "Why won't it stay fixed?"

Zhaozhou said, "A living thing. A living thing."

A monk asked, "What about not running after anything that exists?"

Zhaozhou said, "That's how it should be."

The monk said, "Isn't that the student's own true business?"

Zhaozhou said, "You're running. You're running."

A monk asked, "The ancients spent thirty years on one bow and two arrows and only brought down half a sage. Today, master, shoot the whole thing."

Zhaozhou got up and left.
