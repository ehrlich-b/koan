pointer = '''
Zhaozhou fielding one challenge after another. The opening needs a story: when Bodhidharma handed off his teaching, tradition says four students got pieces of him, skin, flesh, bone, and marrow, marrow being deepest, and the Second Patriarch is the one who "got the marrow." So when monks keep poking at the marrow, they are fishing for the ultimate secret, and Zhaozhou keeps pulling the floor out: here he doesn't even set up a marrow, and the man who chases it can't so much as touch the skin. "True seat" and "separate seat" are monastery shorthand for who actually holds the authentic position, and the monk who wants his rank confirmed gets toyed with instead. Watch the move on "concentration": the monk expects praise for a meditative trophy, and Zhaozhou refuses to let it sit still, "a living thing, a living thing." At the end a monk brags that the old masters only ever brought down half a sage and dares Zhaozhou to hit the whole target. Zhaozhou stands up and walks out, which is the shot.
'''
