case_en = '''
Zhaozhou addressed the assembly: "The word 'Buddha' — I hate hearing it."

A monk asked, "Then do you help people at all?"
Zhaozhou said, "Buddha. Buddha."

A monk asked, "Wipe out the present moment. What then is the real thing?"
Zhaozhou said, "Wipe out the present moment. Don't ask about that."
The monk said, "What is the real thing?"
Zhaozhou said, "I just told you. Don't ask."
The monk said, "How can I see it?"
Zhaozhou said, "So big nothing is outside it. So small nothing is inside it."

A monk asked, "Past the four propositions, beyond the hundred negations. What then?"
Zhaozhou said, "I don't even recognize death."
The monk said, "That's your business."
Zhaozhou said, "Exactly."
The monk said, "Show me, then."
Zhaozhou said, "Past the four propositions, beyond the hundred negations. What's left to point at?"

A monk asked, "What is your family style?"
Zhaozhou said, "Nothing inside. Nothing wanted outside."

A monk asked, "What is it to return to the root and reach the meaning?"
Zhaozhou said, "Answer you and I'd miss it."
A monk asked, "What is the doubting mind?"
Zhaozhou said, "Answer you and I'd miss it."

A monk asked, "Does a monk who's left home still act like a layman?"
Zhaozhou said, "Leave home and you're an abbot. Left or not left, I don't care."
The monk said, "Why don't you care?"
Zhaozhou said, "Because that's what leaving home is."

A monk asked, "What about the disciple with no teacher?"
Zhaozhou said, "The wisdom that leaks nothing is complete from the start." Then he added, "That's the disciple with no teacher."

A monk asked, "What about when you see no edge, no limit?"
Zhaozhou said, "Why are you like this?"

A monk asked, "Settled but not clear, churned up but not muddy. What then?"
Zhaozhou said, "Not clear, not muddy."
The monk said, "What is it?"
Zhaozhou said, "Pitiful, really."

A monk asked, "What is the way through?"
Zhaozhou said, "Drop the diamond Chan."

A monk asked, "What is the jewel in the bag?"
Zhaozhou said, "What's wrong with it?"
The monk said, "What about when you use it and it never runs out?"
Zhaozhou said, "Is what's yours heavy?" Then he added, "Use it and it's heavy. Don't and it's light."

A monk asked, "What is the real point of the ancestors coming from the west?"
Zhaozhou spat.
The monk said, "What's the matter in that?"
Zhaozhou spat on the ground again.

A monk asked, "What is the practice of a monk?"
Zhaozhou said, "Drop the practice."

A monk said, "Point me to the place of true rest."
Zhaozhou said, "Point at it and there's no rest."

A monk asked, "What about when there's no question?"
Zhaozhou said, "You broke the ordinary way of talking."

A monk asked, "When the four mountains close in, what then?"
Zhaozhou said, "No tracks lead out."

A monk asked, "What about when you can't say a word here?"
Zhaozhou said, "Then don't."
The monk said, "How do I say it?"
Zhaozhou said, "Right where you can't."

A monk asked, "Whatever words you use, none get past the top of your head. What's the matter beyond the top?"
Zhaozhou called, "Wenyuan!"
The novice Wenyuan answered, "Yes?"
Zhaozhou said, "It's getting late."

A monk asked, "Who is the teacher of Vairocana Buddha?"
Zhaozhou said, "Watch your mouth."

A monk asked, "'The great way is not hard; it just dislikes picking and choosing.' How do I get past picking and choosing?"
Zhaozhou said, "Above the heavens and below, I alone am the honored one."
The monk said, "That's still picking and choosing."
Zhaozhou said, "You fool. Where's the picking and choosing in that?"

A monk asked, "Who is the person outside the three worlds?"
Zhaozhou said, "What can I do? I'm still inside the three worlds."

A monk asked, "What about someone who knows there is and isn't?"
Zhaozhou said, "If you ask one more time, you're just testing me on purpose."
