pointer = '''
A long stretch of Zhaozhou (778–897) taking questions in the hall, where the pattern is the lesson. A few footholds: "the word Buddha, I hate hearing it" warns against turning awakening into a holy slogan repeated in place of living it; the "four propositions and hundred negations" was stock Buddhist logic clever monks loved to brandish, and he keeps batting it aside; when he spits at "Why did the founder come from the west," the all-time setup question of Chan, he is treating the question as bait. His lifelong text is the Xinxinming line "the great way is not hard, it only dislikes picking and choosing," so when a monk says even quoting it is a preference, Zhaozhou snaps that the monk is the one still sorting. Run your eye down the column and you see him answer a cosmic question with a household word, turn a word back on its asker, or spit, again and again, the flatness refusing to let the truth shrink into a phrase a monk can pocket and stop looking. When his reply lands like an evasion, ask what he is keeping it safe from.
'''
