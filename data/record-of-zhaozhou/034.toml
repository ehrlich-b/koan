師示眾云：「纔有是非，紛然失心，還有答話分也無？」有僧出將沙彌打一掌，便出去。師便歸方丈。至來日問侍者：「昨日者師僧在什麼處？」侍者云：「當時便去也。」師云：「三十年弄馬騎，被驢子撲。」問：「與麼來底人，師還接也無？」師云：「接。」云：「不與麼來底人，師還接也無？」師云：「接。」云：「與麼來從師接，不與麼來，師如何接？」師云：「止止不須說，我法妙難思。」鎮府大王問：「師尊年有幾箇齒在？」師云：「只有一箇牙。」大王云：「爭喫得物？」師云：「雖然一箇，下下咬著。」問：「如何是學人珠？」師云：「高聲問。」僧禮拜。師云：「不解問。何不道高下即不問，如何是學人珠？何不與麼問？」僧便再問。師云：「洎合放過者漢。」問：「二邊寂寂，師如何闡揚？」師云：「今年無風波。」問：「大眾雲集，合談何事？」師云：「今日拽木頭竪僧堂。」云：「莫只者箇便是接學人也無？」師云：「老僧不解雙陸，不解長行。」問：「如何是真實人體？」師云：「春夏秋冬。」云：「與麼即學人難會。」師云：「你問我真實人體。」問：「如何是佛法大意？」師云：「你名什麼？」云：「某甲。」師云：「含元殿裏，金谷園中。」問：「如何是七佛師？」師云：「要眠即眠，要起即起。」問：「道非物外，物外非道，如何是物外道？」師便打。云：「和尚莫打某甲，已後錯打人去在。」師云：「龍蛇易辨，衲子難瞞。」師見大王入院不起，以手自拍膝云：「會麼？」大王云：「不會。」師云：「自小出家今已老，見人無力下禪床。」問：「如何是忠言？」師云：「你娘醜陋。」問：「從上至今不忘底人如何？」師云：「不可得繫心常思念十方一切佛。」問：「如何是忠言？」師云：「喫鐵棒。」問：「如何是佛向上事？」師便撫掌大笑。問：「一燈燃百千燈，一燈未審從什麼處發？」師便趯出一隻履。又云：「作家即不與麼問。」問：「歸根得旨，隨照失宗時如何？」師云：「老僧不答者話。」云：「請和尚答話。」師云：「合與麼。」問：「如何是不思處？」師云：「快道，快道。」問：「夜昇兜率，晝降閻浮，其中為什麼摩尼不現？」師云：「道什麼？」僧再問。師云：「毗婆尸佛早留心，直至如今不得妙。」問：「非思量處如何？」師云：「速道，速道。」問：「如何是衣中寶？」師云：「者一問嫌什麼？」云：「者箇是問，如何是寶？」師云：「與麼即衣也失却。」問：「萬里無店時如何？」師云：「禪院裏宿。」問：「狗子還有佛性也無？」師云：「家家門前通長安。」問：「覿面相呈，還盡大意也無？」師云：「低口。」云：「收不得處如何？」師云：「向你道低口。」問：「如何是目前一句？」師云：「老僧不如你。」問：「出來底是什麼人？」師云：「佛菩薩。」問：「靈草未生時如何？」師云：「齅著即腦裂。」云：「不齅時如何？」師云：「如同立死漢。」云：「還許學人和合否？」師云：「人來莫向伊道。」問：「祖意與教意，同，別？」師云：「才出家未受戒，到處問人。」問：「如何是聖？」師云：「不凡。」云：「如何是凡？」師云：「不聖。」云：「不凡不聖時如何？」師云：「好箇禪僧。」問：「兩鏡相向，那箇最明？」師云：「闍黎眼皮蓋須彌山。」問：「學人近入叢林，乞師指示。」師云：「蒼天，蒼天。」問：「前句已往，後句難明時如何？」師云：「喚作即不可。」云：「請師分。」師云：「問，問，問。」「高峻難上時如何？」師云：「老僧不向高峯頂。」問：「不與萬法為侶者是什麼人？」師云：「非人。」問：「請師宗乘中道一句子。」師云：「今日無錢與長官。」問：「學人不別問，請師不別答。」師云：「奇怪。」問：「三乘教外，如何接人？」師云：「有此世界來，日月不曾換。」問：「三處不通，如何離識？」師云：「識是分外。」問：「眾機來湊，未審其中事如何？」師云：「我眼本正，不說其中事。」問：「淨地不止，是什麼人？」師云：「你未是其中人在。」云：「如何是其中人？」師云：「止也。」問：「如何是萬法之源？」師云：「棟梁椽柱。」云：「學人不會。」師云：「拱斗叉手不會。」問：「一物不將來時如何？」師云：「放下著。」問：「路逢達道人，不將語默對，未審將什麼對？」師云：「人從陳州來，不得許州信。」問：「開口是有為，如何是無為？」師以手示之云：「者箇是無為。」云：「者箇是有為，如何是無為？」師云：「無為。」云：「者箇是有為。」師云：「是有為。」

