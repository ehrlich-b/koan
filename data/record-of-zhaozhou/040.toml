case_en = '''
Zhaozhou addressed the assembly: "Before there was a world, this nature already was. When the world falls apart, this nature will not break."

A monk asked, "What is this nature?"

Zhaozhou said, "The five aggregates, the four elements."

"But those break down. What is this nature?"

Zhaozhou said, "The four elements, the five aggregates."

A lecture-master came from Dingzhou. Zhaozhou asked, "What's your specialty?"

"I can lecture on the sutras, the rules, and the treatises without even hearing them first."

Zhaozhou raised his hand. "Can you lecture on this?"

The master was lost. He had no idea.

Zhaozhou said, "Fine. Say you can lecture without ever being taught. You're still just a man who lectures on sutras and treatises. As for the buddha-dharma, you're not there yet."

"What you're saying right now, isn't that the buddha-dharma?"

Zhaozhou said, "Even if you can ask and I can answer, it all belongs to the sutras and treatises. The buddha-dharma isn't in it."

The master had nothing to say.

Zhaozhou asked a temple worker, "Where do you come from?"

"From the North Hall."

"How does that hall compare to this one?"

The worker had no answer.

A monk standing nearby was told to answer for him. He said, "From that hall over there."

Zhaozhou laughed.

Then he had Wenyuan answer for the worker. Wenyuan said, "The worker won't take up your words."

Zhaozhou asked a lecture-master, "What's your specialty?"

"I lecture on the Vimalakirti Sutra."

Zhaozhou said, "The Vimalakirti Sutra says every step is the place of awakening. Where are you standing?"

The master had no answer.

Zhaozhou had Quanyi answer for him. Quanyi said, "Take just this one question. Can you find the place of awakening in it?"

Zhaozhou said, "Your body stands in the place of awakening. Where is your mind? Out with it, fast."

Quanyi said, "You're not looking for my mind, are you?"

"I am."

"Then this one question and answer, what is it?"

Zhaozhou said, "I don't dwell inside the workings of mind. The dharma runs past eyes, ears, nose, tongue, body, and intellect, and still it is known."

Quanyi said, "If you're not inside the reckoning of mind, why are you looking?"

Zhaozhou said, "Because you can't say it."

Quanyi said, "The dharma runs past eyes, ears, nose, tongue, body, and intellect and is not grasped. So how is it I can't say it?"

Zhaozhou said, "Go eat my snot and spit."

Zhaozhou asked a monk, "Have you ever read the Lotus Sutra?"

"I have."

Zhaozhou said, "The sutra says: 'A patched robe out in the empty wilds, falsely called a forest-dweller, fooling the people of the world.' How do you understand that?"

The monk started to bow.

Zhaozhou said, "Did you come here wearing a patched robe?"

"I did."

"Then don't fool me."

"How do I get to not fooling you?"

Zhaozhou said, "Make your own living. Don't take up my words."

Zhaozhou asked a lecture-master, "What's your specialty?"

"I lecture on the Vimalakirti Sutra."

Zhaozhou said, "Who is the grandfather of Vimalakirti?"

"I am."

Zhaozhou said, "Then why are you passing messages for your own grandchildren?"

The master had no answer.
