case_zh = '''
師示眾云：「未有世界，早有此性。世界壞時，此性不壞。」僧問：「如何是此性？」師云：「五蘊四大。」云：「此猶是壞，如何是此性？」師云：「四大五蘊。」定州有一座主到。師問：「習何業？」云：「經律論不聽便講。」師舉手示之：「還講得者箇麼？」座主茫然不知。師云：「直饒你不聽便講得，也只是箇講經論漢。若是佛法，未在。」云：「和尚即今語話，莫便是佛法否？」師云：「直饒你問得答得，總屬經論，佛法未在。」主無語。師問一行者：「從什麼處來？」云：「北院來。」師云：「那院何似者院？」行者無對。有僧在邊立，師令代行者語。僧代云：「從那院來。」師笑之。師又令文遠代之。文遠云：「行者還是不取師語話。」師問座主：「所習何業？」云：「講維摩經。」師云：「維摩經步步是道場，座主在什麼處？」主無對。師令全益代座主語。全益云：「只者一問，可識道場麼？」師云：「你身在道場裏，心在什麼處？速道取。」云：「和尚不是覓學人心？」師云：「是。」云：「只者一問一答是什麼？」師云：「老僧不在心所裏，法過眼耳鼻舌身意而知解。」云：「既不在心數裏，和尚為什麼覓？」師云：「為你道不得。」云：「法過眼耳鼻舌身意而不解，作麼生道不得？」師云：「喫我涕唾。」師問僧：「你曾看法華經麼？」云：「曾看。」師云：「經中道：『衲衣在空閑，假名阿練若，誑惑世間人。』你作麼生會？」僧擬禮拜。師云：「你披衲衣來否？」云：「披來。」師云：「莫惑我。」云：「如何得不惑去？」師云：「自作活計，莫取老僧語。」師問座主：「所習何業？」云：「講維摩經。」師云：「那箇是維摩祖父？」云：「某甲是。」師云：「為什麼却為兒孫傳語？」主無對。

