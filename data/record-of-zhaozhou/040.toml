pointer = '''
The visitors here are "lecture-masters," scholar-monks who have memorized the sutras, the monastic rules, and the philosophical treatises and make their living explaining them. Zhaozhou keeps deflating them: knowing the library cold is not the same as speaking from your own feet. Things to track. The "five aggregates" and "four elements" are the standard parts-list for what a person is made of, so naming the breakable stuff as the unbreakable "nature" is half a troll and half the actual point. The "place of awakening" (bodhimanda) is a term from the Vimalakirti Sutra meaning awakening can happen anywhere, any moment, so when he asks the lecturer "where are you standing," the answer is right here, and the scholar blanks. Wenyuan, Quanyi, and the rest are Zhaozhou's own monks, whom he keeps drafting to answer when a visitor freezes. The closer says it plainly: he tells the last scholar that for all his reciting of Vimalakirti, he is only passing messages for his own descendants, a messenger boy for words he never made his own.
