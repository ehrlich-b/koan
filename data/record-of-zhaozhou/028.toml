pointer = '''
Zhaozhou says the deal is honest both ways: you bring the question, I answer it. So a monk asks the natural follow-up, and what's the answer, and instead of words Zhaozhou lets out a long sigh. The monk feels robbed, that's all? The last line turns on the Chinese: the phrase under "you took it from me" is literally "you approved of me," nodded along as if pocketing a coin. He feels shortchanged only because he expected the sigh to be a secret teaching worth keeping, and by treating it as currency he made it counterfeit. Had he taken the sigh as a sigh and wanted nothing further, there would have been nothing to cheat him of. The cheat is manufactured entirely by the wanting.
'''
