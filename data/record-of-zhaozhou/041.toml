case_zh = '''
師一日上堂，僧纔出禮拜。師乃合掌珍重。又一日，僧禮拜。師云：「好好問。」云：「如何是禪？」師云：「今日天陰不答話。」問新到：「從何方來？」云：「無方面來。」師乃轉背。僧將坐具隨師轉。師云：「大好無方面。」問新到：「從什麼處來？」云：「南方來。」師云：「三千里外逢莫戲。」云：「不曾。」師云：「摘楊花，摘楊花。」豐干到五臺山下，見一老人。干云：「莫是文殊也無？」老人云：「不可有二文殊也。」干便禮拜。老人不見。有僧舉似師。師云：「豐干只具一隻眼。」師乃令文遠作老人，我作豐干。師云：「莫是文殊也無？」遠云：「豈有二文殊也？」師云：「文殊，文殊。」師問二新到：「上座曾到此間否？」云：「不曾到。」師云：「喫茶去。」又問：「那一人曾到此間否？」云：「曾到。」師云：「喫茶去。」院主問：「和尚，不曾到，教伊喫茶去即且置。曾到，為什麼教伊喫茶去？」師云：「院主。」院主應諾。師云：「喫茶去。」師到雲居。雲居云：「老老大大，何不覓箇住處？」師云：「什麼處住得？」雲居云：「前面有古寺基。」師云：「與麼即和尚自住取。」師又到茱萸。茱萸云：「老老大大，何不覓箇住處去？」師云：「什麼處住得？」茱萸云：「老老大大，住處也不識。」師云：「三十年弄馬騎，今日却被驢撲。」師又到茱萸方丈，上下觀瞻。茱萸云：「平地喫交作什麼？」師云：「只為心麤。」師一日將拄杖上茱萸法堂上，東西來去。萸云：「作什麼？」師云：「探水。」萸云：「我者裏一滴也無，探箇什麼？」師將杖子倚壁便下去。臺山路上有一婆子要問僧。僧問：「臺山路向什麼處去？」云：「驀直去。」僧纔行。婆云：「又與麼去也。」師聞便去。問：「臺山路向什麼處去？」云：「驀直去。」師纔行。婆云：「又與麼去也。」師歸，舉似大眾云：「婆子被老僧勘破了也。」師見僧來，挾火示之云：「會麼？」僧云：「不會。」師云：「你不得喚作火，老僧道了也。」師挾起火云：「會麼？」云：「不會。」師却云：「此去舒州有投子山和尚，你去禮拜問取。因緣相契，不用更來。不相契却來。」其僧便去。纔到投子和尚處。投子乃問：「近離什麼處？」云：「離趙州，特來禮拜和尚。」投子云：「趙州老人有何言句？」僧乃具舉前話。投子乃下禪床，行三五步，却坐云：「會麼？」僧云：「不會。」投子云：「你歸，舉似趙州。」其僧却歸，舉似師。師云：「還會麼？」云：「未會。」師云：「也不較多也。」洞山問僧：「什麼處來？」云：「掌鞋來。」山云：「自解，依他？」云：「依他。」山云：「他還指闍黎也無？」僧無對。師代云：「若𠃔即不違。」普化喫生菜。臨濟見云：「普化大似一頭驢。」普化便作驢鳴。臨濟便休去。普化云：「臨濟小廝兒，只具一隻眼。」師代云：「但與本分草料。」保壽問胡釘鉸：「莫便是胡釘鉸否？」云：「不敢。」保云：「還釘得虗空麼？」云：「請打破虗空來。」保壽便打却云：「他後有多口阿師與你點破在。」胡釘鉸後舉似師。師云：「你因什麼被他打？」云：「不知過在什麼處。」師云：「只者一縫尚不奈何，更教他打破。」釘鉸便會。師又云：「且釘者一縫。」師因行路次，見一婆子。問：「和尚住在什麼處？」師云：「趙州東院西。」師舉問僧云：「你道使那箇西字？」一僧云：「東西字。」一僧云：「依栖字。」師云：「你兩人總作得鹽鐵判官。」師與侍郎遊園，見兔走過。侍郎問：「和尚是大善知識，兔子見為什麼走？」師云：「老僧好殺。」師因見僧掃地次，遂問：「與麼掃還得淨潔也無？」云：「轉掃轉多。」師云：「豈無撥塵者也？」云：「誰是撥塵者？」師云：「會麼？」云：「不會。」師云：「問取雲居去。」其僧乃去問雲居：「如何是撥塵者？」雲居云：「者瞎漢。」師問僧：「你在此間多少時也？」僧云：「七八年。」師云：「還見老僧麼？」云：「見。」師云：「我作一頭驢，你作麼生見？」云：「入法界見。」師云：「我將為你有此一著，枉喫了如許多飯。」僧云：「請和尚道。」師云：「因什麼不道向草料裏見？」師問菜頭：「今日喫生菜，熟菜？」菜頭提起一莖菜。師云：「知恩者少，負恩者多。」有俗行者到院燒香。師問僧：「伊在那裏燒香禮拜，我又共你在者裏語話，正與麼時，生在那頭？」僧云：「和尚是什麼？」師云：「與麼即在那頭也。」云：「與麼已是先也。」師笑之。師與小師文遠論義，不得占勝，占勝者輸餬餅。師云：「我是一頭驢。」遠云：「我是驢胄。」師云：「我是驢糞。」遠云：「我是糞中虫。」師云：「你在彼中作麼？」遠云：「我在彼中過夏。」師云：「把將餬餅來。」師因入內迴，路上見一幢子無一截。僧問云：「幢子一截上天去也，入地去也？」師云：「也不上天，也不入地。」云：「向什麼處去？」師云：「撲落也。」師坐次，一僧纔出禮拜。師云：「珍重。」僧伸問次。師云：「又是也。」師因在簷前立，見燕子語。師云：「者燕子喃喃地，招人言語。」僧云：「未審他還甘也無？」師云：「依稀似曲纔堪聽，又被風吹別調中。」有僧辭去。師云：「什麼處去？」云：「閩中去。」師云：「閩中大有兵馬，你須迴避。」云：「向甚處迴避？」師云：「恰好。」有僧上參次，見師衲衣蓋頭坐次。僧便退。師云：「闍黎莫道老僧不祇對。」師問僧：「從什麼處來？」云：「南方來。」師云：「共什麼人為伴？」云：「水牯牛。」師云：「好箇師僧，因什麼與畜生為伴？」云：「不異故。」師云：「好箇畜生。」云：「爭肯？」師云：「不肯且從，還我伴來。」師問僧：「堂中還有祖師也無？」云：「有。」師云：「喚來與老僧洗脚。」堂中有二僧，相推不肯作第一座。主事白和尚。師云：「總教他作第二座。」云：「教誰作第一座？」師云：「裝香著。」云：「裝香了也。」師云：「戒香，定香。」師問僧：「離什麼處？」云：「離京中。」師云：「你還從潼關過麼？」云：「不歷。」師云：「今日捉得者販私鹽漢。」因送亡僧。師云：「只是一箇死人，得無量人送。」又云：「許多死漢送一箇生漢。」時有僧問：「是心生，是身生？」師云：「身心俱不生。」云：「者箇作麼生？」師云：「死漢。」有僧見貓兒，問云：「某甲喚作貓兒，未審和尚喚作什麼？」師云：「是你喚作貓兒。」因鎮州大王來訪師。侍者來報師云：「大王來。」師云：「大王萬福。」侍者云：「未在，方到三門下。」師云：「又道大王來也。」因上東司，召文遠。文遠應諾。師云：「東司上不可與你說佛法也。」因在殿上過，乃喚侍者。侍者應諾。師云：「好一殿功德。」侍者無對。師因到臨濟，方始洗脚。臨濟便問：「如何是祖師西來意？」師云：「正值洗脚。」臨濟乃近前側聆。師云：「若會便會，若不會，更莫㗖□作麼。」臨濟拂袖去。師云：「三十年行脚，今日為人錯下注脚。」師因到天台國清寺見寒山．拾得。師云：「久嚮寒山．拾得，到來只見兩頭水牯牛。」寒山．拾得便作牛鬬。師云：「叱，叱。」寒山．拾得咬齒相看。師便歸堂。二人來堂內問師：「適來因緣作麼生？」師乃呵呵大笑。一日，二人問師：「什麼處去來？」師云：「禮拜五百尊者來。」二人云：「五百頭水牯牛聻，尊者？」師云：「為什麼作五百頭水牯牛去？」山云：「蒼天，蒼天。」師呵呵大笑。師行脚時見二菴主。一人作丫角童。師問訊。二人殊不顧。來日早晨，丫角童將一鐺飯來，放地上分作三分。菴主將席子近前坐。丫角童亦將席近前相對坐，亦不喚師。師乃亦將席子近前坐。丫童目顧於師。菴主云：「莫言侵早起，更有夜行人。」師云：「何不教詔這行者？」菴主云：「他是人家男女。」師云：「洎合放過。」丫童便起顧視菴主云：「多口作麼？」丫童從此入山不見。師因看經次，沙彌文遠入來。師乃將經側示之。沙彌乃出去。師隨後把住云：「速道，速道。」文遠云：「阿彌陀佛，阿彌陀佛。」師便歸方丈。因沙彌童行參。師向侍者道：「教伊去。」侍者向行者道：「和尚教去。」行者便珍重。師云：「沙彌童行得入門，侍者在門外。」師行脚時到一尊宿院。纔入門相見便云：「有麼？有麼？」尊宿竪起拳頭。師云：「水淺船難泊。」便出去。又到一院，見尊宿便云：「有麼？有麼？」尊宿竪起拳頭。師云：「能縱能奪，能取能撮。」禮拜便出去。師一日拈數珠問新羅長老：「彼中還有者箇也無？」云：「有。」師云：「何似者箇？」云：「不似者箇。」師云：「既有，為什麼不似？」無語。師自代云：「不見道，新羅大唐。」問新到：「什麼處來？」云：「南方來。」師竪起指云：「會麼？」云：「不會。」師云：「動止萬福不會。」師行脚時問大慈：「般若以何為體？」慈云：「般若以何為體？」師便呵呵大笑而出。大慈來日見師掃地次，問：「般若以何為體？」師放下掃箒，呵呵大笑而去。大慈便歸方丈。師到百丈。百丈問：「從什麼處來？」云：「南泉來。」百丈云：「南泉有何言句示人？」師云：「有時道，未得之人亦須峭然去。」百丈叱之。師容愕然。百丈云：「大好峭然。」師便作舞而出。師到投子處對坐齋。投子將蒸餅與師喫。師云：「不喫。」不久，下糊餅。投子教沙彌度與師。師接得餅，却禮沙彌三拜。投子默然。因僧寫師真呈師。師云：「若似老僧，即打殺我。若不似，即燒却。」師因與文遠行次，乃以手指一片地云：「這裏好造一箇巡鋪子。」文遠便去彼中立云：「把將公驗來。」師便打一摑。遠云：「公驗分明過。」師問新到：「近離甚處？」云：「臺山。」師云：「還見文殊也無？」僧展手。師云：「展手頗多，文殊難覩。」云：「只守氣急殺人。」師云：「不覩雲中鴈，焉知沙塞寒？」問：「遠遠投師，請師一接。」師云：「孫臏門下因什麼鑽龜？」僧拂袖出去。師云：「將為當榮，折他雙足。」師與首座看石橋，乃問首座：「是什麼人造？」云：「李膺造。」師云：「造時向什麼處下手？」座無對。師云：「尋常說石橋，問著下手處也不知。」有新羅院主請師齋。師到門首問：「此是什麼？」院云：「新羅院。」師云：「我與你隔海。」問僧：「什麼處來？」云：「雲居來。」師云：「雲居有什麼言句？」云：「有僧問：『𦏰羊掛角時如何？』雲居云：『六六三十六。』」師云：「雲居師兄猶在。」僧却問：「未審和尚尊意如何？」師云：「九九八十一。」有一婆子日晚入院來。師云：「作什麼？」婆云：「寄宿。」師云：「者裏是什麼所在？」婆呵呵大笑而去。師出外，逢見一箇婆子提一箇籃子。師便問：「什麼處去？」云：「偷趙州笋去。」師云：「忽見趙州，又作麼生？」婆子近前打一掌。師因見院主送生飯，鵶子見，便總飛去。師云：「鵶子兒見你，為什麼却飛去？」院主云：「怕某甲。」師云：「是什麼語話？」師代云：「為某甲有殺心在。」師問僧：「什麼處來？」云：「江西來。」師云：「趙州著在什麼處？」僧無對。師從殿上過，見一僧禮拜。師打一棒。云：「禮拜也是好事。」師云：「好事不如無。」師因參潼關。潼關問師云：「你還知有潼關麼？」師云：「知有潼關。」云：「有公驗者即得過，無公驗者不得過。」師云：「忽遇鑾駕來時如何？」關云：「也須檢點過。」云：「你要造反。」師到寶壽。寶壽見師來，遂乃背面而坐。師便展坐具。寶壽起立。師便出去。師在南泉時，泉牽一頭水牯牛入僧堂內巡堂而轉。首座乃向牛背上三拍。泉便休去。師後將一束草安首座面前。首座無對。有秀才見師，乃讚歎師云：「和尚是古佛。」師云：「秀才是新如來。」有僧問：「如何是涅槃？」師云：「我耳重。」僧再問。師云：「我不害耳聾。」乃有頌：「騰騰大道者，對面涅槃門。但坐念無際，來年春又春。」有僧問：「生死二路，是同是別？」師乃有頌：「道人問生死，生死若為論。雙林一池水，朗月耀乾坤。喚他句上識，此是弄精魂。欲會箇生死，顛人說夢春。」有僧問：「諸佛有難，火𦦨裏藏身。和尚有難，向什麼處藏身？」師乃有頌：「渠說佛有難，我說渠有灾。但看我避難，何處有相隨。有無不是說，去來非去來。為你說難法，對面識得來。」

