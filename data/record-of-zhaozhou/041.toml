pointer = '''
A long sweep of short episodes from Zhaozhou's life (778–897), dozens of little scenes back to back. The most famous lives here: a newcomer and an old hand both get sent off with "go drink your tea," the same nothing-answer to opposite reports, which short-circuits the whole game of qualifying who deserves the teaching. Footholds for the rest: "Manjushri" is the bodhisattva of wisdom, said to live on Mount Wutai, so pilgrims trekked there hoping to meet him, and "there can't be two Manjushris" trips anyone trying to point him out as a separate person. He keeps calling people, himself, and even the assembly "donkeys" and "water buffalo," which is affectionate ribbing, not contempt. Hanshan and Shide are two legendary half-mad hermit-poets. Watch the recurring gag of travel papers and checkpoints, with the "salt smuggler" as the black-market peddler dodging the state tax: Zhaozhou treats spiritual credentials like border control, show your papers or get turned back. Read it slowly; most of these are one-breath jokes with a hook set in them.
'''
