case_zh = '''
師示眾云：「擬心即差。」僧便問：「不擬心時如何？」師打三下，云：「莫是老僧辜負闍黎麼？」問：「凡有問答，落在意根；不落意根，師如何對？」師云：「問。」學云：「便請師道。」師云：「莫向者裏是非。」問：「龍女親獻佛，未審將什麼獻？」師以兩手作獻勢。

'''
case_en = '''
Zhaozhou addressed the assembly: "The moment you aim your mind, you've already missed."

A monk asked, "And when I don't aim my mind?"

Zhaozhou hit him three times, then said, "Don't tell me I'm letting you down."

Another asked, "Every question and answer falls into the workings of the mind. Stay clear of those workings, and how do you answer?"

Zhaozhou said, "Ask."

The monk said, "Go ahead, say it."

Zhaozhou said, "Don't start up with right and wrong in here."

Another asked, "The dragon girl handed the Buddha a jewel with her own hands. What was it she handed him?"

Zhaozhou cupped both hands and made the gesture of offering.
'''

