pointer = '''
"The moment you aim your mind, you've already missed" is the line the whole case circles, and it is the same trap Nanquan sprang on the young Zhaozhou back in case 2: reach for the right state and the reaching splits you from it. So the first monk plays it safe and asks about not aiming, and gets hit three times, because not-aiming is just aiming in reverse, one more deliberate move. The dragon girl is from the Lotus Sutra, a young naga who wakes up on the spot and hands the Buddha a priceless jewel, the canonical proof that awakening can happen instantly. The monk wants to know what she "really" gave. Zhaozhou doesn't explain; he just cups his hands in the offering gesture, handing over the empty shape of the act and nothing inside it, which leaves you to say what, if anything, changed hands.
'''
