case_zh = '''
師上堂，示眾云：「金佛不度爐，木佛不度火，泥佛不度水，真佛內裏坐。菩提涅槃．真如佛性，盡是貼體衣服，亦名煩惱。不問，即無煩惱。實際理地什麼處著？一心不生，萬法無咎。但究理而坐二三十年，若不會，截取老僧頭去。夢幻空花，徒勞把捉。心若不異，萬法亦如。既不從外得，更拘什麼？如羊相似，更亂拾物安口中作麼？老僧見藥山和尚道：『有人問著，但教合取狗口。』老僧亦道合取狗口。取我是垢，不取我是淨。一似獵狗相似，專欲得物喫，佛法向什麼處著？一千人萬人盡是覓佛漢子，覓一箇道人無。若與空王為弟子，莫教心病最難醫。未有世界，早有此性。世界壞時，此性不壞。從一見老僧後，更不是別人，只是箇主人公，者箇更向外覓作麼？與麼時，莫轉頭換面，即失却也。」問：「如何是佛向上人？」師云：「只者牽耕牛底是。」問：「如何是急？」師云：「老僧與麼道，你作麼生？」云：「不會。」師云：「向你道急，急著靴水上立，走馬到長安，靴頭猶未濕。」問：「四山相逼時如何？」師云：「無路是趙州。」問：「古殿無王時如何？」師咳𠻳一聲。云：「與麼即臣啟陛下。」師云：「賊身已露。」問：「和尚年多少？」師云：「一串數珠數不盡。」問：「和尚承嗣什麼人？」師云：「從諗。」問：「外方忽有人問，趙州說什麼法，如何祇對？」師云：「鹽貴米賤。」問：「如何是佛？」師云：「你是佛麼？」問：「如何是出家？」師云：「爭得見老僧？」問：「佛祖不斷處如何？」師云：「無遺漏。」問：「本源請師指示。」師云：「本源無病。」云：「了處如何？」師云：「了人知。」云：「與麼時如何？」師云：「與我安名字著。」問：「純一無雜時如何？」師云：「大煞好一問。」問：「無為寂靜底人莫落在沉空也無？」師云：「落在沉空。」云：「究竟如何？」師云：「作驢作馬。」問：「如何是祖師西來意？」師云：「床脚是。」云：「莫便是也無？」師云：「是即脫取去。」問：「澄澄絕點時如何？」師云：「老僧者裏不著客作漢。」問：「鳳飛不到時如何？」師云：「起自何來？」問：「實際理地不受一塵時如何？」師云：「一切總在裏許。」問：「如何是一句？」師應諾。僧再問。師云：「我不患聾。」問：「初生孩子還具六識也無？」師云：「急流水上打毬子。」問：「頭頭到來時如何？」師云：「猶較老僧百步。」問：「如何是和尚家風？」師云：「老僧自小出家，抖擻破活計。」問：「請和尚離四句道。」師云：「老僧常在裏許。」問：「扁鵲醫王為什麼有病？」師云：「扁鵲醫王不離床枕。」又云：「一滴甘露，普潤大千。」問：「如何是露地白牛？」師云：「者畜生。」問：「如何是大人相？」師側目視之。云：「猶是隔階趨附在。」師云：「老僧無工夫趨得者閑漢。」僧問：「纔有心念，落在人天。直無心念，落在眷屬時如何？」師云：「非但老僧，作家亦答你不得。」問：「凡有施為，盡落糟粕，請師不施為答。」師叱尼云：「將水來添鼎子沸。」問：「如何是般若波羅蜜？」師云：「摩訶般若波羅蜜。」問：「如何是咬人師子？」師云：「歸依佛，歸依法，歸依僧，莫咬老僧。」問：「離却言句，請師道。」師咳嗽。問：「如何得不謗古人，不負恩去？」師云：「闍黎作麼生？」問：「如何是一句？」師云：「道什麼？」問：「如何是一句？」師云：「兩句。」問：「唯佛一人是善知識，如何？」師云：「魔語。」問：「如何是菩提？」師云：「者箇是闡提。」問：「如何是大人相？」師云：「好箇兒孫。」問：「寂寂無依時如何？」師云：「老僧在你背後。」問：「如何是伽藍？」師云：「別更有什麼？」云：「如何是伽藍中人？」師云：「老僧與闍黎。」問：「二龍爭珠，誰是得者？」師云：「老僧只管看。」問：「如何是離因果底人？」師云：「不因闍黎問，老僧實不知。」問：「眾盲摸象，各說異端，如何是真象？」師云：「無假自是不知。」問：「如何是第一句？」師咳嗽。云：「莫便是否？」師云：「老僧咳嗽也不得。」問：「大海還納眾流也無？」師云：「大海道不知。」云：「因什麼不知？」師云：「終不道我納眾流。」問：「如何是毗盧師？」師云：「毗盧．毗盧。」問：「諸佛還有師也無？」師云：「有。」云：「如何是諸佛師？」師云：「阿彌陀佛．阿彌陀佛。」問：「如何是學人師？」師云：「雲有出山勢，水無投㵎聲。」云：「不問者箇。」師云：「是你師不認。」問：「諸方盡向口裏道，和尚如何示人？」師脚跟打火爐示之。云：「莫便是也無？」師云：「恰認得老僧脚跟。」問：「不行大道時如何？」師云：「者販私鹽漢。」云：「却行大道時如何？」師云：「還我公驗來。」問：「如何是本來身？」師云：「自從識得老僧後，只這漢更不別。」云：「與麼即與和尚隔生去也。」師云：「非但今生，千生萬生亦不識老僧。」問：「如何是祖師西來意？」師云：「東壁上掛葫蘆多少時也？」問：「方圓不就時如何？」師云：「不方不圓。」云：「與麼時如何？」師云：「是方是圓。」問：「道人相見時如何？」師云：「呈漆器。」問：「諦為什麼觀不得？」師云：「諦即不無，觀即不得。」云：「畢竟如何？」師云：「失諦。」問：「行又不到，問又不到時如何？」師云：「到以不到，道人看如涕唾。」云：「其中事如何？」師唾地。問：「如何是祖師西來意？」師云：「如你不喚作祖師意猶未在。」云：「本來底如何？」師云：「四目相覩，更無第二主宰。」問：「不具形儀，還會也無？」師云：「即今還會麼？」問：「如何是大無慚愧底人？」師云：「皆具不可思議。」問：「學人擬向南方學些子佛法去，如何？」師云：「你去南方，見有佛處急走過，無佛處不得住。」云：「與麼即學人無依也。」師云：「柳絮．柳絮。」問：「如何是急切處？」師云：「一問一答。」問：「不籍三寸，還假今時也無？」師云：「我隨你道，你作麼生會？」問：「如何是和尚家風？」師云：「茫茫宇宙人無數。」云：「請和尚不答話。」師云：「老僧合與麼。」問：「二龍爭珠，誰是得者？」師云：「失者無虧，得者無用。」問：「如何是大人相？」師云：「是什麼？」有俗士獻袈裟。問：「披與麼衣服，莫辜負古人也無？」師拋下拂子云：「是古是今？」問：「如何是沙門行？」師云：「展手不展脚。」問：「牛頭未見四祖時如何？」師云：「飽柴飽水。」云：「見後如何？」師云：「飽柴飽水。」問：「如何是學人自己？」師云：「喫粥了也未？」云：「喫粥也。」師云：「洗鉢盂去。」問：「如何是毗盧師？」師云：「白駝來也未？」云：「來也。」師云：「牽去餵草。」問：「如何是無師智？」師云：「老僧不曾教闍黎。」問：「如何是親切一句？」師云：「話墮也。」問：「不借口，還許商量也無？」師云：「正是時。」云：「便請師商量。」師云：「老僧不曾出。」問：「二祖斷臂，當為何事？」師云：「粉骨碎身。」云：「供養什麼人？」師云：「來者供養。」問：「無邊身菩薩為什麼不見如來頂相？」師云：「你是闍黎。」問：「晝是日光，夜是火光，如何是神光？」師云：「日光火光。」問：「如何是恰問處？」師云：「錯。」云：「如何是不問處？」師云：「向前一句裏辨取。」問：「如何是大人相？」師以手摸面，叉手斂容。問：「如何是無為？」師云：「者箇是有為。」問：「如何是祖師西來意？」師云：「欄中失却牛。」問：「學人遠來，請和尚指示。」師云：「纔入門便好驀面唾。」問：「如何是直截一路？」師云：「淮南船子到也未？」云：「學人不會。」師云：「且喜到來。」問：「栢樹子還有佛性也無？」師云：「有。」云：「幾時成佛？」師云：「待虗空落地。」云：「虗空幾時落地？」師云：「待栢樹子成佛。」問：「如何是西來意？」師云：「因什麼向院裏罵老僧？」云：「學人有何過？」師云：「老僧不能就院裏罵得闍黎。」問：「如何是西來意？」師云：「板齒生毛。」問：「貧子來，將什麼過與？」師云：「不貧。」云：「爭奈覓和尚何？」師云：「只是守貧。」問：「無邊身菩薩為什麼不見如來頂相？」師云：「如隔羅縠。」問：「諸天甘露，什麼人得喫？」師云：「謝你將來。」問：「超過乾坤底人如何？」師云：「待有與麼人即報來。」問：「如何是伽藍？」師云：「三門佛殿。」問：「如何是不生不滅？」師云：「本自不生，今亦無滅。」問：「如何是趙州主？」師云：「大王是。」問：「急切處，請師道。」師云：「尿是小事，須是老僧自去始得。」問：「如何是丈六金身？」師云：「腋不打領。」云：「學人不會。」師云：「不會請人裁。」問：「學人有疑時如何？」師云：「大宜，小宜。」學云：「大疑。」師云：「大宜東北角，小宜僧堂後。」問：「如何是佛向上人？」師下禪床，上下觀瞻相云：「者漢如許長大，截作三橛也得，問什麼向上向下？」尼問：「如何是密密意？」師以手掐之。云：「和尚猶有者箇在。」師云：「是你有者箇。」

