case_zh = '''
師即南泉門人也，俗姓郝氏，本曹州郝鄉人也，諱從諗。鎮府有塔記云，師得七百甲子歟。值武王微沐，避地岨崍，木食草衣，僧儀不易。師初隨本師行脚，到南泉。本師先人事了，師方乃人事。南泉在方丈內臥次，見師來參，便問：「近離什麼處？」師云：「瑞像院。」南泉云：「還見瑞像麼？」師云：「瑞像即不見，即見臥如來。」南泉乃起問：「你是有主沙彌，無主沙彌？」師對云：「有主沙彌。」泉云：「那箇是你主？」師云：「孟春猶寒，伏惟和尚尊體起居萬福。」泉乃喚維那云：「此沙彌別處安排。」師受戒後，聞受業師在曹州西住護國院，乃歸院省覲。到後，本師令郝氏云：「君家之子遊方已迴。」其家親屬忻懌不已，祇候來日咸往觀焉。師聞之，乃云：「俗塵愛網，無有了期。已辭出家，不願再見。」乃於是夜結束前邁。其後自携瓶錫，遍歷諸方，常自謂曰：「七歲童兒勝我者，我即問伊；百歲老翁不及我者，我即教他。」年至八十，方住趙州城東觀音院，去石橋十里已來。住持枯槁，志効古人。僧堂無前後架，旋營齋食。繩床一脚折，以燒斷薪用繩繫之，每有別制新者，師不許也。住持四十年來，未嘗賷一封書告其檀越。因有南方僧來舉，問雪峰：「古㵎寒泉時如何？」雪峰云：「瞪目不見底。」學云：「飲者如何？」峰云：「不從口入。」師聞之，曰：「不從口入，從鼻孔裏入。」其僧却問師：「古㵎寒泉時如何？」師云：「苦。」學云：「飲者如何？」師云：「死。」雪峰聞師此語，讚云：「古佛，古佛。」雪峰後因此不答話矣。厥後因河北燕王領兵收鎮府，既到界上，有觀氣象者奏曰：「趙州有聖人所居，戰必不勝。」燕趙二王因展筵會，俱息交鋒，乃問：「趙之金地，上士何人？」或曰：「有講華嚴經大師，節行孤邈。若歲大旱，咸命往臺山祈禱，大師未迴，甘澤如瀉。」乃曰：「恐未盡善。」或云：「此去一百二十里，有趙州觀音院，有禪師年臘高邈，道眼明白。」僉曰：「此可應兆乎？」二王稅駕觀焉。既屆院內，師乃端坐不起。燕王問曰：「人王尊耶？法王尊耶？」師云：「若在人王，人王中尊；若在法王，法王中尊。」燕王唯然矣。師良久，中間問：「阿那箇是鎮府大王？」趙王應：「諾，弟子。」師云：「老僧濫在山河，不及趨面。」須臾，左右請師為大王說法。師云：「大王左右多，爭教老僧說法？」乃約令左右退。師身畔時有沙彌文遠，高聲云：「啟大王，不是者箇左右。」大王乃問：「是什麼左右？」對曰：「大王尊諱多，和尚所以不敢說法。」燕王乃云：「請禪師去諱說法。」師云：「故知大王曩劫眷屬俱是冤家。我佛世尊，一稱名號，罪滅福生；大王先祖，纔有人觸著名字，便生嗔怒。」師慈悲非倦，說法多時。二王稽首讚嘆，珍敬無盡。來日將迴，燕王下先鋒使聞師不起，凌晨入院，責師慠亢君侯。師聞之，乃出迎接。先鋒乃問曰：「昨日見二王來不起，今日見某甲來，因何起接？」師云：「待都衙得似大王，老僧亦不起接。」先鋒聆師此語，再三拜而去。尋後趙王發使取師供養，既屆城門，闔城威儀迎之入內。師纔下寶輦，王乃設拜，請師上殿，正位而坐。師良久，以手斫額云：「堦下立者是何官長？」左右云：「是諸院尊宿并大師、大德。」師云：「他各是一方化主，若在階下，老僧亦起。」王乃命上殿。是日齋筵將罷，僧官排定，從上至下，一人一問，一人問佛法。師既望見，乃問：「作什麼？」云：「問佛法。」師云：「這裏已坐却老僧，那裏問什麼法？二尊不並化。」王乃令止。其時國后與王俱在左右侍立。國后云：「請禪師為大王摩頂受記。」師以手摩大王頂云：「願大王與老僧齊年。」是時迎師權在近院駐泊，獲時選地，建造禪宮。師聞之，令人謂王曰：「若動著一莖草，老僧却歸趙州。」其時竇行軍願捨菓園一所，直一萬五千貫，號為真際禪院，亦云竇家園也。師入院後，海眾雲臻。是時趙王禮奉，燕王從幽州奏到命服鎮府，具威儀迎接，師堅讓不受。左右舁箱至師面前云：「大王為禪師佛法故，堅請師著此衣。」師云：「老僧為佛法故，所以不著此衣。」左右云：「且看大王面。」師云：「又干俗官什麼事？」乃躬自取衣挂身上，禮賀再三，師惟知應諾而已。師住趙州二年，將謝世時，謂弟子曰：「吾去世之後，焚燒了，不用淨淘舍利。宗師弟子不同浮俗，且身是幻，舍利何生？斯不可也。」令小師送拂子一枝與趙王，傳語云：「此是老僧一生用不盡底。」師於戊子歲十一月十日端坐而終。于時竇家園道俗車馬數萬餘人，哀聲振動，於時盡送終之禮，感歎之泣，無異金棺匿彩於俱尸矣。莫不高營鴈塔，特豎豐碑，諡號曰真際禪師光祖之塔。後唐保大十一年孟夏月旬有三日，有學者咨聞東都東院惠通禪師趙州先人行化厥由，作禮而退，乃授筆錄之。

