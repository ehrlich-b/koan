pointer = '''
Zhaozhou opens with a clean bind: study the scriptures and you are still caught in life and death, ignore them and you are still caught, so where is the door. The monk offers the obvious dodge, cling to neither, and Zhaozhou grants it but slams the door on faking: if your "neither" is real you have it, and if it is just a clever posture it gets you nowhere. The next two questions arrive dressed as tough-guy images, a razor sword, a coming catastrophe to escape, and both treat freedom as a weapon you wield from a safe distance. Zhaozhou won't let them stand outside the problem. He himself is the sharp sword, so where is the sharpness, and as for dodging the disaster, his answer is that it has arrived right on schedule. The exit was never elsewhere; it is in turning to face the thing you came to avoid.
'''
