pointer = '''
Reciting a buddha's name over and over was, and still is, a mainstream devotional practice. Zhaozhou tells the monks to do it, then a monk gets clever and asks which reciting is "truly his own," fishing for some private essence underneath the chant. Zhaozhou turns it straight around: who is the one reciting? That is a real question, the kind that stops you cold, and the monk fumbles it into a slogan, roughly "just me, nobody else here." He has produced a tidy little self to be the answer, which is the very thing the question was prying loose. Hence the insult: he was handed the live question and answered it with a label. Ask it yourself and notice how fast you reach for "me."
'''
