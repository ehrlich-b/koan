case_en = '''
Zhaozhou addressed the assembly: "Don't let the days slip past. Recite the Buddha's name, recite the teaching."

A monk asked, "What is the reciting that is my own?"

Zhaozhou said, "Who is the one reciting?"

The monk said, "No one keeps me company."

Zhaozhou snapped, "You jackass."
'''

