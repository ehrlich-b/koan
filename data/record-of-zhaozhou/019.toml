case_zh = '''
師示眾云：「衲僧家直須坐斷報化佛頭始得。」問：「坐斷報化佛頭是什麼人？」師云：「非你境界。」

'''
case_en = '''
Zhaozhou addressed the assembly: "A real monk has to sit right down on the heads of the reward-body and transformation-body Buddhas. Only then will it do."

A monk asked, "And who is it that sits on the heads of those Buddhas?"

Zhaozhou said, "Not your territory."
'''

verse_zh = '''
'''
verse_en = '''
'''

pointer = '''
Buddhism splits the Buddha into "bodies." Two of them sit behind this case: the reward-body, the radiant glorified Buddha you would meet in a vision, and the transformation-body, the human teacher who walked around fourth-century India, both of them objects of worship. Zhaozhou says a real monk has to sit right down on their heads, bowing to no holy image however exalted, including the most exalted. So a monk asks the natural follow-up: who is big enough to do that? "Not your territory" works as a brush-off and as the answer at once, because the instant you ask who qualifies, you have already placed yourself underneath the thing and disqualified yourself from the question.
'''
