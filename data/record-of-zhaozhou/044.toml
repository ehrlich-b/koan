pointer = '''
Another of the closing verses. "Zhaozhou" is both the master and the name of his town, and the Stone Bridge was its famous local landmark; the Guanyin Cloister is a temple to the bodhisattva of compassion, and Maitreya is the buddha-yet-to-come, the fat laughing one. So three lines just recite real, locatable places and statues. Then the floor drops out: the "old master" is Bodhidharma, the Indian monk who brought Chan to China, and legend says that after he died travelers met him walking back to India carrying a single sandal, and when his tomb was opened only one sandal lay inside. You can point to the town, the bridge, the temple, the statue. The one thing the lineage actually hands down, the sandal, is exactly the thing nobody can lay a finger on.
'''
