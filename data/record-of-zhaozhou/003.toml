case_zh = '''
南泉上堂，師問：「明頭合，暗頭合？」泉便歸方丈。師便下堂云：「這老和尚被我一問，直得無言可對。」首座云：「莫道和尚無語，自是上座不會。」師便打，又云：「這棒合是堂頭老漢喫。」師問南泉：「知有底人向什麼處去？」泉云：「山前檀越家作一頭水牯牛去。」師云：「謝和尚指示。」泉云：「昨夜三更月到窻。」師在南泉作爐頭，大眾普請擇菜，師在堂內呌：「救火，救火！」大眾一時到僧堂前，師乃關却僧堂門。大眾無對，泉乃拋鏁匙從窻內入堂中，師便開門。師在南泉井樓上打水次，見南泉過，便抱柱懸却脚云：「相救，相救！」南泉上楜梯云：「一二三四五。」師少時間却去禮謝云：「適來謝和尚相救。」南泉東西兩堂爭猫兒，泉來堂內提起猫兒云：「道得即不斬，道不得即斬却。」大眾下語皆不契泉意，當時即斬却猫兒了。至晚間，師從外歸來問訊次，泉乃舉前話了，云：「你作麼生救得猫兒？」師遂將一隻鞋戴在頭上出去。泉云：「子若在，救得猫兒。」師問南泉：「異即不問，如何是類？」泉以兩手托地，師便踏倒，却歸涅槃堂內呌：「悔，悔！」泉聞，乃令人去問：「悔箇什麼？」師云：「悔不剩與兩踏。」南泉從浴室裏過，見浴頭燒火，問云：「作什麼？」云：「燒浴。」泉云：「記取來喚水牯牛浴。」浴頭應諾。至晚間，浴頭入方丈。泉問：「作什麼？」云：「請水牯牛去浴。」泉云：「將得繩索來不？」浴頭無對。師來問訊泉，泉舉似師。師云：「某甲有語。」泉便云：「還將得繩索來麼？」師便近前驀鼻便拽。泉云：「是即是，太麤生。」師問南泉：「離四句，絕百非外，請師道。」泉便歸方丈。師云：「這老和尚每常口吧吧地，及其問著，一言不措。」侍者云：「莫道和尚無語好。」師便打一掌。南泉便掩却方丈門，便把灰圍却，問僧云：「道得即開門。」多有人下語，並不契泉意。師云：「蒼天，蒼天！」泉便開門。師問南泉云：「心不是佛，智不是道，還有過也無？」泉云：「有。」師云：「過在什麼處？請師道。」泉遂舉，師便出去。

