pointer = '''
Decades of Zhaozhou's apprenticeship under Nanquan, collected as a string of scenes, two fast minds working each other over. The most famous one is here: the east and west halls quarrel over a cat, Nanquan holds it up and demands a saving word, nobody speaks, and he cuts it in two. When Zhaozhou hears, he sets a sandal on his head and walks out, and Nanquan says the cat would have lived had he been there. The Gateless Gate keeps the whole thing as case 14; this is the source. Don't try to convert every move into a lesson. Notice instead what the answers have in common, the water buffalo, the yank on Nanquan's nose, the staged fire in the kitchen: each refuses the expected reply and forces the other man to actually look at what is in front of him. The buffalo line, by the way, is Nanquan saying an awakened person comes back as a beast of burden, not a god, which is its own quiet rebuke to anyone hunting a reward.
'''
