case_zh = '''
師示眾云：「『至道無難，唯嫌揀擇。』纔有言語是揀擇，是明白。老僧却不在明白裏，是你還護惜也無？」問：「和尚既不在明白裏，又護惜箇什麼？」師云：「我亦不知。」學云：「和尚既不知，為什麼道不在明白裏？」師云：「問事即得，禮拜了退。」

'''
case_en = '''
Zhaozhou addressed the assembly: "The great way isn't hard. It only hates picking and choosing. The moment you speak, that's picking and choosing, that's 'making it clear.' But I don't live inside the clear. So do you treasure it or not?"

A monk asked, "If you don't live inside the clear, what is there to treasure?"

Zhaozhou said, "I don't know that either."

The monk said, "If you don't know, how can you say you don't live inside the clear?"

Zhaozhou said, "You've had your question. Now bow and step back."
'''

