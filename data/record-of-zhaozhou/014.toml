pointer = '''
"The great way isn't hard, it only hates picking and choosing" is the line Zhaozhou quotes most often in this whole book, the opening of the Xinxinming: start sorting things into right and wrong, this and that, and you have already wandered off. But he twists it. The verse prizes being "clear," and Zhaozhou says he doesn't even live inside clarity, which leaves both picking-and-choosing and its supposed cure behind him. The monk pounces, trying to catch him in a contradiction: if you don't know, how can you claim where you don't live? Zhaozhou won't take either horn. You had your question, bow and step back. Refusing to be filed on one side or the other is not him dodging; it is the thing the quoted line was pointing at.
'''
