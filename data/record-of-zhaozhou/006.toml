pointer = '''
Not a single case but a whole afternoon of questions, strung together by the compiler. A few terms unlock it. A "wise teacher" is the stock honorific for an awakened guide, and Zhaozhou keeps shrugging it off. "Saindhava" is an old Indian riddle-word that meant salt, water, a horse, or a vessel depending on the moment, so a good servant brought the right one unprompted; asking "what is saindhava?" is really asking whether you can read a situation without instructions. The line a monk quotes, "the perfect Way is not hard, just quit picking and choosing," opens a poem everyone in the room had memorized, and Zhaozhou treats quoting it as exactly the mental fidgeting it warns against. Danxia once burned a wooden Buddha for firewood on a cold night, and the joke is that the scandalized by-the-book monk is the one who lost his eyebrows to bad karma, not the man who burned the statue. Through all of it Zhaozhou never defines anything; he keeps shoving each monk back into the physical world, your own hand, the kitchen fire, and last the cypress in the yard that became Gateless Gate 37.
