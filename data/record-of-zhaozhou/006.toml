師上堂云：「兄弟，你正在第三冤裏。所以道，但改舊時行履處，莫改舊時人。共你各自家出家，比來無事，更問禪問道，三十、二十人聚頭來問，恰似欠伊禪道相似。你喚作善知識，我是同受拷。老僧不是戲好，恐帶累他古人，所以東道西說。」問：「十二時中如何用心？」師云：「你被十二時使，老僧使得十二時。你問那箇時？」問：「如何是趙州主人公？」師咄云：「這篐桶漢！」學人應諾，師云：「如法篐桶著。」問：「如何是學人本分事？」師云：「樹搖鳥散，魚驚水渾。」問：「如何是少神底人？」師云：「老僧不如你。」學云：「不占勝。」師云：「你因什麼少神？」問：「『至道無難，唯嫌揀擇』，是時人窠窟？」師云：「曾有問我，直得五年分疎不得。」有官人問：「丹霞燒木佛，院主為什麼眉鬚墮落？」師云：「官人宅中變生作熟是什麼人？」云：「所使。」師云：「却是他好手。」僧問：「毗目仙人執善才手，見微塵佛時如何？」師遂執僧手云：「你見箇什麼？」有尼問：「如何是沙門行？」師云：「莫生兒。」尼云：「和尚勿交涉。」師云：「我若共你打交涉，堪作什麼？」問：「如何是趙州主人公？」師云：「田厙奴。」問：「如何是王索仙陀婆？」師云：「你道老僧要箇什麼？」問：「如何是玄中玄？」師云：「說什麼玄中玄？七中七，八中八。」問：「如何是仙陀婆？」師云：「靜處薩婆訶。」問：「如何是法非法？」師云：「東西南北。」學云：「如何會去？」師云：「上下四維。」問：「如何是玄中玄？」師云：「這僧若在，合年七十四、五。」問：「王索仙陀婆時如何？」師驀起打躬叉手。問：「如何是道？」師云：「不敢，不敢。」問：「如何是法？」師云：「敕敕攝攝。」問：「趙州去鎮府多少？」師云：「三百。」學云：「鎮府來趙州多少？」師云：「不隔。」問：「如何是玄中玄？」師云：「玄來多少時也？」學云：「玄來久矣。」師云：「賴遇老僧，洎合玄殺這屢生。」問：「如何是學人自己？」師云：「還見庭前栢樹子麼？」

