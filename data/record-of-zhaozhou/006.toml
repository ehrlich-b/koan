case_en = '''
Zhaozhou took the high seat and said: Brothers, you're sitting right in the middle of your third lifetime of grief. So I tell you: change the road you walk, not the one who walks it. We all left home together. Nothing was wrong, until you started asking about Chan, asking about the Way. Twenty, thirty of you crowd in to ask, as if I owed you some Chan, some Way. You call me a wise teacher. I'm just one more man taking the beating alongside you. I'm not doing this for fun. I'm afraid of dragging down the old masters, so I run my mouth, east and west.

A monk asked, "All day long, how should I use my mind?"
Zhaozhou said, "You get used by the hours. I use the hours. Which one are you asking about?"

A monk asked, "Who is the master in charge here at Zhaozhou?"
Zhaozhou barked, "You bucket of hoops!"
The monk answered, "Yes?"
Zhaozhou said, "Then hoop the bucket properly."

A monk asked, "What is my own original business?"
Zhaozhou said, "The tree shakes, the birds scatter. The fish startle, the water clouds."

A monk asked, "What kind of person has no spirit left in him?"
Zhaozhou said, "I'm not as good as you."
The monk said, "I'm not trying to win."
Zhaozhou said, "Then why so short on spirit?"

A monk said, "'The perfect Way is not hard; just quit picking and choosing.' Isn't that the very hole everybody falls into these days?"
Zhaozhou said, "Somebody asked me that once. Five years, and I still couldn't get clear of it."

An official asked, "Danxia burned a wooden Buddha. Why did the temple director lose his eyebrows and beard?"
Zhaozhou said, "When your kitchen turns raw food into cooked, who does it?"
The official said, "A servant."
Zhaozhou said, "Turns out he's the skilled one."

A monk asked, "When the sage Bhīma took Sudhana's hand and saw buddhas as countless as dust motes, what was that like?"
Zhaozhou took the monk's hand and said, "What do you see?"

A nun asked, "What is the practice of a monk?"
Zhaozhou said, "Don't have a baby."
The nun said, "Master, that has nothing to do with it."
Zhaozhou said, "If I got tangled up with you, what good would it do?"

A monk asked, "Who is the master in charge here at Zhaozhou?"
Zhaozhou said, "Farmhand."

A monk asked, "What is the king's call for saindhava?"
Zhaozhou said, "You tell me. What is it I want?"

A monk asked, "What is the mystery within the mystery?"
Zhaozhou said, "What mystery within the mystery? It's seven within seven, eight within eight."

A monk asked, "What is saindhava?"
Zhaozhou said, "In the quiet place, svāhā."

A monk asked, "What is Dharma, and what is not-Dharma?"
Zhaozhou said, "East, west, south, north."
The monk said, "How do I get hold of that?"
Zhaozhou said, "Up, down, and the four corners."

A monk asked, "What is the mystery within the mystery?"
Zhaozhou said, "If that monk were still alive, he'd be seventy-four or seventy-five."

A monk asked, "What about the king's call for saindhava?"
Zhaozhou suddenly stood, bowed, and folded his hands.

A monk asked, "What is the Way?"
Zhaozhou said, "Pardon me, pardon me."

A monk asked, "What is the Dharma?"
Zhaozhou said, "Order! Order! Attention! Attention!"

A monk asked, "How far is Zhaozhou from Zhenfu?"
Zhaozhou said, "Three hundred miles."
The monk said, "And how far is Zhenfu from Zhaozhou?"
Zhaozhou said, "No distance at all."

A monk asked, "What is the mystery within the mystery?"
Zhaozhou said, "How long have you been at this 'mystery'?"
The monk said, "A long time now."
Zhaozhou said, "Lucky for you, you ran into me. Any longer and the mystery would have killed you, you poor wretch."

A monk asked, "What am I, really, my own self?"
Zhaozhou said, "You see the cypress tree out in the yard?"
