pointer = '''
Another hall session: a brief address, then questions batted back one by one. Zhaozhou opens with a jab at the famous abbots of the day, the kind everyone praises until someone asks them about the Dharma and it turns out to be "frying sand to make rice," all show, nothing edible. Then the monks line up, and almost every one tries to corner him into stating the truth out loud: say the phrase, name the meaning, vouch for the answer. He won't, because anything you can pocket and carry off has already stopped being the thing. "The meaning of Bodhidharma coming from the West" is once more the question of what all this is for, and he answers by silently climbing down off his chair, then denying he said anything. The "four kindnesses and three existences" is just Buddhist debt-language for everything you owe, parents, teachers, ruler, the world; calling the questioner a father-killer is theater, not accusation, his way of saying the question itself proves the man is still tangled in owing and repaying.
