pointer = '''
"Every one of you has the Way already" is Zhaozhou's constant text, and the monk lands the obvious objection on it: if we already own it, what have centuries of teachers been talking about? "Wandering ghost" is the answer with the sting left in. A ghost is restless, never home, drifting from place to place looking for what it can't lack, which is exactly the monk chasing teachings instead of noticing what is his. Then the monk asks the live question, how do you actually teach a thing nobody can be given, and Zhaozhou steps back and shuts his mouth. Say one more word and you have handed it over as an object, turning the Way back into something to chase. The silence is the only honest demonstration left. What would you have done in his place, with the floor and a roomful of ghosts waiting?
'''
