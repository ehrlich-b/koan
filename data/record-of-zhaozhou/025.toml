case_zh = '''
師示眾云：「各自有禪，各自有道。忽有人問你：『作麼生是禪是道？』作麼生祇對他？」僧乃問：「既各有禪道，從上至今語話為什麼？」師云：「為你遊魂。」學云：「未審如何為人？」師乃退身不語。

'''
case_en = '''
Zhaozhou addressed the assembly: "Every one of you has Zen. Every one of you has the Way. Suppose someone walks up and asks, 'What is Zen? What is the Way?' How will you answer him?"

A monk asked, "If we all already have Zen and the Way, then what have the teachers been talking about all this time, right up to now?"

Zhaozhou said, "Because you're a wandering ghost."

The monk asked, "Then how should one work with people?"

Zhaozhou stepped back and said nothing.
'''

