case_en = '''
One day Zhaozhou addressed the assembly: "When I first came to Yaoshan, I caught a single phrase. And right up to now I've been [□□ — two characters missing in the source] full."

Another time, while Zhaozhou sat in meditation in his room, an attendant came in. "The king is here to pay his respects." The king made his bows and left.

Afterward someone asked, "When the king came, why didn't you rise?"

Zhaozhou said, "You don't understand. Here is how it works with me. When a low-rank person comes, I go out to the front gate to meet him. When a middling person comes, I step down from my meditation seat to meet him. When a person of the highest rank comes, I meet him right here on the seat. I could hardly treat the king as middling or low. That would shortchange him." Hearing this, the king was delighted, and pressed him again and again to come to the palace and be looked after.

Zhaozhou asked Councilor Zhou, "Have you ever so much as dreamed of Linji?"

Zhou held up his fist.

Zhaozhou said, "From which side did you see it?"

Zhou said, "From this side."

Zhaozhou said, "Then where did you see Linji?"

Zhou had no answer.

Zhaozhou asked Councilor Zhou, "Where do you come from?"

Zhou said, "Neither coming nor going."

Zhaozhou said, "So you're not some old crow flapping back and forth?"
