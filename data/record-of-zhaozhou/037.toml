pointer = '''
A few scenes strung together. Yaoshan was a master Zhaozhou trained under early; "caught one phrase and stayed full on it ever since" is his joke that a single good line was a lifetime's food. The centerpiece is the king's visit. When royalty arrives and a monk stays seated, that reads as a fatal insult, so Zhaozhou inverts it: the less he rises, the higher the honor, since only top-rank guests rate being received without getting up. He turns rudeness into the ultimate compliment and the king buys it outright. Linji was another towering teacher of the same era; when Councilor Zhou holds up a fist as if to signal "I've grasped it," Zhaozhou keeps poking, a fist is just a fist, where is Linji in it. Then Zhou tries "neither coming nor going," a lofty bit of non-attachment talk, and Zhaozhou punctures it on contact: fine, but you still walked in here flapping around like any old crow. Lofty words, ordinary crow, same person.
'''
