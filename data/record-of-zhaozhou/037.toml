case_zh = '''
師有時示眾云：「老僧初到藥山時，得一句子，直至如今□□地飽。」師因在室坐禪次，主事報大王來禮拜。大王禮拜了，左右問：「土王來，為什麼不起？」師云：「你不會。老僧者裏，下等人來，出三門接。中等人來，下禪床接。上等人來，禪床上接。不可喚大王作中等．下等人也，恐屈大王。」大王歡喜，再三請入內供養。師因問周員外：「你還夢見臨濟也無？」員外竪起拳。師云：「那邊見？」外云：「者邊見。」師云：「什麼處見臨濟？」員外無對。師問周員外：「什麼處來？」云：「非來非去。」師云：「不是老鵶飛來飛去？」

