pointer = '''
A short hall-talk, and the plainest statement of how Zhaozhou wants his monks to live. Robe and bowl are the only two things a monk owns, so "sit under your robe and bowl" just means sit down and meditate. His pitch is almost insultingly simple: stop loafing, and spend your attention on nothing but eating and practice. The tax line lands because peasants in Tang China paid a grain levy twice a year, and his joke is that a real monk owes no one and isn't grinding to a schedule like a man with a bill due. When a monk fishes for the single phrase that sums everything up, Zhaozhou warns that clinging to one fixed answer will only age you, the same allergy to a graspable formula that runs through every case here. The closing dare to cut off his head is his over-the-top way of staking the whole bet on silent, settled practice over clever talk.
'''
