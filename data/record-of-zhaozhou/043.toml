case_zh = '''
本自圓成，何勞疊石。名邈雕鐫，與吾懸隔。若人借問，終不指畫。

'''
case_en = '''
Whole in itself all along.
Why trouble to stack the stones?
A name, a likeness in carved rock —
none of it is me.
Should anyone ask where I am,
I will point at nothing.
'''

