pointer = '''
Zhaozhou opens with an old formula: the world you experience rises and falls with the mind, stir it and a thousand things appear, quiet it and they wink out. Then comes the trap of the "three phrases," a stock teaching grid that sorts any answer into three slots, roughly this end, that end, and the middle. The monk keeps trying to slip the net, not this end, not that, not the middle, and Zhaozhou keeps showing he is still boxed in, since dodging the three is just a fourth move played inside the same game. The release comes when the monk quits fighting the box and says he can simply use the three phrases, and Zhaozhou pounces: that's it, why did it take you so long. The last exchange is its own riddle. Asked for the path that goes everywhere, he says drop the Diamond meditation, telling a man to set down his hardest, most prized practice and walk on without it.
'''
