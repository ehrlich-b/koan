case_zh = '''
師示眾云：「心生即種種法生，心滅即種種法滅。你諸人作麼生？」僧乃問：「只如不生不滅時如何？」師云：「我許你者一問。」師因參次云：「明又未明，道昏欲曉，你在阿那頭？」僧云：「不在兩頭。」師云：「與麼即在中間也。」云：「若在中間，即在兩頭。」師云：「這僧多少時在老僧者裏作與麼語話，不出得三句裏。然直饒出得，也在三句裏。你作麼生？」僧云：「某甲使得三句。」師云：「何不早與麼道？」問：「如何是通方？」師云：「離却金剛禪。」

'''
case_en = '''
Zhaozhou addressed the assembly: "When the mind stirs, all sorts of things arise. When the mind quiets, all sorts of things wink out. So what about you?"

A monk asked, "And when nothing arises and nothing ceases, what then?"

Zhaozhou said, "I'll grant you that one question."

During an evening session, Zhaozhou said, "Light, but not yet light. Call it the road from dusk toward dawn. Which end are you standing on?"

A monk said, "Neither end."

Zhaozhou said, "Then you're in the middle."

The monk said, "If I'm in the middle, I'm at both ends."

Zhaozhou said, "How long has this monk been here with me, talking like this? You can't get outside the three phrases. And even if you could, you'd still be inside them. So what about you?"

The monk said, "I can put the three phrases to use."

Zhaozhou said, "Why didn't you say so to begin with?"

A monk asked, "What is the way that goes everywhere?"

Zhaozhou said, "Drop the Diamond meditation."
'''

