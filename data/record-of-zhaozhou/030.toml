pointer = '''
A long reel of Zhaozhou (778–897) sparring with monks who keep coming armed with scripture and abstractions. The recurring trap is that each question tries to make him name a special place, state, or thing, and he keeps batting it back to the person standing there. Footholds for the jokes: "the place thought can't reach" is supposed to be some transcendent elsewhere, so he holds up his hand and dares the monk to think his way past it. The gem that "takes the color of whatever's near it" is a stock image from the sutras; asked its own true color, Zhaozhou tells the monk to keep taking on colors, because there is no bare uncolored gem to find. "Everyday mind" is his signature teaching, the ordinary mind you already have, which is why he answers it with foxes and jackals rather than anything holy. And "ten thousand things return to one, where does the one return," the cosmic stumper, gets "I made a shirt in Qingzhou, it weighed seven pounds." Run your eye down the column and watch a grand question meet a rice shirt or a water buffalo every single time.
'''
