case_zh = '''
師示眾云：「闍黎不是不將來，老僧不是不祇對。」又云：「闍黎莫擎拳合掌，老僧不將禪床拂子對。」問：「思憶不及處如何？」師云：「過者邊來。」云：「過者邊來即是及處，如何是思不及處？」師竪起手云：「你喚作什麼？」云：「喚作手，和尚喚作什麼？」師云：「百種名字我亦道。」云：「不及和尚百種名字，且喚什麼？」師云：「與麼即你思憶不及處。」僧禮拜。師云：「教你思憶得及者。」云：「如何是？」師云：「釋迦教．祖師教是你師。」云：「祖與佛，古人道了也，如何是思憶不及處？」師再舉指云：「喚作什麼？」僧良久。師云：「何不當頭道著？更疑什麼？」問：「如何是和尚家風？」師云：「老僧耳背，高聲問。」僧再問。師云：「你問我家風，我却識你家風。」問：「萬境俱起時如何？」師云：「萬境俱起。」云：「一問一答是起，如何是不起？」師云：「禪床是不起底。」僧纔禮拜次。師云：「記得問答？」云：「記得。」師云：「試舉看。」僧擬舉。師問。問：「如何是目前佛？」師云：「殿裏底。」云：「者箇是相貌佛，如何是佛？」師云：「即心是。」云：「即心猶是限量，如何是佛？」師云：「無心是。」學云：「有心無心，還許學人揀也無？」師云：「有心無心，總被你揀了也，更教老僧道什麼即得？」問：「遠遠投師，未審家風如何？」師云：「不說似人。」學云：「為什麼不說似人？」師云：「是我家風。」學云：「和尚既不說似人，爭柰四海來投？」師云：「你是海，我不是海。」學云：「未審海內事如何？」師云：「老僧釣得一箇。」問：「祖佛近不得底是什麼人？」師云：「不是祖佛。」學云：「爭柰近不得何？」師云：「向你道不是祖佛，不是眾生，不是物，得麼？」學云：「是什麼？」師云：「若有名字，即是祖佛．眾生也。」學云：「不可只與麼去也。」師云：「卒未與你去在。」問：「如何是平常心？」師云：「狐狼野干是。」問：「作何方便即得聞於未聞？」師云：「未聞且置，你曾聞箇什麼來？」問：「承教有言，隨色摩尼珠，如何是本色？」師召僧名，僧應諾。師云：「過者邊來。」僧便過。又問：「如何是本色？」師云：「且隨色走。」問：「平常心底人還受教化也無？」師云：「我不歷他門戶。」學云：「與麼則莫沉却那邊人麼？」師云：「大好平常心。」問：「如何是學人保任底物？」師云：「盡未來際揀不出。」問：「如何是大修行底人？」師云：「寺裏綱維是。」問：「學人纔到，總不知門戶頭事如何？」師云：「上座名什麼？」學云：「惠南。」師云：「大好不知。」問：「學人欲學，又謗於和尚，如何得不謗去？」師云：「你名什麼？」學云：「道皎。」師云：「靜處去者米囤子。」問：「如何是和尚大意？」師云：「無大無小。」學云：「莫便是和尚大意麼？」師云：「若有纖毫，萬劫不如。」問：「萬法本閑，而人自閙，是什麼人語？」師云：「出來便死。」問：「不是佛，不是物，不是眾生，這箇是斷語，如何是不斷語？」師云：「天上天下，唯我獨尊。」問：「如何是毗盧圓相？」師云：「老僧自小出家，不曾眼花。」學云：「和尚還為人也無？」師云：「願你長見毗盧圓相。」問：「佛祖在日，佛祖相傳，佛祖滅後，什麼人傳？」師云：「古今總是老僧分上。」學云：「未審傳箇什麼？」師云：「箇箇總屬生死。」云：「不可埋沒却祖師也。」師云：「傳箇什麼？」問：「凡聖俱盡時如何？」師云：「願你作大德，老僧是障佛祖漢。」問：「遠聞趙州，到來為什麼不見？」師云：「老僧罪過。」問：「朗月當空，未審室中事如何？」師云：「老僧自出家，不曾作活計。」學云：「與麼即和尚不為今時也。」師云：「自疾不能救，焉能救諸疾？」學云：「爭柰學人無依何？」師云：「依即踏著地，不依即一任東西。」問：「在心心不測時如何？」師云：「測阿誰？」學云：「測自己。」師云：「無兩箇。」問：「不見邊表時如何？」師指淨瓶云：「是什麼？」學云：「淨瓶。」師云：「大好不見邊表。」問：「如何是歸根？」師云：「擬即差。」問：「不離言句，如何得獨脫？」師云：「離言句是獨脫。」學云：「適來無人教某甲來。」師云：「因什麼到此？」學云：「和尚何不揀出？」師云：「我早箇揀了也。」問：「非心不即智，請和尚一句。」師云：「老僧落你後。」問：「如何是畢竟？」師云：「畢竟。」學云：「那箇畢竟是？」師云：「老僧是畢竟，你不解問者話。」學云：「不是不問。」師云：「畢竟在什麼處？」問：「不挂寸絲時如何？」師云：「不挂什麼？」學云：「不挂寸絲。」師云：「大好不挂寸絲。」問：「如救頭燃底人如何？」師云：「便學。」學云：「什麼處？」師云：「莫占他位次。」問：「空劫中阿誰為主？」師云：「老僧在裏許坐。」學云：「說甚麼法？」師云：「說你問底。」問：「承古有言，虗明自照，如何是自照？」師云：「不稱他照。」學云：「照不著處如何？」師云：「你話墮也。」問：「如何是的？」師云：「一念未起時。」問：「如何是法王？」師云：「州裏大王是。」云：「和尚不是？」師云：「你擬造反去，都來一箇王不認。」問：「如何是佛心？」師云：「你是心，我是佛，奉不奉自看。」學云：「師即不無，還奉得也無？」師云：「你教化我看。」問：「三身中，那箇是本來身？」師云：「闕一不可。」問：「未審此土誰為祖師？」師云：「達磨來這邊總是。」學云：「和尚是第幾祖？」師云：「我不落位次。」學云：「在什麼處？」師云：「在你耳裏。」問：「不棄本，不逐末，如何是正道？」師云：「大好出家兒。」學云：「學人從來不曾出家。」師云：「歸依佛，歸依法。」學云：「未審有家可出也無？」師云：「直須出家。」學云：「向什麼處安排他？」師云：「且向家裏坐。」問：「明眼人見一切，還見色也無？」師云：「打却著。」學云：「如何打得？」師云：「莫用力。」學云：「不用力如何打得？」師云：「若用力即乖。」問：「祖佛大意合為什麼人？」師云：「只為今時。」學云：「爭柰不得何？」師云：「誰之過？」學云：「如何承當？」師云：「如今無人承當得。」學云：「與麼即無依倚也。」師云：「又不可無却老僧。」問：「了事底人如何？」師云：「正大修行。」學云：「未審和尚還修行也無？」師云：「著衣喫飯。」學云：「著衣喫飯尋常事，未審修行也無？」師云：「你且道我每日作什麼？」崔郎中問：「大善知識還入地獄也無？」師云：「老僧末上入。」崔云：「既是大善知識，為什麼入地獄？」師云：「老僧若不入，爭得見郎中？」問：「毫釐有差時如何？」師云：「天地懸隔。」云：「毫釐無差時如何？」師云：「天地懸隔。」問：「如何是不睡底眼？」師云：「凡眼．肉眼。」又云：「雖未得天眼，肉眼力如是。」學云：「如何是睡底眼？」師云：「佛眼．法眼是睡底眼。」問：「大庾嶺頭趂得及，為什麼提不起？」師拈起衲衣云：「你甚處得者箇來？」學云：「不問者箇。」師云：「與麼即提不起。」問：「不合不散如何辨？」師云：「你有一箇，我有一箇。」云：「者箇是合，如何是散？」師云：「你便合。」問：「如何是不錯路？」師云：「識心見性是不錯路。」問：「明珠在掌，還照也無？」師云：「照即不無，喚什麼作珠？」問：「靈苗無根時如何？」師云：「你從什麼處來？」云：「太原來。」師云：「大好無根。」問：「學人擬作佛時如何？」師云：「大煞費力生。」云：「不費力時如何？」師云：「與麼即作佛去也。」問：「學人昏鈍在一浮沉，如何得出？」師只據坐。云：「某甲實問和尚。」師云：「你甚處作一浮一沉？」問：「不在凡，不在聖，如何免得兩頭路？」師云：「去却兩頭來答你。」僧不審。師云：「不審從什麼處起？在者裏時從老僧起，在市裏時從什麼處起？」云：「和尚為什麼不定？」師云：「我教你何不道今日好風？」問：「如何是大闡提底人？」師云：「老僧答你，還信否？」云：「和尚重言，那敢不信？」師云：「覓箇闡提人難得。」問：「大無慚愧底人什麼處著得？」師云：「此間著不得。」云：「忽然出頭，爭向？」師云：「將取去。」問：「用處不現時如何？」師云：「用即不無，現是誰？」問：「空劫中還有人修行也無？」師云：「喚什麼作空劫？」云：「無一物是。」師云：「者箇始稱修行，喚什麼作空劫？」問：「如何是出家？」師云：「不履高名，不求垢壞。」問：「不指一法，如何是和尚法？」師云：「老僧不說茆山法。」云：「既不說茆山法，如何是和尚法？」師云：「向你道不說茆山法。」云：「莫者箇便是也無？」師云：「老僧未曾將者箇示人。」問：「如何是目前獨脫一路？」師云：「無二亦無三。」云：「目前有路，還許學人進前也無？」師云：「與麼即千里萬里。」問：「如何是毗盧向上事？」師云：「老僧在你脚底。」云：「和尚為什麼在學人脚底？」師云：「你元來不知有向上事。」問：「如何是合頭？」師云：「是你不合頭。」云：「如何是不合頭？」師云：「前句辨取。」問：「如何是和尚的的意？」師云：「止止不須說，我法妙難思。」問：「澄澄絕點時如何？」師云：「墮坑落壍。」云：「有什麼過？」師云：「你屈著與麼人。」問：「未審出家誓求無上菩提時如何？」師云：「未出家，被菩提使。既出家，使得菩提。」有秀才見師手中拄杖，乃云：「佛不奪眾生願，是否？」師云：「是。」秀才云：「某甲就和尚乞取手中拄杖，得否？」師云：「君子不奪人所好。」秀才云：「某甲不是君子。」師云：「老僧亦不是佛。」師因出外，見婆子插田。云：「忽遇猛虎作麼生？」婆云：「無一法可當情。」師云：「唋。」婆子云：「唋。」師云：「猶有者箇在。」有秀才辭去云：「某甲在此括撓和尚多時，無可報答和尚，待他日作一頭驢來報答和尚。」師云：「教老僧爭得鞍？」師到道吾處，纔入僧堂，吾云：「南泉一隻箭來。」師云：「看箭。」吾云：「過也。」師云：「中也。」問：「百骸俱潰散，一物鎮長靈時如何？」師云：「今朝又風起。」問：「三乘十二分教即不問，如何是祖師西來意？」師云：「水牯牛生兒也好看取。」云：「未審此意如何？」師云：「我亦不知。」問：「萬國來朝時如何？」師云：「逢人不得喚。」問：「十二時中如何淘汰？」師云：「柰河水濁，西水流急。」云：「還得見文殊也無？」師云：「者□瞳漢，什麼處去來？」問：「如何是道場？」師云：「你從道場來，你從道場去，脫體是道場，何處更不是？」問：「萌芽未發時如何？」師云：「齅著即腦裂。」云：「不齅時如何？」師云：「無者閑工夫。」問：「如何數量？」師云：「一二三四五。」云：「數量不拘底事如何？」師云：「一二三四五。」問：「什麼世界即無晝夜？」師云：「即今是晝是夜？」云：「不問即今。」師云：「爭柰老僧何？」問：「迦葉上行衣，不踏曹溪路，什麼人得披？」師云：「虗空不出世，道人都不知。」問：「如何是混而不雜？」師云：「老僧菜食長齋。」云：「還得超然也無？」師云：「破齋也。」問：「如何是古人之言？」師云：「諦聽，諦聽。」問：「如何是學人本分事？」師云：「與麼嫌什麼？」問：「萬法歸一，一歸何所？」師云：「我在青州作一領布衫重七斤。」問：「如何是出家兒？」師云：「不朝天子，父母返拜。」問：「覿面事如何？」師云：「你是覿面漢。」

