case_zh = '''
師示眾云：「纔有是非，紛然失心，還有答話分也無？」後有僧舉似洛浦。洛浦扣齒。又舉似雲居。雲居云：「何必？」僧舉似師。師云：「南方大有人喪身失命。」僧云：「請和尚舉。」師纔舉。僧便指傍僧云：「者箇師僧喫却飯了，作什麼語話？」師休去。師因看金剛經次。僧便問：「一切諸佛及諸佛阿耨菩提皆從此經出，如何是此經？」師云：「『金剛般若波羅蜜經』，如是我聞，一時佛在舍衛國。」僧云：「不是。」師云：「我自理經也不得。」因僧辭去。師云：「闍黎出外，忽有人問：『還見趙州否？』你作麼生祇對？」云：「只可道見。」師云：「老僧是一頭驢，你作麼生見？」僧無語。師問新到：「從什麼處來？」云：「南方來。」師云：「還知有趙州關麼？」云：「須知有不涉關者。」師叱云：「者販私鹽漢。」又云：「兄弟，趙州關也難過。」云：「如何是趙州關？」師云：「石橋是。」有僧從雪峯來。師云：「上座莫住此間，老僧者裏只是避難所在，佛法盡在南方。」云：「佛法豈有南北？」師云：「直饒你從雪峯．雪峯來，也只是箇擔板漢。」云：「未審那邊事如何？」師云：「你因甚夜來尿床？」云：「達後如何？」師云：「又是屙屎。」

