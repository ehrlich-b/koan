case_en = '''
Zhaozhou addressed the assembly: "The moment there's right and wrong, you lose your mind in the noise. So is anyone here fit to answer?"

Later a monk repeated this to Luopu. Luopu clicked his teeth. The monk repeated it to Yunju. Yunju said, "Why bother?" The monk reported both replies to Zhaozhou. Zhaozhou said, "Down south, plenty of people are getting themselves killed over this."

The monk said, "Please, show me how you'd put it."

Zhaozhou started to speak. The monk pointed at the monk beside him and said, "This one's already eaten his rice. What's he running his mouth for?"

Zhaozhou let it drop.

Once, while Zhaozhou was reading the Diamond Sutra, a monk asked, "It says all the buddhas, and the supreme awakening of all buddhas, come out of this sutra. What is 'this sutra'?"

Zhaozhou read aloud: "The Diamond Prajnaparamita Sutra. Thus have I heard. At one time the Buddha was in the kingdom of Shravasti—"

The monk said, "That's not it."

Zhaozhou said, "I can't even get my own sutra straight."

A monk was leaving. Zhaozhou said, "Out there, if someone asks, 'You ever see Zhaozhou?', how will you answer?"

The monk said, "I can only say I saw him."

Zhaozhou said, "I'm one old donkey. How did you see me?"

The monk had nothing to say.

Zhaozhou asked a newcomer, "Where are you from?"

"From the south."

Zhaozhou said, "Do you know there's a Zhaozhou Barrier?"

The monk said, "You should know there's one who passes no barrier at all."

Zhaozhou snapped, "Smuggler!"

Then he said, "Brother, the Zhaozhou Barrier is hard to get past, too."

"What is the Zhaozhou Barrier?"

Zhaozhou said, "The stone bridge."

A monk came from Xuefeng. Zhaozhou said, "Don't stay around here, your reverence. This place of mine is just a hideout. All the real Buddhism is down south."

The monk said, "How can Buddhism have a north and a south?"

Zhaozhou said, "Even if you came straight from Xuefeng, you're still just a man hauling a plank on one shoulder."

The monk said, "What about the matter on the other side?"

Zhaozhou said, "Why'd you wet the bed last night?"

The monk said, "And after you get there?"

Zhaozhou said, "Then you shit yourself too."
