pointer = '''
The title points at the running image: a "barrier" was a guarded checkpoint on the road, and travelers had to clear it to pass. Zhaozhou's town had a real one plus a famous old stone bridge, and he uses both as the test every visitor faces. The monk who brags he "passes no barrier at all" is claiming he is already enlightened and above the whole business, so Zhaozhou calls him a salt smuggler, somebody sneaking contraband past the gate, faking the credential. "A man hauling a plank on one shoulder" is his stock jab at a one-sided person: carry a board that way and you can only see one direction. This set also opens with the line from 33 and 34, take sides and you lose your mind in the noise. And the crude last exchange is not crassness for its own sake; when the monk fishes for grand talk about "the other side" and what comes "after you get there," Zhaozhou keeps yanking him back to the body, to last night, to right now, refusing to trade the ground underfoot for a holy-sounding elsewhere.
'''
