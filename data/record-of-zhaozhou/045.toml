pointer = '''
A short verse from the book's closing set, built on an object you would actually find in the monastery. A "fish drum" is the hollow wooden fish struck with a mallet to keep time during chanting, carved in the shape of a fish. The "four elements" are earth, water, fire, and air, the raw stuff ancient Buddhists held all bodies were made of, so the fish is just shaped matter, same as us. The turn is the hollowness: the thing rings clear only because it is empty inside, and the poem winks that this emptiness "speaks" in a register most ears aren't tuned to catch. A wooden fish making the case for the void, which is about as Zhaozhou as it gets.
'''
