師示眾云：「老僧三十年前在南方火爐頭，有箇無賓主話，直至如今無人舉著。」問：「和尚受大王如是供養，將什麼報答？」師云：「念佛。」云：「貧子也解念佛。」師云：「喚侍者將一錢與伊。」問：「如何是和尚家風？」師云：「屏風雖破，骨格猶存。」問：「如何是不遷之義？」師云：「你道這野鴨子飛從東去西去？」問：「如何是西來意？」師云：「什麼處得者消息來？」問：「如何是塵中人？」師云：「布施茶鹽錢來。」問：「大耳三藏第三度覓國師不見，未審國師在什麼處？」師云：「在三藏鼻孔裏。」問：「盲龜值浮木孔時如何？」師云：「不是偶然事。」問：「久居巖谷時如何？」師云：「何不隱去？」問：「如何是佛法大意？」師云：「禮拜著。」僧擬進話次。師喚沙彌文遠。文遠到。師叱云：「適來去什麼處來？」問：「如何是自家本意？」師云：「老僧不用牛刀。」問：「久嚮趙州石橋，到來只見掠彴子。」師云：「闍黎只見掠彴子，不見趙州石橋。」云：「如何是石橋？」師云：「過來，過來。」又云：「度驢度馬。」問：「和尚姓什麼？」師云：「常州有。」云：「甲子多少？」師云：「蘇州有。」

