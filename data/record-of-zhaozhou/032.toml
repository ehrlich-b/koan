case_en = '''
Zhaozhou addressed the assembly: "Thirty years ago, down south, sitting by the stove, I had a piece on 'no host, no guest.' To this day no one has brought it up."

A monk asked, "The king showers all this support on you. How will you repay him?"
Zhaozhou said, "I chant the Buddha's name."
"A pauper can do that much."
Zhaozhou said, "Attendant, give this man a penny."

A monk asked, "What is your house style?"
Zhaozhou said, "The screen is torn, but the frame still stands."

A monk asked, "What does 'nothing shifts' mean?"
Zhaozhou said, "You tell me. That wild duck, is it flying east or west?"

A monk asked, "Why did Bodhidharma come from the west?"
Zhaozhou said, "Where did you pick up that bit of news?"

A monk asked, "Who is the person in the dust?"
Zhaozhou said, "Hand over some money for tea and salt."

A monk asked, "The third time Big-Ears the Tripitaka master went looking, he couldn't find the National Teacher. Where had the National Teacher gone?"
Zhaozhou said, "Up Big-Ears' own nose."

A monk asked, "What about when the blind turtle finds the hole in the floating log?"
Zhaozhou said, "No accident, that."

A monk asked, "What about living long in the cliffs and valleys?"
Zhaozhou said, "Why not vanish for good?"

A monk asked, "What is the great meaning of the Buddha's teaching?"
Zhaozhou said, "Bow."
The monk started to speak. Zhaozhou called out, "Wenyuan!" The novice Wenyuan came over. Zhaozhou snapped, "Just now, where did you go?"

A monk asked, "What is your own basic intent?"
Zhaozhou said, "I don't reach for the butcher's cleaver."

A monk said, "I've heard of Zhaozhou's stone bridge for ages. I get here and all I see is a plank over a ditch."
Zhaozhou said, "You see the plank. You don't see Zhaozhou's stone bridge."
"What is the stone bridge?"
Zhaozhou said, "Come across. Come across." Then he added, "It carries donkeys, it carries horses."

A monk asked, "What is your surname?"
Zhaozhou said, "There's one in Changzhou."
"And how old are you?"
Zhaozhou said, "There's one in Suzhou."
