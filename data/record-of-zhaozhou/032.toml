pointer = '''
Quick run-ins with visiting monks, four of which need a key. "No host, no guest" points past the split between self and other, the line Zhaozhou says nobody ever asked him about. The "person in the dust" means someone living in the ordinary grimy world. "Big-Ears the Tripitaka master" was a celebrated mind-reader who could see anyone's thoughts, until the National Teacher emptied his own mind and the mind-reader came up blank three times running; "up his own nose" is Zhaozhou saying the so-called master couldn't find what was right under him. The blind turtle and the floating log is the classic image for how absurdly rare a human birth that meets the teaching is: a blind sea turtle surfaces once a century, one log with a single hole drifts the whole ocean, and the turtle's head comes up through that hole. The last bit is pure clowning, his name and his age both answered with the names of towns, the old man refusing to be pinned to any label and enjoying it.
'''
