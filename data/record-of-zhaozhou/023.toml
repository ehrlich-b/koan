pointer = '''
Zhaozhou opens by mocking the room: eight hundred men striking the holy pose, hardly one real person among them. Then the baited questions come and he counterpunches. The monk asking about "no Buddha, no person" is fishing for some pure empty zone above ordinary life, and Zhaozhou tells him to subtract those two labels and he is still swimming in countless ordinary beings; there is no special blank to escape into. The "white cloud that never settles" is a stock image for a free, unattached mind, and the monk wants it confirmed as something that floats above all distinctions. Zhaozhou refuses to climb on that high horse (the "elephant"), then pins him with plain fact: right here you are the guest and I am the host, so where is this free-floating cloud now. The last line plays on a saying from the Tao Te Ching, great skill looks like clumsiness; the monk dresses it up as a question, and Zhaozhou says he has just thrown away the one good roof-beam he had, meaning quit posing and there would have been something solid to build on.
'''
