case_zh = '''
師示眾云：「八百箇作佛漢，覓一箇道人難得。」問：「只如無佛無人處，還有修行也無？」師云：「除却者兩箇，有百千萬億。」學云：「道人來時在什麼處？」師云：「你與麼即不修行也。」其僧禮拜，師云：「大有處著你在。」問：「白雲不落時如何？」師云：「老僧不會上象。」學云：「豈無賓主？」師云：「老僧是主，闍黎是賓。白雲在什麼處？」問：「大巧若拙時如何？」師云：「喪却棟梁材。」

