case_en = '''
Zhaozhou addressed the assembly: "Eight hundred men playing at Buddha, and not one real person of the Way among them."

A monk asked, "What about the place where there's no Buddha and no person? Is there practice there?"
Zhaozhou said, "Subtract those two and you've still got billions left."

The monk asked, "When the person of the Way arrives, where is he?"
Zhaozhou said, "Talking like that, you're not practicing at all."
The monk bowed.
Zhaozhou said, "There's plenty of room to set you down."

A monk asked, "When the white cloud never settles, what then?"
Zhaozhou said, "I don't know how to climb up on the elephant."
The monk said, "But isn't there a host and a guest?"
Zhaozhou said, "I'm the host, you're the guest. So where's your white cloud now?"

A monk asked, "When great skill looks like clumsiness, what then?"
Zhaozhou said, "You just threw away the beam that holds the roof up."
'''

