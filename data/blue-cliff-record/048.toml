case_zh = '''
王太傅入招慶煎茶。時朗上座與明招把銚，朗翻却茶銚。太傅見問上座：「茶爐下是什麼？」朗云：「捧爐神。」太傅云：「既是捧爐神，為什麼翻却茶銚？」朗云：「仕官千日，失在一朝。」太傅拂袖便去。明招云：「朗上座喫却招慶飯了，却去江外打野榸。」朗云：「和尚作麼生？」招云：「非人得其便。」雪竇云：「當時但踏倒茶爐。」

'''
case_en = '''
Minister Wang came to Zhaoqing monastery for tea. While the head monk Lang and Mingzhao were tending the kettle, Lang knocked the teapot over.

The Minister saw it and asked the head monk, "What's under the tea stove?"

Lang said, "The spirit who holds up the stove."

The Minister said, "If a spirit holds up the stove, how did the teapot tip over?"

Lang said, "Serve in office a thousand days, lose it in a single morning." The Minister shook out his sleeves and left.

Mingzhao said, "Lang, you ate Zhaoqing's rice, and off you go across the river to burn rotten stumps."

Lang said, "And you?"

Mingzhao said, "The spirit found its opening."

Xuedou said: Right then I'd have just kicked the tea stove flat.
'''

