intro_en = '''
Gather up the causes, tie off the results. Beginning to end, all of it laid bare. Face to face, nothing held back, and yet not a word has ever been said. Suppose someone steps out and says, "We've spent a whole summer at this, so why do you say nothing's been said?" I'd tell him: wait till you wake up, then I'll tell you. So which is it: am I dodging the question right to your face, or is there more to it? Let's look.
'''

