title_zh = ""
title_en = "The White Head and the Black Head"

intro_zh = '''
夫說法者，無說無示；其聽法者，無聞無得。說既無說無示，爭如不說；聽既無聞無得，爭如不聽。而無說又無聽，却較些子。只如今諸人，聽山僧在這裏說，作麼生免得此過？具透關眼者，試舉看。

'''
intro_en = '''
Whoever teaches the Dharma says nothing, shows nothing. Whoever listens hears nothing, gets nothing. If teaching says nothing and shows nothing, why not keep quiet? If listening hears nothing and gets nothing, why bother to listen? And yet "no teaching, no listening" at least gets you a little closer. So right now, all of you sitting here listening to me run my mouth: how do you dodge this trap? Anyone who has the eye that sees clean through, let's hear you take a crack at it.
'''

case_zh = '''
僧問馬大師：「離四句，絕百非，請師直指某甲西來意。」馬師云：「我今日勞倦，不能為汝說，問取智藏去。」僧問智藏，藏云：「何不問和尚？」僧云：「和尚教來問。」藏云：「我今日頭痛，不能為汝說，問取海兄去。」僧問海兄，海云：「我到這裏却不會。」僧舉似馬大師，馬師云：「藏頭白，海頭黑。」

'''
case_en = '''
A monk asked Master Ma, "Drop the four propositions, cut off the hundred negations, and point straight at the meaning of Bodhidharma coming from the West."

Mazu said, "I'm worn out today. I can't explain it for you. Go ask Zhizang."

The monk asked Zhizang. Zhizang said, "Why not ask the master?"

The monk said, "The master sent me to you."

Zhizang said, "I've got a headache today. I can't explain it for you. Go ask brother Hai."

The monk asked brother Hai. Hai said, "When I get this far, I don't understand it at all."

The monk reported all this back to Master Ma. Mazu said, "Zang's head is white, Hai's head is black."
'''

verse_zh = '''
藏頭白海頭黑，
明眼衲僧會不得。
馬駒踏殺天下人，
臨濟未是白拈賊。
離四句絕百非，
天上人間唯我知。

'''
verse_en = '''
Zang's head white, Hai's head black.
A clear-eyed monk can't crack it.
The colt tramples everyone alive;
beside him Linji's no clean thief yet.
Drop the four propositions, cut the hundred negations:
in heaven and on earth, only I know.
'''

pointer = '''
Master Ma is Mazu, one of the giants of Tang Chan; Zhizang and "brother Hai" (Baizhang Huaihai) are two of his top students. The monk's question is a trap dressed as humility. "The four propositions and the hundred negations" is shorthand for every logical box you could stuff reality into (it is, it isn't, both, neither, and all the rest), so he's saying skip the categories and hand me the naked truth. There's no clean answer, because any answer he gets turns into one more category. Watch the three teachers handle it: Mazu pleads exhaustion and passes the buck, Zhizang pleads a headache and passes it on, Hai just shrugs. The verse calls Mazu a "colt" who tramples everyone alive, high praise here, and ranks him even above Linji, that other legend famous for snatching the ground out from under students like a thief. The "white head, black head" verdict is Mazu's punchline, and trying to decode it into a tidy meaning is the same box the monk got caught in.
'''
