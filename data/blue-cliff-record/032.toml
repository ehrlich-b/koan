title_zh = ""
title_en = "Director Ding Stands Frozen"

intro_zh = '''
十方坐斷，千眼頓開；一句截流，萬機寢削。還有同死同生底麼？見成公案，打疊不下。古人葛藤，試請舉看。

'''
intro_en = '''
Cut off the ten directions, and a thousand eyes snap open at once. One phrase dams the current, and ten thousand schemes fall away. Is there anyone who will live and die alongside you? Even a finished case won't fold up neatly and go back on the shelf. Let me drag out one of the old masters' tangles, and we'll have a look.
'''

case_zh = '''
定上座問臨濟：「如何是佛法大意？」濟下禪床，擒住，與一掌，便托開。定佇立。傍僧云：「定上座，何不禮拜？」定方禮拜，忽然大悟。

'''
case_en = '''
Director Ding asked Linji, "What is the essence of the Buddha's teaching?"

Linji came down off his seat, seized him, slapped him once, and shoved him away.

Ding stood there, frozen. A monk nearby said, "Director Ding, why don't you bow?"

As Ding began to bow, he woke all at once.
'''

verse_zh = '''
斷際全機繼後蹤，
持來何必在從容。
巨靈擡手無多子，
分破華山千萬重。

'''
verse_en = '''
Huangbo's whole works, and Linji took up the trail.
Why hold it back, why take it slow?
The giant god raised one hand, nothing to it,
and split Mount Hua into a thousand peaks.
'''

pointer = '''
Linji is the ninth-century teacher famous for hitting and shouting instead of explaining, the method itself insisting the answer is not anything you can wrap in words. Director Ding is a senior monk, an officer of the monastery, and he walks up with the largest question there is: what is Buddhism actually about? Linji's reply is to seize him, slap him once, and shove him off, no doctrine, just a jolt. Ding stands there short-circuited, and what finishes it is the most ordinary reflex imaginable: a bystander says bow, and as Ding bows it all lands. The verse likens the slap to the myth of a river-god splitting Mount Hua with one bare-handed stroke, one plain move and the whole face of the mountain cracks open.
'''
