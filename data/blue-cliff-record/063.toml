title_zh = ""
title_en = "Nanquan Cuts the Cat in Two"

intro_zh = '''
意路不到，正好提撕；言詮不及，宜急著眼。若也電轉星飛，便可傾湫倒嶽。眾中莫有辨得底麼？試舉看。

'''
intro_en = '''
Thinking can't reach it: that's exactly when to press in. Words can't touch it, so look fast. Move like lightning, like a shooting star, and you can drain the lake and topple the mountains. Anyone here got the eye for it? Let's see.
'''

case_zh = '''
南泉一日東西兩堂爭猫兒。南泉見，遂提起云：「道得即不斬。」眾無對。泉斬猫兒為兩段。

'''
case_en = '''
One day the monks of the east hall and the west hall were fighting over a cat. Nanquan grabbed it and held it up. "Say the word and I won't cut it," he said. Nobody answered. So he cut the cat in two.
'''

verse_zh = '''
兩堂俱是杜禪和，
撥動煙塵不柰何。
賴得南泉能舉令，
一刀兩段任偏頗。

'''
verse_en = '''
Both halls packed with phony monks,
kicking up smoke and dust, helpless to stop it.
Good thing Nanquan could give the order:
one stroke, two halves, let it fall as it falls.
'''

pointer = '''
Nanquan is a famous Tang teacher running a large monastery, and his monks from two halls are squabbling over a cat like it's a prize to win, exactly the grasping these men are supposed to be done with. So he calls the bluff: holds the cat up, dares anyone to "say the word" that shows real understanding and saves it. They freeze. Whether he literally killed a cat or this is a shock story told to land a point, the blade is aimed at the monks, not the animal: all that Chan talk, and when it actually counted nobody had a living word. The unbearable part is that there was a way out and the whole room missed it. Case 64 is the payoff, where Zhaozhou turns up later and gives the answer that would have spared it.
'''
