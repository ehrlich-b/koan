title_zh = ""
title_en = "The Hermit of Tongfeng Roars"

intro_zh = '''
把定世界，不漏纖毫，盡大地人亡鋒結舌，是衲僧正令。頂門放光，照破四天下，是衲僧金剛眼睛。點鐵成金，點金成鐵，忽擒忽縱，是衲僧拄杖子。坐斷天下人舌頭，直得無出氣處，倒退三千里，是衲僧氣宇。且道：總不恁麼時，畢竟是箇什麼人？試舉看。

'''
intro_en = '''
Lock the whole world down and not a hair leaks through. Strike everyone on earth dumb, sword broken, tongue tied: that is a real monk's true command. Light shoots from the crown of his head and blazes across all four corners of the world. That is his diamond eye. He turns iron into gold and gold back into iron, grabs and lets go in the same breath. That is his staff. He cuts off the tongues of everyone alive, leaves them no room even to breathe, sends them stumbling back three thousand miles. That is his nerve. Now tell me: when a man does none of this, what kind of man is he? Let's look.
'''

case_zh = '''
僧到桐峯庵主處，便問：「這裏忽逢大蟲時，又作麼生？」庵主便作虎聲。僧便作怕勢。庵主呵呵大笑。僧云：「這老賊！」庵主云：「爭奈老僧何？」僧休去。雪竇云：「是則是兩箇惡賊，只解掩耳偷鈴。」

'''
case_en = '''
A monk came to the hut of the hermit of Tongfeng and asked, "If a tiger suddenly showed up here, what would you do?"

The hermit growled like a tiger. The monk jumped back, terrified. The hermit roared with laughter.

"You old crook," the monk said.

"And what are you going to do about it?" said the hermit.

The monk gave up and left.

Xuedou said: Both of them are thieves, all right. But all they know how to do is plug their own ears while they steal the bell.
'''

verse_zh = '''
見之不取，
思之千里。
好箇斑斑，
爪牙未備。
君不見，大雄山下忽相逢，
落落聲光皆振地。
大丈夫見也無？
收虎尾兮捋虎鬚。

'''
verse_en = '''
See it and don't grab it,
and it's a thousand miles gone.
Fine stripes on that beast,
but the claws and fangs aren't set.
Haven't you heard? At the foot of Daxiong Mountain they suddenly met,
sound and light crashing down, shaking the ground.
A real man: did he see it or not?
Grab the tiger's tail, yank the tiger's whiskers.
'''

pointer = '''
A hut hermit is a monk who has quit the monastery to live alone in the hills, supposedly enlightened, off the grid, no audience to play to. A traveling monk shows up to test him: what if a tiger appeared? The hermit answers by acting it out, roaring, the monk flinches, the hermit cracks up. The monk calls him a fraud, the hermit fires back, and the monk just walks off. Two men playing tiger, and neither one quite turns into the animal. Xuedou calls them both thieves who "plug their own ears to steal the bell," an old idiom for fooling only yourself, since the bell-thief who cannot hear the ring assumes no one else can either. The roar was real enough; the flinch was real enough; the question is whether either man actually became the tiger instead of impersonating it. "Daxiong Mountain" in the verse is Baizhang's peak, shorthand for a place where real masters faced off, and the verse asks who here had the nerve to grab the tiger by the whiskers.
'''
