number = 39
slug = ""
title_zh = ""
title_en = "Yunmen's Flowering Hedge"

intro_zh = '''
途中受用底，似虎靠山；世諦流布底，如猿在檻。欲知佛性義，當觀時節因緣；欲煅百鍊精金，須是作家爐韛。且道大用現前底，將什麼試驗？

'''
intro_en = '''
A man at ease on the road is a tiger backed by his mountain. A man caught in the world's affairs is a monkey in a cage. Would you know what buddha-nature means? Watch the season, watch the conditions. Would you smelt pure gold, hammered a hundred times? Then you need a master's furnace and bellows. Now tell me: when the great function stands before you in full, what will you use to test it?
'''

case_zh = '''
僧問雲門：「如何是清淨法身？」門云：「花藥欄。」僧云：「便恁麼去時如何？」門云：「金毛獅子。」

'''
case_en = '''
A monk asked Yunmen, "What is the pure body of truth?"
Yunmen said, "The flowering hedge by the fence."
The monk said, "And one who lives just so, what of him?"
Yunmen said, "A golden-haired lion."
'''

verse_zh = '''
花藥欄，
莫顢頇。
星在秤兮不在盤，
便恁麼，
太無端，
金毛獅子大家看。

'''
verse_en = '''
The flowering hedge by the fence:
don't blur it, don't fudge it.
The weight is in the mark on the beam, never the pan.
Live just so,
and there's no handle on it at all.
A golden-haired lion. Everyone, look.
'''

pointer = '''
Yunmen, the famously sharp tenth-century master, gets handed the dharmakaya, "the pure body of truth," the grandest Buddhist abstraction going: reality itself, beyond every form, the kind of phrase that fogs a student's eyes. He answers by pointing at the weeds flowering along the garden fence. There it is, nothing special, in front of you. The monk presses, fine, but what about a person actually living from that, and Yunmen names him a golden-haired lion, the real animal, no longer a house cat reciting lines. The mistake the whole case keeps catching is treating "pure truth" as something located elsewhere; Yunmen keeps slamming it back into the dirt at your feet, the same refusal of a handle that opens this whole collection with Bodhidharma (1).
'''
