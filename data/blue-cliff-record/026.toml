pointer = '''
Baizhang was a major Tang master, and Great Hero Peak was both the mountain he lived on and, conveniently, his seat of authority. So when the monk fishes for the "rare and wondrous thing," some cosmic prize, Baizhang answers with the plainest fact available: me, sitting right here, on my own hill. The monk hears something he can revere and bows, which is exactly the mistake. A bow turns a living answer into a souvenir, freezes the thing the second it shows up, so Baizhang hits him to knock it back to life. The verse calls the monk a fool stroking the tiger's whiskers, which is what walking up to a master expecting a keepsake amounts to.
'''
