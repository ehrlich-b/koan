title_zh = ""
title_en = "Zhaozhou's Four Gates"

intro_zh = '''
明鏡當臺，妍醜自辨；鏌鎁在手，殺活臨時。漢去胡來，胡來漢去，死中得活，活中得死。且道到這裏，又作麼生？若無透關底眼、轉身處，到這裏灼然不柰何。且道：如何是透關底眼、轉身處？試舉看。

'''
intro_en = '''
A clear mirror on its stand sorts the beautiful from the ugly all on its own. A sharp sword in hand kills or saves at a stroke, as you decide. The foreigner comes, the local goes; the local comes, the foreigner goes. In the middle of death you find life, and in the middle of life, death. So tell me, when you get this far, what then? Without the eye that sees through the barrier, the place where you turn yourself around, you arrive here and plainly there is nothing you can do. So tell me: what is that eye that sees through the barrier? Where is the place you turn around? Let's look at an example.
'''

case_zh = '''
僧問趙州：「如何是趙州？」州云：「東門，西門，南門，北門。」

'''
case_en = '''
A monk asked Zhaozhou, "What is Zhaozhou?"
Zhaozhou said, "East gate, west gate, south gate, north gate."
'''

verse_zh = '''
句裏呈機劈面來，
爍迦羅眼絕纖埃。
東西南北門相對，
無限輪鎚擊不開。

'''
verse_en = '''
Inside the words, the trap springs straight at your face.
The all-seeing eye admits not one speck of dust.
East, west, south, north: the gates stand open, facing out.
A thousand hammers pound, and still they won't give way.
'''

pointer = '''
Zhaozhou is the teacher's name, but it is also the name of the town he lived in, the way a man might be called after his city. So when the monk asks "What is Zhaozhou," he is working both senses at once, the place and the person, fishing for some deep word on the master's true nature. Zhaozhou just hands him the city: east gate, west gate, south gate, north gate, walls and openings on every side, nothing tucked away. The intro keeps mentioning a barrier, the checkpoint you have to pass; the joke is that this town stands wide open in all four directions and a seeker still cannot break in, because he is looking for a hidden door that is not there. The answer is fully plain and fully solid, and that combination is exactly what makes it hard to enter. Zhaozhou's other open-and-shut answers run through this book, all the way to his three turning words at case 96.
'''
