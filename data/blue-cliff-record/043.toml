title_zh = ""
title_en = "Dongshan's No Heat, No Cold"

intro_zh = '''
定乾坤句，萬世共遵；擒虎兕機，千聖莫辨。直下更無纖翳，全機隨處齊彰。要明向上鉗鎚，須是作家爐韛。且道：從上來還有恁麼家風也無？試舉看。

'''
intro_en = '''
One word sets heaven and earth in place, and every age after lives by it. One move traps a tiger, and a thousand sages can't read it. Right here there's not the faintest film on the eye, and the whole works blazes out wherever you turn. To handle the hammer and tongs that point beyond, you have to be a master at the forge and bellows. So tell me: has this been the house style all along? Here's a case. Look.
'''

case_zh = '''
僧問洞山：「寒暑到來，如何迴避？」山云：「何不向無寒暑處去？」僧云：「如何是無寒暑處？」山云：「寒時寒殺闍黎，熱時熱殺闍黎。」

'''
case_en = '''
A monk asked Dongshan, "When cold and heat come, how do I dodge them?"
Dongshan said, "Why not go where there's no cold and no heat?"
The monk said, "Where is there no cold and no heat?"
Dongshan said, "When it's cold, the cold kills you. When it's hot, the heat kills you."
'''

verse_zh = '''
垂手還同萬仞崖，
正偏何必在安排。
琉璃古殿照明月，
忍俊韓獹空上階。

'''
verse_en = '''
He reaches down a hand: still a cliff a thousand feet sheer.
Upright or tilted, why bother arranging them?
The old glazed-tile palace shines under the bright moon.
The clever hound runs the empty steps for nothing.
'''

pointer = '''
Dongshan is a ninth-century master, one of the founders of the Caodong (Soto) line. The monk asks something that sounds practical but is really about suffering: when life turns unbearable, too cold, too hot, how do I get out from under it? Dongshan dangles an exit, go where there is no cold or heat, and the monk bites, asking for the address as if a serene zone existed somewhere off the map. Dongshan slams it: the place with no cold and no heat is inside the cold and the heat. When it is cold, be utterly cold; when it is hot, be utterly hot. No exit, no spectator standing off to the side. The "clever hound" in the verse is the monk's busy mind sprinting up the stairs after an answer and finding the house empty, the same shut door Dongshan offers anyone fishing for an elsewhere.
'''
