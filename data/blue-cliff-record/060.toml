number = 60
slug = ""
title_zh = ""
title_en = "Yunmen's Staff Becomes a Dragon"

intro_zh = '''
諸佛眾生本來無異，山河自己寧有等差？為什麼却渾成兩邊去也？若能撥轉話頭，坐斷要津，放過即不可；若不放過，盡大地不消一揑。且作麼生是撥轉話頭處？試舉看。

'''
intro_en = '''
Buddhas and ordinary people were never two different things. Mountains, rivers, your own self: where is the gap? So why has the whole thing split into two sides? If you can flip the question on its head and sit astride the narrow pass, you cannot let a single thing slip by. And if you let nothing slip by, the whole earth wouldn't make one pinch of dust. So how do you flip the question on its head? Watch.
'''

case_zh = '''
雲門以拄杖示眾云：「拄杖子化為龍，吞却乾坤了也，山河大地甚處得來？」

'''
case_en = '''
Yunmen held up his staff before the assembly and said, "This staff has turned into a dragon and swallowed the whole universe. So where do the mountains, the rivers, the great earth come from?"
'''

verse_zh = '''
拄杖子吞乾坤，
徒說桃花浪奔。
燒尾者不在拏雲攫霧，
曝腮者何必喪膽亡魂。
拈了也，
聞不聞？
直須灑灑落落，
休更紛紛紜紜。
七十二棒且輕恕，
一百五十難放君。
師驀拈拄杖下座，大眾一時走散。

'''
verse_en = '''
The staff swallows the universe.
No use babbling about peach-blossom floods surging by.
The one whose tail burns off won't bother clawing through cloud and fog;
the one left gasping on the bank, why lose his nerve, why lose his soul?
He has held it up.
Do you hear it or not?
Be clean, be clear, let it all drop.
Quit churning the mud, quit the endless fuss.
Seventy-two blows, those I'll let you off lightly.
A hundred and fifty, those you won't get out of.
Then the master suddenly grabbed his staff and stepped down from the seat. The whole crowd scattered at once.
'''

pointer = '''
Yunmen, the fierce tenth-century master of one-line gut-punches, is holding up the staff a teacher always carries, the ordinary prop he reaches for to make a point. His trick: the stick just became a dragon and ate the entire cosmos, so where did all the scenery you're still looking at come from? Either answer is a trap. If everything got swallowed, the question can't be answered; if it didn't, his claim was a lie. The "burning tail" in the verse comes from the legend that a carp leaping the Dragon Gate gets its tail scorched off and turns into a dragon, while the one who fails is left "gasping on the bank." The threatened beatings are imaginary, the kind of stick-talk these teachers love, and Yunmen ends the bit by actually swinging the thing and sending the whole assembly running. The case wants you to notice that the question only has teeth while you stand outside the dragon's mouth looking in.
'''
