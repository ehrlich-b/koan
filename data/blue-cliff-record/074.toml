title_zh = ""
title_en = "Jinniu's Rice Bucket"

intro_zh = '''
鏌鎁橫按，鋒前剪斷葛藤窠；明鏡高懸，句中引出毘盧印。田地穩密處，著衣喫飯；神通遊戲處，如何湊泊？還委悉麼？看取下文。

'''
intro_en = '''
A famous sword swings sideways and shears the tangle of vines clean through. A bright mirror hangs high, and from inside a single phrase the master draws out the seal of truth. On solid, settled ground, you put on your clothes and eat your rice. In the playground of miracles, where do you get a foothold? See it yet? Look at the case below.
'''

case_zh = '''
金牛和尚每至齋時，自將飯桶，於僧堂前作舞，呵呵大笑云：「菩薩子喫飯來！」雪竇云：「雖然如此，金牛不是好心。」僧問長慶：「古人道『菩薩子喫飯來』，意旨如何？」慶云：「大似因齋慶讚。」

'''
case_en = '''
Whenever mealtime came, the monk Jinniu would grab the rice bucket himself, dance around in front of the monks' hall, laugh out loud, and call, "Bodhisattvas, come and eat!"

Xuedou said, "Even so, Jinniu wasn't acting out of kindness."

A monk asked Changqing, "When the old master said, 'Bodhisattvas, come and eat,' what was he getting at?"

Changqing said, "Sounds a lot like throwing a party to celebrate the food."
'''

verse_zh = '''
白雲影裏笑呵呵，
兩手持來付與他。
若是金毛獅子子，
三千里外見誵訛。

'''
verse_en = '''
In the shadow of white clouds he laughs out loud,
lifts it in both hands and serves it over.
A real lion cub, golden-maned,
spots the con from a thousand miles off.
'''

pointer = '''
A formal monastery meal was a silent, ranked, ritualized affair, so Jinniu's daily routine is pure sabotage: he drags out the communal rice bucket, dances a jig, and bellows "Bodhisattvas, come eat!" The warmth is real, and that is exactly what Xuedou and Changqing refuse to let you settle into. "Not out of kindness" and "like throwing a party over lunch" are both needles, testing whether you'll swallow the charming gesture whole or notice it is also a performance with a hook in it. The golden-maned lion cub in the verse is the student sharp enough to enjoy the show and clock the bait at the same time. Generosity and a sales pitch can wear the same face; what does the difference look like from the inside?
'''
