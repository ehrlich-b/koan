slug = ""
title_zh = ""
title_en = "Yunmen's Slap"

intro_zh = '''
透出生死，撥轉機關。等閑截鐵斬釘，隨處蓋天蓋地。且道：是什麼人行履處？試舉看。

'''
intro_en = '''
Break clean through life and death. Throw the switch. Cut iron and slice nails as if it were nothing, and wherever you stand you blanket the sky and cover the earth. So tell me: whose ground is this? Here's a case to test you.
'''

case_zh = '''
雲門問僧：「近離甚處？」僧云：「西禪。」門云：「西禪近日有何言句？」僧展兩手，門打一掌。僧云：「某甲話在。」門却展兩手，僧無語，門便打。

'''
case_en = '''
Yunmen asked a monk, "Where have you just come from?"
The monk said, "Xichan."
Yunmen said, "What has Xichan been saying lately?"
The monk spread both hands.
Yunmen slapped him.
The monk said, "I'm not finished."
So Yunmen spread both hands.
The monk had nothing to say.
Yunmen hit him.
'''

verse_zh = '''
虎頭虎尾一時收，
凜凜威風四百州。
却問不知何太嶮，
師云：「放過一著。」

'''
verse_en = '''
Tiger's head, tiger's tail, seized in a single grab.
His blazing authority overawes four hundred provinces.
He asks back, and the monk never knew how steep the drop.
The master said: I'll let him off one move.
'''

pointer = '''
Yunmen, the tenth-century master known for moves that are over before you see them, is quizzing a traveling monk: where were you, what were they teaching there? The monk just spreads both hands, a wordless "this is it" gesture meant to look like deep understanding. Yunmen slaps him to find out whether anything stands behind the pose. When the monk protests that he wasn't finished, Yunmen turns the empty gesture back on him: now you spread your hands, show me what's actually there. The monk freezes, the bluff is exposed, and the second hit lands. A borrowed gesture can carry real understanding or nothing at all, and the whole point of the slap is that the gesture alone won't tell you which. The verse's "I'll let him off one move" is the commentator winking that Yunmen went easy.
'''
