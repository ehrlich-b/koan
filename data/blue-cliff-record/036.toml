One day Changsha went wandering in the hills. Coming back to the gate, he met the head monk, who asked, "Where have you been?"

"Out walking the hills," said Changsha.

"How far did you get?"

"I set out following the fragrant grasses and came home chasing the fallen blossoms."

The head monk said, "Sounds like spring is really in the air."

"It beats autumn dew dripping off the lotus," said Changsha.

