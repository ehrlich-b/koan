title_zh = ""
title_en = "Guishan Hands It Back"

intro_zh = '''
快人一言，快馬一鞭。萬年一念，一念萬年。要知直截，未舉已前。且道：未舉已前，作麼生摸索？請舉看。

'''
intro_en = '''
A sharp person needs one word, a fast horse one flick of the whip. Ten thousand years are this one instant; this one instant, ten thousand years. If you want to cut straight through, do it before a single word is spoken. So tell me: before anything is said, where do you even start groping for it? Here's the case. Look.
'''

case_zh = '''
溈山、五峯、雲巖同侍立百丈。百丈問溈山：「併却咽喉唇吻，作麼生道？」溈山云：「却請和尚道。」丈云：「我不辭向汝道，恐已後喪我兒孫。」

'''
case_en = '''
Guishan, Wufeng, and Yunyan were all standing in attendance on Baizhang. Baizhang turned to Guishan and asked, "Shut off your throat, your lips, your mouth. Now say it."

Guishan said, "I'd rather you said it, master."

Baizhang said, "I don't mind telling you. But if I do, down the road it'll cost me my heirs."
'''

verse_zh = '''
却請和尚道，
虎頭生角出荒草。
十洲春盡花凋殘，
珊瑚樹林日杲杲。

'''
verse_en = '''
"I'd rather you said it, master"—
a tiger sprouts horns and walks out of the weeds.
Across the ten islands spring runs out, the blossoms fall and rot,
yet the coral forest stands blazing in the sun.
'''

pointer = '''
Baizhang is a famous Tang teacher; Guishan, Wufeng, and Yunyan are his students, lined up waiting on him. The whole pressure sits in the question: shut off your throat, lips, and mouth, now say it. Show me your understanding without any of the machinery you'd normally talk with. Guishan neither takes the bait nor fumbles. He bounces it straight back: you say it, master. Baizhang's reply is half praise, half warning, that if he spelled it out his whole future lineage would lose the chance to find it for themselves. This is the first of three back-to-back tests; the same question goes to Wufeng and Yunyan in the next two cases (71, 72), and the fun is watching three good monks dodge one impossible demand three different ways.
'''
