title_zh = ""
title_en = "Mazu's Wild Ducks"

intro_zh = '''
遍界不藏，全機獨露。觸途無滯，著著有出身之機；句下無私，頭頭有殺人之意。且道：古人畢竟向什麼處休歇？試舉看。

'''
intro_en = '''
Across the whole universe, nothing is hidden. The entire works stands bare and alone. Whatever road you take, no snag, no stall: every move opens a way through. Under every word, nothing held back: every phrase carries the will to kill. So tell me, where does the old master finally come to rest? Here's a case to chew on.
'''

case_zh = '''
馬大師與百丈行次，見野鴨子飛過。大師云：「是什麼？」丈云：「野鴨子。」大師云：「什麼處去也？」丈云：「飛過去也。」大師遂扭百丈鼻頭，丈作忍痛聲。大師云：「何曾飛去！」

'''
case_en = '''
Mazu was out walking with Baizhang. A wild duck flew past.
Mazu said, "What's that?"
Baizhang said, "A wild duck."
Mazu said, "Where did it go?"
Baizhang said, "Flew away."
Mazu reached over and twisted Baizhang's nose. Baizhang yelped.
Mazu said, "When did it ever fly away?"
'''

verse_zh = '''
野鴨子，
知何許？
馬祖見來相共語。
話盡山雲海月情，
依前不會還飛去。
欲飛去，
却把住，
道道。

'''
verse_en = '''
A wild duck.
Who knows how far?
Mazu sees it, and they fall to talking.
He has said it all: mountain clouds, sea moon, the whole feeling,
and still Baizhang misses it. Off it flies again.
About to fly off,
he seizes and holds him fast.
Speak! Speak!
'''

pointer = '''
Mazu is one of the great Tang teachers, the source of much of this whole tradition; Baizhang is his student, walking beside him when a wild duck flies past. Baizhang answers the way anyone would: it's a duck, it flew away. That "flew away" is the slip. His attention chased the bird off into the distance, abandoning the spot where he actually stands. So Mazu twists his nose, real pain right here and now, and asks when it ever flew anywhere. The case isn't a riddle about ducks. It's about how easily the mind follows the moving thing out the door, and how the only place anything is ever happening is the one you just left. You'll meet the same lesson when Mazu reappears in case 73, scattering a monk's careful logic.
'''
