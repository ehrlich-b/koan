slug = ""
title_zh = ""
title_en = "Dasui's Kalpa Fire"

intro_zh = '''
魚行水濁，鳥飛毛落。明辨主賓，洞分緇素，直似當臺明鏡，掌內明珠。漢現胡來，聲彰色顯。且道為什麼如此？試舉看。

'''
intro_en = '''
A fish swims and the water clouds. A bird flies and a feather falls. Tell host from guest clearly; sort black from white at a glance. Like a bright mirror on its stand, like a pearl in the palm: when a foreigner comes, he appears; when a local comes, he appears. Sound rings out, color stands plain. So tell me, why is it like this? Here is a case to test you.
'''

case_zh = '''
僧問大隋：「劫火洞然，大千俱壞，未審這箇壞不壞？」隋云：「壞。」僧云：「恁麼則隨他去也？」隋云：「隨他去。」

'''
case_en = '''
A monk asked Dasui, "When the fire at the end of the age blazes through and the whole universe burns away, does this perish too, or not?"

Dasui said, "It perishes."

The monk said, "Then it just goes along with everything else?"

Dasui said, "It goes along with everything else."
'''

verse_zh = '''
劫火光中立問端，
衲僧猶滯兩重關。
可憐一句隨他語，
萬里區區獨往還。

'''
verse_en = '''
In the blaze of the world-ending fire he sets his question;
the monk hangs still at the double barrier.
Pity that one line, "it goes along with the rest,"
sending him ten thousand miles, off and back, alone.
'''

pointer = '''
Buddhist cosmology runs the universe in enormous cycles, each ending in a kalpa fire that burns away every world and every heaven. The whole charge of the question is in the monk's word "this," by which he means your true nature, the buddha-mind teachers keep calling indestructible. So it is a setup: if even that incinerates, what was any of it for? Dasui will not answer the way the monk is steering him. He just says yes, it perishes, it goes along with everything. The monk leaves chewing, and the verse needles him for it: he took one flat reply and turned it into a ten-thousand-mile search for a hidden meaning that was never hidden anywhere. The flatness is the answer, not a clue toward one.
'''
