title_zh = ""
title_en = "Panshan: No Mind to Find"

intro_zh = '''
掣電之機，徒勞佇思。當空霹靂，掩耳難諧。腦門上播紅旗，耳背後輪雙劍，若不是眼辨手親，爭能搆得？有般底，低頭佇思，意根下卜度，殊不知髑髏前見鬼無數。且道不落意根、不抱得失，忽有箇恁麼舉覺，作麼生祗對？試舉看。

'''
intro_en = '''
A flash of lightning leaves no time to think it over. A thunderclap right overhead, and you can't cover your ears in time. A red flag waves on the crown of your head; twin swords spin behind your ears. If your eye isn't sharp and your hand isn't sure, how could you ever grab hold? There's a kind of person who drops his head and chews it over, who weighs and measures it down in the gut, never realizing he sees nothing but ghosts swarming in front of a skull. Now tell me: without falling into the thinking mind, without clutching at gain and loss, if someone suddenly throws out a line like this, how do you answer? Here's a case to test you.
'''

case_zh = '''
盤山垂語云：「三界無法，何處求心？」

'''
case_en = '''
Panshan put it out there: "In the three worlds there is no thing. Where will you look for mind?"
'''

verse_zh = '''
三界無法，
何處求心。
白雲為蓋，
流泉作琴。
一曲兩曲無人會，
雨過夜塘秋水深。

'''
verse_en = '''
The three worlds, empty,
where do you look for mind?
White clouds for a canopy,
a running stream for a lute.
One song, two songs, and no one understands,
rain past, the night pond, deep autumn water.
'''

pointer = '''
Panshan is a Tang teacher, and this is not a dialogue, just one line he tossed into the room: "In the three worlds there is no thing. Where will you look for mind?" The three worlds is the Buddhist name for the whole of existence, everything you could point at. The line is a trap in two beats. First he pulls the floor: nothing out there is solid. Then he asks where you intend to go hunting for mind. With no world, there is no inside-the-skull location to find a mind in either, so any answer that sets off searching has already lost. The verse drops the logic and just shows what the line points at, clouds, a stream, a tune nobody decodes, rain ending over a still pond. Nothing to seize, nothing absent.
'''
