title_zh = ""
title_en = "Zhaozhou's Great Death"

intro_zh = '''
是非交結處，聖亦不能知；逆順縱橫時，佛亦不能辨。為絕世超倫之士，顯逸群大士之能，向氷凌上行，劍刃上走，直下如麒麟頭角，似火裏蓮花。宛見超方，始知同道。誰是好手者？試舉看。

'''
intro_en = '''
Where right and wrong tangle together, even a sage can't tell them apart. When for and against run loose in every direction, even a buddha can't sort it out. It takes someone past the ordinary, a giant who stands clear of the crowd, to show what he can do: walking on a sheet of ice, running along a sword's edge. Straight off he's the unicorn's single horn, the lotus blooming in fire. Now you glimpse one who has gone beyond, and you know he walks the same road. Who has the skill? Here's a case. Take a look.
'''

case_zh = '''
趙州問投子：「大死底人却活時如何？」投子云：「不許夜行，投明須到。」

'''
case_en = '''
Zhaozhou asked Touzi, "The man who has died the great death comes back to life. What then?"

Touzi said, "No traveling by night. Get there in daylight."
'''

verse_zh = '''
活中有眼還同死，
藥忌何須鑒作家。
古佛尚言會未到，
不知誰解撒塵沙。

'''
verse_en = '''
Alive, with eyes, and still as good as dead.
Why test a master against forbidden cures?
Even the old buddhas said they had not arrived.
Who knows how to scatter dust and sand?
'''

pointer = '''
Zhaozhou and Touzi are two ninth-century masters taking each other's measure. "The great death" is Chan shorthand for total ego-collapse, every fixed idea of who you are dropped. Zhaozhou's question carries the trap: if you have truly died like that, what is left to come back to life? It wears the costume of a riddle about the afterlife, but it is really a test of whether Touzi will snag on the words. He doesn't. "No traveling by night, get there in daylight" means don't sneak around in the dark with a clever answer, come into the open and take the long honest road. The verse's "forbidden cures" points the same way: a real hand knows which moves are off-limits and refuses the cheap shortcut, even when the shortcut would dazzle.
'''
