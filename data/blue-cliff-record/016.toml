slug = ""
title_zh = ""
title_en = "Jingqing's Man in the Weeds"

intro_zh = '''
道無橫徑，立者孤危。法非見聞，言思逈絕。若能透過荊棘林，解開佛祖縛，得箇穩密田地，諸天捧花無路，外道潛窺無門。終日行而未甞行，終日說而未甞說，便可以自由自在，展啐啄之機，用殺活之劍。直饒恁麼，更須知有建化門中一手擡一手搦，猶較些子。若是本分事上，且得沒交涉。作麼生是本分事？試舉看。

'''
intro_en = '''
The Way has no shortcut. Stand on it alone and you are exposed. The Dharma is nothing you can see or hear; words and thoughts never reach it. Cut through the thornbush, untie the knots the buddhas and ancestors tied, find the solid ground under your feet, and the gods can find no path to shower you with flowers, outsiders no crack to spy through. All day you act without ever acting, all day you speak without ever speaking. Then you are free. You can work the trigger where chick and hen peck at once, wield the sword that kills and the sword that gives life. Even so, you still must know there is a way of teaching where one hand lifts up and one hand holds down, and even that falls a little short. As for the real thing, none of this so much as touches it. So what is the real thing? Here is a case to test you.
'''

case_zh = '''
僧問鏡清：「學人啐，請師啄。」清云：「還得活也無？」僧云：「若不活，遭人怪笑。」清云：「也是草裏漢。」

'''
case_en = '''
A monk said to Jingqing, "The student is pecking from inside. Master, peck from outside."
Jingqing said, "Will it come out alive or not?"
The monk said, "If it doesn't, people will laugh at me."
Jingqing said, "Still just a man down in the weeds."
'''

verse_zh = '''
古佛有家風，
對揚遭貶剝。
子母不相知，
是誰同啐啄？
啄覺，
猶在殼，
重遭撲。
天下衲僧徒名邈。

'''
verse_en = '''
The old buddhas had a family style:
speak up wrong and you are cut down.
Chick and hen never know each other,
so who is it that pecks together?
The peck registers,
yet he is still in the shell.
Struck again.
Monks everywhere only chase the name.
'''

pointer = '''
A chick about to hatch pecks the shell from inside while the hen pecks from outside, and Chan teachers loved the picture: real awakening is student and teacher breaking through at the very same instant, neither one managing it alone. So when the monk frames his question that way, "I am pecking, master, you peck too," he is advertising that he knows the metaphor, which is the trap closing. Jingqing probes him: will this thing actually come out alive? The monk slides off into worrying about looking foolish if it does not, and Jingqing pins him with "a man down in the weeds," lost in the underbrush, all talk and nowhere near cracking the shell. He had the script word-perfect, but nothing was being born inside it. Knowing the image of hatching is not the same as hatching.
'''
