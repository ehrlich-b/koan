case_zh = '''
南泉復舉前話，問趙州。州便脫草鞋，於頭上戴出。南泉云：「子若在，恰救得猫兒。」

'''
case_en = '''
Nanquan raised the earlier matter again, this time putting it to Zhaozhou. Zhaozhou took off his sandals, set them on his head, and walked out.

Nanquan said, "If you'd been there, you'd have saved the cat."
'''

verse_zh = '''
公案圓來問趙州，
長安城裏任閑遊。
草鞋頭戴無人會，
歸到家山即便休。

'''
verse_en = '''
The case comes round; go ask Zhaozhou.
Through the great city he wanders as he pleases.
Sandals on his head, and no one understands.
He returns to his own mountain, and the matter rests.
'''

pointer = '''
This is part two, and you need part one (case 63). The day before, the monks of two halls were fighting over a cat, Nanquan held it up with a knife and said "say the right word and I'll spare it," nobody could, and he cut it in two. That night he told Zhaozhou the story, and Zhaozhou's reply was to put his sandals on his head and walk out, which Nanquan said would have saved the cat. So what do shoes on a skull have to do with anything? That's the whole move: it's an answer that refuses to play the "produce the magic word" game the dead monks lost. Don't translate the sandals into a tidy meaning, because doing that is the same mistake that killed the cat. Watch instead how Zhaozhou steps clean around the demand for a correct verbal answer on cue.
'''
