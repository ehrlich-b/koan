pointer = '''
Same famous line as the case before it: the Great Way isn't hard, it just won't put up with picking and choosing, the opening of a well-worn Zen poem about dropping the habit of sorting everything into like and dislike. By Zhaozhou's day the line was a greatest hit, quoted so often it had hardened into a slogan people could hide behind. So the monk sets a sly trap: isn't that very quote just another cozy den you crawl into to dodge the real work? Agree and he's snared you, defend the line and you're stuck inside the den he named. Zhaozhou takes neither door. Instead of arguing he admits that someone pinned him with this same question five years back and he still can't talk his way out, which, from the sharpest tongue in Chan, is itself the move; he won't perform an answer to prove he's free of the trap. The verse closes on the crow and the rabbit, old shorthand for sun and moon: while you debate the slogan, the days are flying.
'''
