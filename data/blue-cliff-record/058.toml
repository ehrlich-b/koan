case_en = '''
A monk said to Zhaozhou, "'The Great Way isn't hard, it just won't put up with picking and choosing.' Isn't that line a den people crawl into and hide?"
Zhaozhou said, "Somebody asked me that once. Five years on, I still can't talk my way out of it."
