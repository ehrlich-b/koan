case_zh = '''
南泉參百丈涅槃和尚。丈問：「從上諸聖，還有不為人說底法麼？」泉云：「有。」丈云：「作麼生是不為人說底法？」泉云：「不是心，不是佛，不是物。」丈云：「說了也。」泉云：「某甲只恁麼，和尚作麼生？」丈云：「我又不是大善知識，爭知有說不說？」泉云：「某甲不會。」丈云：「我太殺為爾說了也。」

'''
case_en = '''
Nanquan went to study with Baizhang of Mount Nirvana.

Baizhang asked, "Of all the sages down the ages, is there a teaching none of them ever preached to anyone?"

"There is," Nanquan said.

"What is this teaching nobody ever preached?"

"Not mind, not Buddha, not a thing."

"You just preached it," Baizhang said.

"That's the best I can do. What about you?"

"I'm no great teacher," said Baizhang. "How would I know what's been preached and what hasn't?"

"I don't follow," Nanquan said.

"There. I've already said far too much for you."
'''

verse_zh = '''
祖佛從來不為人，
衲僧今古競頭走。
明鏡當臺列像殊，
一一面南看北斗。
斗柄垂，
無處討，
拈得鼻孔失却口。

'''
verse_en = '''
The buddhas and ancestors never preached a word,
yet monks past and present race to lay hold of it.
A bright mirror on its stand throws back every shape;
each one faces south to look for the North Star.
The Dipper's handle hangs down—
nowhere to search.
Grab the nose and you lose the mouth.
'''

pointer = '''
Two Tang teachers, Nanquan and Baizhang, fence over a baited question: is there some teaching the old sages held back and never spoke? Nanquan says yes, then names it, "not mind, not Buddha, not a thing," and Baizhang springs the trap instantly: you just preached it. The point they are playing is that the deepest matter goes dead the moment it becomes a sentence; say it and it is no longer the unsaid thing. Then watch the volley reverse. Baizhang's "how would I know what's been preached" and Nanquan's "I don't follow" are not admissions, they are moves, each one handing the trap back. The verse's last line, grab the nose and you lose the mouth, is the whole lesson: clamp onto one piece and the rest slips off, you can't hold all of it at once.
'''
