title_zh = ""
title_en = "The Fish That Broke the Net"

intro_zh = '''
七穿八穴，攙鼓奪旗，百匝千重，瞻前顧後。踞虎頭，收虎尾，未是作家；牛頭沒，馬頭回，亦未為奇特。且道：過量底人來時如何？試舉看。

'''
intro_en = '''
Punch holes everywhere, seize the drum and steal the flag, lay down a thousand layers of defense, watch the front while guarding the rear. Sit on the tiger's head and grab its tail, and you're still no master. Ox-head vanishes, horse-head turns back: still nothing special. So tell me, when someone who's off the charts walks in, what then? Here's a case to test you.
'''

case_zh = '''
三聖問雪峯：「透網金鱗，未審以何為食？」峯云：「待汝出網來向汝道。」聖云：「一千五百人善知識，話頭也不識。」峯云：「老僧住持事繁。」

'''
case_en = '''
Sansheng asked Xuefeng, "The golden fish that broke through the net. What does it eat?"

Xuefeng said, "Break out of the net yourself, and I'll tell you."

Sansheng said, "Some teacher you are. Head of fifteen hundred monks, and you can't even follow a conversation."

Xuefeng said, "Running this monastery keeps me busy."
'''

verse_zh = '''
透網金鱗，
休云滯水。
搖乾蕩坤，
振鬣擺尾。
千尺鯨噴洪浪飛，
一聲雷震清飈起。
清飈起，
天上人間知幾幾。

'''
verse_en = '''
The golden fish that broke the net,
don't tell me it stays stuck in the shallows.
It rocks the heavens, churns the earth,
shakes its mane and lashes its tail.
A thousand-foot whale blows, the great waves fly;
one crack of thunder, a clean wind rises.
The clean wind rises:
heaven above, the human world below, who can say how many know?
'''

pointer = '''
Sansheng was a sharp heir of Linji; Xuefeng was a famous Tang master who by report led some fifteen hundred monks. "The golden fish that broke through the net" is a stock image for someone who has blown past every trap, doctrine and enlightenment and the whole catch, and now swims free. So the question is a brag wearing a question's clothes: I'm that fish, what's left to feed someone like me? Xuefeng refuses to feed the ego instead ("break out first, then we'll talk"), Sansheng insults him, and Xuefeng shrugs it off with "I'm busy running this place." This is two masters trading blows at full speed, and the genuine difficulty is that you cannot score it. The fun of the case is sitting with the fact that there's no loser to point to.
'''
