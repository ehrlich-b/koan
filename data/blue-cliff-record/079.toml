title_en = "Touzi's \"Everything Is the Buddha's Voice\""

intro_zh = '''
大用現前，不存軌則，活捉生擒，不勞餘力。且道是什麼人，曾恁麼來？試舉看。

'''
intro_en = '''
When the great function shows itself, it keeps to no rulebook. It takes you alive, pins you down, and never breaks a sweat. So tell me: who is this person? Who ever walked in like that? Here's a case. Watch.
'''

case_zh = '''
僧問投子：「一切聲是佛聲，是否？」投子云：「是。」僧云：「和尚莫㞘沸碗鳴聲。」投子便打。又問：「麁言及細語，皆歸第一義，是否？」投子云：「是。」僧云：「喚和尚作一頭驢得麼？」投子便打。

'''
case_en = '''
A monk asked Touzi, "Is every sound the voice of the Buddha?"

Touzi said, "It is."

The monk said, "Then quit rattling on like a pot boiling over, Master."

Touzi hit him.

The monk tried again. "Coarse words, fine words, all of it comes back to the one ultimate truth. Right?"

Touzi said, "Right."

The monk said, "So I could call you a jackass, Master?"

Touzi hit him.
'''

verse_zh = '''
投子投子，
機輪無阻。
放一得二，
同彼同此。
可憐無限弄潮人，
畢竟還落潮中死。
忽然活，
百川倒流閙𣽅𣽅。

'''
verse_en = '''
Touzi! Touzi!
The gears turn, never catching.
Hand him one, he hands back two,
the same here, the same there.
Pity the endless surfers riding the swells,
who fall in at last and drown.
Then, all at once, alive!
A hundred rivers run backward, roaring,
roaring.
'''

pointer = '''
Touzi (819–914) was a Tang master known for short, deadpan replies. The monk thinks he has rigged a trap: if Touzi agrees that every sound is the Buddha's voice, then Touzi's own chatter is hot air, and even calling him a jackass should count as holy speech. It is the oldest move in the book, turning the teacher's premise against him to win the point. Touzi does not argue, he just hits the kid both times, because the monk is running a tidy syllogism while completely missing the thing he is quoting. The doctrine was never an argument to be won; it was an invitation to actually hear, which the monk is too busy scoring to do. The verse cheers Touzi as a machine whose gears never jam and mocks the clever surfers who ride these slick paradoxes right up until the wave drowns them.
'''
