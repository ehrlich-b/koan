number = 27
slug = ""
title_zh = ""
title_en = "Yunmen's Withered Tree"

intro_zh = '''
問一答十，舉一明三，見兔放鷹，因風吹火。不惜眉毛則且置，只如入虎穴時如何？試舉看。

'''
intro_en = '''
Ask one thing, get ten back. Raise one corner, the other three light up. Spot the rabbit, loose the hawk. Use the wind to fan the fire. The ones who'll risk their own eyebrows to do it we'll set aside for now. But the moment you walk into the tiger's den, what then? Let's look.
'''

case_zh = '''
僧問雲門：「樹凋葉落時如何？」雲門云：「體露金風。」

'''
case_en = '''
A monk asked Yunmen, "What about when the tree withers and the leaves fall?"
Yunmen said, "Body laid bare in the autumn wind."
'''

verse_zh = '''
問既有宗，
答亦攸仝。
三句可辨，
一鏃遼空。
大野兮涼飈颯颯，
長天兮疎雨濛濛。
君不見少林久坐未歸客，
靜依熊耳一叢叢。

'''
verse_en = '''
The question had its point,
the answer met it dead-on.
Three phrases, sharp and clear,
one arrow gone into the sky.
Across the great plain, the cold wind howls;
down the long sky, the thin rain drifts.
Don't you see the long-sitting guest at Shaolin who never went home,
still quiet, settled on Bear's Ear Mountain, clump on clump.
'''

pointer = '''
Yunmen, the tenth-century master whose calling card is the surprising one-liner, gets a question that only sounds seasonal. "When the tree withers and the leaves fall" means: when everything you've propped yourself up with falls away, every idea and support stripped off. The monk is braced for consolation about loss. Yunmen gives him the opposite. The autumn wind in his answer is the thing doing the stripping, and what it leaves is the tree's actual shape, laid bare. Being stripped down to that bare shape is the revelation, not the disaster the monk feared. The verse closes on Bodhidharma, who supposedly sat facing a wall nine years at Shaolin and now rests on Bear's Ear Mountain, as the picture of someone wholly exposed and entirely at home in it.
'''
