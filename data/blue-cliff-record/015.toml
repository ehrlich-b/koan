'''
case_en = '''
A monk asked Yunmen, "What about when it's not the thing in front of you, and not the matter in front of you either?"
Yunmen said, "Upside down."
'''

verse_zh = '''
倒一說，
分一節。
同死同生為君訣。
八萬四千非鳳毛，
三十三人入虎穴。
別，別！
擾擾怱怱水裏月。

'''
verse_en = '''
Upside down —
he splits it clean in two.
Live together, die together: that's the bargain he strikes with you.
Eighty-four thousand of them, and not one a phoenix feather;
thirty-three step straight into the tiger's den.
Look! Look!
A churning, racing world, and the moon down in the water.
'''

pointer = '''
Yunmen Wenyan (864–949) was the Five Dynasties master famous for single words that knock a questioner sideways, and you just met one in the case before this. Here the monk tries to be subtle: he asks about what lies beyond "the thing in front of you" and beyond "the matter in front of you," angling for a grand word about the absolute, the deep stuff that is not mere everyday experience. Yunmen flips him over with one stroke, "Upside down." By straining past what is right here to reach some special "beyond," the monk has the whole thing inverted. The verse runs with it, masters leading students to live and die together, and lands on the moon shaking in churning water: the real thing is in the ordinary, not in an elsewhere you have to go fetch. Check where you put the "beyond," and whether the search itself is the inversion.
'''
