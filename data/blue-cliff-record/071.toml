case_zh = '''
百丈復問五峯，併却咽喉唇吻，作麼生道？峯云：「和尚也須併却。」丈云：「無人處斫額望汝。」

'''
case_en = '''
Baizhang put the same question to Wufeng: "Throat shut, lips shut, mouth shut — now talk."
Wufeng said, "Then you'd better shut yours too, teacher."
Baizhang said, "Out where there's nobody, I'll shade my eyes and watch for you."
'''

verse_zh = '''
和尚也併却，
龍蛇陣上看謀略。
令人長憶李將軍，
萬里天邊飛一鶚。

'''
verse_en = '''
"You shut yours too" —
on the field where dragons and snakes coil, watch the strategy.
It calls to mind old General Li:
one hawk cutting alone across the endless sky.
'''

pointer = '''
Second of the three monks Baizhang hits with the same trick (cases 70–72). The demand: speak with throat, lips, and mouth all clamped shut, meaning say the real thing without the usual apparatus of saying it. Freeze or start explaining and you've already flunked. Wufeng goes sideways and lobs it back at the boss: then you'd better shut yours too. Baizhang's reply is half praise, half jab, picture a coach shading his eyes to track the kid who just bolted past the whole field. The verse caps it with Li Guang, the Han "Flying General" and famed archer, a lone hawk cutting across the sky: Wufeng didn't wrestle the question to the ground, he flew clean over it.
'''
