intro_zh = '''
以無師智，發無作妙用；以無緣慈，作不請勝友。向一句下，有殺有活；於一機中，有縱有擒。且道：什麼人曾恁麼來？試舉看。

'''
intro_en = '''
With a wisdom no one taught him, he sets loose a flawless working that does nothing. With a kindness owed to no one, he turns up as the best friend you never called for. In a single phrase he can kill, he can revive. In a single move he can let go, he can pin down. So tell me: who has ever come this way? Here's a case. Look.
'''

case_zh = '''
雲門示眾云：「乾坤之內，宇宙之間，中有一寶，祕在形山。拈燈籠向佛殿裏，將三門來燈籠上。」

'''
case_en = '''
Yunmen spoke to the assembly: "Inside heaven and earth, in the midst of all space, there is one treasure, hidden in the mountain of the body. Take a lantern, carry it into the Buddha hall, and bring the temple gate. Set it on the lantern."
'''

verse_zh = '''
看看，
古岸何人把釣竿？
雲冉冉，
水漫漫，
明月蘆花君自看。

'''
verse_en = '''
Look. Look.
On the old bank, who holds the fishing rod?
Clouds drift on,
water runs wide.
Bright moon, reed flowers: see for yourself.
'''

pointer = '''
Yunmen, the blunt tenth-century master, is teaching the monks and starts by quoting an old line: a treasure hidden in the mountain of the body, the idea that what you're hunting for is already inside you rather than out there to be found. Then he goes haywire on purpose. Grab the lantern, carry it into the Buddha hall, and stick the giant temple gate on top of it. That's nonsense by design. The bait is to treat it as a riddle with a buried answer, and there isn't one. The point is that the "treasure" can't be located, packaged, or explained; the instant you reach for it as a thing among things, you've stepped over it. The verse doesn't decode anything either. It puts a fishing rod in your hands on an empty bank and tells you to look at the moon and the reeds yourself.
'''
