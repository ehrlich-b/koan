'''
verse_en = '''
He won't perch on the lonely peak, and that is what makes the way run high.
To fish the ocean you need a hook that lands the giant turtle.
Funny, old Guanxi, working the same ground in the same days,
called it "splitting arrows." All that effort, and for nothing.
'''

pointer = '''
Zhaozhou is one of the most quoted Tang masters, and the town he lived in carried his name and was known for a grand stone bridge. The monk is a smart-aleck testing him: I came all this way for the legendary Zhaozhou, and all I find are some plain stepping-stones. Zhaozhou doesn't get defensive and doesn't take the dig. He flips it. Sure, it's a humble bridge, and that humble bridge carries every donkey and horse across, no questions asked. The grand thing isn't a monument you admire; it's whatever quietly bears all the traffic, including the rude monk standing on it. The verse adds that a real master won't pose on some lonely unreachable summit, and Zhaozhou's hook is big enough to land anyone. The jab at "old Guanxi," a contemporary teacher whose famous arrow-splitting trick the verse calls wasted effort, is just there to make Zhaozhou look better by comparison.
'''
