case_zh = '''
僧問趙州：「久響趙州石橋，到來只見略彴。」州云：「汝只見略彴，且不見石橋。」僧云：「如何是石橋？」州云：「渡驢渡馬。」

'''
case_en = '''
A monk said to Zhaozhou, "The stone bridge of Zhaozhou is famous everywhere. I get here and all I see is a row of stepping-stones."

Zhaozhou said, "You see the stepping-stones. You don't see the stone bridge."

The monk said, "Then what is the stone bridge?"

Zhaozhou said, "It carries donkeys across. It carries horses across."
'''

verse_zh = '''
