intro_zh = '''
未透得已前，一似銀山鐵壁；及乎透得了，自己元來是鐵壁銀山。或有人問，且作麼生？但向他道：若尚箇裏，露得一機，看得一境，坐斷要津，不通凡聖，未為分外。苟或未然，看取古人樣子。

'''
intro_en = '''
Before you break through, it's a wall of silver, a mountain of iron. Once you break through, you find out you were the iron wall and the silver mountain all along. Suppose someone asks how that works. Just tell him: if right here you can show one move, see through one scene, sit astride the throat of the road and let nothing pass, neither the ordinary nor the holy, that's still nothing special. And if you can't manage even that? Then take a good look at how the old masters did it.
'''

case_zh = '''
僧問趙州：「至道無難，唯嫌揀擇，如何是不揀擇？」州云：「天上天下，唯我獨尊。」僧云：「此猶是揀擇。」州云：「田厙奴，什麼處是揀擇？」僧無語。

'''
case_en = '''
A monk asked Zhaozhou, "'The Great Way isn't hard; it only hates picking and choosing.' So what is not picking and choosing?"
Zhaozhou said, "Above the heavens, below the heavens, I alone am the honored one."
The monk said, "That's still picking and choosing."
Zhaozhou said, "You hick. Where's the picking and choosing?"
The monk had nothing to say.
'''

verse_zh = '''
似海之深，
如山之固。
蚊虻弄空裏猛風，
螻蟻撼於鐵柱。
揀兮擇兮，
當軒布鼓。

'''
verse_en = '''
Deep as the sea,
firm as the mountain.
A gnat batting at the gale,
an ant out to topple an iron pillar.
Picking, choosing—
a cloth drum thumped at the gate.
'''

pointer = '''
Zhaozhou is the Tang master of short, lethal answers. The monk quotes a line every student knew cold, the opening of an old poem: the Great Way isn't hard, it only hates picking and choosing, meaning quit sorting everything into yes and no, like and dislike. Then he springs the trap. Ask "so what is not picking and choosing?" and any answer you give is itself a choice, a this rather than that. Zhaozhou first lobs out the line the newborn Buddha supposedly said, "I alone am the honored one," which sounds like the loudest possible playing of favorites. When the monk pounces ("see, you're choosing too"), Zhaozhou wheels on him and dares him to put a finger on where the choosing actually is, and the monk goes silent. The verse's painted drum is the kicker: a drum painted on a wall makes no sound, and the monk's clever objection was all picture, no noise. This is the first of four cases (57–59) that all worry the same line; watch how differently Zhaozhou plays it each time.
'''
