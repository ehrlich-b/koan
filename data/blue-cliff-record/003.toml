title_en = "Mazu's Sun-Face, Moon-Face"

intro_zh = '''
一機一境，一言一句，且圖有箇入處，好肉上剜瘡，成窠成窟。大用現前，不存軌則，且圖知有向上事，蓋天蓋地，又摸索不著。恁麼也得，不恁麼也得，太廉纖生；恁麼也不得，不恁麼也不得，太孤危生。不涉二塗，如何即是？請試舉看。

'''
intro_en = '''
One move, one setting. One word, one line. They offer a way in, but it's like cutting into healthy skin to open a wound. From that, whole nests and dens get built. Then the great function arrives and obeys no rule at all, just to let you know there is something higher. It covers heaven, covers earth, and still you can't lay a hand on it.

Say it this way, fine. Say it that way, fine. Too slippery, too soft. Don't say it this way, don't say it that way. Too steep, too dangerous. Take neither road. Then what? Let's put it to the test. Watch.
'''

case_zh = '''
馬大師不安，院主問：「和尚近日尊候如何？」大師云：「日面佛，月面佛。」

'''
case_en = '''
Master Mazu was ill. The head monk asked, "How are you feeling these days, Master?"

Mazu said, "Sun-Face Buddha. Moon-Face Buddha."
'''

verse_zh = '''
日面佛，月面佛，五帝三皇是何物？二十年來曾苦辛，為君幾下蒼龍窟。屈堪述，明眼衲僧莫輕忽。

'''
verse_en = '''
Sun-Face Buddha, Moon-Face Buddha—
what were the old emperors and sage-kings worth?
Twenty bitter years I struggled,
went down into the blue dragon's cave for you, time and again.
What I went through, no telling it.
Clear-eyed monk, don't pass it by.
'''

pointer = '''
Mazu (709–788) was one of the great early teachers, the source of much of the lineage that fills this book, known for blunt answers that jolt. Here he is on his deathbed and his head monk asks the ordinary, tender thing: how are you holding up? The two names he throws back come straight from a Buddhist scripture, where Sun-Face Buddha lives eighteen hundred years and Moon-Face Buddha lives a single day and night. Setting them side by side flattens the longest life and the shortest into one breath, so a dying man is treating his own fading as no special event, no different from a buddha who lasts an age or a buddha gone by morning. Xuedou's verse then looks back at how long he himself wrestled this single line, the "blue dragon's cave" being the fierce hidden thing he kept diving after, and warns against skimming it. So how long do you have, and does the number change anything.
'''
