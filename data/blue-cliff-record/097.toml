title_zh = ""
title_en = "The Diamond Sutra's Scorn"

intro_zh = '''
拈一放一，未是作家；舉一明三，猶乖宗旨。直得天地𨺗變，四方絕唱，雷奔電馳，雲行雨驟，傾湫倒嶽，甕瀉盆傾，也未提得一半在。還有解轉天關、能移地軸底麼？試舉看。

'''
intro_en = '''
Pick one up, set one down: that is not yet a master at work. Raise one corner and grasp the other three, and you have already missed the point. Though heaven and earth turn inside out, though every voice in the four directions falls silent, though thunder cracks and lightning streaks, clouds roll and rain comes down in sheets, lakes tip over and mountains topple, jars and basins pour out their water, still you have not said the half of it. Is there anyone who can throw the bolt on heaven's gate and swing the axis the earth turns on? Let's see.
'''

case_zh = '''
金剛經云：「若為人輕賤，是人先世罪業應墮惡道，以今世人輕賤故，先世罪業則為消滅。」

'''
case_en = '''
The Diamond Sutra says: "If a man is treated with contempt, it is because crimes from a former life should have dropped him into the lower realms. But because people scorn him in this life, the crimes of that former life are wiped clean."
'''

verse_zh = '''
明珠在掌，
有功者賞。
胡漢不來，
全無技倆。
伎倆既無，
波旬失途。
瞿曇瞿曇，
識我也無？

'''
verse_en = '''
The bright pearl rests in your palm.
Earn it, the prize is yours.
No foreigner comes, no native comes,
nothing left to show off.
And once the tricks run out,
the devil loses the trail.
Old Buddha, old Buddha,
do you even know me?
'''

pointer = '''
The Diamond Sutra is one of the most famous Buddhist scriptures, and this line is a real head-scratcher: if you are getting kicked around in this life, that is good news, your old bad karma burning off cheap so you dodge a far worse rebirth. The puzzle the case plays with is how an insult can be a reward and what it even means for "crimes" to vanish. In the verse, "the bright pearl in your palm" is your own true nature, already yours, nothing to go acquire. "Foreigner" and "native," literally Hu and Han, just means anybody at all, and when no one shows up to test you there is nothing left to perform. "The devil" is Mara, the tempter, who loses the trail once you have nothing left to defend, since temptation needs something you are still clutching. The last line needles the Buddha himself: even Gautama might not recognize this self with no handle on it. Being despised as good fortune only stops sounding like a riddle once there is no one left inside to be insulted.
'''
