title_zh = ""
title_en = "Muzhou's Empty-Headed Phony"

intro_zh = '''
恁麼恁麼，不恁麼不恁麼。若論戰也，箇箇立在轉處。所以道：若向上轉去，直得釋迦彌勒、文殊普賢、千聖萬聖、天下宗師，普皆飲氣吞聲；若向下轉去，醯雞蠛蠓、蠢動含靈，一一放大光明，一一壁立萬仞。儻或不上不下，又作麼生商量？有條攀條，無條攀例。試舉看。

'''
intro_en = '''
Say it's this way: fine. Say it's not this way: fine. But once the real fight starts, everyone has to plant his feet at the turning point. So consider: turn upward, and Shakyamuni, Maitreya, Manjushri, Samantabhadra, the thousand sages, the ten thousand sages, every great master under heaven, all swallow hard and hold their breath. Turn downward, and gnats, mosquitoes, every crawling, wriggling, breathing thing, each one blazes with light, each one stands like a sheer wall a mile high. But suppose you turn neither up nor down. How do you weigh it then? Where there's a rule, follow the rule. Where there's none, follow the precedent. Here is a case to test you.
'''

case_zh = '''
睦州問僧：「近離甚處？」僧便喝。州云：「老僧被汝一喝。」僧又喝。州云：「三喝四喝後作麼生？」僧無語。州便打云：「這掠虛頭漢。」

'''
case_en = '''
Muzhou asked a monk, "Where have you just come from?"
The monk gave a shout.
Muzhou said, "So I've taken a shout from you."
The monk shouted again.
Muzhou said, "Three shouts, four shouts, then what?"
The monk had nothing to say.
Muzhou hit him and said, "You empty-headed phony."
'''

verse_zh = '''
兩喝與三喝，
作者知機變。
若謂騎虎頭，
二俱成瞎漢。
誰瞎漢？拈來天下與人看。

'''
verse_en = '''
Two shouts, three shouts.
The real adept knows when the wind shifts.
Think you're riding the tiger's head?
Both of you go blind.
Who's the blind one? Drag him out,
show him to the whole world.
'''

pointer = '''
Muzhou was a Tang teacher known for speed and zero mercy, sizing up a monk the moment he crossed the threshold. The "shout" is a genuine Chan tool, a sudden bark meant to slice through someone's thinking and show that he is awake rather than reciting. The catch is that a shout only lives once. The monk's first one might have been real, but when Muzhou names it, the monk just shouts again on reflex, and when pushed a step past that he has nothing left, because he was copying the gesture without anything standing behind it. That emptiness is why Muzhou hits him and calls him a phony. The verse's image of "riding the tiger's head" is the man who believes he has the dangerous thing under control at the exact moment it is about to eat him. A live shout costs everything; a borrowed one costs you the match.
'''
