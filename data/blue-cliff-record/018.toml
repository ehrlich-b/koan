pointer = '''
National Teacher Zhong is Nanyang Huizhong, an elder master the Tang emperor kept near him as a kind of spiritual advisor. The "tomb" in question is a stupa, the memorial monument raised for a revered monk after death, so the emperor's question is practical and fond: what funeral do you want? The teacher answers from somewhere else. A "seamless tomb" has no joints, no parts, no blueprint, a way of pointing at something whole and unmade rather than a building you could draft, which is why "give me the design" gets only a long silence in return. When the emperor still cannot follow, the puzzle passes to the heir Danyuan, whose reply is a deliberate riddle: directions to a place on no map, a palace with nobody home who knows a thing. Xuedou drops a one-line jab after each phrase, half mockery, half applause. Rather than crack the riddle like a lock, feel how every attempt to pin the thing down slides off its seamless surface.
'''
