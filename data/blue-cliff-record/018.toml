case_en = '''
Emperor Suzong asked National Teacher Zhong, "When you are gone, what will you need?"
"Build me a seamless tomb," the teacher said.
"Then give me the design, Master."
The teacher sat a long while in silence. Then: "Understand?"
"No," said the emperor.
"I have an heir, Danyuan, who knows this matter. Send for him and ask."

After the teacher died, the emperor summoned Danyuan and asked what it all meant.
Danyuan said:
"South of the Xiang, north of the Tan."
(Xuedou: "One hand alone makes no sound.")
"In between, gold enough to fund a whole country."
(Xuedou: "A staff shaped like a mountain.")
"Under the shadowless tree, the ferry that carries everyone across together."
(Xuedou: "Calm seas, clear rivers.")
"In the crystal palace, no one home who knows a thing."
(Xuedou: "There. I have laid it out for you.")
