number = 59
slug = ""
title_zh = ""
title_en = "The Great Way Is Not Hard"

intro_zh = '''
該天括地，越聖超凡。百草頭上，指出涅槃妙心；干戈叢裏，點定衲僧命脈。且道：承箇什麼人恩力，便得恁麼？試舉看。

'''
intro_en = '''
It covers the sky and wraps the earth. It runs past every saint, leaps clear of every ordinary man. On the tip of each blade of grass it points out the wondrous mind of nirvana. In the thick of spears and swords it pins down a monk's lifeline. So tell me: whose kindness do you have to thank to pull this off? Here's a case. Look.
'''

case_zh = '''
僧問趙州：「至道無難，唯嫌揀擇，纔有語言是揀擇，和尚如何為人？」州云：「何不引盡這語？」僧云：「某甲只念到這裏。」州云：「只這至道無難，唯嫌揀擇。」

'''
case_en = '''
A monk asked Zhaozhou, "'The Great Way is not hard; it just refuses to pick and choose.' But the moment you open your mouth, that's picking and choosing. So how do you ever help anyone?"

Zhaozhou said, "Why don't you finish the quote?"

The monk said, "I only got that far."

Zhaozhou said, "It's only this: 'The Great Way is not hard; it just refuses to pick and choose.'"
'''

verse_zh = '''
水灑不著，
風吹不入。
虎步龍行，
鬼號神泣。
頭長三尺知是誰，
相對無言獨足立。

'''
verse_en = '''
Water can't splash it.
Wind can't get in.
It walks like a tiger, moves like a dragon;
ghosts wail, spirits weep.
Three feet of head, and who is that?
Facing you, dead silent, standing on one foot.
'''

pointer = '''
The third pass at the same line: the Great Way is not hard, it just refuses to pick and choose, from that old poem about quitting the sort into yes and no. This monk's trap is the slickest of the three. He tries to catch Zhaozhou in a contradiction: if the Way means no choosing, then opening your mouth at all is a choice, so every teacher who talks is a hypocrite. Zhaozhou won't argue the logic. He just hands the line back and plants himself inside it, finishing the quote the monk couldn't finish and refusing to step outside it to defend it. The strange creature at the end of the verse, three feet of head, standing dead silent on one foot, isn't a description of anything; it's a picture of that unbudgeable spot the monk's clever question can't lay a glove on.
'''
