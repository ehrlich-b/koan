case_en = '''
A monk asked Zhaozhou, "Does a newborn child have the six senses working, or not?"
Zhaozhou said, "A ball thrown on rushing water."
The monk went to Touzi and asked, "A ball thrown on rushing water — what does it mean?"
Touzi said, "Moment after moment, never resting, flowing on."
