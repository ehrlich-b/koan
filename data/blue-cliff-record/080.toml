pointer = '''
Buddhist psychology counts six consciousnesses, the usual five senses plus the thinking mind. The monk's trick question: a newborn has eyes, ears, and a brain, but is not yet carving the world into me-and-that or like-and-dislike, so is the equipment really switched on? Zhaozhou refuses the yes or no and throws an image instead, a ball skipping across fast water, never gripping, never landing, never pausing, all motion with nothing sticking. Touzi, asked to unpack the same picture, simply keeps it in motion: moment after moment, never resting, flowing on. That ceaseless not-sticking is the answer, and it is also why both masters refuse to convert it into a statement, since the instant you freeze the ball into a definition you have dropped it. The newborn here is not really about babies; it is the mind before it starts gripping. Can you watch yours move without grabbing?
'''
