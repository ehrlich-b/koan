pointer = '''
Yunmen (864–949, Five Dynasties) liked one-liners that go off like charges, and here he plants one. A "temple pillar" is just a wooden post holding up the hall, the deadest, most ordinary object he can point at, so when he says an "ancient buddha," the most exalted thing imaginable, is intimate with a plain pillar, he is deliberately welding the highest to the lowest and daring you to rank it: which level of attainment is that? Then he discards his own question and answers with weather, clouds rising over one mountain, rain falling on another, two separate peaks behaving as one connected system, no ladder of levels anywhere. In the verse the "twenty-eight and six" are the legendary ancestors, twenty-eight in India and six in China, gazing at each other across the centuries, and Silla and Tang are Korea and China, the point being that distance and sequence quietly collapse. The closing line flips a pious cliche, since monks are supposed to treat gold like dirt, by teasing that maybe you have the worth of things exactly backwards. So go ahead and grade it.
'''
