title_zh = ""
title_en = "Yunmen's Cake"

intro_zh = '''
向上轉去，可以穿天下人鼻孔，似鶻捉鳩。向下轉去，自己鼻孔在別人手裏，如龜藏殼。箇中忽有箇出來道：「本來無向上向下，用轉作什麼？」只向伊道：「我也知爾向鬼窟裏作活計。」且道：作麼生辨箇緇素？良久云：「有條攀條，無條攀例。」試舉看。

'''
intro_en = '''
Turn upward, and you can lead everyone alive by the nose, a falcon snatching a pigeon. Turn downward, and your own nose sits in someone else's fist, a turtle drawn into its shell. Suppose someone steps forward and says, "There never was any up or down. What's all this turning for?" Just tell him: "So you've found a way to scrape out a living inside a ghost cave." Now tell me, how do you sort black from white? After a long pause: "Got a rule, go by the rule; no rule, go by precedent." Let's look at one.
'''

case_zh = '''
僧問雲門：「如何是超佛越祖之談？」門云：「餬餅。」

'''
case_en = '''
A monk asked Yunmen, "What is talk that gets past the Buddhas and beyond the patriarchs?"
Yunmen said, "A sesame cake."
'''

verse_zh = '''
超談禪客問偏多，
縫罅披離見也麼？
餬餅𡎺來猶不住，
至今天下有誵訛。

'''
verse_en = '''
So many Zen students asking how to get past it all.
The seams and cracks are showing. You see them?
Cram the cake in their mouths and still they won't stop.
To this day there's muddle all over the world.
'''

pointer = '''
Yunmen (864–949, Five Dynasties) built a whole reputation on one-word answers that land like a slammed door, and you meet his signature move all through this book. The monk fishes for the loftiest teaching imaginable, talk that outranks the Buddhas and the great ancestors of the lineage, which is the setup: he wants something cosmic. Yunmen hands him a sesame cake, the cheapest thing on the street. The cake is not secretly holy, and it is not a riddle. The hunt is the problem, the reaching past what is already in your hand toward a grander version of it, and Yunmen short-circuits that reach with breakfast. The verse's "seams and cracks showing" is the jab: the instant you grab for the exalted answer, you have exposed exactly where you are stuck.
'''
