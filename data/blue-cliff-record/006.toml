case_zh = '''
雲門垂語云：「十五日已前不問汝，十五日已後道將一句來。」自代云：「日日是好日。」

'''
case_en = '''
Yunmen put it to them: "I won't ask you about before the fifteenth. Give me a line about after the fifteenth."
And he answered himself: "Every day is a good day."
'''

verse_zh = '''
去却一，
拈得七，
上下四維無等匹。
徐行踏斷流水聲，
縱觀寫出飛禽跡。
草茸茸，
煙羃羃，
空生巖畔花狼籍。
彈指堪悲舜若多。
莫動著，
動著三十棒。

'''
verse_en = '''
Throw out one,
take up seven:
nothing above, below, or to any side can match it.
Walk slow, and you tread the stream's sound into silence.
Look close, and you trace the tracks of birds in flight.
Grass thick and rank,
mist hanging low,
flowers strewn wild round Subhuti's cliff.
Snap your fingers: pity poor Shunyata!
Don't stir.
Stir, and that's thirty blows.
'''

pointer = '''
Yunmen Wenyan (864–949, a Five Dynasties master with the fastest tongue in Chan) sets a trap shaped like a calendar: "the fifteenth" is the full moon, the month's midpoint, used as a marker for a turning point in practice, and he waves off everything before it to demand a word about what comes after. Then he answers himself, every day is a good day, and both easy exits slam shut: it isn't a slogan about staying positive, and there is no grander meaning hiding behind the plain words. "After the fifteenth" is just the next ordinary day, and refusing to rank one day over another is the same move the Xinxinming makes against picking and choosing. The verse piles on Buddhist scenery, Subhuti on his cliff and emptiness given a name, then snaps shut: any grab you make for the point earns thirty blows. Sit with why reaching for the good day is exactly what loses it.
'''
