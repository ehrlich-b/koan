title_zh = ""
title_en = "Iron Grindstone Liu"

intro_zh = '''
高高峯頂立，魔外莫能知；深深海底行，佛眼覷不見。直饒眼似流星，機如掣電，未免靈龜曳尾。到這裏合作麼生？試舉看。

'''
intro_en = '''
Stand on the highest peak, and no demon or outsider can find you. Walk the floor of the deep sea, and even a Buddha's eye won't catch you. Yet though your eye is quick as a falling star and your mind strikes like lightning, you still drag your tail behind you like a turtle. So once you arrive here, what do you do? Let's bring up a case and see.
'''

case_zh = '''
劉鐵磨到溈山，山云：「老牸牛，汝來也。」磨云：「來日臺山大會齋，和尚還去麼？」溈山放身臥，磨便出去。

'''
case_en = '''
Liu Tiemo came to Guishan. Guishan said, "Old cow, so you've come."

Liu said, "Tomorrow there's a great feast on Mount Tai. Are you going, Master?"

Guishan let his body drop and lay flat. Liu walked out.
'''

verse_zh = '''
曾騎鐵馬入重城，
勅下傳聞六國清。
猶握金鞭問歸客，
夜深誰共御街行。

'''
verse_en = '''
She rode an iron horse once, straight through the city walls.
Word comes down: the decree is given, the six kingdoms are at peace.
Still she grips the golden whip, asking the traveler bound for home,
deep in the night, who else rides the imperial road?
'''

pointer = '''
This is a duel between two heavyweights, not a friendly chat. Liu Tiemo, "Iron Grindstone Liu," was a renowned nun and a formidable teacher in her own right, and Guishan was a great master; they knew each other's footwork cold. Guishan opens with a jab, calling her an old cow, a teasing insult. She counters with a baited question: there is a huge feast tomorrow on Mount Tai, a sacred mountain hundreds of miles off and impossible to reach by then, so "are you going" is the trap, since yes makes you a fool and no means you flinched. Guishan answers neither way; he simply lets his body drop and lies flat on the ground, and Liu walks out. No winner is announced, and that is the point: two people so matched that the fight needs no finish. The verse casts Liu as a victorious general still on patrol, golden whip in hand, riding the imperial road at midnight to see who else can keep pace.
'''
