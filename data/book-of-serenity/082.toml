number = 82
slug = ""
title_zh = "雲門聲色"
title_en = "Yunmen's Sound and Form"

intro_zh = '''
不斷聲色，是隨處墮。聲求色見，不見如來。莫有就路還家底麼？

'''
intro_en = '''
Don't cut off sound and form, and you trip wherever you stand. Chase the Buddha through what you hear, hunt him in what you see, and you'll never find him. Is there anyone who can take the road right back home?
'''

case_zh = '''
雲門示眾云：「聞聲悟道，見色明心。觀世音菩薩將錢來買餬餅，放下手，却是饅頭。」

'''
case_en = '''
Yunmen addressed the assembly: "Hear a sound, wake up. See a shape, get the point. Guanyin walks up with cash to buy a flatbread, opens her hand, and look, it's a steamed bun."
'''

verse_zh = '''
出門躍馬掃攙搶，
萬國煙塵自肅清。
十二處亡閑影響，
三千界放淨光明。

'''
verse_en = '''
Out the gate, spurs his horse, sweeps the sky of comets.
Across ten thousand lands the smoke and dust settle on their own.
In all twelve fields of the senses, no idle echoes left.
Across three thousand worlds, pure light pours down.
'''

pointer = '''
Yunmen (864–949, Five Dynasties) was famous for one-line jabs that leave no handhold. Old Buddhist slogans promised awakening through the senses: a monk hears a pebble crack against bamboo, or sees peach blossoms, and wakes on the spot. Guanyin is the bodhisattva of compassion, the saint everyone prays to. Yunmen lines up the formula, hear and you wake, see and you get it, then snaps it: this exalted saint goes out with cash to buy a flatbread, opens her hand, and it's a steamed bun. You asked for one thing and got another. The tidy promise that the senses "deliver" enlightenment comes back to you as plain wrong-order lunch, which is the instruction. The verse sweeps the sky clean of comets and lets light pour through all twelve fields of sense, no idle echoes left, once you quit grading what shows up against what you ordered.
'''
