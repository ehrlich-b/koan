number = 94
slug = ""
title_zh = "洞山不安"
title_en = "Dongshan Unwell"

intro_zh = '''
下不論上，卑不動尊。雖能攝已從他，未可以輕勞重。四大不調時，如何侍養？

'''
intro_en = '''
The low don't lecture the high. The humble don't push the honored around. You can rein yourself in and follow another, but you can't set the light to carry the heavy. When the four elements fall out of tune and the body breaks down, how do you tend it then?
'''

case_zh = '''
洞山不安，僧問：「和尚病，還有不病者麼？」山云：「有。」僧云：「不病者還看和尚否？」山云：「老僧看他有分。」僧云：「和尚看他時如何？」山云：「則不見有病。」

'''
case_en = '''
Dongshan was sick. A monk asked, "Master, you're ill. Is there one who isn't?"
Dongshan said, "There is."
The monk said, "Does the one who isn't sick still look after you?"
Dongshan said, "I'm the one who gets to look after him."
The monk said, "And when you look after him, how is it?"
Dongshan said, "Then I see no sickness at all."
'''

verse_zh = '''
卸却臭皮袋，
拈轉赤肉團。
當頭鼻孔正，
直下髑髏乾。
老醫不見從來癖，
少子相看向近難。
野水瘦時秋潦退，
白雲斷處舊山寒。
須勦絕，
莫顢頇。
轉盡無功伊就位，
孤標不與汝同盤。

'''
verse_en = '''
Drop the stinking leather sack,
turn loose the red lump of flesh.
Head-on, the nostrils sit straight;
straight down, the skull runs dry.
The old doctor never saw the lifelong ailment;
the young son, drawing near, finds it hard to meet him.
The wild stream thins, the autumn floods recede;
the white clouds break, and the old mountain is cold.
Cut it clean.
Don't fumble.
When all turning is spent and nothing's left to do, he takes his seat,
standing alone, he won't share your plate.
'''

pointer = '''
Dongshan, the ninth-century master at the head of the Caodong line, is on his deathbed, and a student tries to corner him: if the body is sick, isn't there a pure deathless "true self" inside that stays untouched? That is the textbook dualism, sick flesh against healthy soul. Watch how he refuses the split. He grants there is "one who isn't sick," then inverts the hierarchy the student expected: rather than that deathless self minding the dying body, Dongshan is the one who gets to tend the deathless self. And once he is fully there in the tending, the line between sick and well has nothing left to divide; no sickness anywhere to point at. The verse lays on the death-imagery, drop the leather sack, the skull dries out, and ends on the loner who won't share your plate, his way of saying this can't be reached through your neat categories. Dongshan meets his own image again in case 49.
'''
