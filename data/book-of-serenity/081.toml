number = 81
slug = ""
title_zh = "玄沙到縣"
title_en = "Xuansha and the Festival"

intro_zh = '''
動即影現，覺即塵生。舉起分明，放下穩密。本色道人相見，如何說話？

'''
intro_en = '''
Move, and a shadow appears. Notice it, and dust kicks up. Lift it: crystal clear. Set it down: sealed tight. When two genuine men of the Way meet, how do they talk?
'''

case_zh = '''
玄沙到蒲田縣，百戲迎之。次日問小塘長老：「昨日許多喧鬧，向甚麼處去也？」小塘提起袈裟角。沙云：「𩕐挑，沒交涉。」

'''
case_en = '''
Xuansha came to Putian county. The whole town turned out to welcome him with a hundred acts and entertainments. The next day he asked Elder Xiaotang, "All that racket yesterday, where has it gone?"
Xiaotang lifted the corner of his robe.
Xuansha said, "Way off. Not even close."
'''

verse_zh = '''
夜壑藏舟，
澄源著棹。
龍魚未知水為命，
折筋不妨聊一攪。
玄沙師小塘老，
函蓋箭鋒，
探竿影草。
潛縮也老龜巢蓮，
游戲也華鱗弄藻。

'''
verse_en = '''
A boat hidden in the night ravine,
a pole set in the clear depths.
Fish and dragons never know water is their life;
no harm in one stir with a snapped chopstick.
Xuansha the master, Xiaotang the old man:
box and lid, point against arrow,
probing pole, grass-shadowing line.
Lie low, and you're an old turtle bedded in lotus roots;
come out to play, and you're a bright-scaled fish flashing through the weeds.
'''

pointer = '''
Xuansha Shibei (835–908) was a leading master of his day; Xiaotang is a local elder he is sounding out. A town floods the streets to welcome him, a hundred acts of drumming and performance, and the next morning Xuansha asks the trick question: all that din and spectacle, where has it gone now that it's over? He is really asking where things rise from and vanish into, appearance against emptiness. Xiaotang answers without speaking, tugging the corner of his robe, a familiar gesture for pointing past words, and Xuansha shoots it down as a stock move that lands nowhere near. The verse stocks the pond with figures of hiding versus showing, the boat tucked in the night ravine, the pole probing dark water, the turtle bedded in lotus roots and the bright fish flashing out; it reads as two adepts feeling for each other's reach, where a borrowed gesture won't survive contact.
'''
