number = 39
slug = ""
title_zh = "趙州洗鉢"
title_en = "Zhaozhou's Wash Your Bowl"

intro_zh = '''
飯來張口，睡來合眼。洗面處拾得鼻孔，□鞋時摸著脚跟。那時蹉却話頭，把火夜深別覓，如何得相應去？

'''
intro_en = '''
Food comes, you open your mouth. Sleep comes, you close your eyes. You wash your face and there's your nose; you pull on your sandals and there are your heels. But reach for the point of the talk and you've missed it. Carry a lamp into the dead of night to hunt for it and it's already gone. So how do you fall into step with it?
'''

case_zh = '''
僧問趙州：「學人乍入叢林，乞師指示。」州云：「喫粥了也未？」僧云：「喫了。」州云：「洗鉢盂去。」

'''
case_en = '''
A monk said to Zhaozhou, "I've just come to the monastery. Please teach me."
Zhaozhou said, "Have you eaten your rice gruel?"
The monk said, "I've eaten."
Zhaozhou said, "Then go wash your bowl."
'''

verse_zh = '''
粥罷令教洗鉢盂，
豁然心地自相符。
而今參飽叢林客，
且道：其間有悟無？

'''
verse_en = '''
Breakfast done, he's told to wash his bowl.
All at once the mind falls into place.
And you, well-fed old hands of the monastery,
tell me: was there any waking in it, or none?
'''

pointer = '''
Zhaozhou is one of the great old masters, prized for answers so plain they slide right past you, and you meet him over and over in this book (10, 18, 47, 63). A new monk turns up and effectively asks for the secret: I've just arrived, teach me. Zhaozhou asks whether he's finished his rice gruel, the monk says yes, and Zhaozhou tells him to go wash his bowl, which is the entire teaching. The whole expectation of something lofty is the trap, while Zhaozhou keeps pointing at the nearest ordinary thing. The verse turns and needles directly: the waking is sitting right there in the dishwater, so the only question left is whether you actually caught it or merely nodded along. So which was it?
'''
