number = 27
slug = ""
title_zh = "法眼指簾"
title_en = "Fayan Points at the Blind"

intro_zh = '''
師多脈亂，法出姦生。無病醫病，雖以傷慈；有條攀條，何妨舉話。

'''
intro_en = '''
A skilled doctor reads too many symptoms, and the diagnosis goes haywire. Make a rule and you breed crooks to break it. Treat a man who isn't sick and your kindness leaves a wound. Still, where there's a thread you pull it, so why not run with this story?
'''

case_zh = '''
法眼以手指簾，時有二僧同去捲簾。眼云：「一得一失。」

'''
case_en = '''
Fayan pointed at the bamboo blind. Two monks went over together and rolled it up. Fayan said, "One got it, one missed."
'''

verse_zh = '''
松直棘曲鶴長𠒎短，
羲皇世人俱忘治亂。
其安也潛龍在淵，
其逸也翔鳥脫絆。
無何祖禰西來，
裏許得失相半。
蓬隨風而轉空，
舡截流而到岸。
箇中靈利衲僧，
看取清涼手段。

'''
verse_en = '''
Pines grow straight, brambles crooked;
cranes stand on long legs, ducks on short.
In the golden age people forgot
which was order and which was chaos.
At rest, the dragon lies deep in the pool;
at play, the bird slips its tether and soars.
Then out of nowhere the ancestors came west,
and there inside it, winning and losing split even.
The tumbleweed rolls with the wind and comes up empty;
the boat cuts the current and reaches the far shore.
You sharp-witted monks out there,
watch how the man from Qingliang works.
'''

pointer = '''
Fayan (885–958) was a major teacher of the Five Dynasties period, founder of the Fayan house; "the man from Qingliang" is just him, named for his temple. He points at a hanging bamboo blind, two monks both jump up and roll it the same way, and he rules that one got it and one missed without saying which. The grading is what he is fishing for you to do. If two identical acts can split into hit and miss, then the difference Fayan is watching for has nothing to do with the rolling, and any attempt to score the monks lands you on the wrong field entirely. The verse stacks up pairs that nature never ranks, straight pines and crooked brambles, long-legged cranes and short-legged ducks, to set the live question loose: where, if anywhere, does "one got it, one missed" actually live?
'''
