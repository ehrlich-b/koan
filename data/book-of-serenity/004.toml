number = 4
slug = ""
title_zh = "世尊指地"
title_en = "The Buddha Points at the Ground"

intro_zh = '''
一塵纔舉，大地全收；疋馬單槍，開疆展土。便可隨處作主，遇緣即宗底，是甚麼人？

'''
intro_en = '''
Lift a single speck of dust and the whole earth comes with it. One horse, one spear, and you've opened up new country. Now you can take charge wherever you land, meeting each moment head-on. Who is that?
'''

case_zh = '''
世尊與眾行次，以手指地云：「此處宜建梵剎。」帝釋將一莖草，插於地上云：「建梵剎已竟。」世尊微笑。

'''
case_en = '''
The Buddha was walking with the assembly. He pointed at the ground and said, "This is a good spot to build a temple." Indra, lord of the gods, took a single blade of grass, stuck it in the ground, and said, "The temple is built." The Buddha smiled.
'''

verse_zh = '''
百草頭上無邊春，
信手拈來用得親。
丈六金身功德聚，
等閑携手入紅塵。
塵中能作主，
化外自來賓。
觸處生涯隨分足，
未嫌伎倆不如人。

'''
verse_en = '''
On the tip of every blade of grass, spring without end.
Reach out, pick one, and it fits your hand like an old friend.
The golden body, sixteen feet of heaped-up merit,
yet off he strolls hand in hand into the red dust.
In the dust he can be master;
beyond the pale, guests come of their own accord.
Wherever he turns, his life is full enough.
He never minds that his tricks fall short of other men's.
'''

pointer = '''
The Buddha is out walking with his students, and Indra, the king of the gods in Indian myth, appears here as an eager pupil rather than a cosmic overlord. When the Buddha points at the ground and calls it a good site for a temple, he sounds like he is scouting real estate for a grand building. Indra's answer is the whole case: he plants a single blade of grass, declares the temple finished, and is right. The sacred is not a structure you fund and raise later; it is already standing in a weed, in the plain dirt underfoot, complete before the first stone. That is the Caodong instinct running through this book, the holy thing found in the ordinary rather than the dramatic. The Buddha's smile is the seal, one teacher confirming that the student saw it.
'''
