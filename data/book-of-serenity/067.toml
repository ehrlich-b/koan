number = 67
slug = ""
title_zh = "嚴經智慧"
title_en = "The Buddha's Wisdom in Everyone"

intro_zh = '''
一塵含萬象，一念具三千。何況頂天立地丈夫兒，道頭知尾靈利漢，莫自辜負已靈、埋沒家寶麼？

'''
intro_en = '''
A single speck of dust holds the ten thousand things. A single thought contains the whole universe. So what of a full-grown man, standing tall between heaven and earth? Say the first word and he already knows the last. You sharp ones: don't sell yourselves short and bury the treasure you were born with.
'''

case_zh = '''
華嚴經云：「我今普見一切眾生，具有如來智慧德相，但以妄想執著，而不證得。」

'''
case_en = '''
The Flower Garland Sutra says: "Now I see that every living being is already complete with the wisdom and the marks of a Buddha. They simply fail to realize it, tangled up in delusion and grasping."
'''

verse_zh = '''
天蓋地載，
成團作塊。
周法界而無邊，
析隣虛而無內。
及盡玄微，
誰分向背？
佛祖來償口業債，
問取南泉王老師，
人人只喫一莖菜。

'''
verse_en = '''
It covers the sky, holds up the earth,
clumps into a ball, packs into a lump.
It fills the whole universe and has no outer edge.
Split it past the last atom and find no inner core.
Push all the way down to the finest grain:
who could mark off front from back?
Buddhas and ancestors come to pay off their debt of words.
Go ask old teacher Nanquan,
where everyone just eats a single stalk of greens.
'''

pointer = '''
This is the Flower Garland Sutra's headline claim, and it is a steep one: enlightenment is not something you earn or accumulate, you already have it whole, right now. The "wisdom and the marks of a Buddha" are standard equipment, not a prize waiting at the end of the road; the only snag is that we cannot see what we are clutching, tangled in our stories and our wanting things otherwise. Hongzhi's verse plays the claim across every scale, this wisdom fills the cosmos and has no edge, you can split it past the last atom and find no core, then it drops with a deflation: even the buddhas run up a "debt of words" for all that teaching, and Nanquan, the Tang master, settles the whole towering question by handing everybody a single stalk of greens. The grand thing you keep reaching for is already in the bowl, which is the part that is hard to credit.
'''
