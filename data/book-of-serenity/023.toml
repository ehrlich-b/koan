number = 23
slug = ""
title_zh = "魯祖面壁"
title_en = "Luzu Faces the Wall"

intro_zh = '''
達磨九年，呼為壁觀；神光三拜，漏泄天機。如何得掃蹤滅跡去？

'''
intro_en = '''
Bodhidharma sat nine years. They called it "wall-gazing." Huike bowed three times and gave the whole game away. So how do you wipe out every track and leave no trace at all?
'''

case_zh = '''
魯祖凡見僧來便面壁。南泉聞云：「我尋常向他道，空劫以前承當，佛未出世時會取，尚不得一箇半箇。他恁麼，驢年去。」

'''
case_en = '''
Whenever Luzu saw a monk coming, he just turned and faced the wall. Nanquan heard of it and said, "I keep telling people: get yourself back before the empty eon, take up the time before any Buddha came into the world. Even then you won't turn up a single one, not even half a one. The way he's going, he'll be at it till the year of the donkey."
'''

verse_zh = '''
淡中有味，
妙超情謂。
綿綿若存兮象先，
兀兀如愚兮道貴。
玉雕文以喪淳，
珠在淵而自媚。
十分爽氣兮清磨暑秋，
一片閑雲兮遠分天水。

'''
verse_en = '''
Plain, and full of flavor.
Subtle, past anything you could think or say.
Faint as a thread, barely there, yet here before all forms.
Still as a fool, dull as a stump, yet here the Way runs deep.
Carve the jade with patterns and you ruin the plain stone.
The pearl rests in the deep, lovely on its own.
Bracing air, clear and cold, autumn scouring off the summer heat.
A single drift of idle cloud, far off, parting sky from water.
'''

pointer = '''
Bodhidharma is the Indian monk who supposedly brought Chan to China and then sat facing a wall for nine years, so "wall-gazing" became shorthand for hardcore meditation. His student Huike got it by bowing silently three times, which the intro teases as giving the game away, since any gesture at all is a kind of leak. Luzu, a dharma-heir of Mazu, takes Bodhidharma one further: a monk shows up with a question and Luzu just turns to the wall, no words at all. Nanquan, his dharma-brother, is unimpressed, saying real understanding means going back before the empty eon, before time and Buddhas and everything, and even that turns up nobody, not half a person. "The year of the donkey" is the joke, since there is no donkey in the Chinese zodiac, so it means never. The live question is whether Luzu's silent wall is the purest possible answer or a gimmick he could ride forever, and Nanquan leaves it hanging.
'''
