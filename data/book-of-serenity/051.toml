number = 51
slug = ""
title_zh = "法眼舡陸"
title_en = "Fayan: By Boat or by Land"

intro_zh = '''
世法裏悟却多少人，佛法裏迷却多少人。忽然打成一片，還著得迷悟也無？

'''
intro_en = '''
In worldly affairs, how many people wake up. In the Buddha-dharma, how many lose their way. But once it all fuses into one piece, is there any room left for lost or awake?
'''

case_zh = '''
法眼問覺上座：「舡來？陸來？」覺云：「舡來。」眼云：「舡在甚麼處？」覺云：「舡在河裏。」覺退後。眼却問傍僧云：「爾道適來這僧，具眼不具眼？」

'''
case_en = '''
Fayan asked the senior monk Jue, "Did you come by boat or by land?"
"By boat," Jue said.
"And where's the boat now?"
"In the river."
Jue stepped back. Fayan turned to a monk standing nearby. "Tell me, does that one have eyes or not?"
'''

verse_zh = '''
水不洗水，
金不博金。
昧毛色而得馬，
靡絲絃而樂琴。
結繩畫卦有許事，
喪盡真淳盤古心。

'''
verse_en = '''
Water won't wash water.
Gold won't buy gold.
Overlook the coat and you still find the horse;
drop the strings and the lute still sings.
Knotting ropes, drawing hexagrams, all that fuss,
draining the last of the world's first plain heart.
'''

pointer = '''
Fayan Wenyi is a major master of the Five Dynasties era, founder of the Fayan house; "senior monk Jue" is a visitor who's clearly no beginner. Fayan opens with the flattest small talk imaginable, how'd you get here, boat or land, and Jue answers plainly, by boat, it's down in the river. The whole thing is a test smuggled inside chitchat: did Jue speak as a free man stating facts, or did he get hooked into Fayan's frame and start accounting for himself? When Jue steps back, Fayan ignores him completely and asks a bystander to grade him, does this one actually see, or is he merely talking? The verse heaps up images for the same point. Water won't wash water, gold won't buy gold; a real eye reads the whole horse without fussing over its coat, and needs no extra machinery bolted to what's already whole.
'''
