slug = ""
title_zh = "鹽官犀扇"
title_en = "Yanguan's Rhino Fan"

intro_zh = '''
剎海無涯，不離當處；塵劫前事，盡在而今。試教伊覿面相呈，便不解當風拈出。且道：過在什麼處？

'''
intro_en = '''
The ocean of worlds has no edge, yet it never leaves the spot where you stand. Everything from a thousand ages back is here in this very moment. Try making it show you its face straight on. Still you can't pluck it out of the wind that's blowing. So tell me: where does the mistake lie?
'''

case_zh = '''
鹽官一日喚侍者：「與我過犀牛扇子來。」者云：「扇子破也。」官云：「扇子既破，還我犀牛兒來。」者無對。資福畫一圓相，於中書一牛字。

'''
case_en = '''
One day Yanguan called his attendant: "Bring me the rhino-horn fan."

The attendant said, "It's broken."

Yanguan said, "If the fan's broken, then bring me back the rhino."

The attendant had nothing to say.

Zifu drew a circle and wrote the word "rhino" inside it.
'''

verse_zh = '''
扇子破索犀牛，
棬攣中字有來由。
誰知桂轂千年魄，
妙作通明一點秋。

'''
verse_en = '''
The fan is broken, so he asks for the rhino;
the word inside the circle has its reasons.
Who knows the moon's dark thousand-year self,
working one bright point of autumn into light?
'''

pointer = '''
Yanguan is a Tang master, an heir of Mazu; the attendant is his student. A rhino-horn fan is a real object, a folding fan with ribs of rhinoceros horn, the sort of fine thing a teacher might own. When the student reports it broken, Yanguan springs the trap, "then bring me the rhino," meaning hand over the living source the fan came from, not the busted gadget. The student freezes, because the demand sounds impossible. Later another teacher, Zifu, answers without words: he draws a circle, a stock Chan emblem for the whole, complete thing, and writes "rhino" inside it. The case is prodding at whether you can produce the real thing itself rather than the worn-out, secondhand version, and Zifu's drawing is one attempt to do exactly that.
'''
