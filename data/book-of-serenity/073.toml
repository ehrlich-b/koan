number = 73
slug = ""
title_zh = "曹山孝滿"
title_en = "Caoshan's Mourning Is Over"

intro_zh = '''
依草附木去，作精靈；負屈㗸冤來，為鬼祟。呼之則燒錢奏馬，遣之則呪水書符。如何得家門平安去？

'''
intro_en = '''
Cling to the grass, hang on the trees, and you turn into a goblin. Nurse a grudge, choke on a wrong, and you come back as a ghost. To call the spirit up, you burn paper money and offer paper horses; to drive it off, you chant over water and scrawl charms. So how do you keep the whole house at peace?
'''

case_zh = '''
僧問曹山：「靈衣不掛時如何？」山云：「曹山今日孝滿。」僧云：「孝滿後如何？」山云：「曹山愛顛酒。」

'''
case_en = '''
A monk asked Caoshan, "When even the spirit-robe is shed, what then?"
Caoshan said, "Today Caoshan's mourning is over."
The monk asked, "And after the mourning's over?"
Caoshan said, "Caoshan loves to get falling-down drunk."
'''

verse_zh = '''
清白門庭四絕隣，
長年關掃不容塵。
光明轉處傾殘月，
爻象分時却建寅。
新滿孝，
便逢春。
醉步狂歌任墮巾，
散髮夷猶誰管係，
太平無事酒顛人。

'''
verse_en = '''
A clean white house, no neighbor on any side,
swept shut all year, no speck of dust gets in.
Where the light turns, the worn moon tips and sets;
when the lines shift, spring comes round again.
Mourning just done,
and here's the spring.
Reeling and singing, let the headcloth slip,
hair loose and easy, who keeps any rule?
All's at peace, nothing doing: just a drunk.
'''

pointer = '''
Caoshan Benji was Dongshan's heir, the two of them the founders of the Caodong line this whole book belongs to. In old Chinese mourning you wore rough plain cloth and gave up wine, meat, music and pleasure for a fixed stretch, often years, after a parent died. The monk's "spirit-robe" is the last fine wrapping of the self, even the spiritual identity you might keep clinging to, and he asks what is left once you drop that too. Caoshan answers through the mourning custom: the long austerity is done, the restrictions lift. So what does life look like after you have let go of everything, including letting-go? Not a solemn enlightened glow, just a man getting cheerfully and harmlessly hammered, loose of every rule. Hongzhi's verse runs the joke out, a spotless empty house and then spring arrives and he is drunk, hair down, singing, bothering no one at all.
'''
