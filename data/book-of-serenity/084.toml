number = 84
slug = ""
title_zh = "俱胝一指"
title_en = "Juzhi's One Finger"

intro_zh = '''
一聞千悟，一解千從。上士一決一切了，中下多聞多不信。剋的簡當處，試拈出看。

'''
intro_en = '''
Hear one thing, wake to a thousand. Grasp one, and a thousand follow. The best student settles the whole matter in a single stroke. The middling and the slow hear plenty and believe almost none of it. Let me pin down the sharp point and hold it up. Take a look.
'''

case_zh = '''
俱胝和尚凡有所問，只竪一指。

'''
case_en = '''
Ask Master Juzhi anything and you got the same answer: he held up one finger.
'''

verse_zh = '''
俱胝老子指頭禪，
三十年來用不殘。
信有道人方外術，
了無俗物眼前看。
所得甚簡，
施設彌寬。
大千剎海飲毛端，
鱗龍無限落誰手，
珍重任公把釣竿。
師復竪起一指，云：「看。」

'''
verse_en = '''
Old Juzhi and his fingertip Zen,
thirty years and it never wore out.
Trust that the man of the Way had a power past the world:
nothing ordinary left before his eyes.
What he held was so plain.
What it opened, so wide.
The whole ocean of worlds, drunk down at the tip of a hair.
Numberless dragons. Into whose hands do they fall?
Take care: it is Duke Ren, gripping the rod.

Then the master raised one finger again and said, Look.
'''

pointer = '''
Juzhi taught one thing only: every question, whatever it was, got a single raised finger. He had taken the gesture whole from his teacher Tianlong and ran on it the rest of his life. Hongzhi's verse stacks images to weigh how much that tiny move carried, the entire ocean of worlds drunk down at the tip of one hair; "Duke Ren" is the giant fisherman of an old tale whose monstrous hook landed a fish that fed half the country, so the one finger is a hook big enough to catch anything. The Gateless Gate tells the rest of the story (case 3), where Juzhi's young attendant mimics the finger and Juzhi cuts it off, which is the warning against copying a gesture you haven't earned. Here the case ends by doing the thing it describes: the master simply raised the finger again and said, Look.
'''
