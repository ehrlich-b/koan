number = 36
slug = ""
title_zh = "馬師不安"
title_en = "Mazu's Sun-Face, Moon-Face"

intro_zh = '''
離心意識參，有這箇在；出凡聖路學，已太高生。紅爐迸出鐵蒺䔧，舌劍脣槍難下口。不犯鋒鋩，試請舉看。

'''
intro_en = '''
Study it with the thinking mind shut off: there's still something here. Study it past the road that forks into ordinary and holy: already too high. A white-hot furnace spits iron caltrops. Sword-tongues, spear-lips, no room to slip a word in. Get past the blade without touching its edge. Let's raise the case and look.
'''

case_zh = '''
馬大師不安，院主問：「和尚近日尊位如何？」大師云：「日面佛，月面佛。」

'''
case_en = '''
The great teacher Mazu was sick. The temple director asked him, "How are you keeping these days, Master?"
Mazu said, "Sun-face Buddha, moon-face Buddha."
'''

verse_zh = '''
日面月面，
星流電卷。
鏡對像而無私，
珠在盤而自轉。
君不見：鉆鎚前百鍊之金，
刀尺下一機之絹。

'''
verse_en = '''
Sun-face, moon-face:
stars streaking, lightning furled.
A mirror meets each shape and plays no favorites,
the pearl in the dish rolls on its own.
Don't you see:
under the hammer, gold beaten a hundred times,
under the shears, one bolt of finished silk.
'''

pointer = '''
Mazu is one of the giants of Tang Chan, a teacher who minted dozens of masters; here he is flat on his back and dying, and a junior monk does the decent thing and asks how he's feeling. Mazu answers with two names from Buddhist lore: the Sun-face Buddha, said to live eighteen hundred years, and the Moon-face Buddha, who lives a single day and a night. The trap is folded into the polite question, in its quiet assumption that a long life is the good answer and a short one the bad. Sick and near the end, Mazu is not sorting the two into better and worse. Long stretch or single night, thriving or going out, it is one thing showing up, the way a mirror takes whatever stands in front of it and prefers no face to any other. Hongzhi sets this in the cooler key; the same Mazu turns up again at case 6.
'''
