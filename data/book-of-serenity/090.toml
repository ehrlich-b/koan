number = 90
slug = ""
title_zh = "仰山謹白"
title_en = "Yangshan's Announcement"

intro_zh = '''
屈原獨醒，正是爛醉；仰山說夢，恰似覺時。且道：萬松恁麼說，諸人恁麼聽，且道是覺是夢？

'''
intro_en = '''
Qu Yuan said he alone was sober, which is exactly dead drunk. Yangshan talks in his sleep, and it's just like being wide awake. So tell me: when Wansong talks like this, and all of you listen like this, are you awake, or dreaming?
'''

case_zh = '''
仰山夢往彌勒所，居第二座。尊者白云：「今日當第二座說法。」山乃起白椎，云：「摩訶衍法，離四句，絕百非。謹白。」

'''
case_en = '''
Yangshan dreamed he went to Maitreya's place and took the second seat. A senior monk announced, "Today the one in the second seat will preach." So Yangshan stood up, struck the gavel, and said, "The teaching of the Great Vehicle is beyond the four propositions and cuts off all hundred negations. Hear me."
'''

verse_zh = '''
夢中擁衲參耆舊，
列聖森森坐其右。
當仁不讓揵椎鳴，
說法無畏師子吼。
心安如海，
膽量如斗。
鮫目泪流，
蚌腸珠剖。
譫語誰知泄我機，
龐眉應笑揚家醜。
離四句，絕百非，
馬師父子病休醫。

'''
verse_en = '''
In the dream he wraps his robe, calls on the old masters,
ranks of sages thick in rows, seated at his right.
The duty falls to him and he does not yield: the gavel cracks,
fearless he preaches, the lion's roar.
Heart calm as the sea,
nerve wide as a barrel.
The shark's eye sheds its tears,
the oyster's gut splits to its pearl.
Talking in his sleep, who knows he leaks my secret?
The bushy-browed old teacher must be laughing: airing the family's dirty wash.
Beyond the four propositions, cutting off the hundred negations,
Mazu and his heirs, the sickness gone, past need of a cure.
'''

pointer = '''
Yangshan Huiji was a ninth-century master. Here he dreams he is called up to preach in the heaven of Maitreya, the buddha-to-be, before ranks of saints, and what he announces is a set phrase: the real teaching is past every concept you could bring to it. The "four propositions" and "hundred negations" are the Buddhist logician's grid for fixing reality, it is, it isn't, both, neither, and all the permutations, and the teaching named here slips clean out of every cell. The deeper hook is the frame: this grand sermon happens inside a dream, and Wansong keeps prodding it, because if a dream-sermon can state the truth dead-on, then "awake" and "dreaming" aren't the clean opposites you assumed. That hook is what the next case picks up, where Nanquan calls the waking world a dream (case 91). The shark's tears and the oyster's pearl are just vivid ways of saying something precious is getting handed over.
'''
