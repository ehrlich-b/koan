number = 15
slug = ""
title_zh = "仰山插鍬"
title_en = "Yangshan Plants the Hoe"

intro_zh = '''
未語先知，謂之默論；不明自顯，謂之暗機。三門前合掌，兩廊下行道，有箇意度。中庭上作舞，後門外搖頭，又作麼生？

'''
intro_en = '''
Knowing before a word is spoken: call it the silent argument. Showing yourself without explaining: call it the hidden trigger. You can press your palms together at the front gate, or pace the corridors lost in thought. But here is the real question. What about the one who dances in the courtyard and shakes his head outside the back door?
'''

case_zh = '''
溈山問仰山：「甚處來？」仰云：「田中來。」山云：「田中多少人？」仰插下鍬子，叉手而立。山云：「南山大有人刈茆。」仰拈鍬子便行。

'''
case_en = '''
Guishan asked Yangshan, "Where've you been?"
"Out in the fields," Yangshan said.
"How many people are out there?"
Yangshan stuck his hoe in the ground, folded his hands, and stood still.
Guishan said, "There's a whole crowd cutting grass on the south mountain."
Yangshan pulled up his hoe and walked off.
'''

verse_zh = '''
老覺情多念子孫，
而今慚愧起家門。
是須記取南山語，
鏤骨銘肌共報恩。

'''
verse_en = '''
Old now, he knows how deep love runs for his children;
humbled, he sets the family house in order.
Hold onto what he said about the south mountain:
carve it in bone, brand it in skin, and repay the kindness together.
'''

pointer = '''
Guishan and Yangshan are teacher and student, and together the founders of one of Chan's five houses, so this is the family business, a master grooming his heir. The small talk about fieldwork and headcounts is a test wearing ordinary clothes: Guishan keeps lobbing plain questions to see whether Yangshan will get tangled in numbers and facts. Yangshan answers twice without a word, once by planting his hoe and standing still, once by pulling it up and leaving. The trap sits in "how many people," which sounds like a request for a figure; what you want to watch is how he declines the bait while still answering completely. The verse adds the Caodong note this book loves, the wordless reply that says more than a count ever could.
'''
