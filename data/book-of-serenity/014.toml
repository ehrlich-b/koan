number = 14
slug = ""
title_zh = "廓侍過茶"
title_en = "Kuo Serves Tea to Deshan"

intro_zh = '''
探竿在手，影草隨身。有時鐵裹綿團，有時錦包特石。以剛決柔則故是，逢強即弱事如何？

'''
intro_en = '''
A probe-pole in your hand, decoy-grass at your back. Sometimes iron wrapped in cotton, sometimes a brick dressed in brocade. Hard breaking soft is easy enough. But when you meet the strong by turning soft, what then?
'''

case_zh = '''
廓侍者問德山：「從上諸聖向什麼處去也？」山云：「作麼？作麼？」廓云：「勅點飛龍馬，跛鼈出頭來。」山便休去。來日山浴出，廓過茶與山，山撫廓背一下。廓云：「這老漢方始瞥地。」山又休去。

'''
case_en = '''
Kuo the attendant asked Deshan, "Where did all the old sages go?"

Deshan said, "What? What's that?"

Kuo said, "I called for a flying dragon-horse, and out crawls a lame turtle." Deshan let it drop.

Next day Deshan came out of the bath, and Kuo brought him tea. Deshan gave him a pat on the back.

Kuo said, "So the old man's finally waking up." Again Deshan let it drop.
'''

verse_zh = '''
覿面來時作者知，
可中石火電光遲。
輸機謀主有深意，
欺敵兵家無遠思。
發必中，
更謾誰？
腦後見腮兮，人難觸犯；
眉底著眼兮，渠得便宜。

'''
verse_en = '''
The master knows it the instant it shows its face;
even spark and lightning-flash come too slow.
Yielding the upper hand has a plan running deep;
baiting his enemy, the general looks no further than the next move.
Loose the arrow, and it lands.
So who is fooling whom?
Cheekbones behind the skull: no one dares touch him.
Eyes set under the brows: he is the one who comes out ahead.
'''

pointer = '''
Deshan is the famously fierce Tang master, the kind who would hit or yell to knock you off your script. Kuo is his personal attendant, the junior monk who fetches his tea and washes his robes, and the kid is testing the master, trying to catch him napping. Twice Kuo throws a sharp line, basically "ha, old man, you slipped" and then "so the old man's finally waking up," and twice Deshan simply lets it go, says nothing, walks off. The trap is reading that silence as a loss. The point runs the other way: the real heavyweight has no need to fire back, and he lets the eager student think he scored because winning the exchange was never the contest. The strange closing image, cheekbones set behind the skull, a face you cannot read, is the old Chinese way of describing someone so deep you can get no handle on him.
'''
