title_zh = "首山新婦"
title_en = "Shoushan's Bride"

intro_zh = '''
吒吒沙沙，剝剝落落，刀刀蹶蹶，漫漫汗汗。沒可咬嚼，難為近傍。且道：是甚麼話？

'''
intro_en = '''
Clatter and scrape. Crack and crumble. Stumble and lurch. A muddy, sweaty mess. Nothing here to sink your teeth into, nothing to get close to. So tell me: what kind of talk is this?
'''

case_zh = '''
僧問首山：「如何是佛？」山云：「新婦騎驢阿家牽。」

'''
case_en = '''
A monk asked Shoushan, "What is Buddha?"
Shoushan said, "The bride rides the donkey, and her mother-in-law leads it."
'''

verse_zh = '''
新婦騎驢阿家牽，
體段風流得自然。
堪笑學顰隣舍女，
向人添醜不成妍。

'''
verse_en = '''
The bride rides the donkey, the mother-in-law leads:
her bearing graceful, easy, nothing forced.
Laughable, the neighbor girl who copies that frown.
She only piles on ugliness and comes out plain.
'''

pointer = '''
Shoushan Shengnian was a Chan teacher in the Linji line. A monk lobs him the oldest question in the book, "What is Buddha?", fishing for something lofty, and Shoushan hands back a snapshot of village life: a bride up on a donkey while her mother-in-law walks ahead leading it. The roles are flipped from what you'd expect, yet everybody is just doing their thing, completely at ease, and that ease is the answer. The verse drives it home with an old Chinese story. A famous beauty was admired even when she frowned in pain, so a homely woman in the village copied the frown and only made herself uglier. The lesson aimed at the monk: stop imitating, stop straining after "Buddha." The real thing is unforced, or it isn't the real thing.
'''
