number = 89
slug = ""
title_zh = "洞山無草"
title_en = "Dongshan's Endless Grass"

intro_zh = '''
動則埋身千丈，不動則當處生苗。直須兩頭撒開，中間放下，更買草鞋行脚始得。

'''
intro_en = '''
Move, and you bury yourself a thousand feet deep. Sit still, and weeds sprout right where you stand. Let go of both ends, drop whatever's in the middle, then buy yourself a pair of straw sandals and hit the road.
'''

case_zh = '''
洞山示眾云：「秋初夏末，兄弟或東或西，直須向萬里無寸草處去。」又云：「只如萬里無寸草處，作麼生去？」石霜云：「出門便是草。」大陽云：「直道：不出門亦是草漫漫地。」

'''
case_en = '''
Dongshan addressed the monks: "It's late summer, early fall, brothers. Some of you will head east, some west. Go where there's not an inch of grass for ten thousand miles." Then he added: "That place, ten thousand miles without a blade of grass — how do you get there?"

Shishuang said: "Step out the door and you're already in grass."

Dayang said: "Better to say: even without stepping out the door, the grass is everywhere."
'''

verse_zh = '''
草漫漫，
門裏門外君自看。
荊棘林中下脚易，
夜明簾外轉身難。
看看，
幾何般。
且隨老木同寒瘠，
將逐春風入燒瘢。

'''
verse_en = '''
Grass everywhere,
inside the gate and out — look for yourself.
Easy to step into the thicket of thorns;
hard to turn around past the bright moonlit curtain.
Look, look —
how many ways are there?
For now, wither in the cold beside the old tree,
then ride the spring wind into the scorched scar.
'''

pointer = '''
Dongshan is the ninth-century master who founded one of the main Chan lines (the Dong in Caodong). At the close of the summer training period the monks scatter to wander and study, and this is his send-off. "Not an inch of grass for ten thousand miles" names a place wiped clean of clinging, distraction, and dust, pure clarity. Then he springs it: if such a place exists, how do you actually get there? Shishuang answers that the moment you take a step you're already in the weeds, any motion at all is entanglement. Dayang outbids him: even if you never move, the grass is everywhere too, so stillness is no escape hatch. The teaching is that there is no grass-free zone to reach and nowhere to stand outside the tangle, which is why the hunt for an exit is the thing to drop. The intro already gave the order: let go of both ends, then buy straw sandals and hit the road.
'''
