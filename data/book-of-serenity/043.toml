number = 43
slug = ""
title_zh = "羅山起滅"
title_en = "Luoshan's Rising and Vanishing"

intro_zh = '''
還丹一粒，點鐵成金；至理一言，轉凡成聖。若知金鐵無二，凡聖本同，果然一點，也用不著。且道：是那一點？

'''
intro_en = '''
One grain of the elixir turns iron to gold. One word that lands turns an ordinary man into a sage. But if you already know gold and iron are not two, that the ordinary man and the sage were never apart, then even that one touch is wasted. So tell me: which touch is that?
'''

case_zh = '''
羅山問巖頭：「起滅不停時如何？」頭咄云：「是誰起滅？」

'''
case_en = '''
Luoshan asked Yantou, "When rising and vanishing never stop, what then?"

Yantou barked, "Whose rising and vanishing?"
'''

verse_zh = '''
斫斷老葛藤，
打破狐窠窟。
豹披霧而變文，
龍乘雷而換骨。
咄！
起滅紛紛是何物？

'''
verse_en = '''
Hack through the old tangled vines.
Smash the fox's den.
The leopard enters the mist and its spots come clear.
The dragon rides the thunder and trades its bones.
Bark!
All this rising and vanishing: what is it?
'''

pointer = '''
Luoshan and Yantou are two Chan masters, and "rising and vanishing" is the nonstop churn of thoughts and feelings, the mental noise that never quiets. Luoshan asks the meditator's natural question: how do I cope with this constant flicker? Inside the question he has already granted two things, that the churn is solidly real and that he's its helpless victim, and that pair is the trap. Yantou skips the how entirely and pulls the floor out, barking "Whose rising and vanishing?" Who, exactly, is this happening to? The verse does the same work, hacking the tangled vines and smashing the fox-den before barking the question once more. Go hunting for the owner the churn supposedly belongs to and the whole tidy problem starts coming apart in your hands.
'''
