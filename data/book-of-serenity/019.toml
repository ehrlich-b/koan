number = 19
slug = ""
title_zh = "雲門須彌"
title_en = "Yunmen's Mount Sumeru"

intro_zh = '''
我愛韶陽新定機，一生與人拔釘楔。為甚有時也開門，掇出膠盆？當路鑿成陷穽，試揀辨看。

'''
intro_en = '''
I love the fresh way Shaoyang sets a trap. All his life he pulled the nails and pried loose the wedges that pinned people down. So why does he sometimes throw the gate wide and shove a bucket of glue at you? Right in the middle of the road he digs a pit and covers it over. Take a look. See if you can tell the trap from the path.
'''

case_zh = '''
僧問雲門：「不起一念，還有過也無？」門云：「須彌山。」

'''
case_en = '''
A monk asked Yunmen, "When not a single thought arises, is there still any fault in that?"
Yunmen said, "Mount Sumeru."
'''

verse_zh = '''
不起一念須彌山，
韶陽法施意非慳。
肯來兩手相分付，
擬去千尋不可攀。
滄海濶，
白雲閑。
莫將毫髮著其間，
假鷄聲韻難謾我，
未肯模胡放過關。

'''
verse_en = '''
Not a single thought arises: Mount Sumeru.
Shaoyang gives out the teaching, and he isn't stingy.
Come willing, and he hands it over with both hands.
Try to leave, and it towers a mile high, nothing to climb.
The blue sea, wide.
The white clouds, idle.
Don't let so much as a hair of yourself slip in.
A faked rooster crow won't fool me at the gate.
I won't wave you through on a vague guess.
'''

pointer = '''
Yunmen is the tenth-century master, Five Dynasties era, known for crushing one-word replies; he is also called Shaoyang after the place he taught. The monk thinks he has located the safe zone: if I empty my mind so thoroughly that not one thought stirs, surely there is nothing left to fault. That "not a single thought" is the trap, because he has turned blankness into something to stand on, a quiet little achievement to be proud of. Yunmen drops a mountain on him, "Mount Sumeru," the giant peak at the center of the world in Buddhist cosmology: your spotless empty mind is itself the largest obstacle around. Congratulating yourself on having no thoughts is just one more thought, and a heavy one. Hongzhi reads this with Yunmen's pillar (case 31) and his other one-word hammer-blows scattered through the book, all of them refusing to let you settle anywhere.
'''
