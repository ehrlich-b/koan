number = 58
slug = ""
title_zh = "剛經輕賤"
title_en = "The Diamond Sutra's Scorn"

intro_zh = '''
依經解義，三世佛冤；離經一字，返同魔說。因不收，果不入底人，還受業報也無？

'''
intro_en = '''
Read the sutra word for word and you slander every buddha, past, present, and future. Throw out a single word and you might as well be quoting demons. Sow no cause, and no fruit comes. So a person like that: do they still get hit with the consequences of what they've done?
'''

case_zh = '''
金剛經云：「若為人輕賤，是人先世罪業應墮惡道，以今世人輕賤故，先世罪業則為消滅。」

'''
case_en = '''
The Diamond Sutra says: "If someone is treated with contempt, it is because the wrongs they did in past lives should drag them down into a wretched rebirth. Yet because people scorn them in this life, the bad karma from those past lives is wiped clean."
'''

verse_zh = '''
綴綴功過，
膠膠因果。
鏡外狂奔演若多，
杖頭擊著破竈墮。
竈墮破，
來相賀，
却道：從前辜負我。

'''
verse_en = '''
Merits and faults, stitched in a tangle.
Cause and effect, glued fast.
Yajnadatta races about, hunting the head outside the mirror.
One whack of the staff, and the Stove God topples.
The stove cracks open, falls apart,
and here they come to offer their congratulations.
Then he turns and says: all this time you've been cheating me.
'''

pointer = '''
The Diamond Sutra is one of Buddhism's most famous scriptures, and this case lifts a line that lands like a paradox: getting insulted is good for you, since it burns off bad karma carried from past lives. The verse piles on two stories. Yajnadatta is the man in an old tale who looked in a mirror, panicked that he'd lost his own head, and ran around frantically searching for the head sitting on his shoulders the whole time, the classic picture of chasing what you already have. The Stove God comes from a Chan story where a teacher smashed a haunted stove-shrine with his staff, and the freed spirit showed up to thank him. Lay those beside the sutra line and the snare appears: if scorn cancels your debt, then whoever scorns you did you a favor, so do you bow in thanks or curse the abuse? The last line catches the trap snapping shut, the one who was "saved" wheeling around to accuse the one who saved him.
'''
