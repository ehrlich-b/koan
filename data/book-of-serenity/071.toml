number = 71
slug = ""
title_zh = "翠巖眉毛"
title_en = "Cuiyan's Eyebrows"

intro_zh = '''
含血噴人，自污其口。貪柸一世償人債，賣紙三年欠鬼錢。萬松為諸人請益：還有擔干計處也無？

'''
intro_en = '''
Spit blood at someone and you only foul your own mouth. Grab for the wine cup and you spend a lifetime paying the debt off. Sell paper three years and you still owe the dead their money. I, Wansong, ask on everyone's behalf: is there any way to walk out of this with your hide intact?
'''

case_zh = '''
翠巖夏末示眾云：「一夏以來，為兄弟說話，看翠巖眉毛在麼？」保福云：「作賊人心虛。」長慶云：「生也。」雲門云：「關。」

'''
case_en = '''
At the end of the summer retreat, Cuiyan said to the assembly, "All summer I've been talking to you brothers. Look. Are my eyebrows still there?" Baofu said, "A thief's heart is uneasy." Changqing said, "They've grown." Yunmen said, "Barrier."
'''

verse_zh = '''
作賊心，
過人膽。
歷歷縱橫對機感。
保福雲門，也垂鼻欺脣；
翠巖長慶，也脩眉映眼。
杜禪和，
有何限。
剛道：意句一齊剗。
埋沒自己，也飲氣吞聲；
帶累先宗，也面牆擔板。

'''
verse_en = '''
A thief's heart,
a daredevil's gall.
Case after case, he takes each comer head-on.
Baofu and Yunmen: noses drooping, lips run loose.
Cuiyan and Changqing: long brows shading the eyes.
These half-baked Zen hands,
is there no end to them?
Flat out he says it: meaning and words, cut clean in one stroke.
Bury yourself, and you swallow your breath, choke down the sound.
Drag the old masters under, and you face the wall, hauling a board.
'''

pointer = '''
A summer retreat is the three-month stretch when monks settle in one place and practice together. Old superstition held that if you talked too freely about the Dharma, explaining what cannot really be explained, your eyebrows would drop out, karma collecting on the spot. So Cuiyan, a student of Xuefeng, ends a whole summer of lecturing by asking the assembly to check: are my eyebrows still there? It is half a joke and half a dare. Did all that talk cost me, or did I get clean away with it? Three famous monks answer and none of them plays it straight. The intro's images all circle the same hook, foul your own mouth, owe debts you can never clear: open your teeth to teach and you are already on the line. Yunmen (864–949, Five Dynasties) ends it with one word, "Barrier," slamming a gate across the whole question rather than walking through it.
'''
