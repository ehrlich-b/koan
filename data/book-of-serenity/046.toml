number = 46
slug = ""
title_zh = "德山學畢"
title_en = "Deshan: Studies Finished"

intro_zh = '''
萬里無寸草，淨地迷人；八方無片雲，晴空賺汝。雖是以楔去楔，不妨拈空挂空。腦後一槌，別看方便。

'''
intro_en = '''
Ten thousand miles and not a blade of grass: clean open ground, and it loses people. Eight directions and not a scrap of cloud: clear sky, and it cheats you. Sure, it's driving out one wedge with another. No harm grabbing emptiness and hanging it on emptiness too. A blow to the back of the skull. Don't go calling it a kindness.
'''

case_zh = '''
德山圓明大師示眾云：「及盡去也，直得三世諸佛口掛壁上，猶有一人呵呵大笑。若識此人，參學事畢。」

'''
case_en = '''
Great Master Yuanming of Deshan spoke to the assembly: "Push it all the way to the end, and even the buddhas of past, present, and future wind up with their mouths hung on the wall. And still, off to one side, one person stands there roaring with laughter. Recognize that person, and your studies are finished."
'''

verse_zh = '''
收！
把斷襟喉，
風磨雲拭。
水冷天秋，
錦鱗莫謂無嗞味。
釣盡滄浪月一鉤。

'''
verse_en = '''
Reel it in.
Grab the throat and shut it.
Wind scours, clouds wipe it clean.
Water cold, sky gone to autumn.
Don't say the golden fish has no taste:
one hook of moonlight fishes the whole blue river dry.
'''

pointer = '''
This Deshan is Master Yuanming, not the famous Deshan of the stick, a different man. "The buddhas of past, present, and future" means every awakened being there ever was or will be, the entire roster. Push it all the way to the end, he says, and even that whole crowd ends up with their mouths hung on the wall, struck dumb, useless, with nothing left to say. The koan turns on the punchline that follows: off to one side, one person is still standing there roaring with laughter. Who is that? Not the buddhas, not the teachings, not any answer that fits into words. Recognize that laugher and your studies are over. The verse recasts it as night fishing, one hook and a sliver of moon pulling up everything, that "golden fish" being exactly the one you came out here to land.
'''
