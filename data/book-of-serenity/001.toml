title_zh = "世尊陞座"
title_en = "The Buddha Takes the Seat"

intro_zh = '''
閉門打睡，接上上機；顧鑑頻申，曲為中下。那堪上曲䚄木，弄鬼眼睛。有箇傍不肯底，出來，也怪伊不得。

'''
intro_en = '''
Shut the door and doze off: that's how you meet the sharpest students. A glance, a nod, again and again, is bending low for the middling and the dull. But what of the ones who put on a show, mugging and rolling their eyes to fake it? If someone off to the side won't buy it and steps out to call it, you can't even blame them.
'''

case_zh = '''
世尊一日陞座。文殊白槌云：「諦觀法王法，法王法如是。」世尊便下座。

'''
case_en = '''
One day the Buddha took the teaching seat. Manjushri struck the gavel and announced, "Look closely at the law of the King of the Law. The law of the King of the Law is just this." And the Buddha came down from the seat.
'''

verse_zh = '''
一段真風見也麼？
綿綿化母理機梭。
織成古錦含春象，
無柰東君漏泄何。

'''
verse_en = '''
That one breath of the true wind, do you see it?
On and on, the mother of change works her loom.
She weaves an old brocade holding the shapes of spring,
yet what can she do? The east wind lets it all slip out.
'''

pointer = '''
The collection opens at the source: the Buddha climbing onto the teaching seat to deliver a sermon, the founding scene of the whole tradition. Manjushri is the bodhisattva of wisdom, who usually runs these assemblies like a master of ceremonies; the gavel he strikes is the signal that a Dharma talk is about to begin. He bangs it and narrates the entire teaching in one breath: look closely, the truth of the King of the Law is exactly this. The "King of the Law" is the Buddha, and "this" is whatever he was about to say. So the Buddha simply gets down and walks off, because the teaching was already complete in the silence before anyone opened a session. Notice that the case never tells you what "this" points to, only that it was finished before the talk could start.
'''
