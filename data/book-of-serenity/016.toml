number = 16
slug = ""
title_zh = "麻谷振錫"
title_en = "Maku Shakes His Staff"

intro_zh = '''
指鹿為馬，握土成金。舌上起風雷，眉間藏血刃。坐觀成敗，立驗死生。且道：是何三昧？

'''
intro_en = '''
Call a deer a horse. Pinch dirt into gold. Storms break loose on the tip of the tongue, and a blade hides between the brows. Sit and watch who wins and who loses; stand and test who lives and who dies. So tell me: what kind of trance is this?
'''

case_zh = '''
麻谷持錫到章敬，遶禪床三匝，振錫一下，卓然而立。敬云：「是，是。」谷又到南泉，遶禪床三匝，振錫一下，卓然而立。泉云：「不是，不是。」谷云：「章敬道是，和尚為什麼道不是？」泉云：「章敬即是，是汝不是。此是風力所轉，終成敗壞。」

'''
case_en = '''
Maku came to Zhangjing carrying his ringed staff. He walked around the meditation seat three times, gave the staff a single shake, and stood there straight as a post.
Zhangjing said, "Right, right."
Then Maku went to Nanquan. He walked around the meditation seat three times, gave the staff a single shake, and stood there straight as a post.
Nanquan said, "Wrong, wrong."
Maku said, "Zhangjing called it right. Why do you call it wrong?"
Nanquan said, "Zhangjing was right. You're wrong. The wind is blowing you around, and in the end it all falls apart."
'''

verse_zh = '''
是與不是，
好看棬䙡。
似抑似揚，
難兄難弟。
縱也彼既臨時，
奪也我何特地。
金錫一振太孤標，
繩床三遶閑游戲。
叢林擾擾是非生，
想像髑髏前見鬼。

'''
verse_en = '''
Right and wrong:
a fine show of force.
Looks like a blow, looks like praise.
Two brothers, neither the weaker.
Let it stand: he only met the moment.
Snatch it away: what's so special in me?
One shake of the gold-ringed staff, lofty and alone.
Three laps of the rope seat, idle play.
The monastery churns, and right and wrong are born.
Picture it: a skull seeing ghosts.
'''

pointer = '''
Maku, Zhangjing, and Nanquan are all Tang masters. A monk's ringed staff carried metal rings that jingled when shaken, a way of announcing yourself. Maku pulls the same wordless stunt on two teachers in turn: circle the seat three times, shake the staff, plant your feet. One says "right," the other says "wrong." The trap is that Maku assumes there must be a correct answer he can pin down by comparing the two verdicts. Nanquan's jab, that Maku is just being blown around by the wind, means he is running a routine and hunting for approval, letting other people's calls push him this way and that. The skull seeing ghosts at the end of the verse is the punchline, manufacturing problems out of nothing and spooking yourself with a right and wrong you invented.
'''
