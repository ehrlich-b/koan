number = 34
slug = ""
title_zh = "風穴一塵"
title_en = "Fengxue's Speck of Dust"

intro_zh = '''
赤手空拳，千變萬化。雖是將無作有，奈何弄假像真。且道：還有基本也無？

'''
intro_en = '''
Bare hands, empty fists, yet a thousand shapes and ten thousand changes. He makes something out of nothing, passes the fake off as real. So tell me: is there anything solid underneath?
'''

case_zh = '''
風穴垂語云：「若立一塵，家國興盛；不立一塵，家國喪亡。」雪竇拈拄杖云：「還有同死同生底衲僧麼？」

'''
case_en = '''
Fengxue addressed the assembly: "Raise up a single speck of dust, and the nation flourishes. Leave it unraised, and the nation falls."
Xuedou held up his staff and said, "Are there any monks here who will live and die with that speck?"
'''

verse_zh = '''
皤然渭水起垂綸，
何似首陽清餓人。
只在一塵分變態，
高名、勳業，兩難珉。

'''
verse_en = '''
White-haired by the Wei River, he lets down his line.
How does that match the clean starving man of Mount Shouyang?
Everything turns on one speck of dust:
great name, great deeds, neither passes for true jade.
'''

pointer = '''
Fengxue states the whole game in one image: raise a single speck of dust and the nation flourishes, with kings and someone in charge; leave it unraised and all of that drops away into nothing. Hearing this as "power good" or "power bad" walks straight into the trap, because it is neither. The two figures in the verse are stock Chinese opposites: a white-haired minister who fished by the Wei River until a king came begging him to govern, fully engaged with the world, and the brothers of Mount Shouyang who refused to serve a new dynasty and starved rather than compromise, clean of it. Xuedou cuts past the whole comparison with his question, which is the live edge of the case. Forget ranking the two roads. Can you actually pick one up and stake your whole life and death on it, no hedging, the way he stakes his on the raised staff?
'''
