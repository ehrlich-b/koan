number = 56
slug = ""
title_zh = "密師白兔"
title_en = "Master Mi's White Rabbit"

intro_zh = '''
寧可永劫沈淪，不求諸聖解脫。提婆達多，無間獄中受三禪樂；欝頭藍弗，有頂天上墮飛狸身。且道：利害在甚麼處？

'''
intro_en = '''
Better to sink and drown forever than chase the saints' liberation. Devadatta, deep in the hell of no relief, tasted the bliss of the third meditation. Udraka, perched at the very summit of heaven, fell back into the body of a flying fox. So tell me: where is the gain, and where the loss?
'''

case_zh = '''
密師伯與洞山行次，見白兔子面前走過。密云：「俊哉！」山云：「作麼生？」密云：「如白衣拜相。」山云：「老老大大，作這箇語話！」密云：「爾又作麼生？」山云：「積代簪纓，暫時落薄。」

'''
case_en = '''
Master Mi was walking with Dongshan when a white rabbit darted across the path in front of them.
"Quick little thing!" said Mi.
"How so?" said Dongshan.
"Like a commoner raised straight to prime minister," said Mi.
"A grown man your age, and that's the best you can do?" said Dongshan.
"Then what would you say?" said Mi.
"Generations of nobility," said Dongshan, "fallen low for a little while."
'''

verse_zh = '''
抗力霜雪，
平步雲霄。
下惠出國，
相如過橋。
蕭曹謀略能成漢，
巢許身心欲避堯。
寵辱若驚深自信，
真情參跡混漁樵。

'''
verse_en = '''
He holds his ground against the frost and snow,
then strolls at ease into the clouds.
Liuxia Hui walks out of his own country;
Xiangru crosses the bridge and never looks back.
Xiao and Cao schemed well and built the Han;
Chaofu and Xu You washed their ears to dodge a throne.
Honor or disgrace, he startles at either, yet trusts himself to the depths,
his true heart hidden in the tracks of fisherman and woodcutter.
'''

pointer = '''
Two Tang Chan monks are out walking when a white rabbit bolts past. Mi sees a poor man suddenly raised high; Dongshan sees an old noble family fallen on hard times, same rabbit, opposite stories, and the jab "a grown man your age, that's all you've got?" is the kind of needle these two traded to test each other. The intro stacks the paradox harder: Devadatta, the Buddha's traitor cousin, finds a flash of bliss inside hell, while the holy hermit Udraka, who reached the highest heaven, drops back down into a fox's body. The reflex the case is after is the urge to rule one reading right and the other wrong, or to keep score of who's up and who's down, when up and down keep trading seats faster than you can call it. The verse name-drops famous Chinese figures who held steady whether the world honored them or threw them out.
'''
