number = 22
slug = ""
title_zh = "巖頭拜喝"
title_en = "Yantou Bows to the Shout"

intro_zh = '''
人將語探，水將杖探，撥草瞻風，尋常用底。忽然跳出箇焦尾大蟲，又作麼生？

'''
intro_en = '''
Words sound out a person. A staff sounds the depth of the water. You part the grass to read the wind: ordinary, everyday moves. Then all at once a scorched-tail tiger comes leaping out at you. Now what?
'''

case_zh = '''
巖頭到德山，跨門便問：「是凡是聖？」山便喝，頭禮拜。洞山聞云：「若不是豁公，大難承當。」頭云：「洞山老漢不識好惡，我當時一手擡一手捺。」

'''
case_en = '''
Yantou came to see Deshan. Planting himself in the doorway, he asked, "Ordinary or holy?"
Deshan shouted.
Yantou bowed.
Hearing of this, Dongshan said, "If it were anyone but Yantou, it would have been hard to carry off."
Yantou said, "That old man Dongshan can't tell good from bad. At that moment one hand was lifting and one hand was pressing down."
'''

verse_zh = '''
挫來機，
總權柄。
事有必行之威，
國有不犯之令。
賓尚奉而主驕，
君忌諫而臣佞。
底意巖頭問德山，
一擡一捺看心行。

'''
verse_en = '''
He breaks your keenest move;
the whole hold is his.
Some deeds carry a power that must be obeyed;
some realms post a law no one dares break.
The guest still bows, yet the host grows proud;
the ruler spurns counsel, and the minister fawns.
This is the buried point of Yantou questioning Deshan:
one hand lifting, one hand pressing. Watch how the mind moves.
'''

pointer = '''
Two big-name Tang teachers. Yantou is the up-and-comer; Deshan is the famous old master who answered questions with blows and yells rather than explanations. Before even crossing the threshold, Yantou throws a trap, "ordinary or holy?", a question rigged so any straight answer makes you look like you are clutching a category. Deshan refuses the bait and just shouts. Yantou bows, which looks like surrender. Then a third teacher, Dongshan, praises how cleanly Yantou pulled it off, and Yantou flips the reading: he was not beaten, he was running the whole exchange, honoring Deshan with the bow and testing him with the question at the same instant. "One hand lifting, one hand pressing" names that double move, flattery and challenge in one gesture. The case turns on who is actually in control when neither man blinks.
'''
