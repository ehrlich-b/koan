number = 26
slug = ""
title_zh = "仰山指雪"
title_en = "Yangshan Points at the Snow"

intro_zh = '''
氷霜一色，雪月交光。凍殺法身，清損漁父。還堪賞玩也無？

'''
intro_en = '''
Ice and frost, all one color. Snow and moon, their light blended into a single glare. It freezes the body of truth solid and chills the old fisherman to the bone. Is there anything here worth admiring, or not?
'''

case_zh = '''
仰山指雪師子云：「還有過得此色者麼？」雲門云：「當時便與推倒。」雪竇云：「只解推倒，不解扶起。」

'''
case_en = '''
Yangshan pointed at a snow lion and said, "Is there anyone who can get past this color?"
Yunmen said, "Right then I'd have shoved it over."
Xuedou said, "He knows how to knock it down. He doesn't know how to set it back up."
'''

verse_zh = '''
一倒一起雪庭師子，
慎於犯而懷仁，
勇於為而見義。
清光照眼似迷家，
明白轉身還墮位。
衲僧家了無寄，
同死同生何此何彼。
暖信破梅兮春到寒枝，
涼飈脫葉兮秋澄潦水。

'''
verse_en = '''
Down once, up once—
the snow lion in the courtyard.
Careful not to overstep, he keeps faith;
bold to act, he sees what's right.
Clear light fills your eyes; you'd think you'd lost the way home.
Turn your body, step clear, and you fall back into rank.
For a real monk there's nowhere to lodge:
same death, same life, what is "this," what is "that"?
A warm breath cracks the plum, spring reaches the cold branch.
A cool gust strips the leaves, autumn clears the standing pools.
'''

pointer = '''
Someone has packed a lion out of snow, and Yangshan turns it into a checkpoint: "this color" is the whole blank-white world, emptiness as one uniform glare that swallows every distinction. Can anyone get past it? Yunmen's reflex is to shove the thing over, because a perfect snow lion is exactly the kind of pristine emptiness people stop and admire instead of walking through. Xuedou, a later master who collected old cases and added his own needling lines, turns the same blade on Yunmen: demolition is easy, but having flattened the lion, can you build anything back? The verse raises the bar past both moves: knocking down and setting up are the small skills, and the open spot to aim for is the one that does both and lodges in neither, the way the seasons keep cracking the plum and stripping the leaves without holding still. So which can you do, and can you do both?
'''
