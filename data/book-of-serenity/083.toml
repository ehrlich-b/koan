number = 83
slug = ""
title_zh = "道吾看病"
title_en = "Daowu Visits the Sick"

intro_zh = '''
通身做病，摩詰難痊。是草堪醫，文殊善用。爭如參取向上人，得箇安樂處。如何是安樂處？

'''
intro_en = '''
The whole body one sickness, and even Vimalakirti couldn't shake it. There's a weed that cures it, and Manjushri knew the use of it. But why not lay hold of the one who has gone beyond all that, and find some real ease? And what is that place of ease?
'''

case_zh = '''
溈山問道吾：「甚麼處來？」吾云：「看病來。」山云：「有幾人病？」吾云：「有病者、不病者。」山云：「不病者莫是智頭陀麼？」吾云：「病與不病，總不干他事。速道速道！」山云：「道得也沒交涉。」

'''
case_en = '''
Guishan asked Daowu, "Where have you come from?"

Daowu said, "From visiting the sick."

Guishan said, "How many were sick?"

Daowu said, "There's the one who falls ill and the one who doesn't."

Guishan said, "The one who doesn't fall ill — isn't that you, Zhi the ascetic?"

Daowu said, "Sick or not sick, none of it touches him. Speak! Speak now!"

Guishan said, "Say it and you'd still miss it clean."
'''

verse_zh = '''
妙藥何曾過口，
神醫莫能捉手。
若存也渠本非無，
至虛也渠本非有。
不滅而生，
不亡而壽。
全超威音之前，
獨步劫空之後。
成平也天蓋地擎，
運轉也烏飛兔走。

'''
verse_en = '''
The wonder-drug never passed his lips.
The healer's hand can't find his pulse.
Call him real, he was never nothing.
Press him to pure void, he was never something.
He does not die, yet he is born.
He does not perish, yet he lives on.
Clean past the first sound of the world,
walking alone beyond the empty age.
At rest: sky roofs him, earth bears him up.
In motion: the sun-crow flies, the moon-hare runs.
'''

pointer = '''
This is two old Chan monks taking each other's measure. Daowu comes back from visiting the sick, and Guishan needles him with what sounds like idle chat, how many were ill? Daowu turns it into a riddle: there is the one in you who falls sick and dies, and the one who doesn't. Guishan tries to nail that deathless one onto Daowu personally, using his name Zhi, as though it were a possession you could point at and claim. Daowu's reply, that it has nothing to do with him, now speak, is the trap closing: the instant you make the deathless into a someone, it's gone. Hongzhi's verse circles this "him" who can't be located, can't be cured, can't be filed as either something or nothing, and runs the whole show regardless. (The sun-crow and the moon-hare are just the old shorthand for time turning.)
'''
