number = 47
slug = ""
title_zh = "趙州柏樹"
title_en = "Zhaozhou's Cypress Tree"

intro_zh = '''
庭前柏樹，竿上風幡。如一華說無邊春，如一滴說大海水。間生古佛，逈出常流，不落言思。若為話會？

'''
intro_en = '''
The cypress tree in the yard. The flag snapping on the pole. One flower can tell the whole of an endless spring; one drop, the whole of the ocean. Once in a long age an old buddha appears, head and shoulders above the common run, never caught in words or thought. So how do you talk about that?
'''

case_zh = '''
僧問趙州：「如何是祖師西來意？」州云：「庭前柏樹子。」

'''
case_en = '''
A monk asked Zhaozhou, "What is the point of Bodhidharma's coming from the West?"
Zhaozhou said, "The cypress tree out in the yard."
'''

verse_zh = '''
岸眉橫雪，
河目含秋。
海口鼓浪，
航舌駕流。
撥亂之手，
太平之籌。
老趙州，老趙州，
攪攪叢林卒未休。
徒費工夫也，造車合轍；
本無伎倆也，塞壑填溝。

'''
verse_en = '''
Snow lies level along his brows,
autumn pools in his eyes.
His mouth, an ocean drumming up waves;
his tongue, a boat astride the current.
A hand that quiets the chaos,
a plan that keeps the peace.
Old Zhaozhou, old Zhaozhou,
forever stirring the monasteries, never letting up.
Wasted labor, and yet the cart he builds fits the ruts.
No tricks up his sleeve, and yet he fills every gully and ditch.
'''

pointer = '''
"Why did Bodhidharma come from the West?" was the standard Chan way of asking the largest possible question: the actual heart of the whole tradition, the reason any of it exists. Monks asked it angling for a grand secret. Zhaozhou, the Tang master prized for plain deadpan answers and met all over this book (10, 18, 39, 63), just names the tree growing outside the hall. No philosophy, no hidden door, only what's already standing in the yard. You get the same bare medicine in his "wash your bowl" (39) and his dog (18); the cypress is one more dose. The verse paints him as an old general who can win the war and keep the peace in a single gesture: the offhand replies look like wasted breath, yet the cart he builds drops straight into the ruts.
'''
