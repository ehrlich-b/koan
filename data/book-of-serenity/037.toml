number = 37
slug = ""
title_zh = "溈山業識"
title_en = "Guishan's Karmic Mind"

intro_zh = '''
驅耕夫之牛，拽迴鼻孔；奪飢人之食，把定咽喉。還有下得毒手者麼？

'''
intro_en = '''
Drive off the plowman's ox. Yank the bull around by the nose. Snatch the food from a starving man's hands. Clamp down on his throat. Anybody here got a hand cruel enough?
'''

case_zh = '''
溈山問仰山：「忽有人問：『一切眾生但有業識，茫茫無本可據』，子作麼生驗？」仰云：「若有僧來，即召云：『某甲。』僧迴首，乃云：『是甚麼？』待伊擬議，向道：『非唯業識茫茫，亦乃無本可據。』」溈云：「善哉。」

'''
case_en = '''
Guishan said to Yangshan, "Suppose someone comes and says, 'Every living being is nothing but karmic mind, a vast murky drift with no root to stand on.' How would you test him?"

Yangshan said, "If a monk comes along, I call out to him. When he turns his head I say, 'What is that?' Before he can scramble for an answer, I tell him: not only is karmic mind a vast murky drift, it has no root to stand on either."

Guishan said, "Good."
'''

verse_zh = '''
一喚迴頭識我不？
依俙蘿月又成鉤。
千金之子纔流落，
漠漠窮途有許愁。

'''
verse_en = '''
One call, his head turns. Does he know me or not?
Faint behind the vines, the moon hooks thin again.
The rich man's son, the moment his fortune is gone,
takes the dead-end road, and the grief has no end.
'''

pointer = '''
Guishan and Yangshan founded one of the early Chan houses, and this is shop talk between teacher and star pupil. "Karmic mind" is their name for the ordinary reactive mind, the one on autopilot, yanked around by every impulse and habit with no solid ground beneath it. Yangshan's move is to catch the thing live rather than describe it: call a man's name, his head whips around on pure reflex, and there is the rootless reflex itself, naked, before he can wrap it in an explanation. The verse closes the loop with a rich man's son who blows the whole inheritance and ends up wandering broke on a dead-end road, which is the human condition in one figure: living off a borrowed mind, mistaken for owned property. Where exactly is the ground he thinks he's standing on?
'''
