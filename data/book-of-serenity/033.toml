number = 33
slug = ""
title_zh = "三聖金鱗"
title_en = "Sansheng's Golden Fish"

intro_zh = '''
逢強即弱，遇柔即剛。兩硬相擊，必有一傷。且道：如何迴互去？

'''
intro_en = '''
Meet force with softness. Meet softness with steel. When two hard things collide, one of them breaks. So tell me: how do you slip past each other instead?
'''

case_zh = '''
三聖問雪峯：「透網金鱗，未審以何為食？」峯云：「待汝出網來，向汝道。」聖云：「一千五百人善知識，話頭也不識。」峯云：「老僧住持事繁。」

'''
case_en = '''
Sansheng asked Xuefeng, "The golden fish that has broken through the net. What does it eat?"
Xuefeng said, "Get out of the net first, then I'll tell you."
Sansheng said, "Fifteen hundred people come to you for the teaching, and you can't even follow a conversation."
Xuefeng said, "I'm an old man. Running this place keeps me busy."
'''

verse_zh = '''
浪級初昇，雲雷相送。
騰躍稜稜看大用，
燒尾分明度禹門。
華鱗未肯淹虀甕，
老成人不驚眾。
慣臨大敵初無恐，
泛泛端如五兩輕。
堆堆何啻千鈞重，
高名四海復誰同。
介立八風吹不動。

'''
verse_en = '''
The waves rise, thunder and clouds see it off.
Watch it leap, sheer power, edge on edge.
It burns off its tail and clears the Dragon Gate, plain as day.
A fish scaled like that won't lie pickling in a jar.
A seasoned man doesn't spook the crowd.
Used to facing great armies, he never felt fear.
Adrift, light as a feather streamer in the wind.
Settled, heavier than a thousand tons.
His name spans the four seas, and who can match him?
He stands alone; the eight winds blow and he does not move.
'''

pointer = '''
Two heavyweights size each other up and neither gives ground. Sansheng's "golden fish that has broken through the net" is a stock figure for someone fully awake, past every trap and clear of the whole apparatus, and his question is really a dare: what does a master like that still need to be fed? Xuefeng, who teaches hundreds, refuses the bait with "get out of the net first," meaning show me, then we'll talk. Sansheng accuses him of dodging, Xuefeng plays the worn-out old man too busy running the place to spar, and the exchange that looks like a fumble is two professionals each denying the other any handle to seize. The "eight winds" in the verse are the eight conditions that swing ordinary people around, gain and loss, praise and blame, fame and disgrace, pleasure and pain; the verse's whole claim is that neither of these two is budging an inch. So which one actually fed the fish?
'''
