number = 52
slug = ""
title_zh = "曹山法身"
title_en = "Caoshan's Dharma Body"

intro_zh = '''
諸有智者，以譬喻得解。若到比不得、類難齊處，如何說向他？

'''
intro_en = '''
The clever grasp things by analogy. But where nothing compares, where there's no match to set beside it, how do you point a man there?
'''

case_zh = '''
曹山問德尚座：「『佛真法身，猶若虛空；應物現形，如水中月。』作麼生說箇應底道理？」德云：「如驢覻井。」山云：「道即大曬，道只道得八成。」德云：「和尚又如何？」山云：「如井覻驢。」

'''
case_en = '''
Caoshan asked Elder Deshang, "'The Buddha's true Dharma body is like empty space. It takes shape in response to things, the way the moon appears in water.' How would you explain that responsiveness?"

Deshang said, "Like a donkey staring into a well."

Caoshan said, "You said a lot, all right. But you only got eighty percent of it."

Deshang said, "And you, Master?"

Caoshan said, "Like the well staring back at the donkey."
'''

verse_zh = '''
驢覻井，
井覻驢。
智容無外，
淨涵有餘。
肘後誰分印？
家中不蓄書。
機絲不掛梭頭事，
文彩縱橫意自殊。

'''
verse_en = '''
The donkey stares into the well,
the well stares into the donkey.
Wisdom so wide it has no outside,
clear and brimming, more than enough.
Who keeps a seal tucked in his sleeve?
This house stores no books.
No thread on the loom, the shuttle flies empty,
yet the pattern runs every way, the meaning all its own.
'''

pointer = '''
Caoshan and Deshang are Chan monks, and the line in quotes is a stock scripture verse: the Buddha's true nature is like empty space, formless yet taking shape in response to whatever shows up, the way the moon "appears" in a pond without ever being in the water. Caoshan asks how that mirroring works. Deshang nails the image of a creature gazing at its reflection, a donkey peering down a well and seeing itself look back. Good, says Caoshan, but it's lopsided, all donkey watching well. So he flips it: the well watches the donkey too. There's no one-way arrangement of an observer over here and a watched world over there, no self standing apart taking in the scenery. The looking runs both directions at once, and neither end is in charge. Caoshan trained under Dongshan (49), and this two-way mirror is the family's signature move, the absolute and the everyday reflecting each other with no gap.
'''
