number = 62
slug = ""
title_zh = "米胡悟否"
title_en = "Mihu Asks About Awakening"

intro_zh = '''
達磨第一義諦，梁武頭迷；淨名不二法門，文殊口過。還有入作分也無？

'''
intro_en = '''
Bodhidharma's "highest truth," and Emperor Wu's head went fuzzy. Vimalakirti's "gate beyond opposites," and even Manjushri said too much. So is there any way in at all?
'''

case_zh = '''
米胡令僧問仰山：「今時人還假悟否？」山云：「悟即不無，爭奈落第二頭何？」僧迴，舉似米胡，胡深肯之。

'''
case_en = '''
Mihu sent a monk to put a question to Yangshan: "Do people these days still need to wake up, or not?"
Yangshan said, "Waking up, sure, that's real enough. But what do you do about landing one step short of it?"
The monk went back and reported this to Mihu, who gave it his deep approval.
'''

verse_zh = '''
第二頭分悟破迷，
快須撒手捨筌罤。
功兮未盡成駢拇，
智也難知覺噬臍。
兔老氷盤秋露泣，
鳥寒玉樹曉風凄。
持來大仰辨直假，
痕玷全無貴白珪。

'''
verse_en = '''
One step short: there waking breaks the dark.
Quick, let go. Drop the net once you've got the fish.
Push the work too far and you grow a sixth finger;
even sharp wits can't see it, and then it's too late to gnaw your own navel.
The old rabbit on the icy moon weeps autumn dew;
a cold bird in the jade tree, the dawn wind keening.
Bring it to great Yangshan, he'll sort the true from the false:
not a flaw, not a stain, prized like white jade.
'''

pointer = '''
Yangshan and Mihu are ninth-century Chan masters. Mihu sends a messenger with the loaded question of the whole tradition: do you still need to "wake up," have a sudden breakthrough, or is enlightenment already here and the striving beside the point? Say yes and you've turned awakening into a prize you chase and fall short of; say no and you've thrown out the practice. Yangshan threads it. Yes, awakening is real, but the instant you grab at it you've already missed by a hair, "landed one step short." The verse stacks warnings against overdoing it: keep hauling the net after you've caught the fish, or grow a sixth finger you don't need, and you wreck the thing. Mihu gave it deep approval because Yangshan refused both easy exits and named the gap that opens the moment you reach.
'''
