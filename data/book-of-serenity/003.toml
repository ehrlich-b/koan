number = 3
slug = ""
title_zh = "東印請祖"
title_en = "The Patriarch Reads No Sutras"

intro_zh = '''
劫前未兆之機，烏龜向火；教外別傳一句，碓嘴生花。且道：還有受持讀誦分也無？

'''
intro_en = '''
The workings that left no trace before the first age dawned. A turtle warming itself at the fire. The one line handed down outside the teachings. Flowers blooming from a stone pestle. So tell me: is there any way to take it up, to hold it, to recite it and read it?
'''

case_zh = '''
東印土國王，請二十七祖般若多羅齊。王問曰：「何不看經？」祖云：「貧道入息不居陰界，出息不涉眾緣，常轉如是經，百千萬億卷。」

'''
case_en = '''
The king of Eastern India invited the twenty-seventh patriarch, Prajnatara, to a meal. The king asked, "Why don't you read the sutras?"

The patriarch said, "Breathing in, I don't dwell in the realm of the senses. Breathing out, I don't get tangled in things. Always I am turning a sutra like this, a hundred thousand million scrolls of it."
'''

verse_zh = '''
雲犀玩月璨含輝，
木馬游春駿不羈。
眉底一雙寒碧眼，
看經那到透牛皮。
明白心起曠劫，
英雄力破重圍。
妙圓樞口轉靈機，
寒山忘却來時路，
拾得相將携手歸。

'''
verse_en = '''
The cloud-rhino toys with the moon, its glow brimming over.
The wooden horse roams the spring, a colt no rope can hold.
Beneath his brows, a pair of cold blue eyes:
what sutra-reading ever cut clean through the hide?
A clear mind rises and the long ages fall away;
the hero's strength bursts the ring of siege wide open.
At the pivot's mouth, perfect and subtle, the living spring turns.
Hanshan forgets the road that brought him here,
and Shide takes his hand and leads him home.
'''

pointer = '''
This one reaches back to the Indian roots of the lineage, before Chan ever arrived in China. A "patriarch" is just an official lineage-holder; Prajnatara is counted as the twenty-seventh, the teacher who would pass the transmission to Bodhidharma, the man who carried it east. Sutras are the recorded scriptures, and a monk is expected to read and chant them constantly, so the king's question carries a faint needle: why are you skipping the homework? Prajnatara turns the word "sutra" inside out. For him the scripture being recited is his own breathing and awareness, running every moment without a single scroll, never snagged on the senses or tangled in things. The reframe is the teaching: he is not refusing the practice but relocating it. Hanshan and Shide, the two laughing hermit-poets who close the verse, are the tradition's patron saints of people who get this and wander off grinning.
'''
